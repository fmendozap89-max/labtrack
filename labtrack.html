function markDone(id,assignDate){
  const t=tasks.find(x=>x.id===id);if(!t)return;
  if(currentUser.role==='analyst'||currentUser.role==='reviewer'){
    if(t.status==='observed'){
      // Re-envío tras observación
      // Modal inline para comentario + checkbox replanificar
      var resubDiv=document.createElement('div');
      resubDiv.innerHTML='<div style="position:fixed;inset:0;z-index:500;background:rgba(0,0,0,.4);display:flex;align-items:center;justify-content:center">'
        +'<div style="background:var(--surface);border-radius:var(--radius-lg);padding:20px;width:380px;box-shadow:0 8px 32px rgba(0,0,0,.2)">'
        +'<h4 style="margin:0 0 14px">Re-enviar análisis</h4>'
        +'<div class="frow"><label>Comentario de corrección *</label><textarea id="rsub-cmt" rows="3" style="width:100%;resize:vertical"></textarea></div>'
        +'<label style="display:flex;align-items:center;gap:8px;margin:10px 0;font-size:13px"><input type="checkbox" id="rsub-replan"> Solicitar replanificación de fechas</label>'
        +'<div style="display:flex;gap:8px;justify-content:flex-end;margin-top:14px">'
        +'<button onclick="document.body.removeChild(this.closest(\'div[style*=fixed]\').parentElement)" class="btn">Cancelar</button>'
        +'<button onclick="window._doResubmit('+id+')" class="btn pri">↩ Re-enviar</button>'
        +'</div></div></div>';
      document.body.appendChild(resubDiv);
      window._doResubmit=function(tid){
        var cmt=(document.getElementById('rsub-cmt')||{}).value||'';
        var wantsReplan=(document.getElementById('rsub-replan')||{}).checked||false;
        if(!cmt.trim()){alert('El comentario es requerido.');return;}
        document.body.removeChild(resubDiv);
        var resubComment=cmt.trim();

      const oldStatus=t.status;
      t.status='done';
      t.resubmittedBy=currentUser.id;
      t.resubmittedTs=Date.now();
      t.resubmitComment=resubComment.trim();
      if(!t.resubmitHistory)t.resubmitHistory=[];
      t.resubmitHistory.push({by:currentUser.id,byName:currentUser.name,ts:Date.now(),comment:resubComment.trim()});
      auditLog('STATUS_CHANGE','TASK',id,{
        field:'status',oldVal:oldStatus,newVal:'done',
        description:'Re-envío tras observación: '+t.producto+' '+t.lote,
        comment:resubComment.trim()
      },'Re-envío: '+resubComment.trim());
      // Marcar notificación de observación como leída (por el analista que re-envía)
      replanNotifs.forEach(function(n){
        if(n.type==='observation'&&n.taskId===id&&n.analystId===currentUser.id){
          if(!n.readBy)n.readBy=[];
          if(!n.readBy.includes(currentUser.id))n.readBy.push(currentUser.id);
        }
      });
      // Notificar al Supervisor
      var reviewerUsers=USERS.filter(function(u){return u.role==='supervisor'||u.role==='reviewer';});
      reviewerUsers.forEach(function(rv){
        replanNotifs.push({
          id:nextNotifId++,type:'resubmit',taskId:id,
          analystId:currentUser.id,forUserId:rv.id,status:'pending',
          ts:Date.now(),fromUser:currentUser.id,fromName:currentUser.name,
          producto:t.producto,lote:t.lote,comment:resubComment.trim()
        });
      });
      saveLS();render();
      saveNow().catch(function(e){console.error('saveNow resubmit:',e);});
      // Si quiere replanificar, abrir el modal de replanificación
      if(wantsReplan){
        var myAssigns=(t.assignments||[]).filter(function(a){return a.analyst===currentUser.id&&!a._removed;});
        var ma=myAssigns[0];
        if(ma){showNotifPanel=false;openReplan(id,currentUser.id);}
      }
      }; // end _doResubmit
      return; // wait for modal
    } else {
      // Completar: pedir horas dedicadas
      // Modal para horas de la sesión
      var hDiv=document.createElement('div');
      hDiv.innerHTML='<div style="position:fixed;inset:0;z-index:500;background:rgba(0,0,0,.4);display:flex;align-items:center;justify-content:center">'

        +'<button onclick="var e=document.getElementById(\'hrs-input\');e.value=(parseFloat(e.value||1)+0.5)" class="btn" style="width:36px;height:36px;font-size:20px;padding:0">+</button>'
        +'</div>'
        +'<div class="frow" style="margin-bottom:14px"><label>Comentario para el revisor <span style="color:var(--text3);font-weight:400">(opcional)</span></label>'
        +'<textarea id="complete-cmt" rows="2" placeholder="Observaciones del análisis, condiciones especiales, resultados relevantes…" style="width:100%;resize:vertical;padding:7px 10px;border:1px solid var(--border2);border-radius:var(--radius);background:var(--surface);color:var(--text);font-size:12px"></textarea></div>'
        +'<div style="display:flex;gap:8px;justify-content:flex-end">'
        +'<button onclick="document.body.removeChild(this.closest(\'div[style*=fixed]\').parentElement)" class="btn">Cancelar</button>'
        +'<button onclick="window._doComplete('+id+',\''+( assignDate||'')+'\')'+'" class="btn pri">✓ Confirmar</button>'
        +'</div></div></div>';
      document.body.appendChild(hDiv);

        // Target the specific assignment by date (independent per-assignment completion)
        var myA=_assignDate
          ?(t.assignments||[]).find(function(a){return a.analyst===currentUser.id&&!a._removed&&!a._completedBySup&&a.date===_assignDate;})
          :(t.assignments||[]).find(function(a){return a.analyst===currentUser.id&&!a._removed&&!a._completedBySup;});
        if(!myA&&(t.assignments||[]).some(function(a){return a.analyst===currentUser.id&&a._completedBySup;})){
          alert('Este análisis fue completado por el supervisor. Aguardá la confirmación.');return;
        }
        if(myA){
          if(!myA.sessions)myA.sessions=[];
          myA.sessions.push({date:today(),hours:hVal,ts:Date.now(),comment:completeCmt||undefined});
          myA.realHours=(myA.realHours||0)+hVal;
        }

        var prevStatus=t.status;
        // Auto-iniciar si todavía está en pending/scheduled (completado 3 días antes)
        if(t.status==='pending'||t.status==='scheduled'){
          t.startedTs=Date.now();
          if(!t.startDatetime)t.startDatetime=new Date().toISOString().slice(0,16);
          auditLog('START','TASK',tid,{field:'status',oldVal:prevStatus,newVal:'progress',
            description:'Auto-inicio por completado anticipado: '+t.producto+' '+t.lote+(_assignDate?' (asig. '+_assignDate+')':'') },'');
        }
        // Mark this specific assignment as pending confirmation
        if(myA){myA._pendingConfirm=true;myA._completedTs=Date.now();}
        // Avanzar a pending-confirm SOLO si todos los analistas/fechas completaron
        _tryAdvanceToPendingConfirm(t);
        if(t.status==='pending-confirm'){t.completedBy=currentUser.id;t.completedTs=Date.now();}
        if(completeCmt){
          if(!t.completionComments)t.completionComments=[];
          t.completionComments.push({by:currentUser.id,byName:currentUser.name,ts:Date.now(),comment:completeCmt});
        }
        auditLog('STATUS_CHANGE','TASK',tid,{field:'status',oldVal:prevStatus,newVal:t.status,description:t.producto+' '+t.lote+' — completado por '+currentUser.name+(t.status==='progress'?' (parcial — otros analistas pendientes)':''),hours:hVal,comment:completeCmt||''},'Completado con '+hVal+'h');
        // Push supervisor notification for completion (dedup: remove stale copies first)
        var sup=USERS.find(function(u){return u.role==='supervisor';});
        if(sup){
          replanNotifs=replanNotifs.filter(function(n){
            return !(n.type==='completed'&&n.taskId===tid&&n.analystId===currentUser.id&&n.status!=='resolved');
          });
          replanNotifs.push({id:nextNotifId++,type:'completed',taskId:tid,
            analystId:currentUser.id,forUserId:sup.id,
            status:'pending',ts:Date.now(),
            fromUser:currentUser.id,fromName:currentUser.name,
            hours:hVal,comment:completeCmt||'',producto:t.producto,lote:t.lote});
        }
        saveLS();render();
        saveNow().catch(function(e){console.error('saveNow complete:',e);});
      }; // end _doComplete
      return; // wait for modal
    }
  } else {
    // Supervisor confirma directamente
    t.status='done';
    t.confirmedBy=currentUser.id;
    auditLog('STATUS_CHANGE','TASK',id,{field:'status',oldVal:'progress',newVal:'done',description:t.producto+' '+t.lote},'');
    t.confirmedTs=Date.now();
    saveLS();render();
  }
}

function confirmAssignment(taskId, analystId, assignDate){
  var t=tasks.find(function(x){return x.id==Number(taskId)||x.id===taskId;});
  if(!t)return;
  // Use assignDate to target the specific assignment when analyst has multiple dates
  var a=(t.assignments||[]).find(function(x){
    return x.analyst===analystId&&(!assignDate||x.date===assignDate);
  });
  // Fallback: if not found by date, try first match (backwards compat)
  if(!a)a=(t.assignments||[]).find(function(x){return x.analyst===analystId;});
  if(!a)return;
  // Mark this assignment as confirmed
  a._pendingConfirm=false;
  a._supervisorConfirmed=true;
  a._confirmedBy=currentUser.id;
  a._confirmedTs=Date.now();
  // Check if ALL assignments are now done AND confirmed
  var assigns=(t.assignments||[]).filter(function(x){return !x._removed;});
  var allConfirmed=assigns.every(function(x){
    return (x.realHours>0||(x.sessions&&x.sessions.length>0))&&(x._supervisorConfirmed||!x._pendingConfirm);
  });
  var allHours=assigns.every(function(x){
    return (x.realHours>0||(x.sessions&&x.sessions.length>0));
  });
  if(allHours&&allConfirmed){
    t.status='done';
    t.confirmedBy=currentUser.id;
    t.confirmedTs=Date.now();
    resolveAllCopies({type:'completed',taskId:Number(taskId)},'accepted');
    auditLog('CONFIRM','TASK',Number(taskId),{field:'status',oldVal:'pending-confirm',newVal:'done',
      description:'Confirmación completado: '+t.producto+' '+t.lote},'');
  } else {
    // No more explicitly pending confirmations — clear pending-confirm status
    var stillPending=assigns.some(function(x){return x._pendingConfirm===true&&!x._supervisorConfirmed;});
    if(!stillPending&&t.status==='pending-confirm'){
      if(allHours){
        // All analysts have hours and none pending → advance
        t.status='done';t.confirmedBy=currentUser.id;t.confirmedTs=Date.now();
      } else {
        // Some analysts still need to complete → back to progress
        t.status='progress';
      }
    }
    delete t.completedBy;
    resolveAllCopies({type:'completed',taskId:Number(taskId),analystId:analystId},'accepted');
    var u=getU(analystId);
    auditLog('CONFIRM_PARTIAL','TASK',Number(taskId),{analystId:analystId,
      description:'Confirmación de '+( u?u.name:'?')+': '+t.producto+' '+t.lote},'');
  }
  saveLS();render();
  saveNow().catch(function(e){console.error('saveNow confirmAssignment:',e);});
}

  saveNow().catch(function(e){console.error(e);});
}

// Resuelve TODAS las copias del mismo evento (para que un supervisor resuelva para todos)
function resolveAllCopies(opts, how){
  var now=Date.now();
  replanNotifs.forEach(function(n){
    if(n.status==='resolved') return;
    if(n.type!==opts.type) return;
    if(opts.taskId!=null && n.taskId!==opts.taskId) return;
    if(opts.freeTaskId!=null && n.freeTaskId!==opts.freeTaskId) return;
    if(opts.analystId!=null && n.analystId!==opts.analystId) return;
    n.status='resolved';
    n.resolvedHow=how;
    n.resolvedBy=currentUser.id;
    n.resolvedByName=currentUser.name;
    n.resolvedTs=now;
  });
}

function confirmDone(id){
  // Delegates to confirmAssignment for all pending assignments of this task
  var t=tasks.find(function(x){return x.id===id;});if(!t)return;
  var assigns=(t.assignments||[]).filter(function(a){return !a._removed&&a._pendingConfirm&&!a._supervisorConfirmed;});
  if(assigns.length===0){
    // No pending — if all have hours, just advance

  if(!samplingDate){alert('Ingresá la fecha real de llegada.');return;}
  if(!samplingHours||samplingHours<=0){alert('Ingresá las horas dedicadas al muestreo.');return;}
  if(!t.samplerAssignments)t.samplerAssignments=[];
  // Buscar asignación activa; si no existe, crear una (muestreo sin asignación previa)
  var sa=t.samplerAssignments.find(function(s){return s.sampler===currentUser.id&&!s.done;});
  if(!sa){
    sa={
      id:Date.now(),
      sampler:currentUser.id,
      samplerName:currentUser.name,
      assignedBy:null,
      assignedTs:Date.now(),
      done:false,
      _ts:Date.now()
    };
    t.samplerAssignments.push(sa);
  }
  sa.done=true;
  sa.doneAt=Date.now();
  sa.realArrivalDate=samplingDate;
  sa.lotNotes=lotNotes;
  if(samplingHours>0)sa.hours=samplingHours;
  sa._ts=Date.now();
  t.status='muestra-ok';

  // Crear notificación al supervisor
  var supUser=USERS.find(function(u){return u.role==='supervisor';});
  replanNotifs.push({
    id:nextNotifId++,
    type:'sampling_done',
    taskId:t.id,
    samplerId:currentUser.id,
    samplerName:currentUser.name,
    realArrivalDate:samplingDate,
    lotNotes:lotNotes,
    hours:samplingHours||null,
    forUserId:supUser?supUser.id:'',
    status:'pending',
    ts:Date.now(),
    producto:t.producto,
    lote:t.lote
  });
  auditLog('SAMPLING','TASK',samplingTaskId,{
    field:'status',oldVal:'a-ingresar',newVal:'muestra-ok',

    realArrivalDate:samplingDate,
    lotNotes:lotNotes||undefined,

function markProg(id,assignDate){
  const t=tasks.find(x=>x.id===id);if(!t)return;
  if(currentUser.role==='analyst'||currentUser.role==='reviewer'){
    var todayDate=new Date(today()+'T12:00:00');
    // If a specific assignment date is provided, only check that one
    var checkAssigns=assignDate
      ?(t.assignments||[]).filter(function(a){return a.analyst===currentUser.id&&a.date===assignDate;})
      :(t.assignments||[]).filter(function(a){return a.analyst===currentUser.id;});
    if(checkAssigns.length>0){
      // Ventana permitida: 3 días hacia atrás hasta 1 día adelante
      var allOutOfWindow=checkAssigns.every(function(ma){
        var ad=new Date((ma.date||today())+'T12:00:00');
        var diff=Math.round((ad-todayDate)/(1000*60*60*24));
        return diff<-3||diff>1;
      });
      if(allOutOfWindow){
        alert('Solo podés iniciar esta actividad dentro de los 3 días previos o el día siguiente a la fecha asignada.');return;
      }
    }
  }
  // Mark the specific assignment as started (per-assignment independent tracking)
  var targetAssign=assignDate
    ?(t.assignments||[]).find(function(a){return a.analyst===currentUser.id&&a.date===assignDate;})
    :(t.assignments||[]).find(function(a){return a.analyst===currentUser.id;});
  if(targetAssign)targetAssign._started=true;
  // Only advance task status if not already running/further along
  var prevStatus=t.status;
  if(t.status==='pending'||t.status==='scheduled'){
    t.status='progress';t.startedTs=Date.now();
    if(!t.startDatetime)t.startDatetime=new Date().toISOString().slice(0,16);
  }
  auditLog('START','TASK',id,{field:'status',oldVal:prevStatus,newVal:t.status,
    description:'Inicio de análisis: '+t.producto+' '+t.lote+(assignDate?' (asig. '+assignDate+')':'') },'');
  saveLS();render();
}

  if(!reason){alert('Indicá el motivo de la replanificación.');return;}
  const t=tasks.find(x=>x.id===replanTaskId);
  if(!t)return;
  if(isSup){
    // Supervisor aplica directamente
    const aIdx=(t.assignments||[]).findIndex(a=>a.analyst===replanAnalystId);
    if(aIdx>=0)t.assignments[aIdx].date=newDate;
    else t.assignments.push({analyst:replanAnalystId,date:newDate});
    _recalcStatusAfterAssignment(t, true);
    // Log as approved
    replanNotifs.push({
      id:nextNotifId++,type:'replan',taskId:replanTaskId,analystId:replanAnalystId,
      oldDate:t.assignments.find(a=>a.analyst===replanAnalystId)?.date||'',
      newDate,reason,requestedBy:'SUP',status:'approved',
      ts:Date.now()
    });
  } else {
    // Analista: crear solicitud pendiente
    var _replanSup=USERS.find(function(u){return u.role==='supervisor';});
    replanNotifs.push({
      id:nextNotifId++,type:'replan',taskId:replanTaskId,analystId:replanAnalystId,
      forUserId:_replanSup?_replanSup.id:'',
      oldDate:(t.assignments||[]).find(a=>a.analyst===replanAnalystId)?.date||t.due,
      newDate,reason,requestedBy:currentUser.id,status:'pending',
      ts:Date.now()
    });
  }
  showReplanModal=false;replanTaskId=null;replanAnalystId=null;
  saveLS();render();
}
function resolveReplan(notifId, approved){
  if(approved) approveReplan(notifId); else rejectReplan(notifId);
}
function approveReplan(notifId){
  const n=replanNotifs.find(x=>x.id===Number(notifId)||x.id===notifId);if(!n)return;
  const t=tasks.find(x=>x.id===n.taskId);if(!t)return;
  const aIdx=(t.assignments||[]).findIndex(a=>a.analyst===n.analystId);
  if(aIdx>=0)t.assignments[aIdx].date=n.newDate;
  else t.assignments.push({analyst:n.analystId,date:n.newDate});
  _recalcStatusAfterAssignment(t, true);
  resolveAllCopies({type:'replan',taskId:n.taskId,analystId:n.analystId},'accepted');
  auditLog('APPROVE','REPLAN',notifId,{analystId:n.analystId,newDate:n.newDate,description:'Replanificación aprobada: '+t.producto+' '+t.lote},'');
  saveLS();render();saveNow().catch(function(e){console.error(e);});
}
function rejectReplan(notifId){
  const n=replanNotifs.find(x=>x.id===Number(notifId)||x.id===notifId);if(!n)return;
  var reason=prompt('Motivo del rechazo (opcional):','');
  if(reason===null)return;
  const t=tasks.find(x=>x.id===n.taskId);
  resolveAllCopies({type:'replan',taskId:n.taskId,analystId:n.analystId},'rejected');
  replanNotifs.push({id:nextNotifId++,type:'replan_rejected',
    taskId:n.taskId,analystId:n.analystId,forUserId:n.analystId,
    reason:reason||'',rejectedByName:currentUser.name,
    producto:t?t.producto:'',lote:t?t.lote:'',
    status:'pending',ts:Date.now()});

  saveLS();render();saveNow().catch(function(e){console.error(e);});
}

function rejectResubmit(taskId, notifId){
  var reason=prompt('Motivo del rechazo (obligatorio):','');
  if(reason===null)return;
  if(!reason.trim()){alert('El motivo es obligatorio.');return;}
  var t=tasks.find(function(x){return x.id===Number(taskId)||x.id===taskId;});
  if(!t)return;
  var n=replanNotifs.find(function(x){return x.id===Number(notifId)||x.id===notifId;});
  if(!t.observations)t.observations=[];
  t.observations.push({ts:Date.now(),comment:reason,by:currentUser.id,byName:currentUser.name});
  t.status='observed';t._ts=Date.now();
  var analystId=(n&&n.fromUser)||null;
  if(!analystId){var _a=(t.assignments||[]).find(function(a){return !a._removed;});if(_a)analystId=_a.analyst;}
  resolveAllCopies({type:'resubmit',taskId:Number(taskId)},'rejected');
  if(analystId){
    replanNotifs.push({id:nextNotifId++,type:'observation',
      taskId:t.id,analystId:analystId,forUserId:analystId,
      comment:reason,fromName:currentUser.name,
      status:'pending',ts:Date.now(),producto:t.producto,lote:t.lote});
  }
  auditLog('REJECT_RESUBMIT','TASK',t.id,{field:'status',oldVal:'done',newVal:'observed',reason:reason,description:'Re-envío rechazado: '+t.producto+' '+t.lote},reason);
  saveLS();render();saveNow().catch(function(e){console.error(e);});
}

// ── Rechazar muestreo: vuelve a a-ingresar, avisa al muestreador ──
function rejectSamplingDone(notifId){

    reason:reason||'',rejectedByName:currentUser.name,
    status:'pending',ts:Date.now(),producto:t.producto,lote:t.lote});

// ── Aceptar solicitud de planificación: asignar analista directamente ──

}
function rejectPlanifRequest(notifId){

// ── Declinar tarea libre: avisa al supervisor, desaparece del panel del analista ──
function declineFreeTask(notifId){

function markResponseNotifRead(notifId){

  if(n){n.status='resolved';n.readTs=Date.now();}

function autoResolveNotifs(){
  // Re-evaluate each pending notification against current state
  replanNotifs.forEach(function(n){
    if(n.status==='resolved') return;
    var task = n.taskId?tasks.find(function(t){return t.id===n.taskId||t.id===n.tid;}):null;
    var ft   = n.freeTaskId?freeTasks.find(function(f){return f.id===n.freeTaskId;}):null;
    var stale = false;
    switch(n.type){
      case 'completed':
        // Stale cuando la tarea ya fue revisada/aprobada (o no existe)
        // NO se resuelve solo por estar en 'progress' — puede haber analistas aún pendientes
        stale = !task || ['done','reviewed','approved'].includes(task.status);
        break;
      case 'planification_request':
        // Stale if task now has assignments (planification done) or task no longer exists
        stale = !task || (task.assignments||[]).filter(function(a){return !a._removed;}).length>0;
        break;
      case 'replan':
        // Stale if task is beyond scheduled status (analysis started or further)
        stale = !task || ['progress','pending-confirm','done','reviewed','approved'].includes(task.status);
        break;
      case 'observation':
        // Stale if task is no longer observed (resubmitted)
        stale = !task || task.status!=='observed';
        break;
      case 'resubmit':
        // Stale when supervisor acted (rejectResubmit→observed, or task advanced further)
        // NOT 'done' — task is 'done' while waiting for supervisor review
        stale = !task || ['observed','reviewed','approved'].includes(task.status);
        break;
      case 'free_task_assigned':
        // Stale if analyst already acted (pending-confirm, confirmed, rejected, declined)
        stale = !ft || ['pending-confirm','confirmed','rejected','declined'].includes(ft.status);
        break;
      case 'free_task_completed':
        // Stale if free task is confirmed or rejected
        stale = !ft || ft.status==='confirmed' || ft.status==='rejected';
        break;
      case 'sampling_done':
        // Stale if task was received (status no longer a-ingresar or muestra-ok)
        stale = !task || (task.status!=='a-ingresar'&&task.status!=='muestra-ok');
        break;
      case 'sampling_rejected':
        // Stale if task is no longer a-ingresar (sampler re-registered)
        stale = !task || task.status!=='a-ingresar';
        break;
      case 'replan_rejected':
        stale = n.status==='read'||(n.readBy||[]).includes(n.forUserId||'');
        break;
      case 'planification_accepted':
        // Stale if task already has analyst assigned beyond scheduled
        stale = !task || ['progress','pending-confirm','done','reviewed','approved'].includes(task.status);
        break;
      case 'planification_rejected':
        stale = n.status==='read'||(n.readBy||[]).includes(n.forUserId||'');
        break;
      case 'hours_rejected':
        // Stale if task moved back beyond progress (analyst re-completed)
        stale = !task || ['pending-confirm','done','reviewed','approved'].includes(task.status);
        break;
      case 'free_task_declined':
        stale = n.status==='read'||(n.readBy||[]).includes(n.forUserId||'');
        break;
      case 'free_task_rejected':
        stale = n.status==='read'||(n.readBy||[]).includes(n.forUserId||'');
        break;
      case 'schedule_rejected':
        stale = n.status==='read'||(n.readBy||[]).includes(n.forUserId||'');
        break;
    }
    if(stale) n.status='resolved';
  });
}

function renderNotifPanel(){
  autoResolveNotifs(); // Re-evaluate stale notifications
  const isSup=currentUser.role==='supervisor';
  const uid=currentUser.id;
  function isUnread(n){return !(n.readBy||[]).includes(uid);}
  const myObsNotifs=replanNotifs.filter(function(n){
    return n.type==='observation'&&n.status!=='resolved'
      &&(n.forUserId===uid||n.analystId===uid);
  }).sort(function(a,b){return b.ts-a.ts;});
  const pendReplan=replanNotifs.filter(function(n){
    return n.type==='replan'&&n.status!=='resolved'&&(isSup||(n.analystId===uid));
  }).sort(function(a,b){return b.ts-a.ts;});
  const schedPend=isSup
    ?scheduleRequests.filter(function(r){return r.status==='pending';})
    :[];
  const schedApproved=!isSup
    ?scheduleRequests.filter(function(r){return r.analystId===uid&&r.status==='approved'&&!r._seenByAnalyst;})
    :[];
  var confirmPend=[];
  if(isSup){
    tasks.forEach(function(t){
      if(t.status!=='pending-confirm') return;
      var pending=(t.assignments||[]).filter(function(a){
        return !a._removed && a._pendingConfirm===true && !a._supervisorConfirmed;
      });
      if(pending.length===0){
        pending=(t.assignments||[]).filter(function(a){
          return !a._removed && !a._supervisorConfirmed
            && (a.realHours>0||(a.sessions&&a.sessions.length>0));
        });
      }
      pending.forEach(function(a){
        confirmPend.push({task:t,assignment:a,analystId:a.analyst});
      });
    });
  }
  const isReviewer=currentUser.role==='reviewer';
  const resubmitBadge=(isSup||isReviewer)
    ?replanNotifs.filter(function(n){return n.type==='resubmit'&&n.forUserId===uid&&n.status!=='resolved'&&isUnread(n);}).length
    :0;
  // Supervisor: direct scan for pending-confirm free tasks (no notification dependency)
  var ftPendConfirm=isSup
    ?freeTasks.filter(function(ft){return ft.status==='pending-confirm';}).sort(function(a,b){return (b._ts||0)-(a._ts||0);})
    :[];
  // ftAssignedNotifs: non-supervisor assigned tasks
  var ftAssignedNotifs=replanNotifs.filter(function(n){
    if(n.status==='resolved') return false;
    if(isSup) return false; // supervisor uses ftPendConfirm instead
    var ft=freeTasks.find(function(x){return x.id===n.freeTaskId;});
    return n.type==='free_task_assigned'&&n.forUserId===uid
      &&n.status!=='resolved'
      &&ft&&(ft.status==='pending'||ft.status==='pending-confirm');
  });
  var planReqNotifs=isSup
    ?replanNotifs.filter(function(n){return n.type==='planification_request'&&n.status!=='resolved';})
    :[];
  var responseNotifBadge=replanNotifs.filter(function(n){
    if(n.status!=='pending'||n.forUserId!==uid) return false;
    return ['sampling_rejected','replan_rejected','planification_accepted',
            'planification_rejected','hours_rejected','free_task_declined',
            'free_task_rejected','schedule_rejected'].indexOf(n.type)>=0;
  }).length;
  var samplingDoneBadge=isSup
    ?replanNotifs.filter(function(n){return n.type==='sampling_done'&&n.status!=='resolved'&&isUnread(n);}).length
    :0;
  var overdueAlerts=[];
  if(isSup){
    var _oTMs2=todayMs();
    tasks.forEach(function(t){
      if(t.status!=='pending'&&t.status!=='scheduled'&&t.status!=='progress')return;
      (t.assignments||[]).filter(function(a){return !a._removed;}).forEach(function(a){
        if(!a.date)return;
        var dL=Math.round((_oTMs2-new Date(a.date+'T12:00:00').getTime())/86400000);
        var done=(a.realHours>0)||(a.sessions&&a.sessions.length>0)||!!a._completedBySup;
        if(dL>=3&&!done)overdueAlerts.push({task:t,assignment:a,analystId:a.analyst,daysLate:dL});
      });
    });
  }
  // totalBadge: solo no-leídas (badge de la campana)
  var pendSuggPanelC=isSup?productSuggestions.filter(function(s){return s.status==='pending';}).length:0;
  var suggRespPanelC=!isSup?replanNotifs.filter(function(n){return n.type==='product_suggestion_response'&&n.forUserId===uid&&n.status==='pending';}).length:0;
  const totalBadge=myObsNotifs.filter(isUnread).length
    +pendReplan.filter(isUnread).length+schedPend.length+schedApproved.length+confirmPend.length
    +resubmitBadge
    +(isSup?ftPendConfirm.length:replanNotifs.filter(function(n){
      return n.type==='free_task_assigned'&&n.forUserId===uid&&n.status!=='resolved'&&isUnread(n);
    }).length)
    +planReqNotifs.filter(isUnread).length+responseNotifBadge+samplingDoneBadge+overdueAlerts.length
    +pendSuggPanelC+suggRespPanelC;

  if(!showNotifPanel){return '';}

  var html='<div style="position:fixed;inset:0;z-index:300;background:rgba(0,0,0,.3);display:flex;align-items:flex-start;justify-content:flex-end;padding:8px">'
    +'<div style="background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);width:min(360px,calc(100vw - 16px));max-height:calc(100dvh - 16px);max-height:calc(100vh - 16px);overflow-y:auto;box-shadow:0 8px 32px rgba(0,0,0,.2)">'
    +'<div style="padding:12px 14px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:8px;position:sticky;top:0;background:var(--surface);z-index:1">'
    +'<span style="font-size:14px;font-weight:600">Notificaciones</span>'
    +(totalBadge>0?'<span style="background:var(--red);color:#fff;border-radius:10px;padding:1px 6px;font-size:10px;font-weight:700">'+totalBadge+'</span>':'')
    +'<button class="btn sm" onclick="showNotifPanel=false;render()" style="margin-left:auto">✕</button>'
    +'</div>'
    +'<div style="display:flex;border-bottom:2px solid var(--border);position:sticky;top:45px;background:var(--surface);z-index:1">'
    +'<button onclick="notifTab=\'active\';render()" style="flex:1;padding:7px;font-size:12px;font-weight:600;border:none;cursor:pointer;background:none;border-bottom:2px solid '+(notifTab==='active'?'var(--blue)':'transparent')+';color:'+(notifTab==='active'?'var(--blue)':'var(--text3)')+';margin-bottom:-2px">Activas'+(totalBadge>0?' ('+totalBadge+')':'')+'</button>'
    +'<button onclick="notifTab=\'history\';render()" style="flex:1;padding:7px;font-size:12px;font-weight:600;border:none;cursor:pointer;background:none;border-bottom:2px solid '+(notifTab==='history'?'var(--blue)':'transparent')+';color:'+(notifTab==='history'?'var(--blue)':'var(--text3)')+';margin-bottom:-2px">Historial (10d)</button>'
    +'</div>';

  // ── Historial (10 días) ──
  if(notifTab==='history'){
    var tenDaysAgo=Date.now()-10*24*60*60*1000;
    var histNotifs=replanNotifs.filter(function(n){
      if(n.status!=='resolved') return false;
      var ts=n.resolvedTs||n.ts||0;
      if(ts<tenDaysAgo) return false;
      if(isSup) return true;
      return n.forUserId===uid||n.analystId===uid||n.fromUser===uid;
    }).sort(function(a,b){return (b.resolvedTs||b.ts)-(a.resolvedTs||a.ts);});
    if(histNotifs.length===0){
      html+='<div class="empty" style="padding:32px 16px;text-align:center;color:var(--text3)">Sin historial en los últimos 10 días</div>';
    } else {
      html+='<div style="padding:10px 14px">';
      histNotifs.forEach(function(n){
        var how=n.resolvedHow||'resolved';
        var howColor=how==='accepted'?'var(--green)':how==='rejected'?'var(--red)':'var(--border2)';
        var howLabel=how==='accepted'?'✓ Aceptado':how==='rejected'?'✗ Rechazado':'Resuelto';
        var howBg=how==='accepted'?'var(--green-bg)':how==='rejected'?'var(--red-bg)':'var(--bg)';
        var eventLabel=getNotifEventLabel(n);
        var byName=n.resolvedByName||'';
        var ts=n.resolvedTs||n.ts;
        var taskLabel='';
        if(n.taskId){var ht=tasks.find(function(x){return x.id===n.taskId;});if(ht)taskLabel=escH(ht.producto)+(ht.lote?' — '+escH(ht.lote):'');}
        else if(n.producto)taskLabel=escH(n.producto)+(n.lote?' — '+escH(n.lote):'');
        var analystName='';
        if(n.analystId){var hu=getU(n.analystId);analystName=hu?hu.name:'';}
        html+='<div style="background:'+howBg+';border-radius:var(--radius);padding:8px 10px;margin-bottom:6px;border-left:3px solid '+howColor+'">'
          +'<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:3px">'
          +'<span style="font-size:11px;font-weight:600;color:var(--text2)">'+eventLabel+'</span>'
          +'<span style="font-size:10px;font-weight:600;color:'+howColor+'">'+howLabel+'</span>'
          +'</div>'
          +(taskLabel?'<div style="font-size:12px;font-weight:600;margin-bottom:2px">'+taskLabel+'</div>':'')
          +(analystName?'<div style="font-size:11px;color:var(--text2)">Analista: '+escH(analystName)+'</div>':'')
          +(n.reason?'<div style="font-size:11px;color:var(--text2);margin-top:2px">Motivo: '+escH(n.reason)+'</div>':'')
          +'<div style="font-size:10px;color:var(--text3);margin-top:4px">'
          +(byName?'Por '+escH(byName)+' · ':'')
          +new Date(ts).toLocaleString('es',{day:'2-digit',month:'2-digit',hour:'2-digit',minute:'2-digit'})
          +'</div>'
          +'</div>';
      });
      html+='</div>';
    }
    html+='</div></div>';
    return html;
  }

  // ── Análisis atrasados 3+ días (supervisor) ──

function setSamplerAssign(taskId, samplerId){
  // Toggle sampler assignment in the task modal (UI only — persisted on saveTask)
  var t=tasks.find(function(x){return x.id===taskId;});
  if(!t)return;

  // Preserve unsaved form values so render() doesn't reset them
  var _snap={
    producto: (document.getElementById('f-prod')||{}).value,
    lote:     (document.getElementById('f-lote')||{}).value,
    status:   (document.getElementById('f-status')||{}).value,
    notes:    (document.getElementById('f-notes')||{}).value,
    due:      (document.getElementById('f-due')||{}).value,
    created:  (document.getElementById('f-created')||{}).value,
    priority: (document.getElementById('f-prio')||{}).value,
    expectedArrival: (document.getElementById('f-expected-arrival')||{}).value,
    arrivalNotes:    (document.getElementById('f-arrival-notes')||{}).value,
    samplerNote:     (document.getElementById('f-sampler-note')||{}).value,
  };
  if(_snap.producto!=null) t.producto=_snap.producto;
  if(_snap.lote!=null)     t.lote=_snap.lote;
  if(_snap.status!=null)   t.status=_snap.status;
  if(_snap.notes!=null)    t.notes=_snap.notes;
  if(_snap.due!=null)      t.due=_snap.due;
  if(_snap.created!=null)  t.created=_snap.created;
  if(_snap.priority!=null) t.priority=_snap.priority;
  if(_snap.expectedArrival!=null) t.expectedArrival=_snap.expectedArrival;
  if(_snap.arrivalNotes!=null)    t.arrivalNotes=_snap.arrivalNotes;
  // Actualizar assignedNote de la asignación activa si había texto
  if(_snap.samplerNote!=null&&t.samplerAssignments){
    var _activeSA=t.samplerAssignments.find(function(s){return !s.done&&!s.removed;});
    if(_activeSA)_activeSA.assignedNote=_snap.samplerNote;
  }

  if(!t.samplerAssignments)t.samplerAssignments=[];
  if(samplerId===null){
    // Remove all sampler assignments that aren't done
    t.samplerAssignments=t.samplerAssignments.filter(function(s){return s.done;});
  } else {
    var existing=t.samplerAssignments.find(function(s){return s.sampler===samplerId&&!s.done&&!s.removed;});
    if(existing){
      // Toggle off: remove undone assignment
      existing.removed=true;
    } else {
      // Remove other non-done assignments and add this one
      t.samplerAssignments=t.samplerAssignments.filter(function(s){return s.done;});
      t.samplerAssignments.push({
        id:nextNotifId++,sampler:samplerId,
        assignedBy:currentUser.id,assignedTs:Date.now(),
        done:false,doneAt:null,realArrivalDate:null,lotNotes:null,
        assignedNote:'',_ts:Date.now()
      });
    }
  }
  t._ts=Date.now();
  render();
}
function saveTask(){
  var _needsTerminalDialog=false,_terminalTargetStatus='';
  const prod=document.getElementById('f-prod').value.trim();
  const lote=document.getElementById('f-lote').value.trim();
  if(!prod||!lote){alert('El producto y el lote son obligatorios.');return;}
  const created=document.getElementById('f-created').value;
  const due=document.getElementById('f-due').value;
  const priority=document.getElementById('f-prio').value;
  const status=document.getElementById('f-status').value;
  const notes=document.getElementById('f-notes').value;
  const _expectedArrivalEl=document.getElementById('f-expected-arrival');
  const _arrivalNotesEl=document.getElementById('f-arrival-notes');
  const expectedArrival=_expectedArrivalEl?_expectedArrivalEl.value:'';
  const arrivalNotes=_arrivalNotesEl?_arrivalNotesEl.value.trim():'';
  // Build assignments from multiAssigns — same analyst can appear N times (multi-day)
  var _editForSave=editingTask!==null?tasks.find(function(x){return x.id===editingTask;}):null;
  var _usedKeys={};
  const assignments=multiAssigns.length>0
    ?multiAssigns.map(function(row){
        var d=row.date||due;
        var existing=_editForSave?((_editForSave.assignments||[]).find(function(a){
          return a.analyst===row.analyst&&a.date===d&&!_usedKeys[row.analyst+'|'+a.date];
        })):null;
        if(existing)_usedKeys[row.analyst+'|'+existing.date]=true;
        return Object.assign({},existing||{},{analyst:row.analyst,date:d,_formRealHours:row.realHours||0});
      })
    :selectedAnalysts.map(function(id){
        var editT=_editForSave;
        var existing=editT?(editT.assignments||[]).find(function(a){return a.analyst===id;}):null;
        return Object.assign({},existing||{},{analyst:id,date:analystDates[id]||due});
      });
  // Auto-derive status; analyst is optional
  var _autoStatus=status;
  if(!editingTask){
    // a-ingresar is a special pre-pending state — do NOT override
    if(isSupRole()&&status==='a-ingresar'){
      _autoStatus='a-ingresar';
    } else {
      _autoStatus=assignments.length===0?'pending':'scheduled';
    }
  } else {
    var _et2=tasks.find(function(x){return x.id===editingTask;});
    // Auto-promote pending→scheduled only if supervisor didn't choose a different status
    if(_et2&&_et2.status==='pending'&&assignments.length>0&&(!isSupRole()||status==='pending'))_autoStatus='scheduled';
    // Allow supervisor to demote to a-ingresar only from pending/scheduled
    if(isSupRole()&&status==='a-ingresar'&&(_et2&&(_et2.status==='pending'||_et2.status==='scheduled'||_et2.status==='a-ingresar'))){
      _autoStatus='a-ingresar';
    }
    // Supervisor: si eligió un estado explícitamente distinto al actual, respetarlo
    if(isSupRole()&&status&&status!==(_et2?_et2.status:''))_autoStatus=status;
    // Regla: sin analistas activos → estado no puede ser scheduled/progress/pending-confirm
    if(isSupRole()&&assignments.length===0&&['scheduled','progress','pending-confirm','observed'].includes(_autoStatus)){
      _autoStatus='pending';
    }
  }
  // Warn if any assignment date is >= due (no time left for review + approval)
  if(assignments.length>0&&due){
    var _lateA=assignments.filter(function(a){return a.date&&a.date>=due;});
    if(_lateA.length>0){
      var _ln=_lateA.map(function(a){var u=getU(a.analyst);return(u?u.name.split(' ')[0]:'?')+': '+a.date;}).join(', ');
      alert('⚠️ AVISO: La fecha límite es el objetivo de APROBACIÓN.\n'
        +'Las siguientes fechas de análisis coinciden o superan esa fecha, sin dejar tiempo para revisión y aprobación:\n'
        +_ln+'\n\nVencimiento (aprobación): '+fmtDF(due)+'\nRevisá la planificación.');
      // PUNTO 5: registrar aviso en audit trail
      auditLog('WARNING','TASK',editingTask||'NEW',{
        description:'Fecha de análisis posterior a fecha límite de aprobación',
        assignments:_ln, due:due
      },'Aviso automático de planificación');
    }
  }
  if(editingTask){
    const t=tasks.find(x=>x.id===editingTask);
    if(t){
      saveTaskVersion(t);
      // PUNTO 2: preservar todos los datos de análisis completados
      // Solo actualizar campos de planificación — NUNCA sobreescribir historial de ejecución
      const preserveFields=['status','completedBy','completedTs','startedTs','startDatetime',
        'reviewedBy','reviewedTs','reviewedDate','approvedBy','approvedTs','approvedDate',
        'confirmedBy','confirmedTs','observedBy','observedTs','observations','_history',
        '_integrity','_integrityTs'];
      // Merge assignments: preservar timeLog y realHours de asignaciones existentes
      var _supHoursChanged=false;
      const mergedAssignments=assignments.map(function(newA){
        const oldA=(t.assignments||[]).find(function(a){
          return a.analyst===newA.analyst&&a.date===newA.date;
        });
        if(oldA){
          var merged=Object.assign({},oldA,{analyst:newA.analyst,date:newA.date});
          // Supervisor puede corregir horas reales directamente desde el modal de edición
          var _fh=newA._formRealHours||0;
          delete merged._formRealHours;
          if(isSupRole()&&_fh>0&&_fh!==(oldA.realHours||0)){
            merged.realHours=_fh;
            _supHoursChanged=true;
            // Si antes no tenía horas registradas, marcar como completado por supervisor
            if(!(oldA.realHours>0)&&!(oldA.sessions&&oldA.sessions.length)){
              merged._completedBySup=true;
              merged._completedBySupId=currentUser.id;
              merged._completedBySupTs=Date.now();
              merged._pendingConfirm=true;
              if(!merged.sessions||!merged.sessions.length)
                merged.sessions=[{date:today(),hours:_fh}];
            }
          }
          return merged;
        }
        var _newA=Object.assign({},newA);delete _newA._formRealHours;return _newA;
      });
      // Reasignaciones eliminadas por el supervisor: los datos se borran completamente.
      // (Permite corregir errores donde el analista marcó horas que no realizó en la práctica.)
      const finalAssignments=mergedAssignments;
      // Aplicar solo campos de planificación
      t.producto=prod;t.lote=lote;t.created=created;t.due=due;
      t.priority=priority;t.notes=notes;
      t.assignments=finalAssignments;
      // Arrival fields for a-ingresar
      if(_autoStatus==='a-ingresar'||t.status==='a-ingresar'||t.status==='muestra-ok'){

    // If created from a suggestion, mark suggestion confirmed and notify suggester

      }

  saveLS('counters');

  // Si el supervisor forzó un estado que requiere datos adicionales, abrir diálogo ahora

  const isSup2=isSupRole();

      assignedTs:isSup2?Date.now():null,
      _ts:Date.now()

  nextId=21; nextUid=100;
  rebuildDerived();
  currentUser=null; selectedLoginUser=null; loginStep=1; loginError='';
  render();
}

document.addEventListener('wheel', function(e){
  if(!e.shiftKey) return;
  var el = e.target;
  while(el && el !== document.body){
    if(el.scrollWidth > el.clientWidth && getComputedStyle(el).overflowX !== 'hidden'){
      e.preventDefault();
      el.scrollLeft += e.deltaY;
      return;
    }
    el = el.parentElement;
  }
}, {passive:false});

loadSpConfig();
if (document.readyState === 'loading') {
  document.addEventListener('DOMContentLoaded', gistBoot, {once:true});
} else {
  gistBoot();
}

function openOvertimeForSup(analystId, dateStr){
  const u=getU(analystId);
  const h=prompt('Horas extra a agregar para '+u.name+' el '+fmtDF(dateStr)+':', '');
  if(h===null)return;
  const val=parseFloat(h);
  if(isNaN(val)||val<=0){alert('Número inválido.');return;}
  const note=prompt('Motivo (opcional):', '');
  if(note===null)return;
  // Add as an approved overtime request directly
  scheduleRequests.push({
    id:nextSchedReqId++,
    analystId,dateStr,status:'approved',
    proposed:{type:'overtime',extraHours:val,startTime:'',endTime:'',breakMinutes:0},
    reason:note||'Asignado por supervisor',
    ts:Date.now(),requestedBy:currentUser.id,
    reviewedBy:currentUser.id,reviewedTs:Date.now()
  });
  showSchedModal=false;saveLS();render();
  saveNow().catch(function(e){console.error('saveNow supOvertime:',e);});
}
