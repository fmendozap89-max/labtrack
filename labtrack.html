    // C4 Fecha programada + límite
    row+='<div style="font-size:10px;line-height:1.4">'
        +(isFirst&&t.due?'<div style="color:var(--text3)">Lím: '+fmtDDMMYY(t.due)+'</div>':'')
        +'<div style="font-family:var(--mono);color:var(--text2)">'+(a.date?fmtDDMMYY(a.date):'—')+'</div>'
        +'</div>';
    // C5 Estado individual analista
    row+='<div><span style="font-size:10px;font-weight:600;padding:2px 7px;border-radius:10px;background:'+aStatusColor+'22;color:'+aStatusColor+'">'+aStatusLabel+'</span></div>';
    // C5 Prioridad (first row only)
    row+='<div>'+(isFirst?'<span class="pill '+(t.priority||'Normal').toLowerCase()+'" style="font-size:10px">'+(t.priority||'Normal')+'</span>':'')+'</div>';
    // C6 Notas (this analyst)
    // C8 Notas (first row only)
    row+='<div style="min-width:0">'
        +(isFirst&&t.notes&&t.notes.trim()
          ?'<span style="font-size:11px;color:var(--text2);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;display:block" title="'+escH(t.notes)+'">'+escH(t.notes.slice(0,40))+'</span>'
          :(isFirst?'<span style="color:var(--text3)">—</span>':''))
        +'</div>';
    // C9 Acciones + Eliminar (first row only, merged)
    row+='<div onclick="event.stopPropagation()" style="display:flex;gap:2px;align-items:center;flex-wrap:wrap">'
        +(isFirst&&assigns.length>0&&isSupRole()?'<button class="btn sm" title="Replanificar" onclick="event.stopPropagation();openReplanSuper('+t.id+')" style="font-size:10px;padding:2px 4px">↺</button>':'')
        +(isFirst&&isSupRole()?'<button class="btn sm" style="color:var(--text3);padding:2px 4px" title="Eliminar" onclick="event.stopPropagation();deleteTask('+t.id+')">🗑</button>':'')
        +'</div>';
    return row+'</div>';
  }).join('');
}

function openReplanSuper(taskId){
  // If multiple analysts, open picker; if one, go direct
  const t=tasks.find(x=>x.id===taskId);if(!t)return;
  const assignees=getAssignees(t);
  if(assignees.length===1){openReplan(taskId,assignees[0]);}
  else if(assignees.length>1){
    const names=assignees.map(id=>getU(id).name).join(', ');
    const pick=prompt('Analistas asignados:\n'+names+'\n\nEscribí las primeras letras del nombre del analista a replanificar:');
    if(!pick)return;
    const found=assignees.find(id=>getU(id).name.toLowerCase().includes(pick.toLowerCase()));
    if(found){openReplan(taskId,found);}
    else{alert('No se encontró ese analista.');}
  }
}
// Expand a task to one row per assignment for the current analyst (independent per-date)
function tRowsAna(t){
  var myA=(t.assignments||[]).filter(function(a){return a.analyst===currentUser.id&&!a._removed;});
  if(myA.length<=1)return tRowAna(t,myA[0]||null);
  return myA.slice().sort(function(a,b){return(a.date||'').localeCompare(b.date||'');})
    .map(function(ma){return tRowAna(t,ma);}).join('');
}
function tRowAna(t,maOverride){
  var todayStr=today();
  var todayDate=new Date(todayStr+'T12:00:00');
  // Todas las asignaciones de este analista en esta tarea (excluyendo las removidas)
  var myAssigns=(t.assignments||[]).filter(function(a){return a.analyst===currentUser.id&&!a._removed;});
  // PUNTO 4: si se pasa una asignación específica (maOverride), usarla directamente
  // Si no, elegir la más relevante: hoy primero, luego la más cercana
  var ma=maOverride||myAssigns.find(function(a){return a.date===todayStr;})
    || myAssigns.slice().sort(function(a,b){
        return Math.abs(new Date(a.date+'T12:00:00')-todayDate)
             - Math.abs(new Date(b.date+'T12:00:00')-todayDate);
       })[0]
    || null;
  var md=ma?ma.date:t.due;
  var assignedDate=new Date((md||todayStr)+'T12:00:00');
  // diffDays: signed — negative=past, positive=future
  var diffDays=Math.round((assignedDate-todayDate)/(1000*60*60*24));
  // Ventana de acción: 3 días atrás hasta 1 día adelante (aplica siempre, incluso si la tarea está vencida)
  var inActionWindow=(diffDays>=-3&&diffDays<=1);
  // Per-assignment state (independent per date)
  var iThisAssignDone=ma&&((ma.realHours>0)||(ma.sessions&&ma.sessions.length>0)||!!ma._completedBySup);
  var iThisAssignPendConf=ma&&ma._pendingConfirm&&!ma._supervisorConfirmed;
  // Task is in an actionable state (not finished)
  var taskActive=['pending','scheduled','progress','pending-confirm','observed'].indexOf(t.status)>=0;
  // canStart: assignment not done/started, in window, task active
  var iThisAssignStarted=!!(ma&&ma._started);
  var canStart=!iThisAssignDone&&!iThisAssignPendConf&&!iThisAssignStarted&&inActionWindow&&taskActive;
  var pendingReplan=replanNotifs.find(function(n){return n.taskId===t.id&&n.analystId===currentUser.id&&n.status==='pending';});
  var replanLabel=pendingReplan?'<span style="font-size:10px;background:var(--amber-bg);color:var(--amber-text);padding:1px 5px;border-radius:4px;font-weight:500">Replan. pendiente</span>':'';
  // Horas: solo de esta asignación específica (independiente por fecha)
  var maRealH=ma?((ma.sessions||[]).reduce(function(s,e){return s+(e.hours||0);},0)||(ma.realHours||0)):0;
  var maTL=ma?(ma.timeLog||[]):[];
  var todayEntry=maTL.find(function(e){return e.date===todayStr;});
  var todayStatus=todayEntry?'<span style="font-size:9px;font-family:var(--mono);color:var(--green)">'+todayEntry.start+'→'+todayEntry.end+'</span>':'';

  var hoursCol='<div style="display:flex;flex-direction:column;gap:2px">'
    +(maRealH?'<span style="font-size:11px;font-weight:700;color:var(--green);font-family:var(--mono)">Real: '+maRealH.toFixed(1)+'h</span>':'<span style="font-size:10px;color:var(--text3)">Sin datos</span>')
    +(todayStatus?todayStatus:'')
    +'</div>';

  // Encode assignment date for targeted markProg/markDone calls
  var dateParam=ma&&ma.date?',\''+ma.date+'\'':'';

  // canComplete: assignment not done and not pending-confirm, task active, date in window
  var canComplete=!iThisAssignDone&&!iThisAssignPendConf&&inActionWindow&&taskActive&&t.status!=='pending-confirm';
  var daysLateAssign=ma&&ma.date?Math.round((new Date(todayStr+'T12:00:00').getTime()-new Date(ma.date+'T12:00:00').getTime())/86400000):0;
  var showOverdueWarn=daysLateAssign>=2&&!iThisAssignDone&&!iThisAssignPendConf&&(t.status==='pending'||t.status==='scheduled'||t.status==='progress');

  return'<div>'
    +'<div class="trow" style="grid-template-columns:1.4fr .7fr .75fr .55fr 1.1fr'+(showOverdueWarn?';border-left:3px solid var(--amber)':'')+'">'
    +'<div><div class="cell-trunc">'+escH(t.producto)+'</div><div class="cell-sub">'+escH(t.lote)+'</div></div>'
    +'<div style="font-family:var(--mono);font-size:12px">'+fmtD(md)+(replanLabel?'<br>'+replanLabel:'')+'</div>'
    +'<div>'+hoursCol+'</div>'
    +'<div>'
    +'<span class="pill '+(taskDisplayStatus(t)==='partial'?'partial':t.status)+'">'+statusLabel(taskDisplayStatus(t))+'</span>'
        +(t.observations&&t.observations.length?'<span title="'+escH(t.observations[t.observations.length-1].comment||'')+'" style="cursor:help;font-size:11px;color:var(--amber-text);margin-left:4px">⚑</span>':'')
    +(t.status==='approved'?'<div style="font-size:9px;color:var(--green);margin-top:1px;font-weight:600">✓ Aprobado'+(t.approvedDate?' '+fmtDF(t.approvedDate):'')+'</div>':'')
    +'</div>'
    +'<div style="display:flex;gap:3px;flex-wrap:wrap;align-items:center">'
    +(canStart?'<button class="btn pri sm" onclick="markProg('+t.id+dateParam+')">▶ Iniciar</button>':'')
    +(canComplete?'<button class="btn suc sm" onclick="markDone('+t.id+dateParam+')">✓ Completar</button>':'')
    +(t.status==='observed'?'<button class="btn suc sm" onclick="markDone('+t.id+dateParam+')">↩ Re-enviar</button>':'')
    +(iThisAssignPendConf?'<span style="font-size:10px;background:var(--blue-bg);color:var(--blue-text);padding:2px 6px;border-radius:4px;font-weight:500">⏳ Conf. pendiente</span>':'')
    +(iThisAssignDone&&!iThisAssignPendConf&&t.status!=='pending-confirm'?'<span style="font-size:11px;color:var(--green)">✓ Completado</span>':'')
    +(!pendingReplan&&!iThisAssignDone&&t.status!=='done'&&t.status!=='pending-confirm'?'<button class="btn sm" onclick="openReplan('+t.id+',\''+currentUser.id+'\')" title="Replanificar">📅</button>':'')
    +((t.observations&&t.observations.length)||(t.completionComments&&t.completionComments.length)||(t.resubmitHistory&&t.resubmitHistory.length)?'<button class="btn sm" onclick="openEdit('+t.id+')" title="Ver comentarios del proceso" style="color:var(--blue)">💬</button>':'')
    +'</div>'
    +'</div>'
    +(showOverdueWarn
      ?'<div style="background:var(--amber-bg);border-left:3px solid var(--amber);border-bottom:1px solid var(--border);padding:7px 12px;font-size:11px;color:var(--amber-text);display:flex;align-items:center;gap:8px;flex-wrap:wrap">'
        +'<span style="font-weight:700">⚠ Atrasado '+daysLateAssign+' día'+(daysLateAssign!==1?'s':'')+'.</span>'
        +(daysLateAssign===2
          ?'<span>Te queda 1 día — completá el análisis o solicitá replanificación antes de que el supervisor sea notificado.</span>'
          :'<span>El supervisor fue notificado. Completá el análisis o solicitá replanificación urgente.</span>')
        +(canComplete?'<button class="btn suc sm" onclick="markDone('+t.id+dateParam+')" style="font-size:10px;margin-left:auto">✓ Completar ahora</button>':'')
        +(!pendingReplan&&!iThisAssignDone?'<button class="btn sm" onclick="openReplan('+t.id+',\''+currentUser.id+'\')" style="font-size:10px">📅 Replanificar</button>':'')
        +'</div>'
      :'')
    +'</div>';
}
function searchBarHtml(){
  return '<div style="position:relative;flex:1;max-width:280px">'
    +'<input type="text" id="search-bar-input" placeholder="Buscar producto o lote\u2026" value="'+escH(filterSearch)+'"'
    +' oninput="filterSearch=this.value;_doSearchRender()"'
    +' style="width:100%;padding:6px 30px 6px 10px;border:1px solid var(--border2);border-radius:var(--radius);background:var(--surface);color:var(--text);font-size:13px">'
    +(filterSearch?'<span onclick="filterSearch=\'\';render()" style="position:absolute;right:8px;top:50%;transform:translateY(-50%);cursor:pointer;color:var(--text3);font-size:16px">×</span>':'')
    +'</div>';
}
let _searchRenderTimer=null;
function _doSearchRender(){
  if(_searchRenderTimer)clearTimeout(_searchRenderTimer);
  _searchRenderTimer=setTimeout(function(){
    const el=document.getElementById('app');
    if(!el)return;
    const html=renderShell();
    if(html!==_lastHtml){_lastHtml=html;el.innerHTML=html;attachLogin&&attachLogin();}
    const inp=document.getElementById('search-bar-input');
    if(inp){const v=filterSearch;inp.focus();inp.value=v;inp.setSelectionRange(v.length,v.length);}
  },80);
}
function renderTasks(){
  const sup=isSupRole();
  const aOpts=ANALYSTS.map(function(a){return'<option value="'+a.id+'">'+escH(a.name)+'</option>';}).join('');
  const viewToggle=sup?'<div style="display:flex;gap:3px;background:var(--bg2);border-radius:var(--radius);padding:2px">'
    +'<button class="btn sm" onclick="tasksView=\'lote\';render()" style="'+(tasksView==='lote'?'background:var(--surface);font-weight:600;box-shadow:0 1px 3px rgba(0,0,0,.1)':'border:none;background:transparent')+'">Por lote</button>'
    +'<button class="btn sm" onclick="tasksView=\'analista\';render()" style="'+(tasksView==='analista'?'background:var(--surface);font-weight:600;box-shadow:0 1px 3px rgba(0,0,0,.1)':'border:none;background:transparent')+'">Por analista</button>'
    +'</div>':'';
  // cols now defined via .trow-sup CSS class
  const thead='<div class="thead-sup">'
    +sortHdrSup('producto','Producto / Lote')
    +'<div>Analistas</div>'
    +sortHdrSup('created','Ingreso')
    +sortHdrSup('due','Aprob. límite')
    +sortHdrSup('status','Estado')
    +sortHdrSup('priority','Prioridad')
    +'<div>Notas</div>'
    +'<div>Acciones</div>'
    +'</div>';
  let rows='';
  let f=sup?sortTasks([...tasks],taskSort,taskSortDir):sortTasks(tasks.filter(function(t){return isMyTask(t)&&t.status!=='a-ingresar'&&t.status!=='muestra-ok';}),taskSort,taskSortDir);
  if(filterAnalyst)f=f.filter(function(t){return getAssignees(t).includes(filterAnalyst);});
  if(filterStatus)f=f.filter(function(t){return filterStatus==='late'?t._dueStatus==='late':t.status===filterStatus;});
  if(filterSearch){var fs2=filterSearch.toLowerCase();f=f.filter(function(t){return t.producto.toLowerCase().includes(fs2)||t.lote.toLowerCase().includes(fs2);});}
  if(!sup){
    // ── Historial de tareas libres (todos los estados, orden cronológico) ──
    var myFT=freeTasks.filter(function(ft){return ft.analystId===currentUser.id;})
      .sort(function(a,b){return(b.date||'').localeCompare(a.date||'');});
    var _stCfg={
      confirmed:  {color:'var(--green)',      label:'✓ Confirmada'},
      'pending-confirm':{color:'var(--amber)',label:'Completada — conf. pendiente'},
      pending:    {color:'var(--blue)',       label:'Asignada — pendiente'},
      rejected:   {color:'var(--red)',        label:'✗ Rechazada'},
      declined:   {color:'var(--red)',        label:'✗ Declinada'}
    };
    var ftSection='<div style="margin-bottom:20px">'
      +'<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:8px;padding-bottom:6px;border-bottom:1px solid var(--border)">'
      +'<div style="font-weight:700;font-size:13px">✏ Mis actividades libres <span style="font-size:11px;font-weight:400;color:var(--text3)">('+myFT.length+')</span></div>'
      +'<button class="btn sm pri" onclick="openFreeTaskModal(null)">+ Agregar</button>'
      +'</div>'
      +(myFT.length===0?'<div class="empty" style="margin-bottom:0">Sin actividades libres registradas</div>'
      :myFT.map(function(ft){
          var cfg=_stCfg[ft.status]||{color:'var(--text3)',label:ft.status||'—'};
          var h=ft.realHours||ft.suggestedHours||ft.hours||0;
          var fromSup=ft.assignedBy&&ft.assignedBy!==currentUser.id;
          var notifFt=replanNotifs.find(function(n){return n.type==='free_task_assigned'&&n.freeTaskId===ft.id&&n.status==='pending';});
          var isPending=ft.status==='pending';
          return'<div style="background:var(--surface);border:1px solid var(--border);border-left:3px solid '+cfg.color+';border-radius:var(--radius-lg);padding:10px 12px;margin-bottom:5px;display:flex;align-items:center;gap:10px">'
            +'<div style="flex:1;min-width:0">'
            +'<div style="font-weight:600;font-size:13px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">'+escH(ft.description)+'</div>'
            +'<div style="font-size:11px;color:var(--text2);margin-top:2px">'
              +fmtDF(ft.date)
              +(h?' · <b style="font-family:var(--mono)">'+h+'h</b>':'')
              +(ft.suggestedHours&&ft.realHours&&ft.realHours!==ft.suggestedHours?' <span style="color:var(--text3)">(sug. '+ft.suggestedHours+'h)</span>':'')
              +(ft.notes?' · '+escH(ft.notes):'')
              +(fromSup?'<span style="color:var(--text3);margin-left:4px">· Asignada por supervisor</span>':'')
            +'</div>'
            +(ft.completionComment?'<div style="font-size:10px;color:var(--blue-text);background:var(--blue-bg);border-radius:4px;padding:2px 7px;margin-top:3px;display:inline-block">💬 '+escH(ft.completionComment)+'</div>':'')
            +'</div>'
            +'<span style="font-size:10px;font-weight:700;padding:2px 8px;border-radius:10px;background:'+cfg.color+'22;color:'+cfg.color+';white-space:nowrap;flex-shrink:0">'+cfg.label+'</span>'
            +(isPending&&fromSup
              ?'<button class="btn sm suc" onclick="confirmFreeTaskAsAnalyst('+ft.id+','+(notifFt?notifFt.id:0)+')" style="font-size:11px;flex-shrink:0">✓ Confirmar</button>'
              +'<button class="btn sm dan" onclick="declineFreeTask('+(notifFt?notifFt.id:0)+')" style="font-size:11px;flex-shrink:0">✗</button>':'')
            +(ft.status==='pending-confirm'?'<button class="btn sm" onclick="openFreeTaskModal('+ft.id+')" style="font-size:11px;flex-shrink:0">✎ Editar</button>':'')
            +'</div>';
        }).join(''))
      +'</div>';

    // PUNTO 4: mostrar UNA FILA POR FECHA ASIGNADA
    if(f.length===0){
      rows=ftSection+'<div class="empty">Sin análisis asignados</div>';
    } else {
      // Expandir: para cada tarea, una fila por asignación de este analista
      var expandedRows=[];
      f.forEach(function(t){
        var myAssigns=(t.assignments||[]).filter(function(a){return a.analyst===currentUser.id&&!a._removed;});
        if(myAssigns.length===0){
          expandedRows.push(tRowAna(t,null));
        } else {
          myAssigns.slice().sort(function(a,b){return(a.date||'').localeCompare(b.date||'');})
            .forEach(function(ma){expandedRows.push(tRowAna(t,ma));});
        }
      });
      rows=ftSection+expandedRows.join('');
    }
  }else if(tasksView==='lote'){
    rows=f.length===0?'<div class="empty">Sin resultados</div>':thead+f.map(function(t){return tRowSupLote(t);}).join('');
  }else{
    // Vista por analista: bloques por PRODUCTO, filas por analista
    if(f.length===0){
      rows='<div class="empty">Sin resultados</div>';
    } else {
      rows=thead+f.map(function(t){return tRowSupAnalista(t);}).join('');
    }
  }
  return'<div class="filter-row" style="gap:8px;flex-wrap:wrap">'
    +searchBarHtml()
    +(sup?'<select onchange="setFA(this.value)"><option value=""'+(filterAnalyst===''?' selected':'')+'>Todos los analistas</option>'+aOpts+'</select>':'')
    +'<select onchange="setFS(this.value)">'
    +'<option value=""'+(filterStatus===''?' selected':'')+'>Todos los estados</option>'
    +'<option value="pending"'+(filterStatus==='pending'?' selected':'')+'>Ingresado</option>'
    +'<option value="scheduled"'+(filterStatus==='scheduled'?' selected':'')+'>Programado</option>'
    +'<option value="progress"'+(filterStatus==='progress'?' selected':'')+'>En curso</option>'
    +'<option value="pending-confirm"'+(filterStatus==='pending-confirm'?' selected':'')+'>Completado (conf. pendiente)</option>'
    +'<option value="done"'+(filterStatus==='done'?' selected':'')+'>Completado p/ revisar</option>'
    +'<option value="late"'+(filterStatus==='late'?' selected':'')+'>⚠ Vencido (fecha límite)</option>'
    +'<option value="reviewed"'+(filterStatus==='reviewed'?' selected':'')+'>Revisado</option>'
    +'<option value="approved"'+(filterStatus==='approved'?' selected':'')+'>Aprobado</option>'
    +'<option value="observed"'+(filterStatus==='observed'?' selected':'')+'>Observado</option>'
    +'</select>'
    +viewToggle
    +'<span class="count-lbl">'+f.length+' lote'+(f.length!==1?'s':'')+(filterSearch?' — «'+escH(filterSearch)+'»':'')+'</span>'
    +(sup?'<button id="copybtn-tbl-tasks" class="btn sm" onclick="copyTableToClipboard(\'tbl-tasks\')" style="margin-left:auto">📋 Copiar</button>':'')
    +'</div>'
    +'<div class="tbl" id="tbl-tasks">'+rows+'</div>';
}

function taskCard(t, showReplanBtn){
    const assigns=(t.assignments||[]).filter(function(a){return !a._removed;});
    const myA=assigns.find(function(a){return a.analyst===currentUser.id;});
    const hasSolicitado=replanNotifs.some(function(n){
      return n.type==='planification_request'&&n.taskId===t.id&&n.analystId===currentUser.id&&n.status==='pending';
    });
    const hasReplan=replanNotifs.some(function(n){
      return n.type==='replan'&&n.taskId===t.id&&n.analystId===currentUser.id&&n.status==='pending';
    });
    return '<div style="background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);padding:12px 14px;margin-bottom:8px">'      +'<div style="display:flex;align-items:flex-start;justify-content:space-between;gap:10px">'      +'<div style="flex:1">'      +'<div style="font-weight:600;font-size:13px">'+escH(t.producto)+'</div>'      +'<div style="font-size:11px;font-family:var(--mono);color:var(--text3);margin-top:1px">'      +escH(t.lote)+(t.due?' · Vence: '+fmtDF(t.due):'')      +(myA?' · Asignado: '+fmtDF(myA.date):'')      +'</div>'      +(t.notes?'<div style="font-size:11px;color:var(--text2);margin-top:3px">'+escH(t.notes)+'</div>':'')      +'</div>'      +'<span class="pill '+t.status+'" style="flex-shrink:0">'+statusLabel(t.status)+'</span>'      +'</div>'      +'<div style="display:flex;gap:6px;margin-top:8px;flex-wrap:wrap">'      +(showReplanBtn&&!hasSolicitado&&!hasReplan        ?(function(){
        var isPartial=(t.assignments||[]).some(function(a){return !a._removed;});
        return '<button class="btn sm pri" onclick="requestPlanification('+t.id+')">'+(isPartial?'📋 Solicitar participar':'📋 Solicitar planificación')+'</button>';
      })()        :hasSolicitado?'<span style="font-size:11px;color:var(--blue-text);padding:4px 8px">✓ Solicitud enviada</span>':''      )      +(myA&&!hasReplan        ?'<button class="btn sm" onclick="openReplan('+t.id+',&quot;'+currentUser.id+'&quot;)">↻ Solicitar replanificación</button>'        :hasReplan?'<span style="font-size:11px;color:var(--amber-text);padding:4px 8px">↻ Replanif. solicitada</span>':''      )      +'</div>'      +'</div>';
  }

function renderPendStatusChips(psf,nAll,nIng,nProg,nAna){
  function chipBtn(status,label,color,count){
    var active=psf===status;
    var bg=active?'background:'+color+';color:#fff;border-color:'+color:'';
    return'<button class="btn sm" onclick="window.pendientesStatusFilter=\''+status+'\';var el=document.getElementById(\'pend-results\');if(el)el.innerHTML=renderPendientesResults();" style="'+bg+'">'+label+' ('+count+')</button>';
  }
  return'<div style="display:flex;gap:8px;flex-wrap:wrap;margin-bottom:12px">'
    +chipBtn('all','Todos','var(--navy,#1a4f8a)',nAll)
    +chipBtn('pending','📥 Ingresado','#64748b',nIng)
    +chipBtn('scheduled','📅 Programado','var(--blue)',nProg)
    +chipBtn('progress','🔬 En curso','var(--green)',nAna)
    +'</div>';
}

function renderPendientesList(){
  const isSup=isSupRole();
  if(isSup) return renderPending();

  // Filter state
  if(typeof window.pendientesSearch==='undefined') window.pendientesSearch='';
  var q=(window.pendientesSearch||'').toLowerCase().trim();
  var psf=window.pendientesStatusFilter||'all';

  function matchQ(t){return !q||t.producto.toLowerCase().includes(q)||t.lote.toLowerCase().includes(q);}
  function matchS(t){
    if(psf==='all') return t.status==='pending'||t.status==='scheduled'||t.status==='progress';
    return t.status===psf;
  }

  var allActive=tasks.filter(function(t){
    return (t.status==='pending'||t.status==='scheduled'||t.status==='progress')&&matchQ(t);
  });
  var filtered=allActive.filter(matchS);

  // Counts for dashboard chips
  var nIngresado=allActive.filter(function(t){return t.status==='pending';}).length;
  var nProgramado=allActive.filter(function(t){return t.status==='scheduled';}).length;
  var nAnalisis=allActive.filter(function(t){return t.status==='progress';}).length;

  var chips=renderPendStatusChips(psf,allActive.length,nIngresado,nProgramado,nAnalisis);
  // Pending-confirm own (completed, awaiting supervisor)
  var misPendConfirm=tasks.filter(function(t){
    return t.status==='pending-confirm'&&t.completedBy===currentUser.id&&matchQ(t);
  });

  // Check if analyst already requested planification for a task
  function alreadyRequested(taskId){
    return replanNotifs.some(function(n){
      return n.type==='planification_request'&&n.taskId===taskId&&n.analystId===currentUser.id&&n.status==='pending';
    });
  }

  function taskRow(t){
    var assigns=(t.assignments||[]).filter(function(a){return !a._removed;});
    var firstDate=assigns.reduce(function(mn,a){return !mn||a.date<mn?a.date:mn;},null);
    var anaAvatars=assigns.map(function(a){var u=getU(a.analyst);return u?'<div class="av '+u.av+'" style="width:18px;height:18px;font-size:8px" title="'+escH(u.name)+'">'+escH(u.avInit)+'</div>':'';}).join('');
    var myA=(t.assignments||[]).some(function(a){return a.analyst===currentUser.id&&!a._removed;});
    var isReq=alreadyRequested(t.id);
    var obsHtml=t.observations&&t.observations.length?'<span title="'+escH(t.observations[t.observations.length-1].comment||'')+'" style="cursor:help;font-size:11px;color:var(--amber-text);margin-left:3px">⚑</span>':'';
    return'<div style="background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);padding:10px 14px;margin-bottom:7px;display:flex;align-items:center;gap:10px">'
      +'<div style="flex:1;min-width:0">'
      +'<div style="font-weight:600;font-size:13px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">'+escH(t.producto)+obsHtml+'</div>'
      +'<div style="font-size:11px;font-family:var(--mono);color:var(--text3);margin-top:1px">'+escH(t.lote)
        +(firstDate?' · Planif: '+fmtDDMMYY(firstDate):'')
        +(t.due?' · Límite: '+dueBadge(t):'')
        +'</div>'
      +(anaAvatars?'<div style="display:flex;gap:2px;margin-top:4px">'+anaAvatars+'</div>':'')
      +'</div>'
      +'<span class="pill '+t.status+'" style="font-size:10px;flex-shrink:0">'+statusLabel(t.status)+'</span>'
      +(myA
        ?'<span style="font-size:10px;color:var(--green);flex-shrink:0">✓ Asignado a mí</span>'
        :(isReq
          ?'<span style="font-size:10px;color:var(--amber-text);flex-shrink:0">⏳ Solicitud enviada</span>'
          :'<button class="btn sm pri" onclick="requestPlanification('+t.id+')" style="flex-shrink:0;font-size:11px">📋 Solicitar</button>'
        )
      )
      +'</div>';
  }

  var searchBar='<div style="display:flex;align-items:center;gap:10px;margin-bottom:14px">'
    +'<div style="position:relative;flex:1">'
    +'<input id="pend-search" type="text" placeholder="Buscar por producto o lote…" value="'+escH(window.pendientesSearch||'')+'"'
    +' style="width:100%;padding:8px 32px 8px 12px;border:1px solid var(--border);border-radius:var(--radius);font-size:13px;background:var(--surface);color:var(--text);box-sizing:border-box"'
    +' oninput="window.pendientesSearch=this.value;var el=document.getElementById(\'pend-results\');if(el){el.innerHTML=renderPendientesResults();}var cl=document.getElementById(\'pend-search-clear\');if(cl)cl.style.display=this.value?\'inline\':\'none\';">'
    +'<span id="pend-search-clear"'
    +' onclick="window.pendientesSearch=\'\';var el=document.getElementById(\'pend-results\');if(el){el.innerHTML=renderPendientesResults();}var inp=document.getElementById(\'pend-search\');if(inp){inp.value=\'\';inp.focus();}this.style.display=\'none\';"'
    +' style="position:absolute;right:10px;top:50%;transform:translateY(-50%);cursor:pointer;color:var(--text3);font-size:20px;line-height:1;user-select:none;display:'+(q?'inline':'none')+'" title="Limpiar búsqueda">×</span>'
    +'</div>'
    +'</div>';

  return chips+searchBar+'<div id="pend-results">'+renderPendientesResults(filtered,misPendConfirm)+'</div>';
}

function renderPendientesResults(filtered,pc){
  if(!filtered){
    var q2=(window.pendientesSearch||'').toLowerCase().trim();
    var psf2=window.pendientesStatusFilter||'all';
    function mQ2(t){return !q2||t.producto.toLowerCase().includes(q2)||(t.lote||'').toLowerCase().includes(q2);}
    function mS2(t){
      if(psf2==='all') return t.status==='pending'||t.status==='scheduled'||t.status==='progress';
      return t.status===psf2;
    }
    filtered=tasks.filter(function(t){return mS2(t)&&mQ2(t);});
    pc=tasks.filter(function(t){return t.status==='pending-confirm'&&t.completedBy===currentUser.id&&mQ2(t);});
  }
  function alreadyReq(taskId){
    return replanNotifs.some(function(n){return n.type==='planification_request'&&n.taskId===taskId&&n.analystId===currentUser.id&&n.status==='pending';});
  }
  function tr(t){
    var assigns=(t.assignments||[]).filter(function(a){return !a._removed;});
    var firstDate=assigns.reduce(function(mn,a){return !mn||a.date<mn?a.date:mn;},null);
    var anaAvatars=assigns.map(function(a){var u=getU(a.analyst);return u?'<div class="av '+u.av+'" style="width:18px;height:18px;font-size:8px" title="'+escH(u.name)+'">'+escH(u.avInit)+'</div>':'';}).join('');
    var myA=(t.assignments||[]).some(function(a){return a.analyst===currentUser.id&&!a._removed;});
    var isReq=alreadyReq(t.id);
    var obsHtml=t.observations&&t.observations.length?'<span title="'+escH(t.observations[t.observations.length-1].comment||'')+'" style="cursor:help;font-size:11px;color:var(--amber-text);margin-left:3px">⚑</span>':'';
    return'<div style="background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);padding:10px 14px;margin-bottom:7px;display:flex;align-items:center;gap:10px">'
      +'<div style="flex:1;min-width:0">'
      +'<div style="font-weight:600;font-size:13px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">'+escH(t.producto)+obsHtml+'</div>'
      +'<div style="font-size:11px;font-family:var(--mono);color:var(--text3);margin-top:1px">'+escH(t.lote)
        +(firstDate?' · Planif: '+fmtDDMMYY(firstDate):'')
        +(t.due?' · Límite: '+dueBadge(t):'')
        +'</div>'
      +(anaAvatars?'<div style="display:flex;gap:2px;margin-top:4px">'+anaAvatars+'</div>':'')
      +'</div>'
      +'<span class="pill '+t.status+'" style="font-size:10px;flex-shrink:0">'+statusLabel(t.status)+'</span>'
      +(myA
        ?'<span style="font-size:10px;color:var(--green);flex-shrink:0">✓ Asignado a mí</span>'
        :(isReq
          ?'<span style="font-size:10px;color:var(--amber-text);flex-shrink:0">⏳ Solicitud enviada</span>'
          :'<button class="btn sm pri" onclick="requestPlanification('+t.id+')" style="flex-shrink:0;font-size:11px">📋 Solicitar</button>'
        )
      )
      +'</div>';
  }
  var out='';
  if(filtered.length===0){
    out='<div class="empty">Sin análisis para el filtro seleccionado</div>';
  } else {
    out=filtered.map(tr).join('');
  }
  if(pc&&pc.length>0){
    out+='<div style="margin-top:16px"><div class="sec" style="margin-bottom:8px;color:var(--amber)">Completados — esperando confirmación del Supervisor ('+pc.length+')</div>'
      +pc.map(tr).join('')
      +'</div>';
  }
  return out;
}

// (old sections moved to renderPendientesResults)
function renderPending(){
  if(typeof window.pendingStatusFilter==='undefined') window.pendingStatusFilter='all';
  // Search state for supervisor pending view
  if(typeof window.pendingSearch==='undefined') window.pendingSearch='';
  const pq=(window.pendingSearch||'').toLowerCase().trim();
  function mPQ(t){return !pq||t.producto.toLowerCase().includes(pq)||t.lote.toLowerCase().includes(pq);}

  const lateT=tasks.filter(t=>t._dueStatus==='late'&&t.status!=='approved'&&mPQ(t));
  const toConfirmT=isSupRole()?tasks.filter(t=>t.status==='pending-confirm'&&mPQ(t)):[];
  const observedT=isSupRole()?tasks.filter(t=>t.status==='observed'&&mPQ(t)):[];
  const needsReviewT=(isSupRole()||isReviewerRole())?tasks.filter(t=>t.status==='done'&&mPQ(t)):[];
  const needsApprovalT=isSupRole()?tasks.filter(t=>t.status==='reviewed'&&mPQ(t)):[];
  const pendT=tasks.filter(t=>t.status==='pending'&&mPQ(t));
  // PUNTO 3: productos sin asignar / sin fecha visible para analistas y revisores
  const unassignedT=!isSupRole()?tasks.filter(function(t){
    return (t.status==='pending'||t.status==='scheduled')&&
      !(t.assignments||[]).some(function(a){return !a._removed;});
  }):[];

function renderPendingContent(){
  const pq2=(window.pendingSearch||'').toLowerCase().trim();
  function mQ2(t){return !pq2||t.producto.toLowerCase().includes(pq2)||t.lote.toLowerCase().includes(pq2);}
  var psf=window.pendingStatusFilter||'all';

  // Unified task list — estados "pendientes" (previos a completado p/ revisar)
  var allT=sortTasks(tasks.filter(function(t){
    var visibleStatuses=['pending','scheduled','progress','pending-confirm'];
    if(isSupRole()){visibleStatuses.unshift('a-ingresar');visibleStatuses.unshift('muestra-ok');}
    return visibleStatuses.indexOf(t.status)>=0&&mQ2(t);
  }),taskSort,taskSortDir);

  // Apply status filter
  var filtered=allT.filter(function(t){
    if(psf==='all') return true;
    if(psf==='late') return t._dueStatus==='late';
    if(psf==='partial') return taskDisplayStatus(t)==='partial';
    return t.status===psf;
  });

  // Dashboard chip counts
  var counts={
    all:allT.length,
    'a-ingresar':allT.filter(function(t){return t.status==='a-ingresar';}).length,
    'muestra-ok':allT.filter(function(t){return t.status==='muestra-ok';}).length,
    pending:allT.filter(function(t){return t.status==='pending';}).length,
    scheduled:allT.filter(function(t){return t.status==='scheduled';}).length,
    progress:allT.filter(function(t){return t.status==='progress';}).length,
    partial:allT.filter(function(t){return taskDisplayStatus(t)==='partial';}).length,
    'pending-confirm':allT.filter(function(t){return t.status==='pending-confirm';}).length,
    late:allT.filter(function(t){return t._dueStatus==='late';}).length
  };

  function chip(id,label,color){
    var active=psf===id;
    var cnt=counts[id];
    if(cnt===0&&id!=='all')return '';
    return'<button class="btn sm" onclick="window.pendingStatusFilter=\''+id+'\';var c=document.getElementById(\'pending-content\');if(c)c.innerHTML=renderPendingContent();" style="'+(active?'background:'+color+';color:#fff;border-color:'+color:'')+'">'
      +label+(cnt!==undefined?' ('+cnt+')':'')+'</button>';
  }

  var chips='<div style="display:flex;gap:6px;flex-wrap:wrap;margin-bottom:12px">'
    +chip('all','Todos','var(--navy,#1a4f8a)')
    +(isSupRole()?chip('a-ingresar','📦 A ingresar','#5b21b6'):'')
    +(isSupRole()?chip('muestra-ok','🧪 Muestra OK','#059669'):'')
    +chip('pending','📥 Ingresado','#64748b')
    +chip('scheduled','📅 Programado','var(--blue)')
    +chip('progress','🔬 En curso','var(--green)')
    +chip('partial','⚡ Completado parcial','#d97706')
    +chip('pending-confirm','✓ Conf. pendiente','var(--amber)')
    +chip('late','⚠ Vencidos','var(--red)')
    +'</div>';

  const cols='grid-template-columns:1.5fr 0.8fr 0.65fr 0.75fr 0.8fr 0.65fr 0.85fr 0.75fr';
  const hdr='<div class="thead" style="'+cols+'">'
    +sortHdr('producto','Producto / Lote')
    +'<div>Analistas</div>'
    +sortHdr('created','Ingreso')
    +'<div>F. planificado</div>'
    +sortHdr('due','Aprob. límite')
    +sortHdr('priority','Prioridad')
    +sortHdr('status','Estado')
    +'<div></div>'
    +'</div>';


  function pRow(t){
    var assigns=(t.assignments||[]).filter(function(a){return !a._removed;});
    var firstDate=assigns.reduce(function(mn,a){return !mn||a.date<mn?a.date:mn;},null);
    var anaAv=assigns.map(function(a){var u=getU(a.analyst);return u?'<div class="av '+u.av+'" style="width:20px;height:20px;font-size:8px" title="'+escH(u.name)+'">'+escH(u.avInit)+'</div>':''}).join('');
    var obsHtml=t.observations&&t.observations.length
      ?'<span style="cursor:help;font-size:10px;font-weight:700;color:var(--amber-text);margin-left:4px" title="'+escH(t.observations.map(function(o,i){return '#'+(i+1)+' '+(o.byName||'')+': '+(o.comment||'');}).join('\n'))+'">⚑ ('+t.observations.length+')</span>':'';
    // Badge para a-ingresar y muestra-ok
    var arrivalHtml='';
    if(t.status==='a-ingresar'||t.status==='muestra-ok'){
      var todayStr2=today();
      var isOverdue=t.expectedArrival&&t.expectedArrival<todayStr2&&t.status==='a-ingresar';
      var arrTooltip='Llegada esperada: '+(t.expectedArrival?fmtDDMMYY(t.expectedArrival):'no definida')+(t.arrivalNotes?'\n'+t.arrivalNotes:'');
      if(t.status==='muestra-ok'){
        var sa=(t.samplerAssignments||[]).find(function(s){return s.done;});
        if(sa)arrTooltip='Muestreo realizado: '+fmtDDMMYY(sa.realArrivalDate)+(sa.lotNotes?'\n'+sa.lotNotes:'');
      }
      arrivalHtml='<span title="'+escH(arrTooltip)+'" style="cursor:help;margin-left:4px;font-size:11px">'
        +(t.status==='muestra-ok'?'<span style="color:#059669;font-weight:700">🧪 OK</span>'
          :isOverdue?'<span style="color:var(--red-text);font-weight:700">⚠ '+fmtDDMMYY(t.expectedArrival)+'</span>'
          :(t.expectedArrival?'📦 '+fmtDDMMYY(t.expectedArrival):'📦 —'))
        +'</span>';
    }
    // Muestreadores asignados
    var samplerAv=(t.samplerAssignments||[]).map(function(sa){var u=getU(sa.sampler);return u?'<div class="av '+u.av+'" title="'+escH(u.name+(sa.done?' ✓':''))+'" style="width:20px;height:20px;font-size:8px;'+(sa.done?'border:2px solid #059669':'opacity:.6')+'">'+escH(u.avInit)+'</div>':''}).join('');
    return'<div class="trow" style="'+cols+'" onclick="openEdit('+t.id+')">'
      +'<div><div class="cell-trunc" style="font-weight:500;font-size:12px">'+escH(t.producto)+'</div>'
      +'<div class="cell-sub cell-trunc" style="font-size:10px">'+escH(t.lote)+'</div></div>'
      +'<div style="display:flex;align-items:center;gap:2px;flex-wrap:wrap">'
      +(anaAv||'<span style="color:var(--text3);font-size:11px">—</span>')
      +(samplerAv?'<span style="color:var(--text3);font-size:9px;margin:0 2px">|</span>'+samplerAv:'')
      +'</div>'
      +'<div style="font-family:var(--mono);font-size:11px;color:var(--text2)">'+(t.created?fmtDDMMYY(t.created):'—')+'</div>'
      +'<div style="font-family:var(--mono);font-size:11px">'+(firstDate?fmtDDMMYY(firstDate):'—')+'</div>'
      +'<div style="font-size:11px">'+(t.due?dueBadge(t):'—')+'</div>'

      +'<div onclick="event.stopPropagation()" style="display:flex;gap:3px">'
      +(isSupRole()&&(t.status==='a-ingresar'||t.status==='muestra-ok')?'<button class="btn sm suc" onclick="event.stopPropagation();markSampleReceived('+t.id+')" style="font-size:10px;background:#5b21b6;border-color:#5b21b6;color:#fff">✓ Recibir</button>':'')

      +(isSupRole()?'<button class="btn sm" onclick="event.stopPropagation();deleteTask('+t.id+')" style="color:var(--text3);padding:2px 4px" title="Eliminar">🗑</button>':'')

// ── WEEK ──
function getMonthDates(off){
  const now=new Date();
  const year=now.getFullYear();
  const month=now.getMonth()+off;
  const d=new Date(year,month,1);
  const firstDay=d.getDay()===0?6:d.getDay()-1; // Mon=0
  const daysInMonth=new Date(year,month+1,0).getDate();
  // pad to full weeks
  const total=Math.ceil((firstDay+daysInMonth)/7)*7;
  return{year:d.getFullYear(),month:d.getMonth(),firstDay,daysInMonth,total,
    label:['Enero','Febrero','Marzo','Abril','Mayo','Junio','Julio','Agosto','Septiembre','Octubre','Noviembre','Diciembre'][d.getMonth()]+' '+d.getFullYear()};
}

function _renderRoleFilterChips(filterVar,setExpr){

    {id:'analyst',label:'Analistas'},
    {id:'sampler',label:'Muestreadores'},
    {id:'staff',label:'Personal'},
    {id:'reviewer',label:'Revisores'},

  var html='<div style="display:flex;gap:6px;flex-wrap:wrap;margin-bottom:8px">';
  roles.forEach(function(r){
    var count=r.id==='all'?CAL_USERS.length:CAL_USERS.filter(function(a){return a.role===r.id;}).length;
    if(count===0&&r.id!=='all')return;
    var active=filterVar===r.id;
    html+='<button class="btn sm" onclick="'+setExpr.replace('__ID__',r.id)+'" style="'+(active?'background:var(--blue);color:#fff;border-color:var(--blue)':'')+'">'+r.label+(r.id!=='all'?' ('+count+')':'')+'</button>';
  });
  html+='</div>';
  return html;
}

function renderCalMonth(sup){
  const {year,month,firstDay,daysInMonth,total,label}=getMonthDates(monthOffset);

  let cells=[];

    cells.push(year+'-'+String(month+1).padStart(2,'0')+'-'+String(dayNum).padStart(2,'0'));

    +'<div style="display:grid;grid-template-columns:repeat(7,minmax(0,1fr));background:var(--bg2);border-bottom:1px solid var(--border)">'
    +DAY_HDR.map(function(d){return'<div style="padding:6px 8px;font-size:11px;font-weight:600;color:var(--text2);text-transform:uppercase;letter-spacing:.04em;text-align:center;border-right:1px solid var(--border)">'+d+'</div>';}).join('')

      // Tareas libres en este día (pending=asignada, pending-confirm=analista confirmó, confirmed=supervisor confirmó)

      dayFT.forEach(function(ft){

// ── Drag & drop en calendario semanal del supervisor ──
var _calDrag={taskId:null,analystId:null,date:null};
function calDragStart(ev,taskId,analystId,date){
  _calDrag={taskId:taskId,analystId:analystId,date:date};
  ev.dataTransfer.effectAllowed='move';
  ev.dataTransfer.setData('text/plain',taskId);
  // No stopPropagation — permite que el evento burbujee normalmente
}
function calDragEnd(ev){ev.target.style.opacity='';}
function calDragOver(ev,analystId,date){
  // Solo aceptar si hay algo siendo arrastrado
  if(!_calDrag.taskId)return;
  ev.preventDefault();
  ev.dataTransfer.dropEffect='move';
  ev.currentTarget.style.outline='2px dashed var(--blue)';
  ev.currentTarget.style.background='var(--blue-bg)';
}
function calDragLeave(ev){
  ev.currentTarget.style.outline='';
  ev.currentTarget.style.background='';
}
function calDrop(ev,newAnalystId,newDate){
  ev.preventDefault();
  ev.currentTarget.style.outline='';
  ev.currentTarget.style.background='';
  var d=_calDrag;
  _calDrag={taskId:null,analystId:null,date:null};
  if(!d.taskId)return;
  if(d.analystId===newAnalystId&&d.date===newDate)return; // misma celda
  var t=tasks.find(function(x){return x.id===d.taskId;});
  if(!t)return;
  var assigns=t.assignments||[];
  var idx=assigns.findIndex(function(a){return a.analyst===d.analystId&&a.date===d.date&&!a._removed;});
  if(idx<0){alert('No se encontró la asignación.');return;}
  // Verificar que el analista destino existe
  var destUser=getU(newAnalystId);
  if(!destUser){alert('Analista destino no encontrado.');return;}
  // Mover asignación
  var newAssigns=assigns.slice();
  newAssigns[idx]=Object.assign({},newAssigns[idx],{analyst:newAnalystId,date:newDate});
  t.assignments=newAssigns;
  t._ts=Date.now();
  auditLog('EDIT','TASK',t.id,{
    description:'Reasignación por drag&drop: '+t.producto+' '+t.lote,
    from:d.analystId+'/'+d.date,to:newAnalystId+'/'+newDate
  },'Arrastrado en calendario semanal');
  saveLS();render();
  saveNow().catch(function(e){console.error('calDrop save:',e);});
}

  const sup=currentUser.role==='supervisor'||currentUser.role==='reviewer';

function renderAnalysts(){
  const isSup=isSupRole();
  if(!ANALYSTS.length) return '<div class="empty">Sin analistas registrados</div>';
  return ANALYSTS.map(function(a){
    const myT=tasks.filter(function(t){return (t.assignments||[]).some(function(x){return x.analyst===a.id;});});
    const pend=myT.filter(function(t){return t.status==='pending'||t.status==='scheduled'||t._dueStatus==='late';}).length;
    const prog=myT.filter(function(t){return t.status==='progress'||t.status==='pending-confirm';}).length;
    const done=myT.filter(function(t){return ['done','reviewed','approved'].includes(t.status);}).length;
    const hReal=myT.reduce(function(s,t){return s+(t.assignments||[]).filter(function(x){return x.analyst===a.id;}).reduce(function(s2,x){return s2+(parseFloat(x.realHours)||0);},0);},0);
    const absentToday=isAbsent(a.id,today());
    const conflicts=checkAbsenceConflicts().filter(function(c){return c.analystId===a.id;}).length;
    return '<div class="card" style="padding:14px 16px;margin-bottom:10px">'
      +'<div style="display:flex;align-items:center;gap:12px;flex-wrap:wrap">'
      +'<div class="av '+a.av+'" style="width:40px;height:40px;font-size:15px;flex-shrink:0">'+escH(a.avInit)+'</div>'
      +'<div style="flex:1;min-width:0"><div style="font-weight:600;font-size:14px">'+escH(a.name)+'</div>'
      +'<div style="font-size:11px;color:var(--text3)">'+escH(a.role==='reviewer'?'Revisor':'Analista')+'</div></div>'
      +(absentToday?'<span style="font-size:11px;background:var(--amber-bg);color:var(--amber-text);padding:2px 8px;border-radius:10px;font-weight:600">Ausente</span>':'')
      +(conflicts>0?'<span style="font-size:11px;background:var(--red-bg);color:var(--red-text);padding:2px 8px;border-radius:10px;font-weight:600">'+conflicts+' conflicto'+(conflicts>1?'s':'')+'</span>':'')
      +'</div>'
      +'<div style="display:flex;gap:12px;margin-top:10px;padding-top:10px;border-top:1px solid var(--border);flex-wrap:wrap;align-items:center">'
      +'<div style="text-align:center;min-width:44px"><div style="font-size:20px;font-weight:700;color:var(--amber)">'+pend+'</div><div style="font-size:10px;color:var(--text3)">Pendiente</div></div>'
      +'<div style="text-align:center;min-width:44px"><div style="font-size:20px;font-weight:700;color:var(--blue)">'+prog+'</div><div style="font-size:10px;color:var(--text3)">En curso</div></div>'
      +'<div style="text-align:center;min-width:44px"><div style="font-size:20px;font-weight:700;color:var(--green)">'+done+'</div><div style="font-size:10px;color:var(--text3)">Completados</div></div>'
      +(hReal>0?'<div style="text-align:center;min-width:44px"><div style="font-size:20px;font-weight:700;color:var(--green)">'+hReal.toFixed(1)+'h</div><div style="font-size:10px;color:var(--text3)">H.Real</div></div>':'')
      +(isSup?'<div style="margin-left:auto;display:flex;gap:6px;flex-wrap:wrap">'
        +'<button class="btn sm" onclick="filterAnalyst=\''+a.id+'\';currentView=\'tasks\';render()">Ver análisis</button>'
        +'<button class="btn sm" onclick="rrhhAnalyst=\''+a.id+'\';currentView=\'rrhh\';rrhhTab=\'absences\';render()">Gestión</button>'
        +'</div>':'')
      +'</div></div>';
  }).join('');
}


function renderHistorialNotif(){
  var typeConf={
    'observation':   {icon:'⚑', label:'Observación',      color:'var(--amber)',  bg:'var(--amber-bg)'},
    'resubmit':      {icon:'↩', label:'Re-envío',          color:'var(--blue)',   bg:'var(--blue-bg)'},
    'completion':    {icon:'💬',label:'Comentario',        color:'var(--green)',  bg:'var(--green-bg,#e8f5e9)'},
    'done':          {icon:'✓', label:'Completado',        color:'var(--green)',  bg:'var(--green-bg,#e8f5e9)'},
    'reviewed':      {icon:'📋',label:'Revisado',          color:'var(--blue)',   bg:'var(--blue-bg)'},
    'approved':      {icon:'✅',label:'Aprobado',          color:'var(--green)',  bg:'var(--green-bg,#e8f5e9)'},
    'replan':        {icon:'↺', label:'Replanificación',   color:'var(--text2)', bg:'var(--bg2)'},
    'sampling_done': {icon:'🧪',label:'Muestreo realizado',color:'#059669',      bg:'#d1fae5'},
    'received':      {icon:'📦',label:'Muestra recibida',  color:'#5b21b6',      bg:'#ede9fe'},
  };

  // Collect events from all tasks
  var events=[];
  tasks.forEach(function(t){
    (t.observations||[]).forEach(function(o){
      events.push({ts:o.ts||0,type:'observation',task:t,by:o.byName||o.by||'',comment:o.comment||''});
    });
    (t.resubmitHistory||[]).forEach(function(r){
      events.push({ts:r.ts||0,type:'resubmit',task:t,by:r.byName||r.by||'',comment:r.comment||''});
    });
    (t.completionComments||[]).forEach(function(c){
      events.push({ts:c.ts||0,type:'completion',task:t,by:c.byName||c.by||'',comment:c.comment||''});
    });
    if(t.completedTs){
      events.push({ts:t.completedTs,type:'done',task:t,by:t.completedBy?getU(t.completedBy).name:'',comment:''});
    }
    if(t.reviewedTs){
      events.push({ts:t.reviewedTs,type:'reviewed',task:t,by:_reviewerName(t),comment:''});
    }
    if(t.approvedTs){
      events.push({ts:t.approvedTs,type:'approved',task:t,by:_approverName(t),comment:''});
    }
  });
  // Also include replan/schedule notifications from replanNotifs
  replanNotifs.filter(function(n){return n.type==='replan'||n.type==='planification_request';}).forEach(function(n){
    var task=tasks.find(function(t){return t.id===n.taskId;});
    if(task){
      events.push({ts:n.ts||0,type:'replan',task:task,by:getU(n.analystId||'').name,comment:n.message||n.reason||''});
    }
  });
  // Muestreos realizados
  replanNotifs.filter(function(n){return n.type==='sampling_done';}).forEach(function(n){
    var task=tasks.find(function(t){return t.id===n.taskId;});
    if(task){
      events.push({ts:n.ts||0,type:'sampling_done',task:task,by:n.samplerName||'',
        comment:'Fecha llegada: '+fmtDDMMYY(n.realArrivalDate)+(n.lotNotes?' | '+n.lotNotes:'')+(n.hours?' | '+n.hours.toFixed(1)+'h':'')});
    }
  });
  // Recepciones aprobadas por supervisor
  tasks.forEach(function(t){
    if(t.arrivedTs){
      events.push({ts:t.arrivedTs,type:'received',task:t,by:t.arrivedBy?getU(t.arrivedBy).name:'',
        comment:'Recibido: '+fmtDDMMYY(t.arrivedDate||'')});
    }
  });

  events.sort(function(a,b){return (b.ts||0)-(a.ts||0);});

  if(events.length===0){
    return'<div class="sec">Historial de proceso</div>'
      +'<div class="empty" style="padding:32px">Sin eventos registrados ✓</div>';
  }

  // Summary chips (abreviados)
  var shortLabel={'observation':'Obs.','resubmit':'Re-env.','completion':'Coment.','done':'Comp.','reviewed':'Rev.','approved':'Apr.','replan':'Replan.'};
  var typeOrder=['done','reviewed','approved','observation','resubmit','completion','replan'];
  var counts={};
  events.forEach(function(e){counts[e.type]=(counts[e.type]||0)+1;});
  var summaryHtml='<div style="display:flex;gap:5px;flex-wrap:wrap;margin-bottom:14px;align-items:center">';
  typeOrder.forEach(function(k){
    if(!counts[k])return;
    var c=typeConf[k]||{icon:'•',color:'var(--text2)',bg:'var(--bg2)'};
    summaryHtml+='<span style="background:'+c.bg+';color:'+c.color+';border-radius:12px;padding:3px 9px;font-size:11px;font-weight:700;white-space:nowrap">'
      +c.icon+counts[k]+' '+shortLabel[k]+'</span>';
  });
  summaryHtml+='<button class="btn sm" onclick="copyHistorial(this)" style="margin-left:auto">📋 Copiar</button>';
  summaryHtml+='</div>';

  var rows=events.map(function(ev){
    var c=typeConf[ev.type]||{icon:'•',label:ev.type,color:'var(--text2)',bg:'var(--bg2)'};
    var t=ev.task;
    var ts=ev.ts?new Date(ev.ts).toLocaleString('es-UY',{day:'2-digit',month:'2-digit',year:'2-digit',hour:'2-digit',minute:'2-digit'}):'—';
    return'<div style="display:grid;grid-template-columns:110px 130px 1fr 160px;gap:0;border-bottom:1px solid var(--border);padding:9px 12px;font-size:12px;align-items:start;cursor:pointer" onclick="openEdit('+t.id+')">'
      +'<div style="font-size:11px;font-family:var(--mono);color:var(--text3)">'+ts+'</div>'
      +'<div><span style="background:'+c.bg+';color:'+c.color+';border-radius:10px;padding:2px 9px;font-size:11px;font-weight:600">'+c.icon+' '+c.label+'</span></div>'
      +'<div style="min-width:0">'
      +'<div style="font-weight:500;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">'+escH(t.producto)+' <span style="color:var(--text3);font-size:10px;font-family:var(--mono)">'+escH(t.lote)+'</span></div>'
      +(ev.comment?'<div style="color:var(--text2);font-size:11px;margin-top:2px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap" title="'+escH(ev.comment)+'">'+escH(ev.comment.slice(0,80))+'</div>':'')
      +'</div>'
      +'<div style="font-size:11px;display:flex;align-items:center;gap:5px">'
      +(ev.by?'<span style="color:var(--text2)">'+escH(ev.by)+'</span>':'')
      +'<span class="pill '+t.status+'" style="font-size:9px;margin-left:auto">'+statusLabel(t.status)+'</span>'
      +'</div>'
      +'</div>';
  }).join('');

  var thead='<div style="display:grid;grid-template-columns:110px 130px 1fr 160px;gap:0;padding:7px 12px;background:var(--bg2);border-bottom:2px solid var(--border);font-size:11px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:.03em">'
    +'<div>Fecha/Hora</div><div>Evento</div><div>Análisis / Comentario</div><div>Por / Estado</div></div>';

  return'<div class="sec">Historial de proceso</div>'
    +summaryHtml
    +'<div class="tbl">'+thead+rows+'</div>';
}

function roundTo15(t){
  if(!t)return t;
  var p=t.split(':');if(p.length<2)return t;
  var h=parseInt(p[0]),m=parseInt(p[1]);
  var r=Math.round(m/15)*15;
  if(r>=60){h=(h+1)%24;r=0;}
  return String(h).padStart(2,'0')+':'+String(r).padStart(2,'0');
}
function timePicker(id,val,style){
  style=style||'';
  var h='08',m='00';
  if(val&&val.length>=4){var p=val.split(':');h=p[0]||'08';m=p[1]||'00';}
  var mi=parseInt(m)||0;mi=Math.round(mi/15)*15;
  if(mi>=60){mi=0;h=String(parseInt(h)+1).padStart(2,'0');}
  m=String(mi).padStart(2,'0');
  var hrs='';
  for(var i=0;i<24;i++){var hh=String(i).padStart(2,'0');hrs+='<option value="'+hh+'"'+(hh===h?' selected':'')+'>'+hh+'</option>';}
  var mins=['00','15','30','45'].map(function(mm){return'<option value="'+mm+'"'+(mm===m?' selected':'')+'>'+mm+'</option>';}).join('');
  return'<span class="time-pick" style="'+style+'">'
    +'<select id="'+id+'-h" onchange="syncTimeHidden(\''+id+'\')" aria-label="Hora">'+hrs+'</select>'
    +'<span style="font-family:var(--mono);font-weight:700;font-size:14px;padding:0 2px;color:var(--text)">:</span>'
    +'<select id="'+id+'-m" onchange="syncTimeHidden(\''+id+'\')" aria-label="Minutos">'+mins+'</select>'
    +'<input type="hidden" id="'+id+'" value="'+h+':'+m+'">'
    +'</span>';
}
function syncTimeHidden(id){
  var h=document.getElementById(id+'-h');
  var m=document.getElementById(id+'-m');
  var hidden=document.getElementById(id);
  if(h&&m&&hidden)hidden.value=h.value+':'+m.value;
}
function getTimeVal(id){
  var el=document.getElementById(id);
  if(!el)return'';
  return el.type==='hidden'?el.value:roundTo15(el.value||'');
}

function saveTimeEntry(){
  const t=tasks.find(x=>x.id===timeLogTaskId);if(!t)return;
  const ma=(t.assignments||[]).find(a=>a.analyst===currentUser.id);if(!ma)return;
  if(!ma.timeLog)ma.timeLog=[];
  const start=getTimeVal('tl-start');
  const end=getTimeVal('tl-end');
  const notes=document.getElementById('tl-notes')?.value||'';
  if(!start||!end){alert('Ingres\u00e1 hora de inicio y fin.');return;}
  if(end<=start){alert('La hora de fin debe ser posterior al inicio.');return;}
  // Calculate hours from start/end
  const [sh,sm]=start.split(':').map(Number);
  const [eh,em]=end.split(':').map(Number);
  const rawMin=(eh*60+em)-(sh*60+sm);
  const roundedMin=Math.round(rawMin/15)*15;
  const hours=Math.round(roundedMin/60*4)/4;
  const todayStr=today();
  const existing=ma.timeLog.find(e=>e.date===todayStr);
  if(existing){existing.start=start;existing.end=end;existing.notes=notes;existing.hours=hours;}
  else{ma.timeLog.push({date:todayStr,start,end,notes,hours});}
  // Update legacy realHours for compat
  ma.realHours=ma.timeLog.reduce((s,e)=>s+(e.hours||0),0);
  showTimeLogModal=false;saveLS();render();
}

function deleteTimeEntry(taskId,dateStr){
  const t=tasks.find(x=>x.id===taskId);if(!t)return;
  const ma=(t.assignments||[]).find(a=>a.analyst===currentUser.id);if(!ma||!ma.timeLog)return;
  ma.timeLog=ma.timeLog.filter(e=>e.date!==dateStr);
  ma.realHours=ma.timeLog.reduce((s,e)=>s+(e.hours||0),0);
  saveLS();render();
}

function renderTaskComments(t){
  var events=[];
  (t.observations||[]).forEach(function(o){
    events.push({ts:o.ts||0,type:'observation',by:o.byName||o.by,comment:o.comment||''});
  });
  (t.resubmitHistory||[]).forEach(function(r){
    events.push({ts:r.ts||0,type:'resubmit',by:r.byName||r.by,comment:r.comment||''});
  });
  (t.completionComments||[]).forEach(function(c){
    events.push({ts:c.ts||0,type:'completion',by:c.byName||c.by,comment:c.comment||''});
  });
  // Muestreo: una entrada por cada asignación completada
  (t.samplerAssignments||[]).filter(function(s){return s.done;}).forEach(function(s){
    var u=getU(s.sampler);
    var commentParts=[];
    if(s.realArrivalDate)commentParts.push('Fecha real de llegada: '+fmtDDMMYY(s.realArrivalDate));
    if(s.lotNotes)commentParts.push(s.lotNotes);
    if(s.hours&&s.hours>0)commentParts.push('Tiempo dedicado: '+s.hours.toFixed(1)+'h');
    if(!s.assignedBy)commentParts.push('(muestreo sin asignación previa)');
    events.push({ts:s.doneAt||0,type:'sampling',by:u?u.name:(s.samplerName||'Muestreador'),comment:commentParts.join('\n')});
  });
  events.sort(function(a,b){return (a.ts||0)-(b.ts||0);});
  if(!events.length)return'';
  var typeConf={
    observation:{icon:'⚑',label:'Observación',color:'var(--amber)',bg:'var(--amber-bg)'},
    resubmit:   {icon:'↩',label:'Re-envío',   color:'var(--blue)', bg:'var(--blue-bg)'},
    completion: {icon:'💬',label:'Comentario del analista',color:'var(--green)',bg:'var(--green-bg,#e8f5e9)'},
    sampling:   {icon:'🧪',label:'Muestreo registrado',color:'#7c3aed',bg:'#ede9fe'}
  };
  var rows=events.map(function(ev){
    var c=typeConf[ev.type]||typeConf.completion;
    var ts=ev.ts?new Date(ev.ts).toLocaleString('es-UY',{day:'2-digit',month:'2-digit',year:'2-digit',hour:'2-digit',minute:'2-digit'}):'';
    return'<div style="display:flex;gap:8px;align-items:flex-start">'
      +'<div style="width:28px;height:28px;border-radius:50%;background:'+c.bg+';display:flex;align-items:center;justify-content:center;font-size:13px;flex-shrink:0">'+c.icon+'</div>'
      +'<div style="flex:1;background:var(--surface);border-radius:var(--radius);padding:8px 10px;border-left:3px solid '+c.color+'">'
      +'<div style="display:flex;align-items:center;gap:6px;margin-bottom:3px;flex-wrap:wrap">'
      +'<span style="font-size:11px;font-weight:600;color:'+c.color+'">'+c.label+'</span>'
      +'<span style="font-size:10px;color:var(--text3)">'+escH(ev.by||'')+(ts?' · '+ts:'')+'</span>'
      +'</div>'
      +'<div style="font-size:12px;color:var(--text);white-space:pre-wrap">'+escH(ev.comment)+'</div>'
      +'</div></div>';
  }).join('');
  return'<div class="frow form-full" style="margin-top:4px">'
    +'<label>Comentarios del proceso ('+events.length+')</label>'
    +'<div style="display:flex;flex-direction:column;gap:8px;padding:4px 0">'+rows+'</div>'
    +'</div>';
}

function renderHoursSummaryBlock(t){
  var assigns=(t.assignments||[]).filter(function(a){return !a._removed&&a.realHours>0;});
  if(!assigns.length)return'';
  var realT=assigns.reduce(function(s,a){return s+(a.realHours||0);},0);
  var body=assigns.map(function(a){
    var u=getU(a.analyst);var rh=a.realHours||0;
    return'<div style="display:flex;align-items:center;gap:7px;padding:3px 10px;background:var(--surface);border-radius:20px;border:1px solid var(--border)">'
      +'<div class="av '+u.av+'" style="width:22px;height:22px;font-size:9px">'+escH(u.avInit)+'</div>'
      +'<span style="font-size:12px">'+escH(u.name.split(' ')[0])+'</span>'
      +'<span style="font-family:var(--mono);font-size:13px;font-weight:700;color:var(--blue)">'+rh.toFixed(1)+'h</span>'
      +'</div>';
  }).join('');
  var totalBadge='<div style="padding:3px 12px;background:var(--green-bg);border-radius:20px;font-size:12px;font-weight:600;color:var(--green-text)">Total: '+realT.toFixed(1)+'h</div>';
  return'<div class="frow form-full"><label>Horas reales por analista</label><div style="background:var(--bg);border-radius:var(--radius);padding:8px 12px;display:flex;flex-wrap:wrap;gap:8px">'+body+totalBadge+'</div></div>';
}

function renderDateAssigns(){
  var sec=document.getElementById('date-assigns');if(!sec)return;
  if(selectedAnalysts.length===0){
    sec.innerHTML='<div style="font-size:12px;color:var(--text3);padding:6px 0">Seleccion\u00e1 al menos un analista arriba</div>';
    return;
  }
  // Sync: add missing row for each selected analyst
  selectedAnalysts.forEach(function(id){
    if(!multiAssigns.some(function(r){return r.analyst===id;})){
      multiAssigns.push({_key:id+'_'+Date.now(),analyst:id,date:analystDates[id]||''});
    }
  });
  // Remove rows for deselected analysts
  multiAssigns=multiAssigns.filter(function(r){return selectedAnalysts.indexOf(r.analyst)>=0;});
  var editT=editingTask!==null?tasks.find(function(x){return x.id===editingTask;}):null;
  // Agrupar por analista (preservando el orden de primera aparici\u00f3n)
  var _anaOrder=[];
  var _byAna={};
  multiAssigns.forEach(function(row){
    if(!_byAna[row.analyst]){_byAna[row.analyst]=[];_anaOrder.push(row.analyst);}
    _byAna[row.analyst].push(row);
  });
  var html='';
  _anaOrder.forEach(function(analystId){
    var rows=_byAna[analystId];
    var u=getU(analystId);
    // Bloque contenedor por analista
    html+='<div style="background:var(--bg);border-radius:var(--radius);margin-bottom:8px;border:1px solid var(--border2);overflow:hidden">';
    // Cabecera del analista
    html+='<div style="display:flex;align-items:center;gap:8px;padding:7px 10px;background:var(--surface);border-bottom:1px solid var(--border2)">'
      +'<div class="av '+u.av+'" style="flex-shrink:0;width:28px;height:28px;font-size:11px">'+escH(u.avInit)+'</div>'
      +'<span style="font-weight:600;flex:1">'+escH(u.name)+'</span>'
      +'<button onclick="addMultiAssignRow(\''+analystId+'\')" title="Agregar otro d\u00eda para este analista"'
      +' style="padding:2px 9px;border:1px dashed var(--blue);border-radius:var(--radius);background:transparent;color:var(--blue);cursor:pointer;font-size:12px;white-space:nowrap">+\u00a0d\u00eda</button>'
      +'</div>';
    // Filas de fecha por cada d\u00eda asignado a este analista
    rows.forEach(function(row,localIdx){
      var existAss=editT?(editT.assignments||[]).find(function(a){
        return a.analyst===row.analyst&&(a.date===row.date||!row.date);
      }):null;
      var tl=existAss&&existAss.timeLog?existAss.timeLog:[];
      var realH=tl.reduce(function(s,e){return s+(e.hours||0);},0)||(existAss&&existAss.realHours||0);
      var tlRows=tl.map(function(e){
        return'<span style="font-size:10px;color:var(--text3);font-family:var(--mono)">'+e.date+': '+e.start+'\u2013'+e.end+(e.hours?' ('+e.hours.toFixed(1)+'h)':'')+'</span>';
      }).join(' \u00b7 ');
      html+='<div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap;padding:7px 10px'+(localIdx>0?';border-top:1px dashed var(--border2)':'')+'">'
        +'<span style="font-size:11px;color:var(--text3);min-width:60px">'+(localIdx===0?'Fecha:':'\u21b3 D\u00eda '+(localIdx+1)+':')+' </span>'
        +'<input type="date" value="'+escH(row.date||'')+'"'
        +' style="font-size:12px;padding:4px 7px;border:1px solid var(--border2);border-radius:var(--radius);background:var(--surface);color:var(--text);width:130px"'
        +' onchange="updateMultiAssign(\''+row._key+'\',\'date\',this.value)">'
        +(isSupRole()&&editingTask!==null
          ?'<label style="font-size:11px;color:var(--text2);white-space:nowrap;flex-shrink:0">Horas:</label>'
           +'<input type="number" min="0.25" max="99" step="0.25" placeholder="\u2014" value="'+(row.realHours>0?row.realHours:'')+'"'
           +' title="Horas reales del an\u00e1lisis (editable por supervisor)"'
           +' style="font-size:12px;padding:3px 6px;border:1px solid '+(row.realHours>0?'var(--green)':'var(--border2)')+';border-radius:var(--radius);background:var(--surface);color:var(--text);width:68px;flex-shrink:0"'
           +' onchange="updateMultiAssign(\''+row._key+'\',\'realHours\',parseFloat(this.value)||0);this.style.borderColor=parseFloat(this.value)>0?\'var(--green)\':\' var(--border2)\'">'
          :(realH>0?'<span style="font-size:11px;font-family:var(--mono);font-weight:700;color:var(--green)">Real: '+realH.toFixed(1)+'h</span>':'')
        )
        +(rows.length>1
          ?'<button onclick="removeMultiAssignRow(\''+row._key+'\')"'
            +' style="padding:2px 6px;border:1px solid var(--border2);border-radius:var(--radius);background:transparent;color:var(--red-text);cursor:pointer;font-size:11px;margin-left:auto">\u2715</button>'
          :'')
        +'</div>'
        +(tlRows?'<div style="padding:2px 10px 6px;display:flex;flex-wrap:wrap;gap:4px">'+tlRows+'</div>':'');
    });
    html+='</div>';
  });
  sec.innerHTML=html;
}
function updateMultiAssign(key,field,val){
  var r=multiAssigns.find(function(x){return x._key===key;});
  if(r){r[field]=val;}
}
function addMultiAssignRow(analystId){
  multiAssigns.push({_key:analystId+'_'+Date.now(),analyst:analystId,date:''});
  renderDateAssigns();
}
function removeMultiAssignRow(key){
  multiAssigns=multiAssigns.filter(function(r){return r._key!==key;});
  renderDateAssigns();
}

function toggleAna(id){
  var i=selectedAnalysts.indexOf(id);
  if(i>=0){
    selectedAnalysts.splice(i,1);
    delete analystDates[id];
    multiAssigns=multiAssigns.filter(function(r){return r.analyst!==id;});
  }else{
    selectedAnalysts.push(id);
    multiAssigns.push({_key:id+'_'+Date.now(),analyst:id,date:analystDates[id]||''});

function nameToId(n){const nl=n.trim().toLowerCase();return ANALYSTS.find(a=>a.name.toLowerCase()===nl||a.name.toLowerCase().split(' ')[0]===nl.split(' ')[0])||null;}
function parsePaste(text){
  const lines=text.trim().split('\n').filter(l=>l.trim());
  if(lines.length<2){pastePreview=[];render();return;}
  pastePreview=lines.slice(1).map(r=>{const c=r.split('\t');return{producto:c[0]||'',lote:c[1]||'',analista:c[2]||'',fechaAnalisis:c[3]||'',due:c[4]||'',priority:c[5]||'Normal',notes:c[6]||''};}).filter(r=>r.producto&&r.lote);
  render();
}
function handleFile(input){
  const file=input.files[0];if(!file)return;
  function doRead(){
  const reader=new FileReader();
  reader.onload=e=>{
    try{
      const wb=XLSX.read(e.target.result,{type:'binary',cellDates:true,dateNF:'yyyy-mm-dd'});
      const ws=wb.Sheets[wb.SheetNames[0]];
      const data=XLSX.utils.sheet_to_json(ws,{defval:'',raw:false,dateNF:'yyyy-mm-dd'});
      if(data.length>500){
        if(!confirm('El archivo tiene '+data.length+' filas. Se importarán las primeras 500. ¿Continuar?'))return;
      }
      const rows=data.slice(0,500);
      pastePreview=rows.map(r=>({
        producto:String(r['Producto']||r['producto']||'').trim(),
        lote:String(r['Lote']||r['lote']||'').trim(),
        analista:String(r['Analista']||r['analista']||'').trim(),
        fechaAnalisis:String(r['Fecha análisis']||r['FechaAnalisis']||r['Fecha_análisis']||'').trim(),
        due:String(r['Fecha entrega']||r['Vence']||r['fecha_entrega']||'').trim(),
        priority:String(r['Prioridad']||r['prioridad']||'Normal').trim(),
        notes:String(r['Notas']||r['notas']||'').trim()
      })).filter(r=>r.producto&&r.lote);
      render();
    }catch(err){
      alert('Error al leer el archivo Excel: '+err.message+'. Verificá que el archivo tenga el formato correcto.');
    }
  };
  reader.onerror=()=>alert('No se pudo leer el archivo.');
  reader.readAsBinaryString(file);
  }
  if(window.XLSX){doRead();}else{
    var s=document.createElement('script');
    s.src='https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js';
    s.onload=doRead;
    s.onerror=function(){alert('No se pudo cargar la librería Excel. Verificá tu conexión a internet.');};
    document.head.appendChild(s);
  }
}
function confirmImport(){
  try{
    var duplicates=[];
    var toImport=[];
    // Group rows by Producto+Lote so multiple analyst rows merge into one task
    var grouped={};
    var groupOrder=[];
    pastePreview.forEach(function(r){
      var prod=(r.producto||'').trim();
      var lote=(r.lote||'').trim();
      if(!prod||!lote)return;
      var key=prod.toLowerCase()+'||'+lote.toLowerCase();
      var exists=tasks.some(function(t){
        return!t._deleted
          &&t.producto.trim().toLowerCase()===prod.toLowerCase()
          &&t.lote.trim().toLowerCase()===lote.toLowerCase();
      });
      if(exists){
        if(!duplicates.includes(prod+' / Lote: '+lote))duplicates.push(prod+' / Lote: '+lote);
        return;
      }
      if(!grouped[key]){grouped[key]={producto:prod,lote:lote,rows:[]};groupOrder.push(key);}
      grouped[key].rows.push(r);
    });
    groupOrder.forEach(function(k){toImport.push(grouped[k]);});
    if(duplicates.length>0){
      var msg='Los siguientes registros YA EXISTEN y no seran importados (mismo Producto y Lote):\n\n'
        +duplicates.slice(0,10).join('\n')
        +(duplicates.length>10?'\n... y '+(duplicates.length-10)+' mas':'');
      if(toImport.length===0){
        alert(msg+'\n\nNo hay registros nuevos para importar.');
        pastePreview=[];showImportModal=false;render();return;
      }
      if(!confirm(msg+'\n\nImportar los '+toImport.length+' registro(s) restante(s)?'))return;
    }
    const newTasks=toImport.map(function(group){
      const prod=group.producto;
      const lote=group.lote;
      // All rows in this group share the same task — collect assignments
      function normDate(s){
        if(!s)return'';
        s=String(s).trim();
        if(/^\d{5}$/.test(s)){const d=new Date(Math.round((parseInt(s)-25569)*86400*1000));return d.getUTCFullYear()+'-'+String(d.getUTCMonth()+1).padStart(2,'0')+'-'+String(d.getUTCDate()).padStart(2,'0');}
        if(/^\d{4}-\d{2}-\d{2}$/.test(s))return s;
        const m=s.match(/^(\d{1,2})[\/\-](\d{1,2})[\/\-](\d{4})$/);
        if(m)return m[3]+'-'+m[2].padStart(2,'0')+'-'+m[1].padStart(2,'0');
        return s;
      }
      var assignments=[];
      var due='';
      var priority='Normal';
      var notes='';
      group.rows.forEach(function(r){
        var ana=nameToId(r.analista);
        var fechaAna=normDate(r.fechaAnalisis);
        var rowDue=normDate(r.due);
        if(rowDue&&!due)due=rowDue;
        if(r.priority&&['Normal','Alta','Urgente'].includes(r.priority))priority=r.priority;
        if(r.notes)notes=r.notes;
        if(ana&&fechaAna){
          assignments.push({analyst:ana.id,date:fechaAna});
        }
      });
      // Ensure at least one assignment even if analista not found
      if(assignments.length===0){
        var r0=group.rows[0];
        var fechaAna0=normDate(r0.fechaAnalisis);
        assignments=[{analyst:'',date:fechaAna0||due}];
      }
      return{id:nextId++,producto:prod,lote,created:today(),assignments,due,priority,status:'pending',notes};
    }).filter(Boolean);
    tasks=tasks.concat(newTasks);
    if(duplicates&&duplicates.length>0&&newTasks.length>0)alert('Importacion completada. '+newTasks.length+' registro(s) importados. '+duplicates.length+' duplicado(s) omitido(s).');
    pastePreview=[];
    showImportModal=false;
    // Check for due date issues on imported tasks
    var lateImports=newTasks.filter(function(t){
      return t.due&&(t.assignments||[]).some(function(a){return a.date&&a.date>=t.due;});
    });
    if(lateImports.length>0){
      alert('⚠ AVISO: '+lateImports.length+' análisis importados tienen fecha de análisis igual o posterior a la fecha límite de aprobación. Revisar: '+lateImports.map(function(t){return t.producto+' '+t.lote;}).join(', '));
    }
    auditLog('IMPORT','TASK','BATCH',{count:newTasks.length},'Importación masiva');
    saveLS();
    saveNow().catch(function(e){console.error('saveNow import:',e);});
    render();
  }catch(e){
    alert('Error al importar: '+e.message+'. Los datos anteriores no fueron modificados.');
    pastePreview=[];showImportModal=false;render();
  }
}
function xlsxDownload(wb, filename){
  try{
    // Use base64 data URL - works with file:// protocol too
    const wbout=XLSX.write(wb,{bookType:'xlsx',type:'base64'});
    const dataUrl='data:application/vnd.openxmlformats-officedocument.spreadsheetml.sheet;base64,'+wbout;
    const a=document.createElement('a');
    a.href=dataUrl;a.download=filename;a.style.display='none';
    document.body.appendChild(a);a.click();
    setTimeout(()=>a.remove(),500);
  }catch(e){
    // Fallback: blob URL
    try{
      const wbout=XLSX.write(wb,{bookType:'xlsx',type:'array'});
      const blob=new Blob([wbout],{type:'application/vnd.openxmlformats-officedocument.spreadsheetml.sheet'});
      const url=URL.createObjectURL(blob);
      const a=document.createElement('a');a.href=url;a.download=filename;
      document.body.appendChild(a);a.click();
      setTimeout(()=>{try{URL.revokeObjectURL(url);}catch(e2){}a.remove();},1000);
    }catch(e2){alert('No se pudo descargar el archivo. Usá la opción "Copiar encabezados" disponible en la pantalla.');}
  }
}
function copyHeadersNow(btn){
  const text='Producto\tLote\tAnalista\tFecha análisis\tFecha entrega\tPrioridad\tNotas';
  const done=function(){if(btn){btn.textContent='✓ Copiado';btn.style.background='var(--green)';btn.style.color='#fff';setTimeout(function(){btn.textContent='📋 Copiar encabezados';btn.style.background='';btn.style.color='';},2500);}};
  if(navigator.clipboard&&navigator.clipboard.writeText){
    navigator.clipboard.writeText(text).then(done).catch(function(){fallbackCopy(text);done();});
  }else{fallbackCopy(text);done();}
}

function fallbackCopy(text){
  const ta=document.createElement('textarea');
  ta.value=text;ta.style.position='fixed';ta.style.opacity='0';
  document.body.appendChild(ta);ta.select();
  try{document.execCommand('copy');alert('Encabezados copiados. Pegá en la celda A1 de Excel.');}
  catch(e){alert('No se pudo copiar automáticamente. Copiá manualmente:\n\n'+text);}
  document.body.removeChild(ta);
}

function copyPendientes(btn){
  var pq=(window.pendingSearch||'').toLowerCase().trim();
  var psf=window.pendingStatusFilter||'all';
  var _cpStatuses=['pending','scheduled','progress','pending-confirm','done','observed'];
  if(isSupRole())_cpStatuses.unshift('a-ingresar');
  var list=tasks.filter(function(t){return _cpStatuses.includes(t.status);})
    .filter(function(t){return !pq||t.producto.toLowerCase().includes(pq)||t.lote.toLowerCase().includes(pq);})
    .filter(function(t){if(psf==='all')return true;if(psf==='late')return t._dueStatus==='late';return t.status===psf;});
  var HDR='Producto\tLote\tAnalistas\tF. Ingreso\tF. Planificado\tF. Aprobación límite\tPrioridad\tEstado';
  var rows=list.map(function(t){
    var assigns=(t.assignments||[]).filter(function(a){return !a._removed;});
    var anas=assigns.map(function(a){return getU(a.analyst).name;}).join(', ');
    var firstDate=assigns.reduce(function(mn,a){return !mn||a.date<mn?a.date:mn;},null);
    return[t.producto,t.lote,anas,t.created||'',firstDate||'',t.due||'',t.priority||'Normal',statusLabel(t.status)].join('\t');
  });
  _clipCopy(HDR+'\n'+rows.join('\n'),btn,'📋 Copiar');
}

// Gestión - Lista (ocurrencias expandidas)
function _getMgmtListData(){
  var period=window.mgmtListPeriod||'week';
  if(period==='week'){
    var wd=getWeekDates(weekOffset);
    return mgmtTasks.flatMap(function(mt){return expandMgmt(mt,wd[0],wd[6]);});
  }else{
    var info=getMonthDates(monthOffset);
    var pad=function(n){return String(n).padStart(2,'0');};
    var from=info.year+'-'+pad(info.month+1)+'-01';
    var to=info.year+'-'+pad(info.month+1)+'-'+pad(info.daysInMonth);
    return mgmtTasks.flatMap(function(mt){return expandMgmt(mt,from,to);});
  }
}

// Historial notificaciones
function copyHistorial(btn){
  var typeConf={'observation':{icon:'⚑',label:'Observación'},'resubmit':{icon:'↩',label:'Re-envío'},'completion':{icon:'💬',label:'Comentario'},'done':{icon:'✓',label:'Completado'},'reviewed':{icon:'📋',label:'Revisado'},'approved':{icon:'✅',label:'Aprobado'},'replan':{icon:'↺',label:'Replanificación'}};
  var events=[];
  tasks.forEach(function(t){
    (t.observations||[]).forEach(function(o){events.push({ts:o.ts||0,type:'observation',task:t,by:o.byName||o.by||'',comment:o.comment||''});});
    (t.resubmitHistory||[]).forEach(function(r){events.push({ts:r.ts||0,type:'resubmit',task:t,by:r.byName||r.by||'',comment:r.comment||''});});
    (t.completionComments||[]).forEach(function(c){events.push({ts:c.ts||0,type:'completion',task:t,by:c.byName||c.by||'',comment:c.comment||''});});
    if(t.completedTs)events.push({ts:t.completedTs,type:'done',task:t,by:t.completedBy?getU(t.completedBy).name:'',comment:''});
    if(t.reviewedTs)events.push({ts:t.reviewedTs,type:'reviewed',task:t,by:_reviewerName(t),comment:''});
    if(t.approvedTs)events.push({ts:t.approvedTs,type:'approved',task:t,by:_approverName(t),comment:''});
  });
  events.sort(function(a,b){return(b.ts||0)-(a.ts||0);});
  var HDR='Fecha/Hora\tEvento\tProducto\tLote\tComentario\tPor\tEstado';
  var rows=events.map(function(ev){
    var c=typeConf[ev.type]||{label:ev.type};
    var ts=ev.ts?new Date(ev.ts).toLocaleString('es-UY',{day:'2-digit',month:'2-digit',year:'2-digit',hour:'2-digit',minute:'2-digit'}):'';
    return[ts,c.label,ev.task.producto,ev.task.lote,ev.comment,ev.by,statusLabel(ev.task.status)].join('\t');
  });
  _clipCopy(HDR+'\n'+rows.join('\n'),btn,'📋 Copiar');
}

// Imprimir / PDF (calendarios y cualquier vista)
function printCalendar(){
  var content=document.querySelector('.content');
  if(!content){alert('No hay contenido para imprimir.');return;}
  var styles=Array.from(document.querySelectorAll('style')).map(function(s){return s.outerHTML;}).join('');
  var w=window.open('','_blank','width=1200,height=800');
  if(!w){alert('Habilitá las ventanas emergentes del navegador para imprimir/exportar como PDF.');return;}
  w.document.write('<!DOCTYPE html><html><head><meta charset="utf-8"><title>Humanova LabTrack</title>'+styles+'<style>body{padding:20px;background:#fff}.btn,.nav-item,.sidebar,.topbar,.modal-overlay{display:none!important}.content{padding:0!important}</style></head><body>');
  w.document.write(content.innerHTML);
  w.document.write('</body></html>');
  w.document.close();w.focus();
  setTimeout(function(){w.print();},700);
}
