function getTableData(tableId){
  // Returns {headers:[], rows:[[]]} built from data model, not DOM
  const HEADERS=['Producto','Lote','Analistas','Fechas análisis','Vence','Prioridad','Estado','T.Real(h)','Notas'];
  function taskToRow(t){
    const analistas=getAssignees(t).map(id=>getU(id).name).join(', ');
    const fechas=(t.assignments||[]).map(a=>getU(a.analyst).name.split(' ')[0]+': '+fmtDF(a.date)).join(' | ');
    const realH=(t.assignments||[]).reduce((s,a)=>s+(a.realHours||0),0);
    return[t.producto||'',t.lote||'',analistas,fechas,fmtDF(t.due),t.priority,statusLabel(t.status),realH||'',t.notes||''];
  }
  let taskList=[];
  if(tableId==='tbl-tasks'){
    let f=currentUser.role==='supervisor'?sortTasks([...tasks],taskSort,taskSortDir):sortTasks(tasks.filter(t=>isMyTask(t)),taskSort,taskSortDir);
    if(filterAnalyst)f=f.filter(t=>getAssignees(t).includes(filterAnalyst));
    if(filterStatus)f=f.filter(t=>t.status===filterStatus);
    // 'Por analista' view: one row per assignment
    if(tasksView==='analista'){
      var analRows=[];
      f.forEach(function(t){
        var asgns=(t.assignments||[]).filter(function(a){return !a._removed;});
        if(asgns.length===0){
          analRows.push(taskToRow(t));
        } else {
          asgns.forEach(function(a){
            var u=getU(a.analyst);
            var aDone=(a.realHours>0)||(a.sessions&&a.sessions.length>0);
            var aStatus=aDone?'Completado':statusLabel(t.status);
            analRows.push([t.producto||'',t.lote||'',u?u.name:'?',fmtDF(a.date),fmtDF(t.due),t.priority||'',aStatus,a.realHours||'',t.notes||'']);
          });
        }
      });
      return{headers:HEADERS,rows:analRows};
    }
    taskList=f;
  } else if(tableId==='tbl-dash'){
    taskList=(dashFilter&&dashFilter!=='all')?tasks.filter(t=>t.status===dashFilter):[...tasks].reverse();
  } else if(tableId==='tbl-late'){
    taskList=tasks.filter(t=>t._dueStatus==='late'&&t.status!=='approved');
  } else if(tableId==='tbl-pend'){
    taskList=tasks.filter(t=>t.status==='pending');
  }
  return{headers:HEADERS,rows:taskList.map(taskToRow)};
}
function buildHtmlTable(headers,rows){
  const thStyle='border:1px solid #bbb;padding:6px 10px;background:#e8e8e8;font-weight:bold;font-family:Arial,sans-serif;font-size:12px;white-space:nowrap';
  const tdStyle='border:1px solid #bbb;padding:5px 10px;font-family:Arial,sans-serif;font-size:12px;vertical-align:top';
  const tdAltStyle='border:1px solid #bbb;padding:5px 10px;font-family:Arial,sans-serif;font-size:12px;vertical-align:top;background:#f9f9f9';
  const head=`<tr>${headers.map(h=>`<th style="${thStyle}">${escH(h)}</th>`).join('')}</tr>`;
  const body=rows.map((r,ri)=>`<tr>${r.map(c=>`<td style="${ri%2===0?tdStyle:tdAltStyle}">${escH(String(c))}</td>`).join('')}</tr>`).join('');
  return`<table style="border-collapse:collapse">${head}${body}</table>`;
}
function buildTextTable(headers,rows){
  return[headers,...rows].map(r=>r.map(c=>String(c).replace(/\t/g,' ')).join('\t')).join('\n');
}
function copyTableToClipboard(tableId){
  const {headers,rows}=getTableData(tableId);
  if(rows.length===0){alert('No hay datos para copiar.');return;}
  const htmlContent=buildHtmlTable(headers,rows);
  const textContent=buildTextTable(headers,rows);
  function doWrite(){
    if(navigator.clipboard&&window.ClipboardItem){
      const htmlBlob=new Blob([htmlContent],{type:'text/html'});
      const textBlob=new Blob([textContent],{type:'text/plain'});
      navigator.clipboard.write([new ClipboardItem({'text/html':htmlBlob,'text/plain':textBlob})])
        .then(()=>showCopyFeedback(tableId))
        .catch(()=>fallbackTextCopy(textContent,tableId));
    } else {
      fallbackTextCopy(textContent,tableId);
    }
  }
  // Some browsers require clipboard write to happen inside a user gesture
  try{doWrite();}catch(e){fallbackTextCopy(textContent,tableId);}
}
function fallbackTextCopy(text,tableId){
  const ta=document.createElement('textarea');
  ta.value=text;ta.style.position='fixed';ta.style.opacity='0';
  document.body.appendChild(ta);ta.select();
  try{document.execCommand('copy');showCopyFeedback(tableId);}
  catch(e){alert('No se pudo copiar. Seleccioná la tabla manualmente.');}
  document.body.removeChild(ta);
}
function showCopyFeedback(tableId){
  const btn=document.getElementById('copybtn-'+tableId);
  if(btn){const orig=btn.textContent;btn.textContent='✓ Copiado';btn.style.background='var(--green)';btn.style.color='#fff';setTimeout(()=>{btn.textContent=orig;btn.style.background='';btn.style.color='';},2000);}
}
const DAY_NAMES=['Dom','Lun','Mar','Mié','Jue','Vie','Sáb'];
function getWeekDates(off){
  const now=new Date();
  const day=now.getDay();
  const diffToMon=day===0?-6:1-day;
  const base=new Date(now);
  base.setDate(now.getDate()+diffToMon+off*7);
  base.setHours(0,0,0,0);
  return Array.from({length:7},(_,i)=>{
    const x=new Date(base);x.setDate(base.getDate()+i);
    return x.toISOString().slice(0,10);
  });
}
function weekDayLabel(dateStr){
  const dt=new Date(dateStr+'T12:00:00');
  return DAY_NAMES[dt.getDay()]+' '+String(dt.getDate()).padStart(2,'0')+'/'+String(dt.getMonth()+1).padStart(2,'0');
}

function sortTasks(arr,sortCol,dir){
  return [...arr].sort(function(a,b){
    var va,vb;
    var dir2=dir||1;
    if(sortCol==='due'){va=a.due||'9999-12-31';vb=b.due||'9999-12-31';}
    else if(sortCol==='created'){va=a.created||'0000-00-00';vb=b.created||'0000-00-00';}
    else if(sortCol==='producto'){va=(a.producto||'').toLowerCase();vb=(b.producto||'').toLowerCase();}
    else if(sortCol==='status'){va=a.status||'';vb=b.status||'';}
    else if(sortCol==='priority'){
      var po={Urgente:0,Alta:1,Normal:2};
      va=po[a.priority]!==undefined?po[a.priority]:3;
      vb=po[b.priority]!==undefined?po[b.priority]:3;
    }
    else{va=a.due||'9999-12-31';vb=b.due||'9999-12-31';}
    if(va<vb)return -dir2;if(va>vb)return dir2;return 0;
  });
}

function recalcLateStatus(){
  var todayStr=today();
  var todayMs=new Date(todayStr+'T12:00:00').getTime();
  tasks.forEach(function(t){
    // Approved tasks: freeze _dueStatus at approval time
    if(t.status==='approved'){t._dueStatus=t._dueStatus||'ok';return;}
    // a-ingresar tasks: never mark late by due date; track expected arrival separately
    if(t.status==='a-ingresar'){t._dueStatus='ok';return;}
    if(!t.due){t._dueStatus='ok';return;}
    var dueMs=new Date(t.due+'T12:00:00').getTime();
    var daysLeft=Math.ceil((dueMs-todayMs)/(1000*60*60*24));
    if(daysLeft<0){t._dueStatus='late';}
    else if(daysLeft<=3){t._dueStatus='near';}
    else{t._dueStatus='ok';}
    // Restore 'late' status only for non-started tasks if was incorrectly set
    if(t.status==='late'){
      // Restore to workflow status
      t.status=(t.assignments&&t.assignments.filter(function(a){return !a._removed;}).length>0)?'scheduled':'pending';
    }
  });
}

function renderInformes(){
  // ── helpers ──
  function diffDays(a,b){
    // a,b: date strings 'YYYY-MM-DD' or timestamps
    if(!a||!b)return null;
    const da=typeof a==='number'?new Date(a):new Date(a);
    const db=typeof b==='number'?new Date(b):new Date(b);
    const diff=Math.round((db-da)/(1000*60*60*24));
    return diff;
  }
  function tsToDate(ts){
    if(!ts)return '';
    const d=new Date(ts);
    return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');
  }
  function dCell(val){
    if(val===null||val===undefined||val==='')return '<td style="color:var(--text3);text-align:center">—</td>';
    return '<td style="text-align:center">'+val+'</td>';
  }
  function numCell(val,color){
    if(val===null||val===undefined)return '<td style="color:var(--text3);text-align:right">—</td>';
    var style='text-align:right'+(color?';color:'+color:'');
    return '<td style="'+style+'">'+val+'</td>';

  // ── filters ──
  var filtered=[...tasks];
  if(informeFilterStatus) filtered=filtered.filter(function(t){return t.status===informeFilterStatus;});

    var fRevision=t.reviewedDate||'';
    var fAprobacion=t.approvedDate||'';

    // Intervals (days)
    var dIngresoInicio=diffDays(fIngreso,fInicio);
    var dInicioCompletado=diffDays(fInicio,fCompletado);
    var dCompletadoRevision=diffDays(fCompletado,fRevision);
    var dRevisionAprobacion=diffDays(fRevision,fAprobacion);
    var dTotal=diffDays(fIngreso,fAprobacion||fRevision||fCompletado||fInicio||fIngreso);
    var dDemora=fVencimiento?(diffDays(fVencimiento,fAprobacion||fRevision||fCompletado||fVencimiento)):null;

      +numCell(dIngresoInicio)

function copyInformeTable(){
  var tbl=document.getElementById('informe-table');
  if(!tbl){alert('No hay tabla para copiar.');return;}
  var rows=[];
  tbl.querySelectorAll('tr').forEach(function(tr){
    var cells=[];
    tr.querySelectorAll('th,td').forEach(function(td){
      cells.push(td.innerText.replace(/\t|\n/g,' ').trim());
    });
    rows.push(cells.join('\t'));
  });
  var text=rows.join('\n');
  navigator.clipboard.writeText(text).then(function(){
    var btn=document.querySelector('[onclick="copyInformeTable()"]');
    if(btn){btn.textContent='✓ Copiado';setTimeout(function(){btn.textContent='\uD83D\uDCCB Copiar para Excel';},2000);}
  }).catch(function(){
    // Fallback
    var ta=document.createElement('textarea');
    ta.value=text;document.body.appendChild(ta);ta.select();
    document.execCommand('copy');document.body.removeChild(ta);
    var btn=document.querySelector('[onclick="copyInformeTable()"]');
    if(btn){btn.textContent='✓ Copiado';setTimeout(function(){btn.textContent='\uD83D\uDCCB Copiar para Excel';},2000);}
  });
}

function _stampTask(t){ t._ts = _ts(); return t; }

// Merge two snapshots: prefer newer _ts per entity
function _ts(){ return Date.now(); }


function mergeSnapshot(local, remote) {
  try {
    var L = typeof local === 'string' ? JSON.parse(local) : local;
    var R = typeof remote === 'string' ? JSON.parse(remote) : remote;
    if(!L || !R) return R || L;

    var merged = Object.assign({}, R); // start from remote base

    // ── Tasks: merge by id, keep newer ──
    var taskMap = {};
    (R.tasks||[]).forEach(function(t){ taskMap[t.id] = t; });
    (L.tasks||[]).forEach(function(t){
      var rt = taskMap[t.id];
      if(!rt || (t._ts||0) > (rt._ts||0)) {
        taskMap[t.id] = t; // local is newer
      }
    });
    merged.tasks = Object.values(taskMap).filter(function(t){ return !t._deleted; });

    // ── Counters: keep max ──
    merged.nextId = Math.max(L.nextId||0, R.nextId||0);
    merged.nextUid = Math.max(L.nextUid||0, R.nextUid||0);
    merged.nextNotifId = Math.max(L.nextNotifId||0, R.nextNotifId||0);
    merged.nextAbsId = Math.max(L.nextAbsId||0, R.nextAbsId||0);
    merged.nextMgmtId = Math.max(L.nextMgmtId||0, R.nextMgmtId||0);
    merged.nextSchedReqId = Math.max(L.nextSchedReqId||0, R.nextSchedReqId||0);

    // ── Schedule requests: merge by id ──
    var srMap = {};
    (R.scheduleRequests||[]).forEach(function(r){ srMap[r.id] = r; });
    (L.scheduleRequests||[]).forEach(function(r){
      var rr = srMap[r.id];
      if(!rr || (r._ts||0) > (rr._ts||0)) srMap[r.id] = r;
    });
    merged.scheduleRequests = Object.values(srMap);

    // ── Replan notifs: merge by id ──
    var rnMap = {};
    (R.replanNotifs||[]).forEach(function(n){ rnMap[n.id] = n; });
    (L.replanNotifs||[]).forEach(function(n){
      var rn = rnMap[n.id];
      if(!rn || (n._ts||0) > (rn._ts||0)) rnMap[n.id] = n;
    });
    merged.replanNotifs = Object.values(rnMap);

    // ── MgmtTasks: merge by id ──
    var mtMap = {};
    (R.mgmtTasks||[]).forEach(function(t){ mtMap[t.id] = t; });
    (L.mgmtTasks||[]).forEach(function(t){
      var rt = mtMap[t.id];
      if(!rt || (t._ts||0) > (rt._ts||0)) mtMap[t.id] = t;
    });
    merged.mgmtTasks = Object.values(mtMap).filter(function(t){ return !t._deleted; });

    // ── Users: merge by id, keep newer ──
    var uMap2 = {};
    (R.users||[]).forEach(function(u){ uMap2[u.id] = u; });
    (L.users||[]).forEach(function(u){
      var ru = uMap2[u.id];
      if(!ru || (u._ts||0) > (ru._ts||0)) uMap2[u.id] = u;
    });
    merged.users = Object.values(uMap2).filter(function(u){ return !u._deleted; });

    // ── Passwords: merge by key, keep newer ──
    var LP = L.passwords||{}, RP = R.passwords||{};
    var LP_ts = L.passwords_ts||{}, RP_ts = R.passwords_ts||{};
    var mergedPwd = Object.assign({}, RP);
    var mergedPwdTs = Object.assign({}, RP_ts);
    Object.keys(LP).forEach(function(uid){
      if((LP_ts[uid]||0) > (RP_ts[uid]||0)){
        mergedPwd[uid] = LP[uid];
        mergedPwdTs[uid] = LP_ts[uid];
      }
    });
    merged.passwords = mergedPwd;
    merged.passwords_ts = mergedPwdTs;

    // ── Absences: merge by analystId, keep newer ──
    var LA = L.absences||{}, RA = R.absences||{};
    var LA_ts = L.absences_ts||{}, RA_ts = R.absences_ts||{};
    var mergedAbs = Object.assign({}, RA);
    var mergedAbsTs = Object.assign({}, RA_ts);
    Object.keys(LA).forEach(function(aid){
      if((LA_ts[aid]||0) > (RA_ts[aid]||0)){
        mergedAbs[aid] = LA[aid];
        mergedAbsTs[aid] = LA_ts[aid];
      }
    });
    merged.absences = mergedAbs;
    merged.absences_ts = mergedAbsTs;

    // ── Analyst schedules: merge by analystId ──
    var LS = L.analystSchedules||{}, RS = R.analystSchedules||{};
    var mergedSched = Object.assign({}, RS);
    Object.keys(LS).forEach(function(aid){
      var ls = LS[aid], rs = RS[aid];
      if(!rs){ mergedSched[aid] = ls; return; }
      // Merge default schedule
      var lDef = ls.default||{}, rDef = rs.default||{};
      var mergedDef = ((lDef._ts||0) > (rDef._ts||0)) ? lDef : rDef;
      // Merge overrides by date
      var mergedOv = Object.assign({}, rs.overrides||{});
      Object.keys(ls.overrides||{}).forEach(function(d){
        var lo = ls.overrides[d], ro = (rs.overrides||{})[d];
        if(!ro || (lo._ts||0) > (ro._ts||0)) mergedOv[d] = lo;
      });
      mergedSched[aid] = {default: mergedDef, overrides: mergedOv};
    });
    merged.analystSchedules = mergedSched;

    // ── Workday config: keep newer ──
    if((L.workdayConfig_ts||0) > (R.workdayConfig_ts||0)){
      merged.workdayConfig = L.workdayConfig;
      merged.workdayConfig_ts = L.workdayConfig_ts;
    }

    // ── MgmtCategories: keep newer ──
    if((L.mgmtCategories_ts||0) > (R.mgmtCategories_ts||0)){
      merged.mgmtCategories = L.mgmtCategories;
      merged.mgmtCategories_ts = L.mgmtCategories_ts;
    }

    // ── AbsenceTypesDef: keep newer ──
    if((L.absenceTypesDef_ts||0) > (R.absenceTypesDef_ts||0)){
      merged.absenceTypesDef = L.absenceTypesDef;
      merged.absenceTypesDef_ts = L.absenceTypesDef_ts;
    }

    return merged;
  } catch(e) {
    console.error('mergeSnapshot error:', e);
    return remote; // fallback: use remote
  }
}

function quickActivateDay(dateStr, analystId) {
  // Collect all analysts assigned to tasks or mgmt on this day
  var affectedAnalysts = new Set();
  tasks.forEach(function(t){
    (t.assignments||[]).forEach(function(a){
      if(a.date===dateStr) affectedAnalysts.add(a.analyst);
    });
  });
  mgmtTasks.forEach(function(mt){
    var occs = expandMgmt(mt, dateStr, dateStr);
    occs.forEach(function(o){ (o.analysts||[]).forEach(function(id){ affectedAnalysts.add(id); }); });
  });
  // Also include the specific analyst passed
  if(analystId) affectedAnalysts.add(analystId);
  var ids = Array.from(affectedAnalysts);
  // Add as extra workday for these analysts
  workdayConfig.off = workdayConfig.off.filter(function(o){ return (o.date||o)!==dateStr; });
  workdayConfig.extra = workdayConfig.extra.filter(function(e){ return (e.date||e)!==dateStr; });
  workdayConfig.extra.push({date:dateStr, analysts:ids, note:'Activado desde gestión de conflictos'});
  workdayConfig.extra.sort(function(a,b){ return (a.date||a).localeCompare(b.date||b); });
  workdayConfig_ts = Date.now();
  saveLS();
  _lastHtml='';
  render();
}

function renderNotificaciones(){
  var isSup=isSupRole();
  var allReqs=[...scheduleRequests].sort(function(a,b){return b.ts-a.ts;});
  var pending=allReqs.filter(function(r){return r.status==='pending';});
  var history=allReqs.filter(function(r){return r.status!=='pending';});

  function typeLabel(t){
    return t==='change'?'Cambio de horario':t==='overtime'?'Horas extra':t==='reduced'?'Horario reducido':t==='shift'?'Guardia / Turno':t||'Solicitud';
  }
  function statusStr(s){
    return s==='approved'?'Aprobado':s==='rejected'?'Rechazado':'Pendiente';
  }
  function buildDetail(p){
    if(!p)return'—';
    var d=typeLabel(p.type);
    if(p.startTime&&p.endTime)d+=': '+p.startTime+'–'+p.endTime;
    if(p.extraHours)d+=' (+'+p.extraHours+'h extra)';
    if(p.breakMinutes!==undefined)d+=', pausa '+p.breakMinutes+'min';
    return d;
  }

    var HDR='Analista	Fecha de solicitud	Fecha asig.	Detalle / Motivo	Comentario analista	Estado	Aprobado por';

      var u=getU(r.analystId);

        u.name,
        ts.toLocaleDateString('es',{day:'2-digit',month:'2-digit',year:'numeric'})+' '+ts.toLocaleTimeString('es',{hour:'2-digit',minute:'2-digit'}),
        r.dateStr?fmtDF(r.dateStr):'—',
        buildDetail(r.proposed),
        r.reason||'',
        statusStr(r.status),
        reviewer?reviewer.name:'—'
      ].join('	');
    });

      var ta=document.createElement('textarea');ta.value=text;

    var sc=r.status==='approved'?'var(--green)':r.status==='rejected'?'var(--red)':'var(--amber)';
    return'<div style="'+COLS+';gap:6px;padding:9px 12px;border-bottom:1px solid var(--border);font-size:12px;align-items:start">'
      // Analista

      // Detalle

      // Comentario / motivo analista
      +'<div style="font-size:11px;color:var(--text2)">'+(r.reason?escH(r.reason):'<span style="color:var(--text3)">—</span>')+'</div>'
      // Estado
      +'<div><span style="font-size:10px;font-weight:700;padding:2px 7px;border-radius:10px;background:'+sc+'22;color:'+sc+'">'+statusStr(r.status)+'</span></div>'
      // Aprobado por

            :'')

  }

  var html='<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;flex-wrap:wrap;gap:8px">'
    +'<div class="sec" style="margin-bottom:0">Solicitudes de cambio de horario ('+allReqs.length+')</div>'
    +'<div style="display:flex;gap:5px">'
    +'<button id="btn-copy-sol" class="btn sm" onclick="window._ltCopyTsv&&window._ltCopyTsv()">📋 Copiar</button>'
    +'<button class="btn sm" onclick="exportNotificacionesXLSX()">↓ Excel</button>'
    +'</div>'
    +'</div>';

  html+='<div style="font-size:12px;font-weight:600;color:var(--amber);margin-bottom:8px">Pendientes ('+pending.length+')</div>';
  if(pending.length===0){
    html+='<div class="empty" style="margin-bottom:16px">Sin solicitudes pendientes ✓</div>';
  }else{
    html+='<div class="tbl" style="margin-bottom:20px;overflow-x:auto">'+thead()+pending.map(function(r){return trow(r,true);}).join('')+'</div>';
  }
  if(history.length>0){
    html+='<div style="font-size:12px;font-weight:600;color:var(--text2);margin-bottom:8px">Historial ('+history.length+')</div>';
    html+='<div class="tbl" style="overflow-x:auto">'+thead()+history.map(function(r){return trow(r,false);}).join('')+'</div>';
  }
  return html;
}

// ── Electronic signature: require reason for critical actions ──
function requireSignature(action, label, callback) {
  // Show confirmation modal with reason field
  const overlay = document.createElement('div');
  overlay.style.cssText = 'position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.5);z-index:9999;display:flex;align-items:center;justify-content:center';
  overlay.innerHTML = '<div style="background:var(--surface);border-radius:var(--radius-lg);padding:24px;max-width:420px;width:90%;box-shadow:0 8px 32px rgba(0,0,0,.3)">'
    + '<h3 style="margin:0 0 8px;font-size:15px">Firma electrónica — '+escH(label)+'</h3>'
    + '<p style="font-size:12px;color:var(--text2);margin:0 0 16px">Esta acción quedará registrada en el audit trail con tu identidad y fecha/hora.</p>'
    + '<div style="margin-bottom:12px"><label style="font-size:12px;font-weight:600;color:var(--text2)">Contraseña de confirmación</label>'
    + '<input type="password" id="sig-pwd" placeholder="Ingresá tu contraseña" style="width:100%;margin-top:4px;padding:8px 10px;border:1px solid var(--border2);border-radius:var(--radius);background:var(--bg2);color:var(--text);font-size:13px;box-sizing:border-box"></div>'
    + '<div style="margin-bottom:16px"><label style="font-size:12px;font-weight:600;color:var(--text2)">Motivo / justificación <span style="font-size:11px;font-weight:400;color:var(--text3)">(opcional)</span></label>'
    + '<textarea id="sig-reason" placeholder="Ej: Resultados verificados, análisis conforme a especificaciones" rows="3" style="width:100%;margin-top:4px;padding:8px 10px;border:1px solid var(--border2);border-radius:var(--radius);background:var(--bg2);color:var(--text);font-size:13px;box-sizing:border-box;resize:vertical"></textarea></div>'
    + '<div id="sig-err" style="color:var(--red);font-size:12px;margin-bottom:8px;display:none"></div>'
    + '<div style="display:flex;gap:8px;justify-content:flex-end">'
    + '<button onclick="this.closest(\'div[style*=fixed]\').remove()" style="padding:8px 16px;border:1px solid var(--border2);border-radius:var(--radius);background:var(--surface);color:var(--text);cursor:pointer;font-size:13px">Cancelar</button>'
    + '<button id="sig-confirm" style="padding:8px 16px;border:none;border-radius:var(--radius);background:var(--blue);color:#fff;cursor:pointer;font-size:13px;font-weight:600">Confirmar y firmar</button>'
    + '</div></div>';
  document.body.appendChild(overlay);
  // Wire confirm button
  document.getElementById('sig-confirm').onclick = function() {
    const pwd = document.getElementById('sig-pwd').value;
    const reason = document.getElementById('sig-reason').value.trim();
    const errEl = document.getElementById('sig-err');
    if(!pwd) { errEl.textContent='Ingresá tu contraseña'; errEl.style.display='block'; return; }
    const uid = currentUser.id;
    if(pwd !== passwords[uid]) { errEl.textContent='Contraseña incorrecta'; errEl.style.display='block'; return; }
    overlay.remove();
    callback(reason);
  };
  document.getElementById('sig-pwd').onkeydown = function(e){
    if(e.key==='Enter') document.getElementById('sig-confirm').click();
  };
}

// ── Immutability guard: check if a task can still be edited ──
function canEditTask(t) {
  // Once approved, task data is locked — only admin can override
  if(t.status==='approved') return false;
  return true;
}
function canEditField(t, field) {
  // After review, analytical results (notes, hours) are locked
  const lockedAfterReview = ['notes','assignments'];
  if(['reviewed','approved'].includes(t.status) && lockedAfterReview.includes(field)) return false;
  return true;
}

function exportAuditCSV(){
  var rows=[['Fecha','Hora','Usuario','Rol','Accion','Entidad','ID','Descripcion','Motivo']];
  [...auditTrail].sort(function(a,b){return a.ts-b.ts;}).forEach(function(e){
    var dt=new Date(e.ts);var u=getU(e.userId||e.user);
    rows.push([dt.toLocaleDateString('es'),dt.toLocaleTimeString('es'),u?u.name:(e.userName||e.userId||''),u?u.role:(e.userRole||''),,e.action,e.entity,String(e.entityId||''),(e.details&&e.details.description)||'',e.reason||'']);
  });
  var csv=rows.map(function(r){return r.map(function(c){return'"'+String(c||'').replace(/"/g,'""')+'"';}).join(',');}).join('\n');
  var blob=new Blob(['\uFEFF'+csv],{type:'text/csv;charset=utf-8'});
  var a=document.createElement('a');a.href=URL.createObjectURL(blob);
  a.download='audit_trail_'+new Date().toISOString().slice(0,10)+'.csv';
  document.body.appendChild(a);a.click();document.body.removeChild(a);
}

      det.newVal!==undefined?String(det.newVal):'',
      e.reason||''
    ].join('\t');
  });
  const text = [hdrs.join('\t'),...rows].join('\n');
  navigator.clipboard.writeText(text).then(function(){
    alert('Audit trail copiado ('+entries.length+' registros).\nPodés pegarlo en Excel.');
  }).catch(function(){
    const ta=document.createElement('textarea');ta.value=text;
    document.body.appendChild(ta);ta.select();document.execCommand('copy');
    document.body.removeChild(ta);
    alert('Copiado ('+entries.length+' registros)');
  });
}

// ── 21 CFR Part 11: Failed login tracking ──
let loginAttempts = {};  // {uid: {count, lastTs}}
const MAX_LOGIN_ATTEMPTS = 5;
const LOGIN_LOCKOUT_MS = 15 * 60 * 1000; // 15 min

function checkLoginLockout(uid) {
  const att = loginAttempts[uid];
  if(!att) return false;
  if(Date.now() - att.lastTs > LOGIN_LOCKOUT_MS) { loginAttempts[uid] = null; return false; }
  return att.count >= MAX_LOGIN_ATTEMPTS;
}
function recordLoginFailure(uid, name) {
  if(!loginAttempts[uid]) loginAttempts[uid] = {count:0, lastTs:0};
  loginAttempts[uid].count++;
  loginAttempts[uid].lastTs = Date.now();
  /* LOGIN_FAIL no se registra en audit trail */
  if(loginAttempts[uid].count >= MAX_LOGIN_ATTEMPTS) {
    /* ACCOUNT_LOCKED no se registra en audit trail */
  }
}
function recordLoginSuccess(uid) {
  loginAttempts[uid] = null; // reset on success
}

// ── 21 CFR Part 11: Session inactivity timeout ──
let _lastActivityTs = Date.now();
const SESSION_TIMEOUT_MS = 30 * 60 * 1000; // 30 min inactivity
let _sessionTimer = null;

function resetActivityTimer() {
  _lastActivityTs = Date.now();
}
function startSessionWatchdog() {
  if(_sessionTimer) clearInterval(_sessionTimer);
  _sessionTimer = setInterval(function() {
    if(!currentUser) return;
    const idle = Date.now() - _lastActivityTs;
    if(idle >= SESSION_TIMEOUT_MS) {
      /* SESSION_TIMEOUT no se registra en audit trail */
      currentUser = null;
      selectedLoginUser = null;
      loginStep = 1;
      loginError = 'Sesión cerrada por inactividad (30 min). Por favor ingresá nuevamente.';
      render();
    }
  }, 60000); // check every minute
}

// ── GLP: Soft delete — never destroy records ──
function softDeleteTask(id, reason) {
  const t = tasks.find(function(x){return x.id===id;});
  if(!t) return;
  t._deleted = true;
  t._deletedBy = currentUser.id;
  t._deletedTs = Date.now();
  t._deletedReason = reason;
  t._ts = Date.now();
  auditLog('DELETE','TASK',id,{
    description:'Anulación (borrado lógico): '+t.producto+' '+t.lote,
    oldVal: t.status
  }, reason);
  closeModal(); saveLS(); render();
}

// ── GLP/ISO 17025: Record versioning — save snapshot before each edit ──
function saveTaskVersion(t) {
  if(!t) return;
  if(!t._history) t._history = [];
  t._history.push({
    ts: Date.now(),
    editedBy: currentUser ? currentUser.id : '?',
    editedByName: currentUser ? currentUser.name : '?',
    snapshot: {
      producto: t.producto,
      lote: t.lote,
      status: t.status,
      assignments: JSON.parse(JSON.stringify(t.assignments||[])),
      notes: t.notes,
      due: t.due,
      priority: t.priority
    }
  });
  // Keep last 20 versions
  if(t._history.length > 20) t._history = t._history.slice(-20);
}

// ── Render task history modal ──
function renderTaskHistory(taskId) {
  const t = tasks.find(function(x){return x.id===taskId;});
  if(!t||!t._history||!t._history.length) return '<div class="empty">Sin historial de ediciones previas</div>';
  const rows = [...t._history].reverse().map(function(h,i){
    const d = new Date(h.ts);
    const snap = h.snapshot||{};
    const changes = [];
    // Compare with current
    if(snap.status !== t.status) changes.push('Estado: '+statusLabel(snap.status)+' → '+statusLabel(t.status));
    if(snap.notes !== t.notes) changes.push('Notas modificadas');
    if(snap.due !== t.due) changes.push('Vencimiento: '+fmtDF(snap.due||'')+' → '+fmtDF(t.due||''));
    if(snap.priority !== t.priority) changes.push('Prioridad: '+snap.priority+' → '+t.priority);

      +'<div style="display:flex;gap:12px;align-items:center;flex-wrap:wrap">'
      +'<span style="font-size:11px;font-family:var(--mono);color:var(--text3)">v'+(t._history.length-i)

      +'<span style="font-size:12px;font-weight:600">'+escH(h.editedByName||h.editedBy||'?')+'</span>'

}

// ── 21 CFR Part 11: Data integrity hash ──
function computeIntegrityHash(t) {
  // Simple deterministic checksum of critical fields
  const str = [t.id, t.producto, t.lote, t.status,
    t.reviewedBy||'', t.reviewedDate||'', t.approvedBy||'', t.approvedDate||'',
    (t.assignments||[]).map(function(a){return a.analyst+':'+a.date;}).join(',')
  ].join('|');
  // DJB2 hash
  let hash = 5381;
  for(let i=0;i<str.length;i++){hash=((hash<<5)+hash)+str.charCodeAt(i);hash=hash&hash;}
  return (hash>>>0).toString(16).padStart(8,'0');
}

function verifyTaskIntegrity(t) {
  if(!t._integrityHash) return null; // not yet hashed
  return t._integrityHash === computeIntegrityHash(t);
}

function stampIntegrity(t) {
  t._integrityHash = computeIntegrityHash(t);
  t._integrityTs = Date.now();
  t._integrityBy = currentUser ? currentUser.id : '?';
}

          <button class="btn sm" onclick="dashFilter=dashFilter==='done'?'':'done';render()" style="${dashFilter==='done'?'background:var(--green-bg);color:var(--green-text);font-weight:600;border-color:var(--green)':''}">Completados</button>

        ${filtered.length===0?'<div class="empty">Sin resultados para este filtro</div>':filtered.map(t=>tRowSupLote(t)).join('')}
      </div>`;
  }
  // Analyst/Reviewer view — exclude a-ingresar (supervisor-only pre-pending state)
  const myTasks=tasks.filter(t=>t.status!=='a-ingresar'&&(t.assignments||[]).some(a=>a.analyst===currentUser.id));
  const todayD=new Date(today()+'T12:00:00');
  const minWin=_relDate(-3);const maxWin=_relDate(1);
  // "Mi día": tareas que requieren acción — asignaciones dentro de la ventana, o ya en progreso/observadas
  const myActionable=myTasks.filter(function(t){
    if(['done','reviewed','approved'].includes(t.status))return false;
    if(t.status==='progress'||t.status==='pending-confirm'||t.status==='observed')return true;
    // pending/scheduled: mostrar si hay alguna asignación dentro de la ventana de acción
    return(t.assignments||[]).some(function(a){
      return a.analyst===currentUser.id&&!a._removed&&a.date>=minWin&&a.date<=maxWin;
    });
  });
  const myDone=myTasks.filter(t=>['done','reviewed','approved'].includes(t.status));
  const myObs=myTasks.filter(t=>t.status==='observed');
  // Horas reales: suma de todas las asignaciones del analista
  const myHReal=myTasks.reduce((s,t)=>s+((t.assignments||[]).filter(a=>a.analyst===currentUser.id).reduce((s2,a)=>s2+(a.realHours||0),0)),0);
  return`<div class="dash-grid" style="margin-bottom:16px">
    <div class="stat-card"><div class="stat-n" style="color:var(--amber)">${myActionable.length}</div><div class="stat-l">Requieren acción</div></div>
    <div class="stat-card"><div class="stat-n" style="color:var(--blue)">${myTasks.filter(t=>t.status==='progress'||t.status==='pending-confirm').length}</div><div class="stat-l">En curso</div></div>
    <div class="stat-card"><div class="stat-n" style="color:var(--green)">${myDone.length}</div><div class="stat-l">Completados</div></div>
    ${myObs.length?`<div class="stat-card"><div class="stat-n" style="color:var(--amber)">${myObs.length}</div><div class="stat-l">Observados</div></div>`:''}
    ${myHReal>0?`<div class="stat-card"><div class="stat-n" style="color:var(--green);">${myHReal.toFixed(1)}h</div><div class="stat-l">H.Real</div></div>`:''}
  </div>
  ${currentUser.role==='staff'?renderStaffFreeTasksWidget():''}  ${myObs.length?`<div class="sec" style="color:var(--amber);margin-bottom:8px">⚑ Análisis observados</div>
  <div class="tbl" style="margin-bottom:16px">${myObs.map(t=>tRowsAna(t)).join('')}</div>`:''}
  <div class="sec" style="margin-bottom:8px">Mis análisis — actividades que requieren acción</div>
  <div class="tbl">${myActionable.length===0?'<div class="empty">No tenés análisis con acción pendiente hoy ✓</div>':myActionable.map(t=>tRowsAna(t)).join('')}</div>`;
}

function openReplanSuper(taskId){
  // If multiple analysts, open picker; if one, go direct
  const t=tasks.find(x=>x.id===taskId);if(!t)return;
  const assignees=getAssignees(t);
  if(assignees.length===1){openReplan(taskId,assignees[0]);}
  else if(assignees.length>1){
    const names=assignees.map(id=>getU(id).name).join(', ');
    const pick=prompt('Analistas asignados:\n'+names+'\n\nEscribí las primeras letras del nombre del analista a replanificar:');
    if(!pick)return;
    const found=assignees.find(id=>getU(id).name.toLowerCase().includes(pick.toLowerCase()));
    if(found){openReplan(taskId,found);}
    else{alert('No se encontró ese analista.');}
  }
}
// Expand a task to one row per assignment for the current analyst (independent per-date)
function tRowsAna(t){
  var myA=(t.assignments||[]).filter(function(a){return a.analyst===currentUser.id&&!a._removed;});
  if(myA.length<=1)return tRowAna(t,myA[0]||null);
  return myA.slice().sort(function(a,b){return(a.date||'').localeCompare(b.date||'');})
    .map(function(ma){return tRowAna(t,ma);}).join('');
}
function tRowAna(t,maOverride){
  var todayStr=today();
  var todayDate=new Date(todayStr+'T12:00:00');
  // Todas las asignaciones de este analista en esta tarea (excluyendo las removidas)
  var myAssigns=(t.assignments||[]).filter(function(a){return a.analyst===currentUser.id&&!a._removed;});
  // PUNTO 4: si se pasa una asignación específica (maOverride), usarla directamente
  // Si no, elegir la más relevante: hoy primero, luego la más cercana
  var ma=maOverride||myAssigns.find(function(a){return a.date===todayStr;})
    || myAssigns.slice().sort(function(a,b){
        return Math.abs(new Date(a.date+'T12:00:00')-todayDate)
             - Math.abs(new Date(b.date+'T12:00:00')-todayDate);
       })[0]
    || null;
  var md=ma?ma.date:t.due;
  var assignedDate=new Date((md||todayStr)+'T12:00:00');
  // diffDays: signed — negative=past, positive=future
  var diffDays=Math.round((assignedDate-todayDate)/(1000*60*60*24));
  // Ventana de acción: 3 días atrás hasta 1 día adelante
  var inActionWindow=(diffDays>=-3&&diffDays<=1)||t._dueStatus==='late';
  // Per-assignment state (independent per date)
  var iThisAssignDone=ma&&((ma.realHours>0)||(ma.sessions&&ma.sessions.length>0));
  var iThisAssignPendConf=ma&&ma._pendingConfirm&&!ma._supervisorConfirmed;
  // Task is in an actionable state (not finished)
  var taskActive=['pending','scheduled','progress','pending-confirm','observed'].indexOf(t.status)>=0;
  // canStart: assignment not done/started, in window, task active
  var iThisAssignStarted=!!(ma&&ma._started);
  var canStart=!iThisAssignDone&&!iThisAssignPendConf&&!iThisAssignStarted&&inActionWindow&&taskActive;
  var pendingReplan=replanNotifs.find(function(n){return n.taskId===t.id&&n.analystId===currentUser.id&&n.status==='pending';});
  var replanLabel=pendingReplan?'<span style="font-size:10px;background:var(--amber-bg);color:var(--amber-text);padding:1px 5px;border-radius:4px;font-weight:500">Replan. pendiente</span>':'';
  // Horas: solo de esta asignación específica (independiente por fecha)
  var maRealH=ma?((ma.sessions||[]).reduce(function(s,e){return s+(e.hours||0);},0)||(ma.realHours||0)):0;
  var maTL=ma?(ma.timeLog||[]):[];
  var todayEntry=maTL.find(function(e){return e.date===todayStr;});
  var todayStatus=todayEntry?'<span style="font-size:9px;font-family:var(--mono);color:var(--green)">'+todayEntry.start+'→'+todayEntry.end+'</span>':'';

  var hoursCol='<div style="display:flex;flex-direction:column;gap:2px">'
    +(maRealH?'<span style="font-size:11px;font-weight:700;color:var(--green);font-family:var(--mono)">Real: '+maRealH.toFixed(1)+'h</span>':'<span style="font-size:10px;color:var(--text3)">Sin datos</span>')
    +(todayStatus?todayStatus:'')
    +'</div>';

  // Encode assignment date for targeted markProg/markDone calls
  var dateParam=ma&&ma.date?',\''+ma.date+'\'':'';

  // canComplete: assignment not done and not pending-confirm, task active, date in window
  var canComplete=!iThisAssignDone&&!iThisAssignPendConf&&inActionWindow&&taskActive;

  return'<div class="trow" style="grid-template-columns:1.4fr .7fr .75fr .55fr 1.1fr">'
    +'<div><div class="cell-trunc">'+escH(t.producto)+'</div><div class="cell-sub">'+escH(t.lote)+'</div></div>'
    +'<div style="font-family:var(--mono);font-size:12px">'+fmtD(md)+(replanLabel?'<br>'+replanLabel:'')+'</div>'
    +'<div>'+hoursCol+'</div>'
    +'<div>'
    +'<span class="pill '+(taskDisplayStatus(t)==='partial'?'partial':t.status)+'">'+statusLabel(taskDisplayStatus(t))+'</span>'
        +(t.observations&&t.observations.length?'<span title="'+escH(t.observations[t.observations.length-1].comment||'')+'" style="cursor:help;font-size:11px;color:var(--amber-text);margin-left:4px">⚑</span>':'')
    +(t.status==='approved'?'<div style="font-size:9px;color:var(--green);margin-top:1px;font-weight:600">✓ Aprobado'+(t.approvedDate?' '+fmtDF(t.approvedDate):'')+'</div>':'')
    +'</div>'
    +'<div style="display:flex;gap:3px;flex-wrap:wrap;align-items:center">'
    +(canStart?'<button class="btn pri sm" onclick="markProg('+t.id+dateParam+')">▶ Iniciar</button>':'')
    +(canComplete?'<button class="btn suc sm" onclick="markDone('+t.id+dateParam+')">✓ Completar</button>':'')
    +(t.status==='observed'?'<button class="btn suc sm" onclick="markDone('+t.id+dateParam+')">↩ Re-enviar</button>':'')
    +(iThisAssignPendConf?'<span style="font-size:10px;background:var(--blue-bg);color:var(--blue-text);padding:2px 6px;border-radius:4px;font-weight:500">⏳ Conf. pendiente</span>':'')
    +(iThisAssignDone&&!iThisAssignPendConf&&t.status!=='pending-confirm'?'<span style="font-size:11px;color:var(--green)">✓ Completado</span>':'')
    +(!pendingReplan&&!iThisAssignDone&&t.status!=='done'&&t.status!=='pending-confirm'?'<button class="btn sm" onclick="openReplan('+t.id+',\''+currentUser.id+'\')" title="Replanificar">📅</button>':'')
    +((t.observations&&t.observations.length)||(t.completionComments&&t.completionComments.length)||(t.resubmitHistory&&t.resubmitHistory.length)?'<button class="btn sm" onclick="openEdit('+t.id+')" title="Ver comentarios del proceso" style="color:var(--blue)">💬</button>':'')
    +'</div>'
    +'</div>';
}

      +'</div>';

    if(f.length===0){
      rows=ftSection+'<div class="empty">Sin análisis asignados</div>';

      // Expandir: para cada tarea, una fila por asignación de este analista
      var expandedRows=[];
      f.forEach(function(t){

      rows=ftSection+expandedRows.join('');

      rows='<div class="empty">Sin resultados</div>';

    +'<select onchange="setFS(this.value)">'

    +'<option value="scheduled"'+(filterStatus==='scheduled'?' selected':'')+'>Programado</option>'
    +'<option value="progress"'+(filterStatus==='progress'?' selected':'')+'>En curso</option>'
    +'<option value="pending-confirm"'+(filterStatus==='pending-confirm'?' selected':'')+'>Por confirmar</option>'
    +'<option value="done"'+(filterStatus==='done'?' selected':'')+'>Completado</option>'
    +'<option value="late"'+(filterStatus==='late'?' selected':'')+'>⚠ Vencido (fecha límite)</option>'
    +'<option value="reviewed"'+(filterStatus==='reviewed'?' selected':'')+'>Revisado</option>'
    +'<option value="approved"'+(filterStatus==='approved'?' selected':'')+'>Aprobado</option>'
    +'<option value="observed"'+(filterStatus==='observed'?' selected':'')+'>Observado</option>'

}

function renderPendStatusChips(psf,nAll,nIng,nProg,nAna){
  function chipBtn(status,label,color,count){
    var active=psf===status;
    var bg=active?'background:'+color+';color:#fff;border-color:'+color:'';
    return'<button class="btn sm" onclick="window.pendientesStatusFilter=\''+status+'\';var el=document.getElementById(\'pend-results\');if(el)el.innerHTML=renderPendientesResults();" style="'+bg+'">'+label+' ('+count+')</button>';
  }
  return'<div style="display:flex;gap:8px;flex-wrap:wrap;margin-bottom:12px">'

    +chipBtn('scheduled','📅 Programado','var(--blue)',nProg)

}

function renderPendientesList(){
  const isSup=isSupRole();
  if(isSup) return renderPending();

  // Filter state
  if(typeof window.pendientesSearch==='undefined') window.pendientesSearch='';
  var q=(window.pendientesSearch||'').toLowerCase().trim();
  var psf=window.pendientesStatusFilter||'all';

  function matchQ(t){return !q||t.producto.toLowerCase().includes(q)||t.lote.toLowerCase().includes(q);}
  function matchS(t){
    if(psf==='all') return t.status==='pending'||t.status==='scheduled'||t.status==='progress';
    return t.status===psf;
  }

  var allActive=tasks.filter(function(t){
    return (t.status==='pending'||t.status==='scheduled'||t.status==='progress')&&matchQ(t);
  });
  var filtered=allActive.filter(matchS);

  // Counts for dashboard chips
  var nIngresado=allActive.filter(function(t){return t.status==='pending';}).length;
  var nProgramado=allActive.filter(function(t){return t.status==='scheduled';}).length;
  var nAnalisis=allActive.filter(function(t){return t.status==='progress';}).length;

  var chips=renderPendStatusChips(psf,allActive.length,nIngresado,nProgramado,nAnalisis);
  // Pending-confirm own (completed, awaiting supervisor)
  var misPendConfirm=tasks.filter(function(t){
    return t.status==='pending-confirm'&&t.completedBy===currentUser.id&&matchQ(t);
  });

  // Check if analyst already requested planification for a task
  function alreadyRequested(taskId){
    return replanNotifs.some(function(n){
      return n.type==='planification_request'&&n.taskId===taskId&&n.analystId===currentUser.id&&n.status==='pending';
    });
  }

  function taskRow(t){
    var assigns=(t.assignments||[]).filter(function(a){return !a._removed;});
    var firstDate=assigns.reduce(function(mn,a){return !mn||a.date<mn?a.date:mn;},null);
    var anaAvatars=assigns.map(function(a){var u=getU(a.analyst);return u?'<div class="av '+u.av+'" style="width:18px;height:18px;font-size:8px" title="'+escH(u.name)+'">'+escH(u.avInit)+'</div>':'';}).join('');
    var myA=(t.assignments||[]).some(function(a){return a.analyst===currentUser.id&&!a._removed;});
    var isReq=alreadyRequested(t.id);
    var obsHtml=t.observations&&t.observations.length?'<span title="'+escH(t.observations[t.observations.length-1].comment||'')+'" style="cursor:help;font-size:11px;color:var(--amber-text);margin-left:3px">⚑</span>':'';
    return'<div style="background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);padding:10px 14px;margin-bottom:7px;display:flex;align-items:center;gap:10px">'
      +'<div style="flex:1;min-width:0">'
      +'<div style="font-weight:600;font-size:13px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">'+escH(t.producto)+obsHtml+'</div>'
      +'<div style="font-size:11px;font-family:var(--mono);color:var(--text3);margin-top:1px">'+escH(t.lote)
        +(firstDate?' · Planif: '+fmtDDMMYY(firstDate):'')
        +(t.due?' · Límite: '+dueBadge(t):'')
        +'</div>'
      +(anaAvatars?'<div style="display:flex;gap:2px;margin-top:4px">'+anaAvatars+'</div>':'')
      +'</div>'
      +'<span class="pill '+t.status+'" style="font-size:10px;flex-shrink:0">'+statusLabel(t.status)+'</span>'
      +(myA
        ?'<span style="font-size:10px;color:var(--green);flex-shrink:0">✓ Asignado a mí</span>'
        :(isReq
          ?'<span style="font-size:10px;color:var(--amber-text);flex-shrink:0">⏳ Solicitud enviada</span>'
          :'<button class="btn sm pri" onclick="requestPlanification('+t.id+')" style="flex-shrink:0;font-size:11px">📋 Solicitar</button>'
        )
      )
      +'</div>';
  }

  var searchBar='<div style="display:flex;align-items:center;gap:10px;margin-bottom:14px">'
    +'<input id="pend-search" type="text" placeholder="Buscar por producto o lote…" value="'+escH(window.pendientesSearch||'')+'"'
    +' style="flex:1;padding:8px 12px;border:1px solid var(--border);border-radius:var(--radius);font-size:13px;background:var(--surface);color:var(--text)"'
    +' oninput="window.pendientesSearch=this.value;var el=document.getElementById(\'pend-results\');if(el){el.innerHTML=renderPendientesResults();}">'
    +(q?'<button class="btn sm" onclick="window.pendientesSearch=\'\';var el=document.getElementById(\'pend-results\');if(el){el.innerHTML=renderPendientesResults();}else{render();}">✕ Limpiar</button>':'')
    +'</div>';

  return chips+searchBar+'<div id="pend-results">'+renderPendientesResults(filtered,misPendConfirm)+'</div>';
}

function renderPendientesResults(filtered,pc){
  if(!filtered){
    var q2=(window.pendientesSearch||'').toLowerCase().trim();
    var psf2=window.pendientesStatusFilter||'all';
    
    function mS2(t){
      if(psf2==='all') return t.status==='pending'||t.status==='scheduled'||t.status==='progress';
      return t.status===psf2;
    }
    filtered=tasks.filter(function(t){return mS2(t)&&mQ2(t);});
    pc=tasks.filter(function(t){return t.status==='pending-confirm'&&t.completedBy===currentUser.id&&mQ2(t);});
  }
  function alreadyReq(taskId){
    return replanNotifs.some(function(n){return n.type==='planification_request'&&n.taskId===taskId&&n.analystId===currentUser.id&&n.status==='pending';});
  }
  function tr(t){
    var assigns=(t.assignments||[]).filter(function(a){return !a._removed;});
    var firstDate=assigns.reduce(function(mn,a){return !mn||a.date<mn?a.date:mn;},null);
    var anaAvatars=assigns.map(function(a){var u=getU(a.analyst);return u?'<div class="av '+u.av+'" style="width:18px;height:18px;font-size:8px" title="'+escH(u.name)+'">'+escH(u.avInit)+'</div>':'';}).join('');
    var myA=(t.assignments||[]).some(function(a){return a.analyst===currentUser.id&&!a._removed;});
    var isReq=alreadyReq(t.id);
    var obsHtml=t.observations&&t.observations.length?'<span title="'+escH(t.observations[t.observations.length-1].comment||'')+'" style="cursor:help;font-size:11px;color:var(--amber-text);margin-left:3px">⚑</span>':'';
    return'<div style="background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);padding:10px 14px;margin-bottom:7px;display:flex;align-items:center;gap:10px">'
      +'<div style="flex:1;min-width:0">'
      +'<div style="font-weight:600;font-size:13px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">'+escH(t.producto)+obsHtml+'</div>'
      +'<div style="font-size:11px;font-family:var(--mono);color:var(--text3);margin-top:1px">'+escH(t.lote)
        +(firstDate?' · Planif: '+fmtDDMMYY(firstDate):'')
        +(t.due?' · Límite: '+dueBadge(t):'')
        +'</div>'
      +(anaAvatars?'<div style="display:flex;gap:2px;margin-top:4px">'+anaAvatars+'</div>':'')
      +'</div>'
      +'<span class="pill '+t.status+'" style="font-size:10px;flex-shrink:0">'+statusLabel(t.status)+'</span>'
      +(myA
        ?'<span style="font-size:10px;color:var(--green);flex-shrink:0">✓ Asignado a mí</span>'
        :(isReq
          ?'<span style="font-size:10px;color:var(--amber-text);flex-shrink:0">⏳ Solicitud enviada</span>'
          :'<button class="btn sm pri" onclick="requestPlanification('+t.id+')" style="flex-shrink:0;font-size:11px">📋 Solicitar</button>'
        )
      )
      +'</div>';
  }
  var out='';
  if(filtered.length===0){
    out='<div class="empty">Sin análisis para el filtro seleccionado</div>';
  } else {
    out=filtered.map(tr).join('');
  }
  if(pc&&pc.length>0){
    out+='<div style="margin-top:16px"><div class="sec" style="margin-bottom:8px;color:var(--amber)">Completados — esperando confirmación del Supervisor ('+pc.length+')</div>'
      +pc.map(tr).join('')
      +'</div>';
  }
  return out;
}

function renderPendingContent(){
  const pq2=(window.pendingSearch||'').toLowerCase().trim();
  function mQ2(t){return !pq2||t.producto.toLowerCase().includes(pq2)||t.lote.toLowerCase().includes(pq2);}
  var psf=window.pendingStatusFilter||'all';

  // Unified task list — all active + pending-confirm (+ a-ingresar for supervisor only)
  var allT=sortTasks(tasks.filter(function(t){
    var visibleStatuses=['pending','scheduled','progress','pending-confirm','done','observed'];
    if(isSupRole())visibleStatuses.unshift('a-ingresar');
    return visibleStatuses.indexOf(t.status)>=0&&mQ2(t);
  }),taskSort,taskSortDir);

  // Apply status filter
  var filtered=allT.filter(function(t){
    if(psf==='all') return true;
    if(psf==='late') return t._dueStatus==='late';
    return t.status===psf;
  });

  // Dashboard chip counts
  var counts={
    all:allT.length,
    'a-ingresar':allT.filter(function(t){return t.status==='a-ingresar';}).length,
    pending:allT.filter(function(t){return t.status==='pending';}).length,
    scheduled:allT.filter(function(t){return t.status==='scheduled';}).length,
    progress:allT.filter(function(t){return t.status==='progress';}).length,
    'pending-confirm':allT.filter(function(t){return t.status==='pending-confirm';}).length,
    late:allT.filter(function(t){return t._dueStatus==='late';}).length
  };

  function chip(id,label,color){
    var active=psf===id;
    var cnt=counts[id];
    if(cnt===0&&id!=='all')return '';
    return'<button class="btn sm" onclick="window.pendingStatusFilter=\''+id+'\';var c=document.getElementById(\'pending-content\');if(c)c.innerHTML=renderPendingContent();" style="'+(active?'background:'+color+';color:#fff;border-color:'+color:'')+'">'
      +label+(cnt!==undefined?' ('+cnt+')':'')+'</button>';
  }

  var chips='<div style="display:flex;gap:6px;flex-wrap:wrap;margin-bottom:12px">'
    +chip('all','Todos','var(--navy,#1a4f8a)')
    +(isSupRole()?chip('a-ingresar','📦 A ingresar','#5b21b6'):'')
    +chip('pending','📥 Ingresado','#64748b')
    +chip('scheduled','📅 Programado','var(--blue)')
    +chip('progress','🔬 En análisis','var(--green)')
    +chip('pending-confirm','✓ Completado','var(--amber)')
    +chip('late','⚠ Vencidos','var(--red)')
    +'</div>';

  const cols='grid-template-columns:1.5fr 0.8fr 0.65fr 0.75fr 0.8fr 0.65fr 0.85fr 0.75fr';
  const hdr='<div class="thead" style="'+cols+'">'
    +sortHdr('producto','Producto / Lote')
    +'<div>Analistas</div>'
    +sortHdr('created','Ingreso')
    +'<div>F. planificado</div>'
    +sortHdr('due','Aprob. límite')
    +sortHdr('priority','Prioridad')
    +sortHdr('status','Estado')
    +'<div></div>'
    +'</div>';


  function pRow(t){
    var assigns=(t.assignments||[]).filter(function(a){return !a._removed;});
    var firstDate=assigns.reduce(function(mn,a){return !mn||a.date<mn?a.date:mn;},null);
    var anaAv=assigns.map(function(a){var u=getU(a.analyst);return u?'<div class="av '+u.av+'" style="width:20px;height:20px;font-size:8px" title="'+escH(u.name)+'">'+escH(u.avInit)+'</div>':''}).join('');
    var obsHtml=t.observations&&t.observations.length
      ?'<span style="cursor:help;font-size:10px;font-weight:700;color:var(--amber-text);margin-left:4px" title="'+escH(t.observations.map(function(o,i){return '#'+(i+1)+' '+(o.byName||'')+': '+(o.comment||'');}).join('\n'))+'">⚑ ('+t.observations.length+')</span>':'';
    // Arrival date badge for a-ingresar
    var arrivalHtml='';
    if(t.status==='a-ingresar'){
      var todayStr2=today();
      var isOverdue=t.expectedArrival&&t.expectedArrival<todayStr2;
      var arrTooltip='Llegada esperada: '+(t.expectedArrival?fmtDDMMYY(t.expectedArrival):'no definida')+(t.arrivalNotes?'\n'+t.arrivalNotes:'');
      arrivalHtml='<span title="'+escH(arrTooltip)+'" style="cursor:help;margin-left:4px;font-size:11px">'
        +(isOverdue
          ?'<span style="color:var(--red-text);font-weight:700">⚠ '+fmtDDMMYY(t.expectedArrival)+'</span>'
          :(t.expectedArrival?'📦 '+fmtDDMMYY(t.expectedArrival):'📦 —'))
        +'</span>';
    }
    return'<div class="trow" style="'+cols+'" onclick="openEdit('+t.id+')">'
      +'<div><div class="cell-trunc" style="font-weight:500;font-size:12px">'+escH(t.producto)+'</div>'
      +'<div class="cell-sub cell-trunc" style="font-size:10px">'+escH(t.lote)+'</div></div>'
      +'<div style="display:flex;align-items:center;gap:2px;flex-wrap:wrap">'+(anaAv||'<span style="color:var(--text3);font-size:11px">Sin asignar</span>')+'</div>'
      +'<div style="font-family:var(--mono);font-size:11px;color:var(--text2)">'+(t.created?fmtDDMMYY(t.created):'—')+'</div>'
      +'<div style="font-family:var(--mono);font-size:11px">'+(firstDate?fmtDDMMYY(firstDate):'—')+'</div>'
      +'<div style="font-size:11px">'+(t.due?dueBadge(t):'—')+'</div>'
      +'<div><span class="pill '+(t.priority||'Normal').toLowerCase()+'" style="font-size:10px">'+(t.priority||'Normal')+'</span></div>'
      +'<div><span class="pill '+(taskDisplayStatus(t)==='partial'?'partial':t.status)+'" style="font-size:10px">'+statusLabel(taskDisplayStatus(t))+'</span>'+obsHtml+arrivalHtml+'</div>'
      +'<div onclick="event.stopPropagation()" style="display:flex;gap:3px">'
      +(isSupRole()&&t.status==='a-ingresar'?'<button class="btn sm suc" onclick="event.stopPropagation();markSampleReceived('+t.id+')" style="font-size:10px;background:#5b21b6;border-color:#5b21b6;color:#fff">✓ Recibida</button>':'')
      +(isSupRole()&&t.status==='pending-confirm'?'<button class="btn sm suc" onclick="event.stopPropagation();confirmDone('+t.id+')" style="font-size:10px">✓ Conf.</button>':'')
      +(isSupRole()?'<button class="btn sm" onclick="event.stopPropagation();deleteTask('+t.id+')" style="color:var(--text3);padding:2px 4px" title="Eliminar">🗑</button>':'')
      +'</div>'
      +'</div>';
  }
  
  var tableHtml='<div class="tbl" id="tbl-pending-unified">'
    +(filtered.length===0?'<div class="empty">Sin resultados para el filtro seleccionado</div>':hdr+filtered.map(pRow).join(''))
    +'</div>';

  var exportBar='<div style="display:flex;justify-content:flex-end;gap:5px;margin-bottom:10px">'
    +'<button class="btn sm" onclick="copyPendientes(this)">📋 Copiar</button>'
    +'<button class="btn sm" onclick="exportPendientesXLSX()">↓ Excel</button>'
    +'</div>';
  return chips+exportBar+tableHtml;
}

// ── WEEK ──
function getMonthDates(off){
  const now=new Date();
  const year=now.getFullYear();
  const month=now.getMonth()+off;
  const d=new Date(year,month,1);
  const firstDay=d.getDay()===0?6:d.getDay()-1; // Mon=0
  const daysInMonth=new Date(year,month+1,0).getDate();
  // pad to full weeks
  const total=Math.ceil((firstDay+daysInMonth)/7)*7;
  return{year:d.getFullYear(),month:d.getMonth(),firstDay,daysInMonth,total,
    label:['Enero','Febrero','Marzo','Abril','Mayo','Junio','Julio','Agosto','Septiembre','Octubre','Noviembre','Diciembre'][d.getMonth()]+' '+d.getFullYear()};
}

function renderAnalysts(){
  const isSup=isSupRole();
  if(!ANALYSTS.length) return '<div class="empty">Sin analistas registrados</div>';
  return ANALYSTS.map(function(a){
    const myT=tasks.filter(function(t){return (t.assignments||[]).some(function(x){return x.analyst===a.id;});});
    const pend=myT.filter(function(t){return t.status==='pending'||t.status==='scheduled'||t._dueStatus==='late';}).length;
    const prog=myT.filter(function(t){return t.status==='progress'||t.status==='pending-confirm';}).length;
    const done=myT.filter(function(t){return ['done','reviewed','approved'].includes(t.status);}).length;
    const hReal=myT.reduce(function(s,t){return s+(t.assignments||[]).filter(function(x){return x.analyst===a.id;}).reduce(function(s2,x){return s2+(parseFloat(x.realHours)||0);},0);},0);
    const absentToday=isAbsent(a.id,today());
    const conflicts=checkAbsenceConflicts().filter(function(c){return c.analystId===a.id;}).length;
    return '<div class="card" style="padding:14px 16px;margin-bottom:10px">'
      +'<div style="display:flex;align-items:center;gap:12px;flex-wrap:wrap">'
      +'<div class="av '+a.av+'" style="width:40px;height:40px;font-size:15px;flex-shrink:0">'+escH(a.avInit)+'</div>'
      +'<div style="flex:1;min-width:0"><div style="font-weight:600;font-size:14px">'+escH(a.name)+'</div>'
      +'<div style="font-size:11px;color:var(--text3)">'+escH(a.role==='reviewer'?'Revisor':'Analista')+'</div></div>'
      +(absentToday?'<span style="font-size:11px;background:var(--amber-bg);color:var(--amber-text);padding:2px 8px;border-radius:10px;font-weight:600">Ausente</span>':'')
      +(conflicts>0?'<span style="font-size:11px;background:var(--red-bg);color:var(--red-text);padding:2px 8px;border-radius:10px;font-weight:600">'+conflicts+' conflicto'+(conflicts>1?'s':'')+'</span>':'')
      +'</div>'
      +'<div style="display:flex;gap:12px;margin-top:10px;padding-top:10px;border-top:1px solid var(--border);flex-wrap:wrap;align-items:center">'
      +'<div style="text-align:center;min-width:44px"><div style="font-size:20px;font-weight:700;color:var(--amber)">'+pend+'</div><div style="font-size:10px;color:var(--text3)">Pendiente</div></div>'
      +'<div style="text-align:center;min-width:44px"><div style="font-size:20px;font-weight:700;color:var(--blue)">'+prog+'</div><div style="font-size:10px;color:var(--text3)">En curso</div></div>'
      +'<div style="text-align:center;min-width:44px"><div style="font-size:20px;font-weight:700;color:var(--green)">'+done+'</div><div style="font-size:10px;color:var(--text3)">Completados</div></div>'
      +(hReal>0?'<div style="text-align:center;min-width:44px"><div style="font-size:20px;font-weight:700;color:var(--green)">'+hReal.toFixed(1)+'h</div><div style="font-size:10px;color:var(--text3)">H.Real</div></div>':'')
      +(isSup?'<div style="margin-left:auto;display:flex;gap:6px;flex-wrap:wrap">'
        +'<button class="btn sm" onclick="filterAnalyst=\''+a.id+'\';currentView=\'tasks\';render()">Ver análisis</button>'
        +'<button class="btn sm" onclick="rrhhAnalyst=\''+a.id+'\';currentView=\'rrhh\';rrhhTab=\'absences\';render()">Gestión</button>'
        +'</div>':'')
      +'</div></div>';
  }).join('');
}


function renderHistorialNotif(){
  var typeConf={
    'observation': {icon:'⚑',label:'Observación',   color:'var(--amber)',  bg:'var(--amber-bg)'},
    'resubmit':    {icon:'↩',label:'Re-envío',       color:'var(--blue)',   bg:'var(--blue-bg)'},
    'completion':  {icon:'💬',label:'Comentario',    color:'var(--green)',  bg:'var(--green-bg,#e8f5e9)'},
    'done':        {icon:'✓', label:'Completado',    color:'var(--green)',  bg:'var(--green-bg,#e8f5e9)'},
    'reviewed':    {icon:'📋',label:'Revisado',      color:'var(--blue)',   bg:'var(--blue-bg)'},
    'approved':    {icon:'✅',label:'Aprobado',      color:'var(--green)',  bg:'var(--green-bg,#e8f5e9)'},
    'replan':      {icon:'↺', label:'Replanificación',color:'var(--text2)', bg:'var(--bg2)'},
  };

  // Collect events from all tasks
  var events=[];
  tasks.forEach(function(t){
    (t.observations||[]).forEach(function(o){
      events.push({ts:o.ts||0,type:'observation',task:t,by:o.byName||o.by||'',comment:o.comment||''});
    });
    (t.resubmitHistory||[]).forEach(function(r){
      events.push({ts:r.ts||0,type:'resubmit',task:t,by:r.byName||r.by||'',comment:r.comment||''});
    });
    (t.completionComments||[]).forEach(function(c){
      events.push({ts:c.ts||0,type:'completion',task:t,by:c.byName||c.by||'',comment:c.comment||''});
    });
    if(t.completedTs){
      events.push({ts:t.completedTs,type:'done',task:t,by:t.completedBy?getU(t.completedBy).name:'',comment:''});
    }
    if(t.reviewedTs){
      events.push({ts:t.reviewedTs,type:'reviewed',task:t,by:t.reviewedBy?getU(t.reviewedBy).name:'',comment:''});
    }
    if(t.approvedTs){
      events.push({ts:t.approvedTs,type:'approved',task:t,by:t.approvedBy?getU(t.approvedBy).name:'',comment:''});
    }
  });
  // Also include replan/schedule notifications from replanNotifs
  replanNotifs.filter(function(n){return n.type==='replan'||n.type==='planification_request';}).forEach(function(n){
    var task=tasks.find(function(t){return t.id===n.taskId;});
    if(task){
      events.push({ts:n.ts||0,type:'replan',task:task,by:getU(n.analystId||'').name,comment:n.message||n.reason||''});
    }
  });

  events.sort(function(a,b){return (b.ts||0)-(a.ts||0);});

  if(events.length===0){
    return'<div class="sec">Historial de proceso</div>'
      +'<div class="empty" style="padding:32px">Sin eventos registrados ✓</div>';
  }

  // Summary chips (abreviados)
  var shortLabel={'observation':'Obs.','resubmit':'Re-env.','completion':'Coment.','done':'Comp.','reviewed':'Rev.','approved':'Apr.','replan':'Replan.'};
  var typeOrder=['done','reviewed','approved','observation','resubmit','completion','replan'];
  var counts={};
  events.forEach(function(e){counts[e.type]=(counts[e.type]||0)+1;});
  var summaryHtml='<div style="display:flex;gap:5px;flex-wrap:wrap;margin-bottom:14px;align-items:center">';
  typeOrder.forEach(function(k){
    if(!counts[k])return;
    var c=typeConf[k]||{icon:'•',color:'var(--text2)',bg:'var(--bg2)'};
    summaryHtml+='<span style="background:'+c.bg+';color:'+c.color+';border-radius:12px;padding:3px 9px;font-size:11px;font-weight:700;white-space:nowrap">'
      +c.icon+counts[k]+' '+shortLabel[k]+'</span>';
  });
  summaryHtml+='<button class="btn sm" onclick="copyHistorial(this)" style="margin-left:auto">📋 Copiar</button>';
  summaryHtml+='</div>';

  var rows=events.map(function(ev){
    var c=typeConf[ev.type]||{icon:'•',label:ev.type,color:'var(--text2)',bg:'var(--bg2)'};
    var t=ev.task;
    var ts=ev.ts?new Date(ev.ts).toLocaleString('es-UY',{day:'2-digit',month:'2-digit',year:'2-digit',hour:'2-digit',minute:'2-digit'}):'—';
    return'<div style="display:grid;grid-template-columns:110px 130px 1fr 160px;gap:0;border-bottom:1px solid var(--border);padding:9px 12px;font-size:12px;align-items:start;cursor:pointer" onclick="openEdit('+t.id+')">'
      +'<div style="font-size:11px;font-family:var(--mono);color:var(--text3)">'+ts+'</div>'
      +'<div><span style="background:'+c.bg+';color:'+c.color+';border-radius:10px;padding:2px 9px;font-size:11px;font-weight:600">'+c.icon+' '+c.label+'</span></div>'
      +'<div style="min-width:0">'
      +'<div style="font-weight:500;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">'+escH(t.producto)+' <span style="color:var(--text3);font-size:10px;font-family:var(--mono)">'+escH(t.lote)+'</span></div>'
      +(ev.comment?'<div style="color:var(--text2);font-size:11px;margin-top:2px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap" title="'+escH(ev.comment)+'">'+escH(ev.comment.slice(0,80))+'</div>':'')
      +'</div>'
      +'<div style="font-size:11px;display:flex;align-items:center;gap:5px">'
      +(ev.by?'<span style="color:var(--text2)">'+escH(ev.by)+'</span>':'')
      +'<span class="pill '+t.status+'" style="font-size:9px;margin-left:auto">'+statusLabel(t.status)+'</span>'
      +'</div>'
      +'</div>';
  }).join('');

  var thead='<div style="display:grid;grid-template-columns:110px 130px 1fr 160px;gap:0;padding:7px 12px;background:var(--bg2);border-bottom:2px solid var(--border);font-size:11px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:.03em">'
    +'<div>Fecha/Hora</div><div>Evento</div><div>Análisis / Comentario</div><div>Por / Estado</div></div>';

  return'<div class="sec">Historial de proceso</div>'
    +summaryHtml
    +'<div class="tbl">'+thead+rows+'</div>';
}

function saveUserName(uid){
  const u=USERS.find(function(x){return x.id===uid;});if(!u)return;
  const v=document.getElementById('uname-'+uid)?.value.trim();
  if(!v){alert('El nombre no puede estar vacío.');return;}
  u.name=v;
  rebuildDerived();auditLog('EDIT','USER',uid,{field:'name',description:'Cambio de nombre'},'Cambio administrativo');
  saveLS();render();
}

function saveUserRole(uid){
  const u=USERS.find(function(x){return x.id===uid;});if(!u)return;
  const newRole=document.getElementById('urole-'+uid)?.value;
  if(!newRole)return;
  const oldRole=u.role;
  u.role=newRole;
  // If changing away from supervisor, warn if this is the only one
  if(oldRole==='supervisor'&&USERS.filter(function(x){return x.role==='supervisor';}).length===0){
    alert('No puede haber cero supervisores. Se restauró el rol.');
    u.role=oldRole;rebuildDerived();saveLS();render();return;
  }
  auditLog('EDIT','USER',uid,{field:'role',oldRole:oldRole,newRole:newRole,description:'Cambio de rol'},'Cambio administrativo');
  rebuildDerived();saveLS();render();
  const roleLabels={supervisor:'Supervisor',reviewer:'Revisor',analyst:'Analista'};
  const msg=document.getElementById('new-user-msg');
  if(msg){msg.style.color='var(--green)';msg.textContent='Rol de '+escH(u.name)+' cambiado a '+roleLabels[newRole]+'. Efectivo al próximo login.';
  setTimeout(function(){if(msg)msg.textContent='';},3000);}
}

function saveUserPwd(uid){

function roundTo15(t){
  if(!t)return t;
  var p=t.split(':');if(p.length<2)return t;
  var h=parseInt(p[0]),m=parseInt(p[1]);
  var r=Math.round(m/15)*15;
  if(r>=60){h=(h+1)%24;r=0;}
  return String(h).padStart(2,'0')+':'+String(r).padStart(2,'0');
}
function timePicker(id,val,style){
  style=style||'';
  var h='08',m='00';
  if(val&&val.length>=4){var p=val.split(':');h=p[0]||'08';m=p[1]||'00';}
  var mi=parseInt(m)||0;mi=Math.round(mi/15)*15;
  if(mi>=60){mi=0;h=String(parseInt(h)+1).padStart(2,'0');}
  m=String(mi).padStart(2,'0');
  var hrs='';
  for(var i=0;i<24;i++){var hh=String(i).padStart(2,'0');hrs+='<option value="'+hh+'"'+(hh===h?' selected':'')+'>'+hh+'</option>';}
  var mins=['00','15','30','45'].map(function(mm){return'<option value="'+mm+'"'+(mm===m?' selected':'')+'>'+mm+'</option>';}).join('');
  return'<span class="time-pick" style="'+style+'">'
    +'<select id="'+id+'-h" onchange="syncTimeHidden(\''+id+'\')" aria-label="Hora">'+hrs+'</select>'
    +'<span style="font-family:var(--mono);font-weight:700;font-size:14px;padding:0 2px;color:var(--text)">:</span>'
    +'<select id="'+id+'-m" onchange="syncTimeHidden(\''+id+'\')" aria-label="Minutos">'+mins+'</select>'
    +'<input type="hidden" id="'+id+'" value="'+h+':'+m+'">'
    +'</span>';
}
function syncTimeHidden(id){
  var h=document.getElementById(id+'-h');
  var m=document.getElementById(id+'-m');
  var hidden=document.getElementById(id);
  if(h&&m&&hidden)hidden.value=h.value+':'+m.value;
}
function getTimeVal(id){
  var el=document.getElementById(id);
  if(!el)return'';
  return el.type==='hidden'?el.value:roundTo15(el.value||'');
}

function saveTimeEntry(){
  const t=tasks.find(x=>x.id===timeLogTaskId);if(!t)return;
  const ma=(t.assignments||[]).find(a=>a.analyst===currentUser.id);if(!ma)return;
  if(!ma.timeLog)ma.timeLog=[];
  const start=getTimeVal('tl-start');
  const end=getTimeVal('tl-end');
  const notes=document.getElementById('tl-notes')?.value||'';
  if(!start||!end){alert('Ingres\u00e1 hora de inicio y fin.');return;}
  if(end<=start){alert('La hora de fin debe ser posterior al inicio.');return;}
  // Calculate hours from start/end
  const [sh,sm]=start.split(':').map(Number);
  const [eh,em]=end.split(':').map(Number);
  const rawMin=(eh*60+em)-(sh*60+sm);
  const roundedMin=Math.round(rawMin/15)*15;
  const hours=Math.round(roundedMin/60*4)/4;
  const todayStr=today();
  const existing=ma.timeLog.find(e=>e.date===todayStr);
  if(existing){existing.start=start;existing.end=end;existing.notes=notes;existing.hours=hours;}
  else{ma.timeLog.push({date:todayStr,start,end,notes,hours});}
  // Update legacy realHours for compat
  ma.realHours=ma.timeLog.reduce((s,e)=>s+(e.hours||0),0);
  showTimeLogModal=false;saveLS();render();
}

function deleteTimeEntry(taskId,dateStr){
  const t=tasks.find(x=>x.id===taskId);if(!t)return;
  const ma=(t.assignments||[]).find(a=>a.analyst===currentUser.id);if(!ma||!ma.timeLog)return;
  ma.timeLog=ma.timeLog.filter(e=>e.date!==dateStr);
  ma.realHours=ma.timeLog.reduce((s,e)=>s+(e.hours||0),0);
  saveLS();render();
}

function renderTaskComments(t){
  var events=[];
  (t.observations||[]).forEach(function(o){
    events.push({ts:o.ts||0,type:'observation',by:o.byName||o.by,comment:o.comment||''});
  });
  (t.resubmitHistory||[]).forEach(function(r){
    events.push({ts:r.ts||0,type:'resubmit',by:r.byName||r.by,comment:r.comment||''});
  });
  (t.completionComments||[]).forEach(function(c){
    events.push({ts:c.ts||0,type:'completion',by:c.byName||c.by,comment:c.comment||''});
  });
  events.sort(function(a,b){return (a.ts||0)-(b.ts||0);});
  if(!events.length)return'';
  var typeConf={
    observation:{icon:'⚑',label:'Observación',color:'var(--amber)',bg:'var(--amber-bg)'},
    resubmit:   {icon:'↩',label:'Re-envío',   color:'var(--blue)', bg:'var(--blue-bg)'},
    completion: {icon:'💬',label:'Comentario del analista',color:'var(--green)',bg:'var(--green-bg,#e8f5e9)'}
  };
  var rows=events.map(function(ev){
    var c=typeConf[ev.type]||typeConf.completion;

function updateMultiAssign(key,field,val){

function toggleAna(id){
  var i=selectedAnalysts.indexOf(id);

}

function nameToId(n){const nl=n.trim().toLowerCase();return ANALYSTS.find(a=>a.name.toLowerCase()===nl||a.name.toLowerCase().split(' ')[0]===nl.split(' ')[0])||null;}
function parsePaste(text){
  const lines=text.trim().split('\n').filter(l=>l.trim());
  if(lines.length<2){pastePreview=[];render();return;}
  pastePreview=lines.slice(1).map(r=>{const c=r.split('\t');return{producto:c[0]||'',lote:c[1]||'',analista:c[2]||'',fechaAnalisis:c[3]||'',due:c[4]||'',priority:c[5]||'Normal',notes:c[6]||''};}).filter(r=>r.producto&&r.lote);
  render();
}
function handleFile(input){
  const file=input.files[0];if(!file)return;
  function doRead(){
  const reader=new FileReader();
  reader.onload=e=>{
    try{
      const wb=XLSX.read(e.target.result,{type:'binary',cellDates:true,dateNF:'yyyy-mm-dd'});
      const ws=wb.Sheets[wb.SheetNames[0]];
      const data=XLSX.utils.sheet_to_json(ws,{defval:'',raw:false,dateNF:'yyyy-mm-dd'});
      if(data.length>500){
        if(!confirm('El archivo tiene '+data.length+' filas. Se importarán las primeras 500. ¿Continuar?'))return;
      }
      const rows=data.slice(0,500);
      pastePreview=rows.map(r=>({
        producto:String(r['Producto']||r['producto']||'').trim(),
        lote:String(r['Lote']||r['lote']||'').trim(),
        analista:String(r['Analista']||r['analista']||'').trim(),
        fechaAnalisis:String(r['Fecha análisis']||r['FechaAnalisis']||r['Fecha_análisis']||'').trim(),
        due:String(r['Fecha entrega']||r['Vence']||r['fecha_entrega']||'').trim(),
        priority:String(r['Prioridad']||r['prioridad']||'Normal').trim(),
        notes:String(r['Notas']||r['notas']||'').trim()
      })).filter(r=>r.producto&&r.lote);
      render();
    }catch(err){
      alert('Error al leer el archivo Excel: '+err.message+'. Verificá que el archivo tenga el formato correcto.');
    }
  };
  reader.onerror=()=>alert('No se pudo leer el archivo.');
  reader.readAsBinaryString(file);
  }
  if(window.XLSX){doRead();}else{
    var s=document.createElement('script');
    s.src='https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js';
    s.onload=doRead;
    s.onerror=function(){alert('No se pudo cargar la librería Excel. Verificá tu conexión a internet.');};
    document.head.appendChild(s);
  }
}
function confirmImport(){
  try{
    var duplicates=[];
    var toImport=[];
    // Group rows by Producto+Lote so multiple analyst rows merge into one task
    var grouped={};
    var groupOrder=[];
    pastePreview.forEach(function(r){
      var prod=(r.producto||'').trim();
      var lote=(r.lote||'').trim();
      if(!prod||!lote)return;
      var key=prod.toLowerCase()+'||'+lote.toLowerCase();
      var exists=tasks.some(function(t){
        return!t._deleted
          &&t.producto.trim().toLowerCase()===prod.toLowerCase()
          &&t.lote.trim().toLowerCase()===lote.toLowerCase();
      });
      if(exists){
        if(!duplicates.includes(prod+' / Lote: '+lote))duplicates.push(prod+' / Lote: '+lote);
        return;
      }
      if(!grouped[key]){grouped[key]={producto:prod,lote:lote,rows:[]};groupOrder.push(key);}
      grouped[key].rows.push(r);
    });
    groupOrder.forEach(function(k){toImport.push(grouped[k]);});
    if(duplicates.length>0){
      var msg='Los siguientes registros YA EXISTEN y no seran importados (mismo Producto y Lote):\n\n'
        +duplicates.slice(0,10).join('\n')
        +(duplicates.length>10?'\n... y '+(duplicates.length-10)+' mas':'');
      if(toImport.length===0){
        alert(msg+'\n\nNo hay registros nuevos para importar.');
        pastePreview=[];showImportModal=false;render();return;
      }
      if(!confirm(msg+'\n\nImportar los '+toImport.length+' registro(s) restante(s)?'))return;
    }
    const newTasks=toImport.map(function(group){
      const prod=group.producto;
      const lote=group.lote;
      // All rows in this group share the same task — collect assignments
      function normDate(s){
        if(!s)return'';
        s=String(s).trim();
        if(/^\d{5}$/.test(s)){const d=new Date(Math.round((parseInt(s)-25569)*86400*1000));return d.getUTCFullYear()+'-'+String(d.getUTCMonth()+1).padStart(2,'0')+'-'+String(d.getUTCDate()).padStart(2,'0');}
        if(/^\d{4}-\d{2}-\d{2}$/.test(s))return s;
        const m=s.match(/^(\d{1,2})[\/\-](\d{1,2})[\/\-](\d{4})$/);
        if(m)return m[3]+'-'+m[2].padStart(2,'0')+'-'+m[1].padStart(2,'0');
        return s;
      }
      var assignments=[];
      var due='';
      var priority='Normal';
      var notes='';
      group.rows.forEach(function(r){
        var ana=nameToId(r.analista);
        var fechaAna=normDate(r.fechaAnalisis);
        var rowDue=normDate(r.due);
        if(rowDue&&!due)due=rowDue;
        if(r.priority&&['Normal','Alta','Urgente'].includes(r.priority))priority=r.priority;
        if(r.notes)notes=r.notes;
        if(ana&&fechaAna){
          assignments.push({analyst:ana.id,date:fechaAna});
        }
      });
      // Ensure at least one assignment even if analista not found
      if(assignments.length===0){
        var r0=group.rows[0];
        var fechaAna0=normDate(r0.fechaAnalisis);
        assignments=[{analyst:'',date:fechaAna0||due}];
      }
      return{id:nextId++,producto:prod,lote,created:today(),assignments,due,priority,status:'pending',notes};
    }).filter(Boolean);
    tasks=tasks.concat(newTasks);
    if(duplicates&&duplicates.length>0&&newTasks.length>0)alert('Importacion completada. '+newTasks.length+' registro(s) importados. '+duplicates.length+' duplicado(s) omitido(s).');
    pastePreview=[];
    showImportModal=false;
    // Check for due date issues on imported tasks
    var lateImports=newTasks.filter(function(t){
      return t.due&&(t.assignments||[]).some(function(a){return a.date&&a.date>=t.due;});
    });
    if(lateImports.length>0){
      alert('⚠ AVISO: '+lateImports.length+' análisis importados tienen fecha de análisis igual o posterior a la fecha límite de aprobación. Revisar: '+lateImports.map(function(t){return t.producto+' '+t.lote;}).join(', '));
    }
    auditLog('IMPORT','TASK','BATCH',{count:newTasks.length},'Importación masiva');
    saveLS();
    saveNow().catch(function(e){console.error('saveNow import:',e);});
    render();
  }catch(e){
    alert('Error al importar: '+e.message+'. Los datos anteriores no fueron modificados.');
    pastePreview=[];showImportModal=false;render();
  }
}
function xlsxDownload(wb, filename){
  try{
    // Use base64 data URL - works with file:// protocol too
    const wbout=XLSX.write(wb,{bookType:'xlsx',type:'base64'});
    const dataUrl='data:application/vnd.openxmlformats-officedocument.spreadsheetml.sheet;base64,'+wbout;
    const a=document.createElement('a');
    a.href=dataUrl;a.download=filename;a.style.display='none';

  }catch(e){

    try{
      const wbout=XLSX.write(wb,{bookType:'xlsx',type:'array'});
      const blob=new Blob([wbout],{type:'application/vnd.openxmlformats-officedocument.spreadsheetml.sheet'});
      const url=URL.createObjectURL(blob);
      const a=document.createElement('a');a.href=url;a.download=filename;
      document.body.appendChild(a);a.click();
      setTimeout(()=>{try{URL.revokeObjectURL(url);}catch(e2){}a.remove();},1000);

function confirmAssignment(taskId, analystId, assignDate){
  var t=tasks.find(function(x){return x.id==Number(taskId)||x.id===taskId;});
  if(!t)return;
  // Use assignDate to target the specific assignment when analyst has multiple dates
  var a=(t.assignments||[]).find(function(x){
    return x.analyst===analystId&&(!assignDate||x.date===assignDate);
  });
  // Fallback: if not found by date, try first match (backwards compat)
  if(!a)a=(t.assignments||[]).find(function(x){return x.analyst===analystId;});
  if(!a)return;
  // Mark this assignment as confirmed
  a._pendingConfirm=false;
  a._supervisorConfirmed=true;
  a._confirmedBy=currentUser.id;
  a._confirmedTs=Date.now();
  // Check if ALL assignments are now done AND confirmed
  var assigns=(t.assignments||[]).filter(function(x){return !x._removed;});
  var allConfirmed=assigns.every(function(x){
    return (x.realHours>0||(x.sessions&&x.sessions.length>0))&&(x._supervisorConfirmed||!x._pendingConfirm);
  });
  var allHours=assigns.every(function(x){
    return (x.realHours>0||(x.sessions&&x.sessions.length>0));
  });
  if(allHours&&allConfirmed){
    t.status='done';
    t.confirmedBy=currentUser.id;
    t.confirmedTs=Date.now();
    // Resolve all pending notifications for this task
    replanNotifs.filter(function(n){
      return n.status==='pending'
        && (n.taskId===Number(taskId)||n.tid===Number(taskId))
        && ['completed','planification_request'].includes(n.type);
    }).forEach(function(n){n.status='resolved';});
    auditLog('CONFIRM','TASK',Number(taskId),{field:'status',oldVal:'pending-confirm',newVal:'done',
      description:'Confirmación completado: '+t.producto+' '+t.lote},'');
  } else {
    // No more explicitly pending confirmations — clear pending-confirm status
    var stillPending=assigns.some(function(x){return x._pendingConfirm===true&&!x._supervisorConfirmed;});
    if(!stillPending&&t.status==='pending-confirm'){
      if(allHours){
        // All analysts have hours and none pending → advance
        t.status='done';t.confirmedBy=currentUser.id;t.confirmedTs=Date.now();
      } else {
        // Some analysts still need to complete → back to progress
        t.status='progress';
      }
    }
    // Clear completedBy so next analyst's completion triggers a fresh notification
    delete t.completedBy;
    // Resolve 'completed' and 'planification_request' notifications for this task/analyst
    replanNotifs.filter(function(n){
      return n.status==='pending'
        && (n.taskId===Number(taskId)||n.tid===Number(taskId))
        && (n.type==='completed'||n.type==='planification_request')
        && (n.analystId===analystId||!n.analystId);
    }).forEach(function(n){n.status='resolved';});
    var u=getU(analystId);
    auditLog('CONFIRM_PARTIAL','TASK',Number(taskId),{analystId:analystId,
      description:'Confirmación de '+( u?u.name:'?')+': '+t.producto+' '+t.lote},'');
  }
  saveLS();render();
  saveNow().catch(function(e){console.error('saveNow confirmAssignment:',e);});
}

function markAllNotifsRead(){
  var uid=currentUser.id;
  var isSup2=isSupRole();
  replanNotifs.forEach(function(n){
    if(n.status!=='pending') return;
    var mine=n.forUserId===uid||n.analystId===uid||n.fromUser===uid;
    if(!mine) return;
    // confirmPend (type='completed') solo se resuelve confirmando explícitamente
    if(isSup2 && n.type==='completed') return;
    n.status='read';
  });
  // Solicitudes de horario: marcar como vistas para suprimir badge sin bloquear acción
  if(isSup2){
    scheduleRequests.forEach(function(r){
      if(r.status==='pending') r._seenBySup=true;
    });
  } else {
    scheduleRequests.forEach(function(r){
      if(r.analystId===uid && r.status==='approved') r._seenByAnalyst=true;
    });
  }
  saveLS();
  saveNow().catch(function(e){console.error(e);});
}
