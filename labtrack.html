<style>

@import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@300;400;500;600&family=IBM+Plex+Mono:wght@400;500&display=swap');
:root{--bg:#f5f4f0;--bg2:#eceae4;--surface:#fff;--border:rgba(0,0,0,.10);--border2:rgba(0,0,0,.18);--text:#1a1916;--text2:#6b6860;--text3:#9c9a94;--blue:#1a4f8a;--blue-bg:#e8eff8;--blue-text:#1a4f8a;--green:#1e5c35;--green-bg:#e4f2ea;--green-text:#1e5c35;--amber:#7a4e0a;--amber-bg:#fdf0d8;--amber-text:#7a4e0a;--red:#8a2020;--red-bg:#fce8e8;--red-text:#8a2020;--orange:#8a3c10;--orange-bg:#fdeee4;--orange-text:#8a3c10;--radius:6px;--radius-lg:10px;--font:'IBM Plex Sans',sans-serif;--mono:'IBM Plex Mono',monospace}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:var(--font);background:var(--bg);color:var(--text);font-size:13px;line-height:1.5}
.login-wrap{min-height:100vh;min-height:100dvh;display:flex;align-items:center;justify-content:center;padding:16px;box-sizing:border-box}
.login-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);padding:32px 28px;width:100%;max-width:380px;box-shadow:0 2px 16px rgba(0,0,0,.07);box-sizing:border-box}
.login-logo{display:flex;align-items:center;gap:10px;margin-bottom:28px}
.login-logo .icon{width:36px;height:36px;background:var(--blue);border-radius:8px;display:flex;align-items:center;justify-content:center}
.login-logo .name{font-size:16px;font-weight:600;letter-spacing:-.02em}
.login-logo .name span{color:var(--blue)}
.user-list{display:flex;flex-direction:column;gap:5px;margin-bottom:18px}
.user-btn{display:flex;align-items:center;gap:10px;padding:10px 12px;background:var(--bg);border:1px solid var(--border);border-radius:var(--radius);cursor:pointer;transition:all .12s}
.user-btn:hover,.user-btn.selected{border-color:var(--blue);background:var(--blue-bg)}
.user-btn.selected{border-width:2px}
.pwd-hint{font-size:10px;color:var(--text3);background:var(--bg2);border-radius:var(--radius);padding:8px 10px;margin-top:12px;line-height:1.6}
.pwd-hint b{color:var(--text2);font-weight:500}
.av{width:24px;height:24px;border-radius:50%;display:inline-flex;align-items:center;justify-content:center;font-size:9px;font-weight:700;flex-shrink:0;font-family:var(--mono);text-transform:uppercase}
.av-lg{width:32px;height:32px;font-size:10px}
.av-xl{width:38px;height:38px;font-size:11px}
.av0,.av1{background:#ddeaf8;color:#1a4f8a}
.av2{background:#d4ede0;color:#1e5c35}
.av3{background:#faecd3;color:#7a4e0a}
.av4{background:#fadddd;color:#8a2020}
.av5{background:#e8e3f8;color:#4a35a0}
.av6{background:#fde8d8;color:#8a3c10}
.av7{background:#d8f0f0;color:#1a6060}
.av8{background:#f0e8f8;color:#6a35a0}
.frow{margin-bottom:12px}
.frow label{font-size:10px;color:var(--text2);display:block;margin-bottom:3px;font-weight:500;text-transform:uppercase;letter-spacing:.04em}
.frow input,.frow select,.frow textarea{width:100%;font-size:12px;padding:7px 10px;border:1px solid var(--border2);border-radius:var(--radius);background:var(--surface);color:var(--text);font-family:var(--font)}
.frow input:focus,.frow select:focus,.frow textarea:focus{outline:none;border-color:var(--blue);box-shadow:0 0 0 3px rgba(26,79,138,.12)}
.frow textarea{height:58px;resize:vertical}
.err-msg{font-size:11px;color:var(--red-text);background:var(--red-bg);border-radius:var(--radius);padding:8px 12px;margin-bottom:12px;border:1px solid rgba(138,32,32,.15)}
.btn{font-size:11px;padding:6px 14px;border-radius:var(--radius);border:1px solid var(--border2);background:var(--surface);color:var(--text);cursor:pointer;font-family:var(--font);font-weight:500;transition:all .1s;white-space:nowrap}
.btn:hover{background:var(--bg2)}
.btn:active{transform:scale(.98)}
.btn.pri{background:var(--blue);color:#fff;border-color:var(--blue)}.btn.pri:hover{background:#143e6e}
.btn.suc{background:var(--green);color:#fff;border-color:var(--green)}.btn.suc:hover{background:#174827}
.btn.dan{background:var(--red);color:#fff;border-color:var(--red)}
.btn.amb{background:var(--amber);color:#fff;border-color:var(--amber)}
.btn.sm{font-size:10px;padding:3px 8px}
.shell{display:flex;height:100vh;overflow:hidden}
.sidebar{width:200px;background:var(--surface);border-right:1px solid var(--border);display:flex;flex-direction:column;flex-shrink:0}
.sb-header{padding:14px 16px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:8px}
.sb-logo-icon{width:28px;height:28px;background:var(--blue);border-radius:6px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.sb-logo-text{font-size:13px;font-weight:600;letter-spacing:-.02em}
.sb-logo-text span{color:var(--blue)}
.sb-role-badge{font-size:10px;padding:2px 6px;border-radius:20px;font-weight:500;margin-left:auto}
.sb-role-badge.sup{background:var(--blue-bg);color:var(--blue-text)}
.sb-role-badge.ana{background:var(--green-bg);color:var(--green-text)}
.sb-role-badge.stf{background:var(--amber-bg);color:var(--amber-text)}
.sb-role-badge.rev{background:var(--teal, #ccfbf1);color:var(--teal-text, #0d9488)}
.nav-item{padding:7px 16px;font-size:12px;cursor:pointer;color:var(--text2);display:flex;align-items:center;gap:8px;border-left:2px solid transparent;transition:all .1s}
.nav-item:hover{background:var(--bg);color:var(--text)}
.nav-item.active{background:var(--blue-bg);color:var(--blue-text);border-left-color:var(--blue);font-weight:500}
.nav-item .ni{font-size:13px;width:16px;text-align:center}
.nbadge{font-size:10px;padding:1px 5px;border-radius:10px;margin-left:auto;font-weight:600}
.nbadge.d{background:var(--red-bg);color:var(--red-text)}
.nbadge.w{background:var(--amber-bg);color:var(--amber-text)}
.sb-user{margin-top:auto;padding:12px 16px;border-top:1px solid var(--border)}
.sb-user-name{font-size:12px;font-weight:500;margin-bottom:2px}
.sb-link{font-size:10px;color:var(--text3);cursor:pointer;text-decoration:underline}
.sb-link:hover{color:var(--text2)}
.main{flex:1;display:flex;flex-direction:column;overflow:hidden;min-width:0}
.topbar{padding:11px 18px;background:var(--surface);border-bottom:1px solid var(--border);display:flex;align-items:center;gap:8px;flex-shrink:0}
.topbar-title{font-size:14px;font-weight:600;flex:1;letter-spacing:-.01em}
.content{flex:1;overflow-y:auto;padding:18px}
.stats-row{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:10px;margin-bottom:18px}@media(max-width:480px){.stats-row{grid-template-columns:repeat(2,1fr);gap:8px}}@media(min-width:481px) and (max-width:700px){.stats-row{grid-template-columns:repeat(4,1fr);gap:8px}}
.scard{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);padding:14px;-webkit-tap-highlight-color:transparent;user-select:none}
.scard .sl{font-size:10px;color:var(--text3);margin-bottom:4px;text-transform:uppercase;letter-spacing:.04em;font-weight:500}
.scard .sv{font-size:clamp(18px,4vw,26px);font-weight:600;font-family:var(--mono)}
.sv.ok{color:var(--green)}.sv.w{color:var(--amber)}.sv.d{color:var(--red)}
.sec{font-size:10px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:.06em;margin-bottom:8px}
.tbl{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);overflow-x:auto;margin-bottom:16px}
.thead{display:grid;padding:7px 12px;background:var(--bg2);border-bottom:1px solid var(--border);font-size:10px;font-weight:600;color:var(--text2);text-transform:uppercase;letter-spacing:.04em}
.trow{display:grid;padding:9px 12px;border-bottom:1px solid var(--border);font-size:12px;align-items:center;cursor:pointer;transition:background .1s}
.trow:hover{background:var(--bg)}
.trow-sup{display:grid;grid-template-columns:2fr 0.8fr 0.7fr 0.85fr 0.95fr 0.65fr 1fr 0.8fr;width:100%;box-sizing:border-box;padding:8px 12px;border-bottom:1px solid var(--border);font-size:12px;align-items:center;cursor:pointer;transition:background .1s}
.trow-sup:hover{background:var(--bg)}
.trow-sup>*{min-width:0;overflow:hidden;text-overflow:ellipsis}
.thead-sup{display:grid;grid-template-columns:2fr 0.8fr 0.7fr 0.85fr 0.95fr 0.65fr 1fr 0.8fr;width:100%;box-sizing:border-box;padding:7px 12px;background:var(--bg2);border-bottom:2px solid var(--border);font-size:11px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:.03em}
.thead-sup>*{min-width:0;overflow:hidden;white-space:nowrap}
.trow:last-child{border-bottom:none}
.cell-trunc{overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.cell-sub{font-size:10px;color:var(--text3);font-family:var(--mono)}
.pill{font-size:10px;padding:2px 8px;border-radius:20px;font-weight:600;display:inline-block;white-space:nowrap}
.pill.pend{background:var(--amber-bg);color:var(--amber-text)}
.pill.prog{background:var(--blue-bg);color:var(--blue-text)}
.pill.done{background:var(--green-bg);color:var(--green-text)}.pill.scheduled{background:var(--blue-bg);color:var(--blue-text)}
.pill.late{background:var(--red-bg);color:var(--red-text)}
.pill.partial{background:linear-gradient(90deg,var(--green-bg) 50%,var(--amber-bg) 50%);color:var(--text2);border:1px solid var(--border)}
.pill.pending-confirm{background:var(--amber-bg);color:var(--amber-text)}
.pill.near{background:var(--amber-bg);color:var(--amber-text)}
.pill.ok{background:var(--green-bg);color:var(--green)}
.due-badge{display:inline-flex;align-items:center;gap:3px;font-size:9px;font-weight:600;padding:1px 5px;border-radius:10px}
.due-badge.late{background:var(--red-bg);color:var(--red-text)}
.due-badge.near{background:var(--amber-bg);color:var(--amber-text)}
.due-badge.ok{background:var(--green-bg);color:var(--green)}
.pill.nor{background:var(--bg2);color:var(--text2)}
.pill.hi{background:var(--orange-bg);color:var(--orange-text)}
.pill.urg{background:var(--red-bg);color:var(--red-text)}
.week-grid{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);overflow:hidden;margin-bottom:16px}
.whead{display:grid;border-bottom:1px solid var(--border);background:var(--bg2)}
.whead>div,.wcell-name,.wcell{padding:7px 8px;border-right:1px solid var(--border);font-size:10px;font-weight:600;color:var(--text2);text-transform:uppercase;letter-spacing:.04em}
.whead>div:last-child,.wcell:last-child{border-right:none}
.wrow{display:grid;border-bottom:1px solid var(--border)}
.wrow:last-child{border-bottom:none}
.wcell-name{font-weight:500;color:var(--text);background:var(--bg);text-transform:none;letter-spacing:0;display:flex;align-items:flex-start;gap:6px;padding-top:8px;min-height:44px;font-size:11px}
.wcell{display:flex;flex-direction:column;gap:3px;min-height:44px;font-weight:400;text-transform:none;letter-spacing:0}
.chip{padding:3px 5px;border-radius:4px;font-size:10px;line-height:1.3;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;font-weight:500}
.c1{background:#ddeaf8;color:#1a4f8a}.c2{background:#d4ede0;color:#1e5c35}.c3{background:#faecd3;color:#7a4e0a}.c4{background:#fadddd;color:#8a2020}.c5{background:#e8e3f8;color:#4a35a0}.c6{background:#fde8d8;color:#8a3c10}.c7{background:#d8f0f0;color:#1a6060}.c8{background:#f0e8f8;color:#6a35a0}
.acard{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);padding:14px}
.pbar{background:var(--bg2);border-radius:3px;height:4px;margin:6px 0 4px;overflow:hidden}
.pfill{height:100%;border-radius:3px;background:var(--blue)}
.a-mini-grid{display:grid;grid-template-columns:1fr 1fr;gap:5px;font-size:10px;margin-top:10px}
.a-mini{background:var(--bg);border-radius:var(--radius);padding:6px 8px}
.a-mini .al{color:var(--text3)}
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.35);display:flex;align-items:flex-start;justify-content:center;padding-top:24px;z-index:200}
.modal{background:var(--surface);border-radius:var(--radius-lg);border:1px solid var(--border);padding:22px;width:500px;max-height:calc(100vh - 48px);overflow-y:auto;box-shadow:0 8px 40px rgba(0,0,0,.12)}
.modal h3{font-size:14px;font-weight:600;margin-bottom:16px;letter-spacing:-.01em}
.modal-btns{display:flex;gap:8px;justify-content:flex-end;margin-top:16px}
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:0 14px}
.form-full{grid-column:1/-1}
.analysts-check{display:grid;grid-template-columns:1fr 1fr;gap:5px;margin-top:4px}
.ana-check{display:flex;align-items:center;gap:7px;padding:6px 9px;border:1px solid var(--border2);border-radius:var(--radius);cursor:pointer;font-size:11px;transition:all .1s}
.ana-check:hover{border-color:var(--blue)}
.ana-check.selected{background:var(--blue-bg);border-color:var(--blue);color:var(--blue-text);font-weight:500}
.date-assign-row{display:flex;align-items:center;gap:8px;padding:6px 9px;background:var(--bg);border-radius:var(--radius);margin-bottom:5px;font-size:11px}
.notif{background:var(--red-bg);border-radius:var(--radius-lg);padding:10px 14px;margin-bottom:14px;font-size:11px;color:var(--red-text);border:1px solid rgba(138,32,32,.15)}
.filter-row{display:flex;gap:8px;margin-bottom:12px;align-items:center;flex-wrap:wrap}
.filter-row select{padding:6px 10px;font-size:11px;border-radius:var(--radius);border:1px solid var(--border2);background:var(--surface);color:var(--text);font-family:var(--font)}
.count-lbl{font-size:11px;color:var(--text3);margin-left:auto;font-family:var(--mono)}
.empty{padding:22px;text-align:center;font-size:12px;color:var(--text3)}
.av-stack{display:flex;gap:2px;flex-wrap:wrap}
.tab-bar{display:flex;gap:4px;margin-bottom:14px;background:var(--bg2);border-radius:var(--radius);padding:3px}
.tab{font-size:11px;padding:5px 12px;border-radius:4px;cursor:pointer;color:var(--text2);font-weight:500;flex:1;text-align:center;transition:all .1s}
.tab.active{background:var(--surface);color:var(--text);box-shadow:0 1px 4px rgba(0,0,0,.08)}
.import-area{border:2px dashed var(--border2);border-radius:var(--radius-lg);padding:24px;background:var(--bg);text-align:center;font-size:12px;color:var(--text2);cursor:pointer;transition:all .15s}
.import-area:hover{border-color:var(--blue);background:var(--blue-bg);color:var(--blue-text)}
.paste-area{width:100%;height:88px;font-size:10px;font-family:var(--mono);padding:8px;border:1px solid var(--border2);border-radius:var(--radius);background:var(--surface);color:var(--text);resize:vertical}
.preview-tbl{width:100%;font-size:10px;border-collapse:collapse;margin-top:8px}
.preview-tbl th{background:var(--bg2);padding:5px 7px;text-align:left;border:1px solid var(--border);font-weight:600;color:var(--text2);text-transform:uppercase;letter-spacing:.04em;font-size:10px}
.preview-tbl td{padding:5px 7px;border:1px solid var(--border);font-size:11px}
.today-banner{background:var(--blue);border-radius:var(--radius-lg);padding:14px 18px;margin-bottom:16px;display:flex;align-items:center;gap:16px}
.admin-wrap{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);padding:18px;margin-bottom:14px}
.admin-wrap h4{font-size:12px;font-weight:600;margin-bottom:4px}
.admin-wrap .sub{font-size:11px;color:var(--text2);margin-bottom:14px}
.pw-row{display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid var(--border)}
.pw-row:last-of-type{border-bottom:none}
.new-user-form{background:var(--bg);border-radius:var(--radius);padding:14px;margin-top:12px;display:grid;grid-template-columns:1fr 1fr;gap:8px}
.new-user-form .form-full{grid-column:1/-1}

  .time-pick{display:inline-flex;align-items:center;gap:2px;background:var(--surface);border:1px solid var(--border2);border-radius:var(--radius);padding:2px 4px;}
  .time-pick select{border:none;background:transparent;color:var(--text);font-family:var(--mono);font-size:12px;font-weight:600;padding:2px 2px;cursor:pointer;-webkit-appearance:none;appearance:none;text-align:center;width:30px;}
  .time-pick select:focus{outline:none;color:var(--blue);}

  .pill.reviewed{background:#e4f2ea;color:#1e5c35}
  .pill.a-ingresar{background:#ede9fe;color:#5b21b6}
  .arrival-fields{background:var(--bg);border:1px solid #d8b4fe;border-radius:var(--radius);padding:10px 12px;margin-top:6px}

@keyframes spin{to{transform:rotate(360deg)}}
@media (max-width:600px){
  .login-card{padding:28px 20px;}
  .shell{flex-direction:column;}
  .nav{width:100%!important;height:auto!important;flex-direction:row!important;overflow-x:auto!important;overflow-y:hidden!important;padding:0 4px!important;border-right:none!important;border-bottom:1px solid var(--border)!important;min-width:0!important;}
  .nav .nav-item{flex-direction:column!important;gap:2px!important;padding:8px 10px!important;font-size:9px!important;min-width:52px!important;white-space:nowrap!important;}
  .nav .nav-icon{font-size:14px!important;}
  .main{overflow:auto!important;-webkit-overflow-scrolling:touch!important;}
  .content{padding:12px!important;}
  .tbl,.week-grid{overflow-x:auto!important;-webkit-overflow-scrolling:touch!important;}
  input,select,textarea{font-size:14px!important;}
}

window.onerror=function(msg,src,line,col,err){
  var el=document.getElementById('app');
  if(el&&el.textContent==='Cargando...')
    el.innerHTML='<div style="padding:24px;color:#c00;font-family:monospace;font-size:13px"><b>Error JS (línea '+line+'):</b><br>'+msg+'<br><br><small>'+src+'</small><br><br><button onclick="location.reload()" style="margin-top:12px;padding:6px 14px">Recargar</button></div>';
  return false;
};
// ── AV COLORS (cycling) ──
const AV_CLASSES=['av1','av2','av3','av4','av5','av6','av7','av8'];
const CHIP_CLASSES=['c1','c2','c3','c4','c5','c6','c7','c8'];

function initials(name){
  const parts=name.trim().split(/\s+/).filter(Boolean);
  if(parts.length===0)return'??';
  if(parts.length===1)return parts[0].slice(0,2).toUpperCase();
  return(parts[0][0]+parts[parts.length-1][0]).toUpperCase();
}
function avClass(idx){return AV_CLASSES[idx%AV_CLASSES.length];}
function chipClass(idx){return CHIP_CLASSES[idx%CHIP_CLASSES.length];}

// LABTRACK v9 — GITHUB GIST PERSISTENCE LAYER
// Hosting: GitHub Pages | Datos: GitHub Gist API (CORS nativo, privado)
// Sin Azure AD. Sin PowerShell. Sin IT. Sin servicios pagos.
// Auth: Personal Access Token (scope: gist) — creado por el usuario en 30s
// ═══════════════════════════════════════════════════════════════════════════

const GIST_API = 'https://api.github.com/gists';
const GIST_FILE_STATE = 'labtrack_state.json';
const GIST_FILE_AUDIT = 'labtrack_audit.json';

// Configuración — persiste solo en localStorage (token + gist ID, no datos operativos)
let GIST_CONFIG = { token:'', gistId:'', configured:false };

// Estado interno
let gistStatus    = 'offline';
let gistLastSync  = null;
let _lastRemoteTs = 0;       // savedAt del último pull — evita writes innecesarios
let _auditBuffer  = [];      // eventos de audit pendientes de flush
let _syncTimer    = null;
let _saveDebounce = null;
let _auditDebounce = null;
let _pendingSaves = {};
const SYNC_INTERVAL = 60000;
const SAVE_DEBOUNCE  = 1500;
const AUDIT_DEBOUNCE = 3000;

// ══════════════════════════════════════════════════════════════
// HTTP helpers
// ══════════════════════════════════════════════════════════════

async function _gistFetch(method, path, body) {
  const r = await fetch(GIST_API + (path||''), {
    method: method||'GET',
    headers: {
      'Authorization': 'Bearer ' + GIST_CONFIG.token,
      'Accept': 'application/vnd.github+json',
      'X-GitHub-Api-Version': '2022-11-28',
      ...(body ? { 'Content-Type': 'application/json' } : {})
    },
    body: body ? JSON.stringify(body) : undefined
  });
  if (!r.ok) {
    const t = await r.text().catch(()=>'');
    throw new Error('GitHub API ' + r.status + ': ' + t.slice(0,200));
  }
  return r.status === 204 ? {} : r.json();
}

// ══════════════════════════════════════════════════════════════
// GIST — crear o encontrar el gist de LabTrack
// ══════════════════════════════════════════════════════════════

async function _gistFindOrCreate() {
  // Buscar gist existente por descripción
  let page = 1;
  while (page <= 5) {
    const list = await _gistFetch('GET', '?per_page=100&page=' + page);
    if (!list.length) break;
    const found = list.find(g => g.description === 'LabTrack-Data');
    if (found) { GIST_CONFIG.gistId = found.id; _saveGistConfig(); return found.id; }
    if (list.length < 100) break;
    page++;
  }
  // No encontrado — crear nuevo
  const created = await _gistFetch('POST', '', {
    description: 'LabTrack-Data',
    public: false,
    files: {
      [GIST_FILE_STATE]: { content: getSnapshot() },
      [GIST_FILE_AUDIT]: { content: '[]' }
    }
  });
  GIST_CONFIG.gistId = created.id;
  _saveGistConfig();
  return created.id;
}

// ══════════════════════════════════════════════════════════════
// AUDIT TRAIL — append-only, global
// ══════════════════════════════════════════════════════════════

async function writeAuditEntry(action, entity, entityId, details, reason) {
  if (!currentUser) return;
  const ts = Date.now();
  const entry = {
    id: 'AL' + ts + Math.random().toString(36).slice(2,5),
    ts, userId: currentUser.id, userName: currentUser.name, userRole: currentUser.role,
    action, entity, entityId: String(entityId), details: details||{}, reason: reason||''
  };
  // Agregar a caché local inmediatamente
  if (!Array.isArray(auditTrail)) auditTrail = [];
  auditTrail.unshift(entry);
  // Acumular en buffer para flush debounced
  _auditBuffer.push(entry);
  if (_auditDebounce) clearTimeout(_auditDebounce);
  _auditDebounce = setTimeout(_flushAuditBuffer, AUDIT_DEBOUNCE);
}

async function _flushAuditBuffer() {
  _auditDebounce = null;
  if (!_auditBuffer.length || !GIST_CONFIG.configured) return;
  const toFlush = [..._auditBuffer]; _auditBuffer = [];
  try {
    // Leer audit actual del gist
    const gist = await _gistFetch('GET', '/' + GIST_CONFIG.gistId);
    const raw = gist.files[GIST_FILE_AUDIT]?.content || '[]';
    let existing = [];
    try { existing = JSON.parse(raw); } catch(e) {}
    // Prepend nuevos (más reciente primero), cap 500 entradas
    const merged = [...toFlush, ...existing].slice(0, 500);
    await _gistFetch('PATCH', '/' + GIST_CONFIG.gistId, {
      files: { [GIST_FILE_AUDIT]: { content: JSON.stringify(merged, null, 2) } }
    });
    // Actualizar badge tras flush exitoso
    gistLastSync = new Date(); gistStatus = 'ok'; renderSpBadge();
  } catch(e) {
    console.warn('Audit flush failed, re-buffering:', e.message);
    _auditBuffer = [...toFlush, ..._auditBuffer]; // re-encolar
  }
}

// Compatibilidad con código existente
function auditLog(action, entity, entityId, details, reason) {
  writeAuditEntry(action, entity, entityId, details, reason).catch(e => console.error('auditLog:', e));
}

async function establecerEstadoOperativo() {

  _showSpinner('Estableciendo estado operativo…');
  try {

// SAVE — debounced, escribe state.json completo
// ══════════════════════════════════════════════════════════════

// Guardar inmediatamente sin debounce (para operaciones críticas)
async function saveNow() {
  if (_saveDebounce) { clearTimeout(_saveDebounce); _saveDebounce = null; }
  _pendingSaves = {}; // marcar todo como pendiente
  await _executeSave();
}

function saveLS(hint) {
  if (hint) _pendingSaves[hint] = true;
  else ['workdayConfig','analystSchedules','mgmtCategories','users','passwords','absenceTypesDef','counters'].forEach(k=>{ _pendingSaves[k]=true; });
  if (_saveDebounce) clearTimeout(_saveDebounce);
  _saveDebounce = setTimeout(_executeSave, SAVE_DEBOUNCE);
}

async function _executeSave() {
  _saveDebounce = null;
  if (!GIST_CONFIG.configured) return;
  _pendingSaves = {};
  gistStatus = 'syncing'; renderSpBadge();
  try {
    await _gistFetch('PATCH', '/' + GIST_CONFIG.gistId, {
      files: { [GIST_FILE_STATE]: { content: getSnapshot() } }
    });
    gistStatus = 'ok'; gistLastSync = new Date();
  } catch(e) { console.error('save:', e); gistStatus = 'error'; }
  renderSpBadge();
}

// ══════════════════════════════════════════════════════════════
// SYNC — pull de cambios desde Gist
// ══════════════════════════════════════════════════════════════

async function gistSyncFromRemote() {
  if (!GIST_CONFIG.configured) return;
  gistStatus = 'syncing'; renderSpBadge();
  try {
    const gist = await _gistFetch('GET', '/' + GIST_CONFIG.gistId);
    let stateChanged = false;

    // ── Estado operativo ──
    const stateContent = gist.files[GIST_FILE_STATE]?.content;
    if (!stateContent) throw new Error('Archivo state no encontrado en el gist');
    let remoteState;
    try { remoteState = JSON.parse(stateContent); } catch(e) { throw new Error('State JSON inválido'); }
    const remoteTs = remoteState.savedAt || 0;
    if (remoteTs > _lastRemoteTs) {
      _lastRemoteTs = remoteTs;
      const prevUser = currentUser;
      applySnapshot(stateContent);
      currentUser = prevUser;
      stateChanged = true;
    }

    // ── Audit trail: SIEMPRE cargar desde remoto en cada sync ──
    const auditContent = gist.files[GIST_FILE_AUDIT]?.content;
    if (auditContent) {
      try {
        const remoteAudit = JSON.parse(auditContent);
        // Merge: poner primero las entradas del buffer local pendientes de flush
        // que aún no están en el remoto, luego el remoto completo
        const remoteIds = new Set(remoteAudit.map(e => e.id));
        const localOnly = _auditBuffer.filter(e => !remoteIds.has(e.id));
        const merged = [...localOnly, ...remoteAudit];
        auditTrail = merged.sort((a,b) => (b.ts||0) - (a.ts||0));
      } catch(e) {}
    }

    gistStatus = 'ok'; gistLastSync = new Date();
    if(!currentUser) _restoreSession();
    render(); // siempre refrescar — puede haber audit trail nuevo
  } catch(e) { console.error('gistSync:', e); gistStatus = 'error'; }
  renderSpBadge();
}

// Restore session from localStorage after page refresh
function firstViewForRole(user){
  if(!user)return 'dashboard';
  switch(user.role){
    case 'supervisor': return 'dashboard';
    case 'reviewer':   return 'tasks';
    case 'analyst':    return 'dashboard';
    case 'staff':      return 'dashboard';
    default:           return 'dashboard';
  }
}
function isViewAllowed(view, user){
  if(!user||!view)return false;
  var role=user.role;
  // Views restricted to supervisor only
  var supOnly=['admin','audit','historial'];
  if(supOnly.includes(view)&&role!=='supervisor')return false;
  // Views restricted to supervisor + reviewer
  var supRevOnly=['aprobados'];
  if(supRevOnly.includes(view)&&role!=='supervisor'&&role!=='reviewer')return false;
  return true;
}
function _restoreSession(){
  try{
    var s=localStorage.getItem('lt9-session');
    if(!s)return;
    var obj=JSON.parse(s);
    if(!obj||!obj.uid)return;
    // Session expires after 12 hours
    if(Date.now()-obj.ts>12*60*60*1000){
      localStorage.removeItem('lt9-session');
      return;
    }
    var u=USERS.find(function(x){return x.id===obj.uid;});
    if(!u)return;
    currentUser=u;
    // Only restore lastView if the role has permission for it
    var savedView=localStorage.getItem('lt9-lastView')||'';
    currentView=isViewAllowed(savedView,u)?savedView:firstViewForRole(u);
    loginStep=1;loginError='';
  }catch(e){}
}

async function gistBoot() {
  if (!GIST_CONFIG.configured) {
    _initDefaultState();
    _restoreSession();
    gistStatus = 'offline'; renderSpBadge();
    render();
    return;
  }
  _showSpinner('Conectando con GitHub…');
  gistStatus = 'connecting'; renderSpBadge();
  try {
    // Encontrar o crear el gist
    if (!GIST_CONFIG.gistId) {
      _showSpinner('Creando repositorio de datos…');
      await _gistFindOrCreate();
    }
    _showSpinner('Cargando estado operativo…');
    // Leer estado remoto
    const gist = await _gistFetch('GET', '/' + GIST_CONFIG.gistId);
    const stateContent = gist.files[GIST_FILE_STATE]?.content;
    if (stateContent) {
      const remoteState = JSON.parse(stateContent);
      _lastRemoteTs = remoteState.savedAt || 0;
      // Si tiene _operationalBase, cargar ese estado como base
      if (applySnapshot(stateContent)) {
        // OK
      }
    } else {
      _initDefaultState();
    }
    // Cargar audit trail — ordenar más reciente primero
    const auditContent = gist.files[GIST_FILE_AUDIT]?.content;
    if (auditContent) {
      try {
        const loaded = JSON.parse(auditContent);
        auditTrail = loaded.sort((a,b) => (b.ts||0) - (a.ts||0));
      } catch(e) {}
    }
    _hideSpinner();
    gistStatus = 'ok'; gistLastSync = new Date(); renderSpBadge();
    if (_syncTimer) clearInterval(_syncTimer);
    _syncTimer = setInterval(gistSyncFromRemote, SYNC_INTERVAL);
    _restoreSession(); // restore login after data loaded
    render();
  } catch(e) {
    _hideSpinner();
    console.error('gistBoot:', e);
    gistStatus = 'error'; renderSpBadge();
    const msg = e.message||'';
    if (msg.includes('401')) {
      alert('Token inválido o expirado.\nGenere un nuevo token en GitHub Settings → Developer settings.');
    } else if (msg.includes('404')) {
      alert('Gist no encontrado. Si tiene el Gist ID incorrecto, bórrelo del campo y reconecte para crear uno nuevo.');
    } else {
      alert('Error al conectar:\n' + msg + '\n\nLa app funciona en modo local sin sincronización.');
    }
    _initDefaultState();
    // Restore session after state load
    _restoreSession();
    render();
  }
}

function exportDataFile() {
  try {
    const blob = new Blob([getSnapshot()],{type:'application/json'});
    const url  = URL.createObjectURL(blob);
    const a    = document.createElement('a');
    a.href=url; a.download='labtrack_datos_'+today()+'.json';
    document.body.appendChild(a); a.click();
    setTimeout(()=>{ URL.revokeObjectURL(url); a.remove(); },1000);
  } catch(e) { alert('Error al exportar.'); }
}

function importDataFile() {
  if (!isSupRole()) { alert('Solo el Supervisor puede importar datos.'); return; }
  const inp = document.createElement('input'); inp.type='file'; inp.accept='.json';
  inp.onchange = e => {
    const file=e.target.files[0]; if(!file) return;
    const reader=new FileReader();
    reader.onload = async ev => {
      if (applySnapshot(ev.target.result)) {
        if (GIST_CONFIG.configured && confirm('Datos cargados en memoria.\n¿Desea establecerlos como estado operativo en GitHub?')) {
          await establecerEstadoOperativo();
        } else {
          currentUser=null; selectedLoginUser=null; loginStep=1; loginError='';
          alert('Datos importados. Inicie sesión nuevamente.'); render();
        }
      } else { alert('Formato de archivo inválido.'); }
    };
    reader.readAsText(file);
  };
  document.body.appendChild(inp); inp.click(); inp.remove();
}

function isWorkday(dateStr){
  if(workdayConfig.off.some(o=>(o.date||o)===dateStr))return false;
  if(workdayConfig.extra.some(e=>(e.date||e)===dateStr))return true;
  const day=new Date(dateStr+'T12:00:00').getDay();
  return workdayConfig.weekdays[day]===true;
}
// isWorkdayFor: is this date a working day for a specific analyst?
// For overnight shifts, the working day is the shift START day (not end day).
function isWorkdayFor(analystId, dateStr){
  if(workdayConfig.off.some(o=>(o.date||o)===dateStr))return false;
  // Check explicit per-analyst schedule override for this date
  const stored=analystSchedules[analystId];
  if(stored&&stored.overrides&&stored.overrides[dateStr]){
    const ov=stored.overrides[dateStr];
    if(ov.status==='approved'||ov.status==='assigned') return true;
  }
  // Check per-analyst workday config (stored as analystSchedules[id].workdays)
  if(stored&&stored.workdays){
    const day=new Date(dateStr+'T12:00:00').getDay();
    // workdays is an object like {1:true,2:true,...} same as global
    if(stored.workdays[day]===true) return true;
    if(stored.workdays[day]===false) return false;
  }
  // Check if there's a per-analyst extra for this date
  const extra=workdayConfig.extra.find(e=>(e.date||e)===dateStr);
  if(extra){
    const analysts=extra.analysts||[];
    return analysts==='all'||analysts.includes(analystId);
  }
  const day=new Date(dateStr+'T12:00:00').getDay();
  return workdayConfig.weekdays[day]===true;
}

function setAnalystDefault(analystId,sched){
  if(!analystSchedules[analystId])analystSchedules[analystId]={overrides:{}};
  else if(!analystSchedules[analystId].overrides)analystSchedules[analystId].overrides={};
  analystSchedules[analystId].default=sched;
  saveLS();render();
}
function setAnalystDayOverride(analystId,dateStr,sched){
  if(!analystSchedules[analystId])analystSchedules[analystId]={default:{startTime:'08:00',endTime:'16:00',breakMinutes:60},overrides:{}};
  else if(!analystSchedules[analystId].overrides)analystSchedules[analystId].overrides={};
  analystSchedules[analystId].overrides[dateStr]=sched;
  saveLS();render();
}
function removeAnalystDayOverride(analystId,dateStr){
  ifanalystSchedules[analystId]?.overrides
    delete analystSchedules[analystId].overrides[dateStr];
  saveLS();render();
}
function isAbsent(analystId,dateStr){
  return getAnalystAbsences(analystId).some(a=>a.startDate<=dateStr&&a.endDate>=dateStr);
}
function getAbsenceOnDate(analystId,dateStr){
  return getAnalystAbsences(analystId).find(a=>a.startDate<=dateStr&&a.endDate>=dateStr)||null;
}
function addAbsence(analystId,type,startDate,endDate,note){
  if(!absences[analystId])absences[analystId]=[];
  const _nabs={_ts:Date.now(),id:nextAbsId++,type,startDate,endDate,note:note||''};
  absences[analystId].push(_nabs);
  auditLog('CREATE','ABSENCE',_nabs.id,{
    analystId:analystId,analystName:getU(analystId).name,
    type:type,startDate:startDate,endDate:endDate,note:note||''
  },'');
  saveLS();render();
  checkAbsenceConflicts();
}
function saveAbsenceEdit(analystId, absId){
  const type=document.getElementById('abt-'+absId)?.value;
  const start=document.getElementById('abs-'+absId+'-s')?.value;
  const end=document.getElementById('abs-'+absId+'-e')?.value||start;
  const note=document.getElementById('abn-'+absId)?.value||'';
  if(!start){alert('Fecha requerida.');return;}
  if(end<start){alert('La fecha fin no puede ser anterior al inicio.');return;}
  const list=absences[analystId]||[];
  const ab=list.find(a=>a.id===absId);
  if(ab){ab.type=type;ab.startDate=start;ab.endDate=end;ab.note=note;}
  checkAbsenceConflicts();saveLS();render();
}
function deleteAbsence(analystId,absId){
  if(!absences[analystId])return;
  absences[analystId]=absences[analystId].filter(a=>a.id!==absId);
  saveLS();render();
}
function checkAbsenceConflicts(){
  const conflicts=[];

  // ── Analysis task conflicts ──
  tasks.forEach(t=>{
    (t.assignments||[]).forEach(a=>{
      if(!a.date)return;
      const absent=isAbsent(a.analyst,a.date);
      const nonWork=!isWorkdayFor(a.analyst,a.date);
      if(absent||nonWork){
        const absEntry=getAbsenceOnDate(a.analyst,a.date);
        const absTyp=absent?(getABSTypes()[absEntry?.type]||{label:'Ausencia'}):null;
        conflicts.push({
          type:'analysis',
          taskId:t.id,analystId:a.analyst,date:a.date,
          task:t.producto+' '+t.lote,
          analyst:getU(a.analyst).name,
          absType:absEntry?.type||null,
          absLabel:absent?(absTyp?.label||'Ausencia'):null,
          nonWorkday:nonWork&&!absent,
          reason:absent?'Ausencia: '+(absTyp?.label||'Ausencia'):'Día no laborable'
        });
      }
    });
  });

  // ── Management task conflicts ──
  const today_=today();
  const checkFrom=new Date(today_+'T00:00:00');
  checkFrom.setDate(checkFrom.getDate()-7); // check from last week
  const checkTo=new Date(today_+'T00:00:00');
  checkTo.setMonth(checkTo.getMonth()+3); // check 3 months ahead
  const fromStr=checkFrom.toISOString().slice(0,10);
  const toStr=checkTo.toISOString().slice(0,10);

  mgmtTasks.forEach(mt=>{
    const occs=expandMgmt(mt,fromStr,toStr);
    occs.forEach(occ=>{
      // Use occ.analysts (already has exceptions applied) not mt.analysts
      (occ.analysts||[]).forEach(analystId=>{
        const d=occ.occDate;
        const absent=isAbsent(analystId,d);
        const nonWork=!isWorkdayFor(analystId,d);
        if(absent||nonWork){
          const absEntry=getAbsenceOnDate(analystId,d);
          const absTyp=absent?(getABSTypes()[absEntry?.type]||{label:'Ausencia'}):null;
          const cat=getMgmtCat(mt.category);
          conflicts.push({
            type:'mgmt',
            mgmtId:mt.id,analystId,date:d,
            task:cat.label+(occ.startTime?' '+occ.startTime:''),
            analyst:getU(analystId).name,
            absType:absEntry?.type||null,
            absLabel:absent?(absTyp?.label||'Ausencia'):null,
            nonWorkday:nonWork&&!absent,
            reason:absent?'Ausencia: '+(absTyp?.label||'Ausencia'):'Día no laborable',
            catColor:cat.color,catText:cat.text
          });
        }
      });
    });
  });

  // Sort by date
  conflicts.sort((a,b)=>a.date.localeCompare(b.date));
  return conflicts;
}

function saveSchedModal(){
  const isSup=currentUser.role==='supervisor';
  const start=getTimeVal('sm-start')||'08:00';
  const end=getTimeVal('sm-end')||'16:00';
  const brk=parseInt(document.getElementById('sm-brk')?.value)||60;
  const note=document.getElementById('sm-note')?.value.trim()||'';
  const type=document.getElementById('sm-type')?.value||'change';
  const proposed={startTime:start,endTime:end,breakMinutes:brk,type,note};
  if(isSup){
    if(schedModalDate){
      setAnalystDayOverride(schedModalAnalyst,schedModalDate,{...proposed,status:'assigned'});
    } else {
      setAnalystDefault(schedModalAnalyst,proposed);
      // Save per-analyst workdays if checkboxes are present
      var wdResult={};
      var hasWd=false;
      [0,1,2,3,4,5,6].forEach(function(d){
        var cb=document.getElementById('sm-wd-'+d);
        if(cb){wdResult[d]=cb.checked;hasWd=true;}
      });
      if(hasWd){
        if(!analystSchedules[schedModalAnalyst])analystSchedules[schedModalAnalyst]={overrides:{}};
        analystSchedules[schedModalAnalyst].workdays=wdResult;
      }
    }
    showSchedModal=false;saveLS();render();
  } else {
    if(!note&&!isSup){alert('Indicá el motivo del cambio.');return;}
    scheduleRequests.push({
      id:nextSchedReqId++,analystId:schedModalAnalyst,
      dateStr:schedModalDate||null,status:'pending',
      proposed,reason:note,ts:Date.now(),requestedBy:currentUser.id
    });
    showSchedModal=false;saveLS();render();
    // No alert needed — bell will show it
  }

// Per-assignment hours helper — returns real hours logged
var getAssignHours=function(task,analystId,dateStr){
  var assigns=(task.assignments||[]).filter(function(a){return a.analyst===analystId&&(!dateStr||a.date===dateStr);});
  return assigns.reduce(function(s,a){return s+(a.realHours||0);},0);
};

function selectNewAbsPalette(idx){
  selectedAbsPalette=idx;
  document.querySelectorAll('[id^=newabs-pal-]').forEach((el,i)=>{
    el.style.transform=i===idx?'scale(1.35)':'scale(1)';
    el.style.boxShadow=i===idx?'0 0 0 2px var(--blue)':'none';
  });
}
function saveAbsType(key){
  const input=document.getElementById('abstype-'+key);
  const val=input?.value.trim();
  if(!val){showAbsTypeMsg('El nombre no puede estar vacío.','var(--red)');return;}
  if(absenceTypesDef[key])absenceTypesDef[key].label=val;
  saveLS();render();
  showAbsTypeMsg('Tipo actualizado: "'+val+'"','var(--green)');
}
function cycleAbsColor(key){
  const cur=absenceTypesDef[key];if(!cur)return;
  const curIdx=ABS_COLOR_PALETTES.findIndex(p=>p.color===cur.color);
  const next=ABS_COLOR_PALETTES[(curIdx+1)%ABS_COLOR_PALETTES.length];
  cur.color=next.color;cur.text=next.text;
  saveLS();render();
}
function deleteAbsType(key){
  const used=Object.values(absences).flat().filter(a=>a.type===key).length;
  if(used>0){alert('No se puede eliminar: hay '+used+' ausencia(s) con este tipo. Primero editá o eliminá esas ausencias.');return;}
  if(!confirm('¿Eliminar el tipo "'+absenceTypesDef[key]?.label+'"?'))return;
  delete absenceTypesDef[key];
  saveLS();render();
}
function addAbsType(){
  const label=(document.getElementById('newabstype-label')?.value||'').trim();
  if(!label){showNewAbsTypeMsg('Ingresá un nombre.','var(--red)');return;}
  const pal=ABS_COLOR_PALETTES[selectedAbsPalette]||ABS_COLOR_PALETTES[0];
  // Generate a safe key from label
  const key='custom_'+label.toLowerCase().replace(/[^a-z0-9]/g,'_').slice(0,20)+'_'+Date.now().toString(36).slice(-4);
  if(absenceTypesDef[key]){showNewAbsTypeMsg('Ya existe un tipo con ese nombre.','var(--red)');return;}
  absenceTypesDef[key]={label,color:pal.color,text:pal.text};
  saveLS();
  const inp=document.getElementById('newabstype-label');
  if(inp)inp.value='';
  showNewAbsTypeMsg('Tipo "'+label+'" creado.','var(--green)');
  render();
}
function showAbsTypeMsg(msg,color){
  const el=document.getElementById('abstype-msg');
  if(el){el.style.color=color;el.textContent=msg;setTimeout(()=>{if(el)el.textContent='';},3000);}
}
function showNewAbsTypeMsg(msg,color){
  const el=document.getElementById('newabstype-msg');
  if(el){el.style.color=color;el.textContent=msg;setTimeout(()=>{if(el)el.textContent='';},3000);}
}

function handleWorkdayClick(dateStr){
  const extra=getExtraEntry(dateStr);
  const off=getOffEntry(dateStr);
  if(off){removeWorkdayOverride(dateStr);render();return;}
  if(extra){
    // Re-open the extra workday editor for this date
    extraModalDate=dateStr;showExtraModal=true;render();return;
  }
  const day=new Date(dateStr+'T12:00:00').getDay();
  const defaultWork=workdayConfig.weekdays[day]===true;
  if(defaultWork){
    // Normal workday — mark as off (add note)
    const note=prompt('Motivo (opcional, ej: Feriado nacional):','');
    if(note===null)return; // cancelled
    saveOffDay(dateStr,note);render();
  } else {
    // Non-workday — open modal to select which analysts work
    extraModalDate=dateStr;showExtraModal=true;render();
  }
}

function renderAllAbsencesCalendar(){
  // Show a monthly overview for all analysts
  const {year,month,firstDay,daysInMonth,total,label}=getMonthDates(monthOffset);
  const todayStr=today();
  const DAY_HDR=['Lun','Mar','Mié','Jue','Vie','Sáb','Dom'];
  let cells=[];
  for(let i=0;i<total;i++){
    const dayNum=i-firstDay+1;
    if(dayNum<1||dayNum>daysInMonth){cells.push(null);continue;}
    const dateStr=year+'-'+String(month+1).padStart(2,'0')+'-'+String(dayNum).padStart(2,'0');
    cells.push(dateStr);
  }
  const weeks=[];
  for(let i=0;i<cells.length;i+=7)weeks.push(cells.slice(i,i+7));
  return`
  <div style="display:flex;align-items:center;gap:8px;margin-bottom:10px">
    <button class="btn sm" onclick="monthOffset--;render()">←</button>
    <span style="font-size:13px;font-weight:600;flex:1;text-align:center">${label}</span>
    <button class="btn sm" onclick="monthOffset++;render()">→</button>
    <button class="btn sm" onclick="monthOffset=0;render()">Hoy</button>
  </div>
  <div style="background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);overflow:hidden">
    <div style="display:grid;grid-template-columns:repeat(7,minmax(0,1fr));background:var(--bg2);border-bottom:1px solid var(--border)">
      
      ${DAY_HDR.map(d=>`<div style="padding:5px 4px;font-size:10px;font-weight:600;color:var(--text2);text-transform:uppercase;text-align:center;border-right:1px solid var(--border)">${d}</div>`).join('')}
    </div>
    ${weeks.map(week=>`<div style="display:grid;grid-template-columns:repeat(7,minmax(0,1fr));border-bottom:1px solid var(--border)">
      ${week.map(dateStr=>{
        if(!dateStr)return`<div style="background:var(--bg2);border-right:1px solid var(--border);min-height:70px"></div>`;
        const isToday=dateStr===todayStr;
        const dt2=new Date(dateStr+'T12:00:00');
        const isWE=dt2.getDay()===0||dt2.getDay()===6;
        const absent=rrhhAnalyst?getAbsenceOnDate(rrhhAnalyst,dateStr):null;
        const isWork=rrhhAnalyst?isWorkdayFor(rrhhAnalyst,dateStr):isWorkday(dateStr);
        const absTyp=absent?getABSTypes()[absent.type]||{color:'#fdeee4',text:'#8a3c10',label:'Aus.'}:null;
        const bg=absent?absTyp.color+'55':isToday?'var(--blue-bg)':!isWork?'var(--bg2)':'var(--surface)';
        return`<div style="border-right:1px solid var(--border);min-height:70px;padding:4px;background:${bg}">
          <div style="font-size:12px;font-weight:${isToday?700:400};color:${isToday?'var(--blue)':isWE?'var(--amber)':'var(--text2)'};text-align:right;margin-bottom:3px;font-family:var(--mono)">${dateStr.slice(8)}</div>
          ${absent?`<div style="font-size:10px;font-weight:600;padding:2px 5px;border-radius:4px;background:${absTyp.color};color:${absTyp.text}">${absTyp.label}</div>`:''}
          ${!isWork&&!absent?`<div style="font-size:10px;color:var(--text3);text-align:center;padding-top:6px">—</div>`:''}
        </div>`;
      }).join('')}
    </div>`).join('')}
  </div>`;
}

// Quick-fix helpers callable from conflict rows
function quickSkipMgmtOcc(mgmtId, dateStr){
  var mt=mgmtTasks.find(function(m){return m.id==mgmtId;});
  if(!mt)return;
  if(!mt.exceptions)mt.exceptions=[];
  var exc=mt.exceptions.find(function(e){return e.date===dateStr;});
  if(exc){exc.analysts=[];}
  else mt.exceptions.push({date:dateStr,analysts:[],note:'Omitido desde conflictos'});
  saveLS();render();
}

function quickRemoveAnalystFromMgmtOcc(mgmtId, dateStr, analystId){
  var mt=mgmtTasks.find(function(m){return m.id==mgmtId;});
  if(!mt)return;
  if(!mt.exceptions)mt.exceptions=[];
  var exc=mt.exceptions.find(function(e){return e.date===dateStr;});
  var baseAnalysts=(exc?exc.analysts:(mt.analysts||[])).filter(function(a){return a!==analystId;});
  if(exc){exc.analysts=baseAnalysts;}
  else mt.exceptions.push({date:dateStr,analysts:baseAnalysts,note:'Modificado desde conflictos'});
  saveLS();render();
}

function getNotifBadge(){
  var isSup=currentUser.role==='supervisor';
  var isRev=currentUser.role==='reviewer';
  var uid=currentUser.id;
  // Observations: solo las dirigidas al usuario actual (analysts)
  var obsC=replanNotifs.filter(function(n){
    return n.type==='observation'&&n.status==='pending'
      &&(n.forUserId===uid||n.analystId===uid);
  }).length;
  // Replan requests
  var replanC=replanNotifs.filter(function(n){
    return n.type==='replan'&&n.status==='pending'&&(isSup||(n.analystId===uid));
  }).length;
  // Schedule requests
  var schedPC=isSup
    ?scheduleRequests.filter(function(r){return r.status==='pending'&&!r._seenBySup;}).length
    :scheduleRequests.filter(function(r){return r.analystId===uid&&r.status==='pending';}).length;
  var schedAC=!isSup
    ?scheduleRequests.filter(function(r){return r.analystId===uid&&r.status==='approved'&&!r._seenByAnalyst;}).length
    :0;
  // Confirm pending (supervisor) — computed from tasks same way as panel
  var confC=0;
  if(isSup){
    tasks.forEach(function(t){
      if(t.status!=='pending-confirm')return;
      var pend=(t.assignments||[]).filter(function(a){return !a._removed&&a._pendingConfirm===true&&!a._supervisorConfirmed;});
      if(!pend.length)pend=(t.assignments||[]).filter(function(a){return !a._removed&&!a._supervisorConfirmed&&(a.realHours>0||(a.sessions&&a.sessions.length>0));});
      confC+=pend.length;
    });
  }
  // Resubmit (supervisor + reviewer)
  var resubC=(isSup||isRev)
    ?replanNotifs.filter(function(n){return n.type==='resubmit'&&n.forUserId===uid&&n.status==='pending';}).length
    :0;
  // Free task notifications
  var ftC=0;
  if(isSup){
    ftC=replanNotifs.filter(function(n){return n.type==='free_task_completed'&&n.forUserId===uid&&n.status==='pending';}).length;
  } else {
    ftC=replanNotifs.filter(function(n){
      var ft=freeTasks.find(function(x){return x.id===n.freeTaskId;});
      return n.type==='free_task_assigned'&&n.forUserId===uid
        &&(n.status==='pending'||n.status==='read')
        &&ft&&(ft.status==='pending'||ft.status==='pending-confirm');
    }).length;
  }
  // Planification requests (supervisor)
  var planC=isSup
    ?replanNotifs.filter(function(n){return n.type==='planification_request'&&n.status==='pending';}).length
    :0;
  return obsC+replanC+schedPC+schedAC+confC+resubC+ftC+planC;
}

// ── MANAGEMENT TASKS ──
const MGMT_CATEGORIES=['Revisión','TOC','Compras','Gestión','Limpieza','Mantenimiento','Otro'];
const MGMT_FREQS=[
  {id:'once',label:'Una vez'},
  {id:'daily',label:'Diariamente'},
  {id:'weekly',label:'Semanal'},
  {id:'biweekly',label:'Quincenal'},
  {id:'monthly',label:'Mensual'},
  {id:'semestral',label:'Semestral'},
];
const WORKDAY_HOURS=8;

function expandMgmt(mt, fromDate, toDate){
  const occ=[];
  const from=new Date(fromDate+'T00:00:00');
  const to=new Date(toDate+'T23:59:59');
  const start=new Date((mt.startDate||fromDate)+'T00:00:00');
  function add(d){
    const ds=d.toISOString().slice(0,10);
    if(d<from||d>to)return;
    if(mt.frequency==='daily'&&!isWorkday(ds))return;
    const exc=(mt.exceptions||[]).find(e=>e.date===ds);
    if(exc&&exc.analysts&&exc.analysts.length===0)return;
    const effAnalysts=exc?exc.analysts:(mt.analysts||[]);
    occ.push({...mt,occDate:ds,analysts:effAnalysts,_hasExc:!!exc});
  }
  if(mt.frequency==='once'){add(start);return occ;}
  let cur=new Date(start);
  const endD=mt.endDate?new Date(mt.endDate+'T23:59:59'):to;
  const cap=to<endD?to:endD;
  let safety=0;
  while(cur<=cap&&safety<1500){
    safety++;
    add(new Date(cur));
    if(mt.frequency==='daily')cur.setDate(cur.getDate()+1);
    else if(mt.frequency==='weekly')cur.setDate(cur.getDate()+7);
    else if(mt.frequency==='biweekly')cur.setDate(cur.getDate()+14);
    else if(mt.frequency==='monthly')cur.setMonth(cur.getMonth()+1);
    else if(mt.frequency==='semestral')cur.setMonth(cur.getMonth()+6);
    else break;
  }
  return occ;
}

          +(workH>totalAvail?'<div style="font-size:9px;font-weight:700;color:var(--red);margin-top:2px">\u26a0 +'+(workH-totalAvail).toFixed(1)+'h extra</div>':'')
          +'</div>';
      }
      // Analysis tasks
      myTasks.slice(0,3).forEach(function(t){
        const st=t.status;
        const stColor=st==='done'?'var(--green)':st==='progress'?'var(--blue)':st==='pending-confirm'?'var(--amber)':'var(--text3)';
        const stIcon=st==='done'?'\u2713':st==='progress'?'\u25b6':st==='pending-confirm'?'\u23f3':'\u25cb';
        grid+='<div style="padding:3px 6px;border-radius:4px;margin-bottom:3px;background:#d4ede0;border-left:3px solid #1e5c35;cursor:pointer" onclick="openEdit('+t.id+')">'
          +'<div style="display:flex;justify-content:space-between;align-items:center">'
          +'<div style="font-size:10px;font-weight:600;color:#1e5c35;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">'+escH(t.producto.split(' ')[0])+'</div>'
          +'<span style="font-size:9px;color:'+stColor+'">'+stIcon+'</span></div>'
          +'<div style="font-size:9px;color:#1e5c35;opacity:.7;font-family:var(--mono);overflow:hidden;text-overflow:ellipsis;white-space:nowrap">'+escH(t.lote)+'</div>'
          +'</div>';
      });
      // Mgmt tasks
      mgmtOccs.slice(0,2).forEach(function(o){
        const c=getMgmtCat(o.category);
        grid+='<div style="padding:3px 6px;border-radius:4px;margin-bottom:3px;background:'+c.color+';border-left:3px solid '+c.text+'">'
          +'<div style="font-size:10px;font-weight:600;color:'+c.text+';overflow:hidden;text-overflow:ellipsis;white-space:nowrap">'+escH(c.label)+'</div>'
          +(o.dedicacion?'<div style="font-size:9px;color:'+c.text+';opacity:.7;font-family:var(--mono)">'+o.dedicacion+'h</div>':'')
          +'</div>';
      });
      const more=myTasks.length+mgmtOccs.length>5?myTasks.length+mgmtOccs.length-5:0;
      if(more) grid+='<div style="font-size:9px;color:var(--text3);text-align:center">+'+more+' m\u00e1s</div>';
      // Action buttons
      if(!pendReq){
        grid+='<div style="display:flex;gap:4px;margin-top:6px">'
          +'<button class="btn sm" style="flex:1;font-size:10px;padding:3px;color:var(--blue);border-color:var(--blue)" onclick="requestScheduleChange(\''+currentUser.id+'\',\''+d+'\')">&#x1F4C5; Cambio</button>'
          +'<button class="btn sm" style="flex:1;font-size:10px;padding:3px;color:var(--green);border-color:var(--green)" onclick="requestOvertime(\''+d+'\')">&#x2605; Extra</button>'
          +'</div>';
      } else {
        grid+='<div style="background:var(--amber-bg);border-radius:5px;padding:3px 7px;font-size:9px;font-weight:700;color:var(--amber-text);text-align:center;margin-top:5px">\u23f3 Solicitud pendiente</div>';
      }
    } else if(absent){
      grid+='<div style="font-size:10px;color:'+absTyp.text+';text-align:center;padding:10px 0;font-weight:500">'+(absent.note||absTyp.label)+'</div>';
    } else {
      grid+='<div style="font-size:10px;color:var(--text3);text-align:center;padding:10px 0">\u2014</div>';
    }
    grid+='</div></div>';
  });
  grid+='</div></div>';
  return nav+grid;
}

function renderCronogramaMonth(a, def){
  const {year,month,firstDay,daysInMonth,total,label}=getMonthDates(monthOffset);
  const todayStr=today();
  const pad=function(n){return String(n).padStart(2,'0');};
  const fromDate=year+'-'+pad(month+1)+'-01';
  const toDate=year+'-'+pad(month+1)+'-'+pad(daysInMonth);
  const mgmtOccsByDay={};
  mgmtTasks.forEach(function(mt){
    expandMgmt(mt,fromDate,toDate).forEach(function(o){
      if(!(o.analysts||[]).includes(currentUser.id))return;
      if(!mgmtOccsByDay[o.occDate])mgmtOccsByDay[o.occDate]=[];
      mgmtOccsByDay[o.occDate].push(o);
    });
  });
  const DAY_HDR=['Lun','Mar','M\u00edd','Jue','Vie','S\u00e1b','Dom'];
  let cells=[];
  for(let i=0;i<total;i++){const dn=i-firstDay+1;cells.push(dn<1||dn>daysInMonth?null:year+'-'+pad(month+1)+'-'+pad(dn));}
  const weeks=[];for(let i=0;i<cells.length;i+=7)weeks.push(cells.slice(i,i+7));

  let nav='<div style="display:flex;align-items:center;gap:8px;margin-bottom:12px;flex-wrap:wrap">'
    +'<button class="btn" onclick="monthOffset--;render()">\u2190 Anterior</button>'
    +'<span style="font-size:14px;font-weight:600;min-width:160px;text-align:center">'+label+'</span>'
    +'<button class="btn" onclick="monthOffset++;render()">Siguiente \u2192</button>'
    +'<button class="btn sm" onclick="monthOffset=0;render()">Hoy</button>'
    +'</div>';

  let grid='<div style="background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);overflow:hidden">'
    +'<div style="display:grid;grid-template-columns:repeat(7,minmax(0,1fr));background:var(--bg2);border-bottom:1px solid var(--border)">'
    +DAY_HDR.map(function(d){return'<div style="padding:6px 4px;font-size:10px;font-weight:600;color:var(--text2);text-transform:uppercase;text-align:center;border-right:1px solid var(--border)">'+d+'</div>';}).join('')
    +'</div>';

  weeks.forEach(function(week){
    grid+='<div style="display:grid;grid-template-columns:repeat(7,minmax(0,1fr));border-bottom:1px solid var(--border)">';
    week.forEach(function(dateStr){
      if(!dateStr){grid+='<div style="background:var(--bg2);border-right:1px solid var(--border);min-height:100px"></div>';return;}
      const ov=analystSchedules[currentUser.id]?.overrides?.[dateStr];
      const hasOv=ov&&(ov.status==='approved'||ov.status==='assigned');
      const s=hasOv?ov:def;
      const h=calcHours(s);
      const absent=getAbsenceOnDate(currentUser.id,dateStr);
      const isWork=isWorkdayFor(currentUser.id,dateStr);
      const pendReq=scheduleRequests.find(function(r){return r.analystId===currentUser.id&&r.dateStr===dateStr&&r.status==='pending';});
      const approvedOT=scheduleRequests.find(function(r){return r.analystId===currentUser.id&&r.dateStr===dateStr&&r.status==='approved'&&r.proposed.type==='overtime';});
      const myTasks=tasks.filter(function(t){return(t.assignments||[]).some(function(x){return x.analyst===currentUser.id&&x.date===dateStr;});});
      const dayMgmt=mgmtOccsByDay[dateStr]||[];
      const workH=myTasks.reduce(function(acc,t){return acc+getAssignHours(t,currentUser.id,dateStr);},0);
      const totalAvail=h+(approvedOT?approvedOT.proposed.extraHours||0:0);
      const absTyp=absent?getABSTypes()[absent.type]||{color:'#fdeee4',text:'#8a3c10',label:'Aus.'}:null;
      const schedTyp=hasOv?SCHED_TYPES.find(function(t){return t.id===ov.type;})||null:null;
      const dt2=new Date(dateStr+'T12:00:00');
      const isToday=dateStr===todayStr;
      const isWE=dt2.getDay()===0||dt2.getDay()===6;
      const bg=absent?absTyp.color+'55':hasOv?(schedTyp&&schedTyp.color?schedTyp.color+'77':'##e8eff8'):isToday?'var(--blue-bg)':!isWork?'var(--bg2)':'var(--surface)';

      grid+='<div style="border-right:1px solid var(--border);min-height:100px;padding:4px;background:'+bg+';cursor:pointer" onclick="requestScheduleChange(\''+currentUser.id+'\',\''+dateStr+'\')">';
      grid+='<div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:3px">'
        +'<span style="font-size:'+(isToday?'14':'12')+'px;font-weight:'+(isToday?'800':'500')+';color:'+(isToday?'var(--blue)':isWE?'var(--amber)':'var(--text)')+';font-family:var(--mono)">'+dateStr.slice(8)+'</span>'
        +(pendReq?'<span style="font-size:8px;background:var(--amber-bg);color:var(--amber-text);padding:1px 3px;border-radius:3px;font-weight:700">\u23f3</span>':'')
        +'</div>';
      if(!absent&&isWork){
        const schedColor=hasOv?'var(--blue)':'var(--text2)';
        grid+='<div style="font-size:10px;font-family:var(--mono);font-weight:600;color:'+schedColor+'">'+s.startTime+'\u2013'+s.endTime+'</div>';
        grid+='<div style="font-size:10px;color:'+schedColor+';font-family:var(--mono)">'+h.toFixed(1)+'h'+(approvedOT?'<span style="color:var(--green)"> +'+approvedOT.proposed.extraHours+'h</span>':'')+'</div>';
        if(hasOv&&schedTyp) grid+='<div style="font-size:8px;font-weight:700;padding:1px 4px;border-radius:3px;background:'+(schedTyp.color||'#e8eff8')+';color:'+(schedTyp.text||'#1a4f8a')+';margin-top:2px">'+schedTyp.label+'</div>';
        if(workH>0){
          const pct=Math.min(workH/totalAvail*100,100);
          grid+='<div style="background:rgba(0,0,0,.08);border-radius:2px;height:3px;overflow:hidden;margin:3px 0"><div style="height:100%;background:'+(workH>totalAvail?'var(--red)':workH>=totalAvail*.8?'var(--amber)':'var(--blue)')+';width:'+pct.toFixed(0)+'%"></div></div>';
        }
        myTasks.slice(0,2).forEach(function(t){
          grid+='<div style="font-size:9px;padding:1px 4px;border-radius:2px;margin-bottom:1px;background:#d4ede0;color:#1e5c35;font-weight:600;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;cursor:pointer" onclick="event.stopPropagation();openEdit('+t.id+')">'+escH(t.producto.split(' ')[0])+'</div>';
        });
        dayMgmt.slice(0,2).forEach(function(o){
          const c=getMgmtCat(o.category);
          grid+='<div style="font-size:9px;padding:1px 4px;border-radius:2px;margin-bottom:1px;background:'+c.color+';color:'+c.text+';font-weight:600;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">'+escH(c.label)+'</div>';
        });
        const more=myTasks.length+dayMgmt.length>4?myTasks.length+dayMgmt.length-4:0;
        if(more) grid+='<div style="font-size:8px;color:var(--text3);text-align:center">+'+more+' m\u00e1s</div>';
      } else if(absent){
        grid+='<div style="font-size:9px;font-weight:600;color:'+absTyp.text+';margin-top:4px">'+absTyp.label+'</div>';
        if(absent.note) grid+='<div style="font-size:8px;color:'+absTyp.text+';opacity:.7">'+escH(absent.note)+'</div>';
      } else {
        grid+='<div style="font-size:9px;color:var(--text3);text-align:center;padding:8px 0">\u2014</div>';
      }
      grid+='</div>';
    });
    grid+='</div>';
  });
  grid+='</div>';

  const legend='<div style="display:flex;gap:10px;flex-wrap:wrap;margin-top:8px;font-size:11px;color:var(--text2)">'
    +'<span style="display:flex;align-items:center;gap:4px"><span style="width:10px;height:10px;background:#d4ede0;border-left:3px solid #1e5c35;border-radius:2px;display:inline-block"></span>An\u00e1lisis</span>'
    +'<span style="display:flex;align-items:center;gap:4px"><span style="width:10px;height:10px;background:#e8eff8;border-left:3px solid #1a4f8a;border-radius:2px;display:inline-block"></span>Gesti\u00f3n</span>'
    +'<span style="display:flex;align-items:center;gap:4px"><span style="width:10px;height:10px;background:var(--blue-bg);border:2px solid var(--blue);border-radius:2px;display:inline-block"></span>Hoy</span>'
    +'<span style="font-size:10px;color:var(--text3);align-self:center">Clic en un d\u00eda para solicitar cambio de horario</span>'
    +'</div>';
  return nav+grid+legend;
}
function renderMySchedule(){
  scheduleRequests.filter(r=>r.analystId===currentUser.id&&r.status==='approved'&&!r._seenByAnalyst)
    .forEach(r=>{r._seenByAnalyst=true;});
  const a=getU(currentUser.id);
  const def=getAnalystScheduleDefault(currentUser.id);
  const defH=calcHours(def);
  const pendReqs=scheduleRequests.filter(r=>r.analystId===currentUser.id&&r.status==='pending');
  const histReqs=scheduleRequests.filter(r=>r.analystId===currentUser.id&&r.status!=='pending').slice(-10).reverse();
  const isSup=currentUser.role==='supervisor';

  const viewToggle='<div style="display:flex;gap:4px;background:var(--bg2);border-radius:var(--radius);padding:3px;width:fit-content;margin-bottom:14px">'
    +'<button class="btn sm" onclick="mySchedView=\'week\';render()" style="'+(mySchedView==='week'?'background:var(--surface);font-weight:600;box-shadow:0 1px 3px rgba(0,0,0,.1)':'border:none;background:transparent')+'">Semana</button>'
    +'<button class="btn sm" onclick="mySchedView=\'month\';render()" style="'+(mySchedView==='month'?'background:var(--surface);font-weight:600;box-shadow:0 1px 3px rgba(0,0,0,.1)':'border:none;background:transparent')+'">Mes</button>'
    +'</div>';

  const headerCard='<div style="background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);padding:12px 16px;margin-bottom:16px;display:flex;align-items:center;gap:12px;flex-wrap:wrap">'
    +'<div class="av av-xl '+a.av+'">'+escH(a.avInit)+'</div>'
    +'<div><div style="font-weight:600;font-size:15px">'+escH(a.name)+'</div>'
    +'<div style="font-size:12px;color:var(--text2)">Horario base: <b style="font-family:var(--mono)">'+def.startTime+' \u2013 '+def.endTime+'</b> \u00b7 <b style="color:var(--blue)">'+defH.toFixed(1)+'h</b> \u00b7 Descanso '+( def.breakMinutes||60)+'min</div></div>'
    +(pendReqs.length?'<div style="margin-left:auto;background:var(--amber-bg);border-radius:var(--radius);padding:6px 12px;font-size:12px;color:var(--amber-text);font-weight:600">\u23f3 '+pendReqs.length+' solicitud'+(pendReqs.length>1?'es':'')+' pendiente'+(pendReqs.length>1?'s':'')+'</div>':'')
    +'</div>';

  const content=mySchedView==='week'?renderMySchedWeek(a,def):renderMySchedMonth(a,def);

  const histSection=pendReqs.length||histReqs.length
    ?'<div style="background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);overflow:hidden;margin-top:16px">'
      +'<div style="padding:10px 14px;background:var(--bg2);border-bottom:1px solid var(--border);font-size:12px;font-weight:600">Solicitudes de cambio de horario</div>'
      +[...pendReqs,...histReqs].map(r=>{
        const h=calcHours(r.proposed);
        const stBg={pending:'var(--amber-bg)',approved:'var(--green-bg)',rejected:'var(--red-bg)'}[r.status];
        const stC={pending:'var(--amber-text)',approved:'var(--green-text)',rejected:'var(--red-text)'}[r.status];
        const stL={pending:'Pendiente',approved:'Aprobada',rejected:'Rechazada'}[r.status];
        const typeL=SCHED_TYPES.find(t=>t.id===r.proposed.type)?.label||'Cambio';
        const dt=new Date(r.ts);
        return'<div style="padding:10px 14px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10px;flex-wrap:wrap">'
          +'<div style="min-width:90px;font-family:var(--mono);font-size:12px;font-weight:600">'+(r.dateStr?fmtDF(r.dateStr):'Base')+'</div>'
          +'<div style="flex:1;min-width:0">'
          +'<div style="font-size:12px;font-weight:600">'+(r.proposed.type==='overtime'?'Horas extra: '+r.proposed.extraHours+'h':''+r.proposed.startTime+'\u2013'+r.proposed.endTime+' \u00b7 '+h.toFixed(1)+'h')+'</div>'
          +'<div style="font-size:11px;color:var(--text2);overflow:hidden;text-overflow:ellipsis;white-space:nowrap">'+escH(r.reason||'')+'</div>'
          +'<div style="font-size:10px;color:var(--text3)">'+typeL+'</div>'
          +'</div>'
          +'<div style="display:flex;flex-direction:column;align-items:flex-end;gap:2px">'
          +'<span style="font-size:10px;font-weight:700;padding:2px 8px;border-radius:10px;background:'+stBg+';color:'+stC+'">'+stL+'</span>'
          +'<span style="font-size:10px;color:var(--text3)">'+dt.getDate()+'/'+(dt.getMonth()+1)+' '+String(dt.getHours()).padStart(2,'0')+':'+String(dt.getMinutes()).padStart(2,'0')+'</span>'
          +'</div></div>';
      }).join('')
      +'</div>'
    :'';

  return viewToggle+headerCard+content+histSection;
}

function renderMySchedWeek(a, def){

    +'<button class="btn sm" onclick="weekOffset=0;render()">Hoy</button>'

    const pendOT=scheduleRequests.find(r=>r.analystId===currentUser.id&&r.dateStr===d&&r.status==='pending'&&r.proposed.type==='overtime');
    const approvedOT=scheduleRequests.find(r=>r.analystId===currentUser.id&&r.dateStr===d&&r.status==='approved'&&r.proposed.type==='overtime');
    const myTasks=tasks.filter(t=>(t.assignments||[]).some(x=>x.analyst===currentUser.id&&x.date===d));

          +'<span style="font-family:var(--mono);font-weight:700;color:'+(workH>totalAvail?'var(--red)':workH>=totalAvail*.8?'var(--amber)':'var(--green)')+'">'+workH.toFixed(1)+'/'+totalAvail.toFixed(1)+'h</span></div>'
          +'<div style="background:rgba(0,0,0,.08);border-radius:3px;height:6px;overflow:hidden">'
          +'<div style="height:100%;border-radius:3px;background:'+(workH>totalAvail?'var(--red)':workH>=totalAvail*.8?'var(--amber)':'var(--blue)')+';width:'+pct.toFixed(0)+'%"></div></div>'
          +(extraH>0?'<div style="font-size:9px;font-weight:700;color:var(--red);margin-top:2px">\u26a0 +'+extraH.toFixed(1)+'h sobre jornada</div>':'')

          +'<button class="btn sm" style="flex:1;font-size:10px;padding:3px;color:var(--blue);border-color:var(--blue)" onclick="requestScheduleChange(\''+currentUser.id+'\',\''+d+'\')">📅 Cambio</button>'
          +'<button class="btn sm" style="flex:1;font-size:10px;padding:3px;color:var(--green);border-color:var(--green)" onclick="requestOvertime(\''+d+'\')">⭐ Horas extra</button>'
          +'</div>';
      } else {
        grid+='<div style="background:var(--amber-bg);border-radius:5px;padding:3px 7px;font-size:9px;font-weight:700;color:var(--amber-text);text-align:center;margin-top:5px">\u23f3 Solicitud pendiente</div>';
      }

      grid+='<div style="font-size:10px;color:'+absTyp.text+';text-align:center;padding:10px 0;font-weight:500">'+(absent.note||absTyp.label)+'</div>';
    } else {
      grid+='<div style="font-size:10px;color:var(--text3);text-align:center;padding:10px 0">\u2014</div>';
    }
    grid+='</div></div>';
  });
  grid+='</div></div>';
  return nav+grid;
}

function renderMySchedMonth(a, def){
  const {year,month,firstDay,daysInMonth,total,label}=getMonthDates(monthOffset);
  const todayStr=today();
  const pad=n=>String(n).padStart(2,'0');
  const DAY_HDR=['Lun','Mar','Mié','Jue','Vie','Sáb','Dom'];
  let cells=[];
  for(let i=0;i<total;i++){const dn=i-firstDay+1;cells.push(dn<1||dn>daysInMonth?null:year+'-'+pad(month+1)+'-'+pad(dn));}
  const weeks=[];for(let i=0;i<cells.length;i+=7)weeks.push(cells.slice(i,i+7));

  let nav='<div style="display:flex;align-items:center;gap:8px;margin-bottom:12px;flex-wrap:wrap">'
    +'<button class="btn" onclick="monthOffset--;render()">&#8592; Anterior</button>'
    +'<span style="font-size:14px;font-weight:600;min-width:160px;text-align:center">'+label+'</span>'
    +'<button class="btn" onclick="monthOffset++;render()">Siguiente &#8594;</button>'
    +'<button class="btn sm" onclick="monthOffset=0;render()">Hoy</button>'
    +'</div>';

  let grid='<div style="background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);overflow:hidden">';
  grid+='<div style="display:grid;grid-template-columns:repeat(7,minmax(0,1fr));background:var(--bg2);border-bottom:1px solid var(--border)">';
  DAY_HDR.forEach(d=>{grid+='<div style="padding:6px 4px;font-size:10px;font-weight:600;color:var(--text2);text-transform:uppercase;text-align:center;border-right:1px solid var(--border)">'+d+'</div>';});
  grid+='</div>';

  weeks.forEach(week=>{
    grid+='<div style="display:grid;grid-template-columns:repeat(7,minmax(0,1fr));border-bottom:1px solid var(--border)">';
    week.forEach(dateStr=>{
      if(!dateStr){grid+='<div style="background:var(--bg2);border-right:1px solid var(--border);min-height:110px"></div>';return;}
      const ov=analystSchedules[currentUser.id]?.overrides?.[dateStr];
      const hasOv=ov&&(ov.status==='approved'||ov.status==='assigned');
      const s=hasOv?ov:def;
      const h=calcHours(s);
      const absent=getAbsenceOnDate(currentUser.id,dateStr);
      const isWork=isWorkdayFor(currentUser.id,dateStr);
      const pendReq=scheduleRequests.find(r=>r.analystId===currentUser.id&&r.dateStr===dateStr&&r.status==='pending');
      const approvedOT=scheduleRequests.find(r=>r.analystId===currentUser.id&&r.dateStr===dateStr&&r.status==='approved'&&r.proposed.type==='overtime');
      const myTasks=tasks.filter(t=>(t.assignments||[]).some(x=>x.analyst===currentUser.id&&x.date===dateStr));
      const mgmtOccs=mgmtTasks.flatMap(mt=>expandMgmt(mt,dateStr,dateStr)).filter(o=>(o.analysts||[]).includes(currentUser.id));
      const workH=myTasks.reduce((a,t)=>a+getAssignHours(t,currentUser.id,d||dateStr||''),0);
      const totalAvail=h+(approvedOT?approvedOT.proposed.extraHours||0:0);
      const absTyp=absent?getABSTypes()[absent.type]||{color:'#fdeee4',text:'#8a3c10',label:'Aus.'}:null;
      const schedTyp=hasOv?SCHED_TYPES.find(t=>t.id===ov.type)||null:null;
      const dt2=new Date(dateStr+'T12:00:00');
      const isToday=dateStr===todayStr;
      const isWE=dt2.getDay()===0||dt2.getDay()===6;
      let bg=absent?absTyp.color+'55':hasOv?(schedTyp&&schedTyp.color?schedTyp.color+'77':'##e8eff8'):isToday?'var(--blue-bg)':!isWork?'var(--bg2)':'var(--surface)';

      grid+='<div style="border-right:1px solid var(--border);min-height:110px;padding:4px;background:'+bg+';cursor:pointer" onclick="requestScheduleChange(\''+currentUser.id+'\',\''+dateStr+'\')">';
      grid+='<div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:3px">';
      grid+='<span style="font-size:13px;font-weight:'+(isToday?'800':'500')+';color:'+(isToday?'var(--blue)':isWE?'var(--amber)':'var(--text)')+';font-family:var(--mono)">'+dateStr.slice(8)+'</span>';
      if(pendReq) grid+='<span style="font-size:8px;background:var(--amber-bg);color:var(--amber-text);padding:1px 3px;border-radius:3px;font-weight:700">\u23f3</span>';
      grid+='</div>';
      if(!absent&&isWork){
        grid+='<div style="font-size:10px;font-family:var(--mono);font-weight:600;color:'+(hasOv?'var(--blue)':'var(--text2)')+'">'+s.startTime+'\u2013'+s.endTime+'</div>';
        grid+='<div style="font-size:10px;color:'+(hasOv?'var(--blue)':'var(--text3)')+';font-family:var(--mono)">'+h.toFixed(1)+'h'+(approvedOT?' <span style="color:var(--green)">+'+approvedOT.proposed.extraHours+'h</span>':'')+'</div>';
        if(hasOv&&schedTyp) grid+='<div style="font-size:8px;font-weight:600;padding:1px 4px;border-radius:3px;background:'+(schedTyp.color||'#e8eff8')+';color:'+(schedTyp.text||'#1a4f8a')+';margin-top:2px">'+schedTyp.label+'</div>';
        if(workH>0){
          const pct=Math.min(workH/totalAvail*100,100);
          grid+='<div style="background:rgba(0,0,0,.08);border-radius:2px;height:3px;overflow:hidden;margin:3px 0"><div style="height:100%;background:'+(workH>totalAvail?'var(--red)':workH>=totalAvail*.8?'var(--amber)':'var(--blue)')+';width:'+pct.toFixed(0)+'%"></div></div>';
        }
        grid+=myTasks.slice(0,2).map(t=>'<div style="font-size:9px;padding:1px 4px;border-radius:2px;margin-bottom:1px;background:#d4ede0;color:#1e5c35;font-weight:600;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">'+escH(t.producto.split(' ')[0])+'</div>').join('');
        grid+=mgmtOccs.slice(0,1).map(o=>{const c=getMgmtCat(o.category);return'<div style="font-size:9px;padding:1px 4px;border-radius:2px;margin-bottom:1px;background:'+c.color+';color:'+c.text+';font-weight:600;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">'+escH(c.label)+'</div>';}).join('');
      } else if(absent){
        grid+='<div style="font-size:9px;font-weight:600;color:'+absTyp.text+';margin-top:4px">'+absTyp.label+'</div>';
      } else {
        grid+='<div style="font-size:9px;color:var(--text3);text-align:center;padding:8px 0">\u2014</div>';
      }
      grid+='</div>';
    });
    grid+='</div>';
  });
  grid+='</div>';

  const legend='<div style="display:flex;gap:10px;flex-wrap:wrap;margin-top:8px;font-size:11px;color:var(--text2)">'
    +'<span style="display:flex;align-items:center;gap:4px"><span style="width:10px;height:10px;background:var(--blue-bg);border:2px solid var(--blue);border-radius:2px;display:inline-block"></span>Hoy</span>'
    +'<span style="display:flex;align-items:center;gap:4px"><span style="width:10px;height:10px;background:#e8eff8;border-left:3px solid #1a4f8a;border-radius:2px;display:inline-block"></span>Excepci\u00f3n horario</span>'
    +'<span style="display:flex;align-items:center;gap:4px"><span style="width:10px;height:10px;background:var(--bg2);border:1px solid var(--border);border-radius:2px;display:inline-block"></span>No laborable</span>'
    +'<span style="font-size:10px;color:var(--text3);align-self:center">Clic en cualquier d\u00eda para solicitar cambio</span>'
    +'</div>';
  return nav+grid+legend;
}

function requestOvertime(dateStr){
  var otDiv=document.createElement('div');
  otDiv.innerHTML='<div style="position:fixed;inset:0;z-index:500;background:rgba(0,0,0,.4);display:flex;align-items:center;justify-content:center">'
    +'<div style="background:var(--surface);border-radius:var(--radius-lg);padding:22px;width:360px;box-shadow:0 8px 32px rgba(0,0,0,.2)">'
    +'<h4 style="margin:0 0 14px">Solicitar hora extra</h4>'
    +'<p style="font-size:12px;color:var(--text2);margin:0 0 14px">Fecha: '+dateStr+'</p>'
    +'<div class="frow"><label>Horas extra *</label>'
    +'<input type="number" id="ot-hrs" min="0.5" max="24" step="0.5" value="2" style="width:100%;padding:7px 10px;border:1px solid var(--border2);border-radius:var(--radius);background:var(--surface);color:var(--text)"></div>'
    +'<div class="frow" style="margin-top:10px"><label>Motivo *</label>'
    +'<textarea id="ot-reason" rows="3" style="width:100%;resize:vertical;padding:7px 10px;border:1px solid var(--border2);border-radius:var(--radius);background:var(--surface);color:var(--text)"></textarea></div>'
    +'<div style="display:flex;gap:8px;justify-content:flex-end;margin-top:14px">'
    +'<button onclick="document.body.removeChild(this.closest(\'div[style*=fixed]\').parentElement)" class="btn">Cancelar</button>'
    +'<button onclick="window._doOvertime(\''+dateStr+'\')" class="btn pri">Solicitar</button>'
    +'</div></div></div>';
  document.body.appendChild(otDiv);
  window._doOvertime=function(ds){
    var hVal=parseFloat((document.getElementById('ot-hrs')||{}).value||0);
    var reasonVal=((document.getElementById('ot-reason')||{}).value||'').trim();
    if(isNaN(hVal)||hVal<=0){alert('Ingres\u00e1 un n\u00famero de horas v\u00e1lido.');return;}
    if(!reasonVal){alert('El motivo es requerido.');return;}
    document.body.removeChild(otDiv);
    scheduleRequests.push({
      id:nextSchedReqId++,
      analystId:currentUser.id,
      dateStr:ds,
      status:'pending',
      proposed:{type:'overtime',extraHours:hVal,startTime:'',endTime:'',breakMinutes:0},
      reason:reasonVal,
      ts:Date.now(),
      requestedBy:currentUser.id
    });
    saveLS();render();
  };
}

}

function cycleMgmtCatColor(idx){
  const c=mgmtCategories[idx];if(!c)return;
  const ci=MGMT_CAT_PALETTES.findIndex(p=>p.color===c.color);
  const next=MGMT_CAT_PALETTES[(ci+1)%MGMT_CAT_PALETTES.length];
  c.color=next.color;c.text=next.text;saveLS();render();
}
function saveMgmtCat(id){
  const inp=document.getElementById('mgcat-lbl-'+id);
  const val=inp?.value.trim();
  if(!val){alert('El nombre no puede estar vacío.');return;}
  const c=mgmtCategories.find(x=>x.id===id);
  if(c)c.label=val;
  saveLS();
  const msg=document.getElementById('mgcat-msg');
  if(msg){msg.style.color='var(--green)';msg.textContent='Categoría actualizada.';setTimeout(()=>{if(msg)msg.textContent='';render();},1500);}
}
function deleteMgmtCat(id){
  const used=mgmtTasks.filter(t=>t.category===id).length;
  if(used>0){alert('No se puede eliminar: hay '+used+' actividad(es) con esta categoría.');return;}
  if(!confirm('¿Eliminar la categoría "'+mgmtCategories.find(c=>c.id===id)?.label+'"?'))return;
  mgmtCategories=mgmtCategories.filter(c=>c.id!==id);
  saveLS();render();
}
function addMgmtCat(){
  const label=(document.getElementById('newmgcat-label')?.value||'').trim();
  if(!label){const m=document.getElementById('newmgcat-msg');if(m){m.style.color='var(--red)';m.textContent='Ingresá un nombre.';setTimeout(()=>{if(m)m.textContent='';},2000);}return;}
  const pal=MGMT_CAT_PALETTES[selMgmtCatPalette]||MGMT_CAT_PALETTES[0];
  const id='cat_'+label.toLowerCase().replace(/[^a-z0-9]/g,'_').slice(0,16)+'_'+Date.now().toString(36).slice(-3);
  mgmtCategories.push({id,label,color:pal.color,text:pal.text});
  const inp=document.getElementById('newmgcat-label');if(inp)inp.value='';
  saveLS();
  const m=document.getElementById('newmgcat-msg');
  if(m){m.style.color='var(--green)';m.textContent='"'+label+'" agregada.';setTimeout(()=>{if(m)m.textContent='';render();},1500);}
}

function skipMgmtOccRange(){
  var mt=mgmtTasks.find(function(m){return m.id===mgmtOccTaskId;});
  if(!mt)return;
  var startStr=document.getElementById('mocc-range-start')&&document.getElementById('mocc-range-start').value;
  var endStr=document.getElementById('mocc-range-end')&&document.getElementById('mocc-range-end').value;
  var analystId=document.getElementById('mocc-range-analyst')&&document.getElementById('mocc-range-analyst').value;
  if(!startStr||!endStr){alert('Ingresá fechas válidas.');return;}
  if(endStr<startStr){alert('La fecha fin debe ser posterior al inicio.');return;}
  if(!mt.exceptions)mt.exceptions=[];
  var cur=new Date(startStr+'T12:00:00');
  var end=new Date(endStr+'T12:00:00');
  var changed=0;
  while(cur<=end){
    var ds=cur.toISOString().slice(0,10);
    var exc=mt.exceptions.find(function(e){return e.date===ds;});
    if(!exc){exc={date:ds,analysts:[].concat(mt.analysts||[])};mt.exceptions.push(exc);}
    if(analystId){
      exc.analysts=exc.analysts.filter(function(a){return a!==analystId;});
    } else {
      exc.analysts=[];
    }
    changed++;
    cur.setDate(cur.getDate()+1);
  }
  showMgmtOccModal=false;saveLS();render();
}

function removeMgmtExc(){
  var mt=mgmtTasks.find(function(m){return m.id===mgmtOccTaskId;});
  if(!mt||!mt.exceptions)return;
  mt.exceptions=mt.exceptions.filter(function(e){return e.date!==mgmtOccDate;});
