function confirmDone(id){
  // Delegates to confirmAssignment for all pending assignments of this task
  var t=tasks.find(function(x){return x.id===id;});if(!t)return;
  var assigns=(t.assignments||[]).filter(function(a){return !a._removed&&a._pendingConfirm&&!a._supervisorConfirmed;});
  if(assigns.length===0){
    // No pending — if all have hours, just advance
    var allH=(t.assignments||[]).filter(function(a){return !a._removed;}).every(function(a){
      return (a.realHours>0)||(a.sessions&&a.sessions.length>0);
    });
    if(allH&&t.status==='pending-confirm'){
      t.status='done';t.confirmedBy=currentUser.id;t.confirmedTs=Date.now();
      auditLog('CONFIRM','TASK',id,{field:'status',oldVal:'pending-confirm',newVal:'done',description:t.producto+' '+t.lote},'');
      saveLS();render();saveNow().catch(function(e){console.error(e);});
    }
    return;
  }
  assigns.forEach(function(a){confirmAssignment(id,a.analyst,a.date);});
}

function markProg(id,assignDate){
  const t=tasks.find(x=>x.id===id);if(!t)return;
  if(currentUser.role==='analyst'||currentUser.role==='reviewer'){
    var todayDate=new Date(today()+'T12:00:00');
    // If a specific assignment date is provided, only check that one
    var checkAssigns=assignDate
      ?(t.assignments||[]).filter(function(a){return a.analyst===currentUser.id&&a.date===assignDate;})
      :(t.assignments||[]).filter(function(a){return a.analyst===currentUser.id;});
    if(checkAssigns.length>0){
      // Ventana permitida: 3 días hacia atrás hasta 1 día adelante
      var allOutOfWindow=checkAssigns.every(function(ma){
        var ad=new Date((ma.date||today())+'T12:00:00');
        var diff=Math.round((ad-todayDate)/(1000*60*60*24));
        return diff<-3||diff>1;
      });
      if(allOutOfWindow&&t._dueStatus!=='late'){
        alert('Solo podés iniciar esta actividad dentro de los 3 días previos o el día siguiente a la fecha asignada.');return;
      }
    }
  }
  // Mark the specific assignment as started (per-assignment independent tracking)
  var targetAssign=assignDate
    ?(t.assignments||[]).find(function(a){return a.analyst===currentUser.id&&a.date===assignDate;})
    :(t.assignments||[]).find(function(a){return a.analyst===currentUser.id;});
  if(targetAssign)targetAssign._started=true;
  // Only advance task status if not already running/further along
  var prevStatus=t.status;
  if(t.status==='pending'||t.status==='scheduled'){
    t.status='progress';t.startedTs=Date.now();
    if(!t.startDatetime)t.startDatetime=new Date().toISOString().slice(0,16);
  }
  auditLog('START','TASK',id,{field:'status',oldVal:prevStatus,newVal:t.status,
    description:'Inicio de análisis: '+t.producto+' '+t.lote+(assignDate?' (asig. '+assignDate+')':'') },'');
  saveLS();render();
}
function deleteTask(id){
  const t=tasks.find(function(x){return x.id===id;});

  if(!isSupRole()){alert('Solo el supervisor puede eliminar análisis.');return;}
  if(t.status==='approved'){alert('No se puede eliminar un análisis aprobado (ALCOA+).');return;}
  requireSignature('Eliminar análisis','Eliminar: '+t.producto+' | Lote: '+t.lote,function(reason){
    auditLog('DELETE','TASK',id,{
      description:'Eliminación: '+t.producto+' | Lote: '+t.lote
        +' | Estado: '+statusLabel(t.status)+' | Vto: '+fmtDF(t.due),
      producto:t.producto,lote:t.lote,status:t.status

    tasks=tasks.filter(function(x){return x.id!==id;});
    showModal=false;editingTask=null;
    saveLS();render();
  });
}

function autoResolveNotifs(){
  // Re-evaluate each pending notification against current state
  replanNotifs.forEach(function(n){
    if(n.status==='resolved') return;
    var task = n.taskId?tasks.find(function(t){return t.id===n.taskId||t.id===n.tid;}):null;
    var ft   = n.freeTaskId?freeTasks.find(function(f){return f.id===n.freeTaskId;}):null;
    var stale = false;
    switch(n.type){
      case 'completed':
        // Stale if task is no longer pending-confirm (already confirmed/done/approved)
        stale = !task || !['pending-confirm'].includes(task.status);
        break;
      case 'planification_request':
        // Stale if task now has assignments (planification done) or task no longer exists
        stale = !task || (task.assignments||[]).filter(function(a){return !a._removed;}).length>0;
        break;
      case 'replan':
        // Stale if task is beyond scheduled status (analysis started or further)
        stale = !task || ['progress','pending-confirm','done','reviewed','approved'].includes(task.status);
        break;
      case 'observation':
        // Stale if task is no longer observed (resubmitted)
        stale = !task || task.status!=='observed';
        break;
      case 'resubmit':
        // Stale when supervisor acted: re-observed, reviewed, or approved
        stale = !task || ['observed','reviewed','approved'].includes(task.status);
        break;
      case 'free_task_assigned':
        // Stale if analyst already acted (pending-confirm, confirmed, rejected)
        stale = !ft || ['pending-confirm','confirmed','rejected'].includes(ft.status);
        break;
      case 'free_task_completed':
        // Stale if free task is already confirmed
        stale = !ft || ft.status==='confirmed';
        break;
    }
    if(stale) n.status='resolved';
  });
}

function renderNotifPanel(){
  autoResolveNotifs(); // Re-evaluate stale notifications
  const isSup=currentUser.role==='supervisor';
  const myObsNotifs=replanNotifs.filter(function(n){
    return n.type==='observation'&&(n.forUserId===currentUser.id||n.analystId===currentUser.id);
  }).sort(function(a,b){return b.ts-a.ts;});
  const pendReplan=replanNotifs.filter(function(n){
    return n.type==='replan'&&n.status==='pending'&&(isSup||(n.analystId===currentUser.id));
  }).sort(function(a,b){return b.ts-a.ts;});
  const schedPend=isSup
    ?scheduleRequests.filter(function(r){return r.status==='pending';})
    :scheduleRequests.filter(function(r){return r.analystId===currentUser.id&&r.status==='pending';});
  const schedApproved=!isSup
    ?scheduleRequests.filter(function(r){return r.analystId===currentUser.id&&r.status==='approved'&&!r._seenByAnalyst;})
    :[];
  // confirmPend: one entry per analyst assignment pending confirmation
  // confirmPend: tasks waiting for supervisor confirmation
  // Strict: only tasks with status=pending-confirm that have at least one
  // assignment with _pendingConfirm=true (explicitly set by analyst completing)
  var confirmPend=[];
  if(isSup){
    tasks.forEach(function(t){
      if(t.status!=='pending-confirm') return;
      // Find assignments explicitly awaiting confirmation
      var pending=(t.assignments||[]).filter(function(a){
        return !a._removed && a._pendingConfirm===true && !a._supervisorConfirmed;
      });
      // Fallback: if no flag but task is pending-confirm and has unconfirmed hours
      if(pending.length===0){
        pending=(t.assignments||[]).filter(function(a){
          return !a._removed && !a._supervisorConfirmed
            && (a.realHours>0||(a.sessions&&a.sessions.length>0));
        });
      }
      pending.forEach(function(a){
        confirmPend.push({task:t,assignment:a,analystId:a.analyst});
      });
    });
  }
  const isReviewer=currentUser.role==='reviewer';
  const resubmitBadge=(isSup||isReviewer)
    ?replanNotifs.filter(function(n){return n.type==='resubmit'&&n.forUserId===currentUser.id&&n.status==='pending';}).length
    :0;
  // ftAssignedNotifs and planReqNotifs defined here so totalBadge can count them
  var ftAssignedNotifs=replanNotifs.filter(function(n){
    if(n.status==='resolved') return false;
    if(isSup){
      // Supervisor: only free_task_completed (NOT 'completed' — that's in confirmPend)
      return n.type==='free_task_completed'
        &&n.forUserId===currentUser.id&&n.status==='pending';
    } else {
      // Analyst: see assigned tasks (pending or read — until marked done)
      var ft=freeTasks.find(function(x){return x.id===n.freeTaskId;});
      // Show while task is pending OR pending-confirm (waiting sup confirmation)
      return n.type==='free_task_assigned'&&n.forUserId===currentUser.id
        &&(n.status==='pending'||n.status==='read')
        &&ft&&(ft.status==='pending'||ft.status==='pending-confirm');
    }
  });
  var planReqNotifs=isSup
    ?replanNotifs.filter(function(n){return n.type==='planification_request'&&n.status==='pending';})
    :[];
  const totalBadge=myObsNotifs.filter(function(n){return n.status==='pending';}).length
    +pendReplan.length+schedPend.length+schedApproved.length+confirmPend.length
    +resubmitBadge
    +(isSup?ftAssignedNotifs.length:replanNotifs.filter(function(n){
      return n.type==='free_task_assigned'&&n.forUserId===currentUser.id&&n.status==='pending';
    }).length)
    +planReqNotifs.length;

  if(!showNotifPanel){
    return'<div style="position:relative;display:inline-block">'
      +'<button class="btn" onclick="showNotifPanel=true;render()" style="position:relative">'
      +'🔔 Solicitudes'
      +(totalBadge>0?'<span style="position:absolute;top:-4px;right:-4px;background:var(--red);color:#fff;border-radius:50%;width:16px;height:16px;font-size:9px;font-weight:700;display:flex;align-items:center;justify-content:center">'+totalBadge+'</span>':'')
      +'</button></div>';
  }

  var html='<div style="position:fixed;inset:0;z-index:300;background:rgba(0,0,0,.3);display:flex;align-items:flex-start;justify-content:flex-end;padding:8px">'
    +'<div style="background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);width:360px;max-height:calc(100vh - 16px);overflow-y:auto;box-shadow:0 8px 32px rgba(0,0,0,.2)">'
    +'<div style="padding:12px 14px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:8px;position:sticky;top:0;background:var(--surface);z-index:1">'
    +'<span style="font-size:14px;font-weight:600">Notificaciones</span>'
    +'<button class="btn sm" onclick="showNotifPanel=false;render()" style="margin-left:auto">✕</button>'
    +'</div>';

  // ── Tareas libres / Análisis completados ──
  var ftForMe=ftAssignedNotifs.filter(function(n){
    return isSup?(n.type==='completed'||n.type==='free_task_completed'):(n.type==='free_task_assigned');
  });
  if(ftForMe.length>0){
    var ftHeader=isSup?'✅ Completados / Actividades libres':'📌 Actividades asignadas';
    html+='<div style="padding:10px 14px;border-bottom:1px solid var(--border);background:var(--blue-bg)">'
      +'<div style="font-size:12px;font-weight:600;color:var(--blue-text);margin-bottom:8px">'+ftHeader+'</div>';
    ftForMe.forEach(function(n){
    var u2=getU(n.analystId||n.fromUser);
    var task2=n.taskId?tasks.find(function(x){return x.id===n.taskId;}):null;
    var ft2=n.freeTaskId?freeTasks.find(function(x){return x.id===n.freeTaskId;}):null;
    var isComplete=n.type==='completed';
    var isFtDone=n.type==='free_task_completed';
    var title=isComplete
      ?(task2?escH(task2.producto)+' — '+escH(task2.lote):'Análisis completado')
      :isFtDone?(escH(n.description||'Actividad libre'))
      :(ft2?escH(ft2.description):escH(n.description||'Actividad libre'));
    var icon=isComplete?'✅':isFtDone?'✅':'📌';
    html+='<div style="background:var(--surface);border-radius:var(--radius);padding:7px 9px;margin-bottom:5px;font-size:12px">'
      +'<div style="font-weight:600">'+icon+' '+title+'</div>'
      +'<div style="font-size:11px;color:var(--text2);margin:2px 0">'
      +(u2?'<span class="av '+u2.av+'" style="width:16px;height:16px;font-size:8px;border-radius:50%;display:inline-flex;align-items:center;justify-content:center;vertical-align:middle;margin-right:4px">'+escH(u2.avInit)+'</span>'+escH(u2.name):'')
      +(n.hours?' · <b style="font-family:var(--mono)">'+n.hours+'h</b>':'')
      +'</div>'
      +(isFtDone&&n.comment?'<div style="font-size:11px;color:var(--text);background:var(--bg2);border-radius:4px;padding:4px 8px;margin:4px 0">💬 '+escH(n.comment)+'</div>':'')
      +((isComplete||isFtDone)
        ?'<div style="display:flex;gap:4px;margin-top:5px">'
        +'<button class="btn sm suc" onclick="markNotifRead('+n.id+');showNotifPanel=false;render()" style="font-size:10px">✓ Visto</button>'
        +(task2?'<button class="btn sm" onclick="openEdit('+task2.id+');showNotifPanel=false">🔍 Ver análisis</button>':'')
        +'</div>'
        :'<div style="font-size:11px;color:var(--text2);margin-top:4px">'
        +(n.date?fmtDDMMYY(n.date):'—')+' · '+(n.suggestedHours?n.suggestedHours+'h sugeridas':'sin horas sugeridas')+'</div>'
        +'<div style="display:flex;gap:4px;margin-top:6px">'
        +'<button class="btn sm suc" onclick="showNotifPanel=false;confirmFreeTaskAsAnalyst('+(ft2?ft2.id:0)+','+n.id+')" style="font-size:11px">✓ Confirmar realizada</button>'
        +'<button class="btn sm" onclick="markFtNotifRead('+n.id+');render()" style="font-size:10px;color:var(--text3)" title="Marcar como leída">✓ Leída</button>'
        +'</div>')
      +'</div>';
    });
    html+='</div>';

function saveTask(){
  const prod=document.getElementById('f-prod').value.trim();
  const lote=document.getElementById('f-lote').value.trim();
  if(!prod||!lote){alert('El producto y el lote son obligatorios.');return;}
  const created=document.getElementById('f-created').value;
  const due=document.getElementById('f-due').value;
  const priority=document.getElementById('f-prio').value;
  const status=document.getElementById('f-status').value;
  const notes=document.getElementById('f-notes').value;
  const _expectedArrivalEl=document.getElementById('f-expected-arrival');
  const _arrivalNotesEl=document.getElementById('f-arrival-notes');
  const expectedArrival=_expectedArrivalEl?_expectedArrivalEl.value:'';
  const arrivalNotes=_arrivalNotesEl?_arrivalNotesEl.value.trim():'';
  // Build assignments from multiAssigns — same analyst can appear N times (multi-day)
  var _editForSave=editingTask!==null?tasks.find(function(x){return x.id===editingTask;}):null;
  var _usedKeys={};
  const assignments=multiAssigns.length>0
    ?multiAssigns.map(function(row){
        var d=row.date||due;
        var existing=_editForSave?((_editForSave.assignments||[]).find(function(a){
          return a.analyst===row.analyst&&a.date===d&&!_usedKeys[row.analyst+'|'+a.date];
        })):null;
        if(existing)_usedKeys[row.analyst+'|'+existing.date]=true;
        return Object.assign({},existing||{},{analyst:row.analyst,date:d});
      })
    :selectedAnalysts.map(function(id){
        var editT=_editForSave;
        var existing=editT?(editT.assignments||[]).find(function(a){return a.analyst===id;}):null;
        return Object.assign({},existing||{},{analyst:id,date:analystDates[id]||due});
      });
  // Auto-derive status; analyst is optional
  var _autoStatus=status;
  if(!editingTask){
    // a-ingresar is a special pre-pending state — do NOT override
    if(isSupRole()&&status==='a-ingresar'){
      _autoStatus='a-ingresar';
    } else {
      _autoStatus=assignments.length===0?'pending':'scheduled';
    }
  } else {
    var _et2=tasks.find(function(x){return x.id===editingTask;});
    if(_et2&&_et2.status==='pending'&&assignments.length>0)_autoStatus='scheduled';
    // Allow supervisor to demote to a-ingresar only from pending/scheduled
    if(isSupRole()&&status==='a-ingresar'&&(_et2&&(_et2.status==='pending'||_et2.status==='scheduled'||_et2.status==='a-ingresar'))){
      _autoStatus='a-ingresar';
    }
  }
  // Warn if any assignment date is >= due (no time left for review + approval)
  if(assignments.length>0&&due){
    var _lateA=assignments.filter(function(a){return a.date&&a.date>=due;});
    if(_lateA.length>0){
      var _ln=_lateA.map(function(a){var u=getU(a.analyst);return(u?u.name.split(' ')[0]:'?')+': '+a.date;}).join(', ');
      alert('⚠️ AVISO: La fecha límite es el objetivo de APROBACIÓN.\n'
        +'Las siguientes fechas de análisis coinciden o superan esa fecha, sin dejar tiempo para revisión y aprobación:\n'
        +_ln+'\n\nVencimiento (aprobación): '+fmtDF(due)+'\nRevisá la planificación.');
      // PUNTO 5: registrar aviso en audit trail
      auditLog('WARNING','TASK',editingTask||'NEW',{
        description:'Fecha de análisis posterior a fecha límite de aprobación',
        assignments:_ln, due:due
      },'Aviso automático de planificación');
    }
  }
  if(editingTask){
    const t=tasks.find(x=>x.id===editingTask);
    if(t){
      saveTaskVersion(t);
      // PUNTO 2: preservar todos los datos de análisis completados
      // Solo actualizar campos de planificación — NUNCA sobreescribir historial de ejecución
      const preserveFields=['status','completedBy','completedTs','startedTs','startDatetime',
        'reviewedBy','reviewedTs','reviewedDate','approvedBy','approvedTs','approvedDate',
        'confirmedBy','confirmedTs','observedBy','observedTs','observations','_history',
        '_integrity','_integrityTs'];
      // Merge assignments: preservar timeLog y realHours de asignaciones existentes
      const mergedAssignments=assignments.map(function(newA){
        const oldA=(t.assignments||[]).find(function(a){
          return a.analyst===newA.analyst&&a.date===newA.date;
        });
        // Si la asignación ya existía, preservar su historial de ejecución
        if(oldA)return Object.assign({},oldA,{analyst:newA.analyst,date:newA.date});
        return newA;
      });
      // Reasignaciones eliminadas: preservar como historial si tienen datos
      const removedWithData=(t.assignments||[]).filter(function(oldA){
        const stillPresent=assignments.some(function(newA){
          return newA.analyst===oldA.analyst&&newA.date===oldA.date;
        });
        return !stillPresent&&(oldA.realHours||oldA.timeLog&&oldA.timeLog.length);
      }).map(function(a){return Object.assign({},a,{_removed:true,_removedTs:Date.now()});});
      const finalAssignments=mergedAssignments.concat(removedWithData);
      // Aplicar solo campos de planificación
      t.producto=prod;t.lote=lote;t.created=created;t.due=due;
      t.priority=priority;t.notes=notes;
      t.assignments=finalAssignments;
      // Arrival fields for a-ingresar
      if(_autoStatus==='a-ingresar'||t.status==='a-ingresar'){
        t.expectedArrival=expectedArrival||t.expectedArrival||'';
        t.arrivalNotes=arrivalNotes||t.arrivalNotes||'';
      }
      // Estado: solo retroceder si aún no inició (pending/scheduled/a-ingresar)
      if(t.status==='pending'||t.status==='scheduled'||t.status==='a-ingresar')t.status=_autoStatus;
    }
  }
  else{var _newT={id:nextId++,producto:prod,lote,created,assignments,due,priority,status:_autoStatus,notes};if(_autoStatus==='a-ingresar'){if(expectedArrival)_newT.expectedArrival=expectedArrival;if(arrivalNotes)_newT.arrivalNotes=arrivalNotes;}tasks.push(_newT);}
  const _eid2=editingTask;
  showModal=false;editingTask=null;
  auditLog(_eid2?'EDIT':'CREATE','TASK',_eid2||nextId-1,{description:(_eid2?'Edicion':'Nuevo analisis')+': '+prod+' '+lote},'');
  saveLS('counters');
  render();
  saveNow().catch(e=>console.error('saveNow task:',e));
}
function acceptResubmit(taskId, notifId){
  var t=tasks.find(function(x){return x.id===taskId;});
  if(!t)return;
  // Restore task to 'done' (Completado para revisar) — ready for review
  var prevStatus=t.status;
  t.status='done';
  t._acceptedResubmit=Date.now();
  t._acceptedBy=currentUser.id;
  auditLog('ACCEPT_RESUBMIT','TASK',taskId,{
    field:'status',oldVal:prevStatus,newVal:'done',
    description:'Re-envío aceptado: '+t.producto+' '+t.lote
  },'Aceptado para revisión');
  markObsNotifRead(notifId);
  saveLS();render();
  saveNow().catch(function(e){console.error('saveNow acceptResubmit:',e);});
}
function markObsNotifRead(notifId){
  // Coerce a número porque el onclick pasa el id como string desde el HTML
  var nid=Number(notifId);
  const n=replanNotifs.find(function(x){return x.id===nid||x.id===notifId;});
  if(n){
    n.status='read';
    n.readTs=Date.now();
    auditLog('READ','NOTIFICATION',nid,{type:'observation',producto:n.producto,lote:n.lote},'');
    saveLS();
    saveNow().catch(function(e){console.error('saveNow notifRead:',e);});
    render();
  }
}

function saveFreeTask(){
  const desc=(document.getElementById('ft-desc')||{}).value||'';
  const date=(document.getElementById('ft-date')||{}).value||'';
  const hours=parseFloat((document.getElementById('ft-hours')||{}).value||0);
  const notes=(document.getElementById('ft-notes')||{}).value||'';
  if(!desc.trim()){alert('La descripción es requerida.');return;}
  if(!date){alert('La fecha es requerida.');return;}
  if(!hours||hours<=0){alert('Las horas deben ser mayores a 0.');return;}
  const isSup2=isSupRole();
  const selAnalyst=(document.getElementById('ft-analyst')||{}).value||currentUser.id;
  const targetUser=getU(selAnalyst)||currentUser;
  if(editingFreeTask){
    const ft=freeTasks.find(function(x){return x.id===editingFreeTask;});
    if(ft){
      ft.description=desc.trim();ft.date=date;ft.hours=hours;ft.notes=notes.trim();
      if(isSup2&&selAnalyst){ft.analystId=selAnalyst;ft.analystName=targetUser.name;}
      auditLog('EDIT','FREE_TASK',editingFreeTask,{description:desc.trim(),hours,date},'');
    }
  } else {
    const ft={
      id:nextFreeTaskId++,
      analystId:isSup2?selAnalyst:currentUser.id,
      analystName:isSup2?targetUser.name:currentUser.name,
      description:desc.trim(),
      date:date,
      hours:isSup2?0:hours,           // analyst enters real hours
      suggestedHours:isSup2?hours:0,  // supervisor sets suggestion
      notes:notes.trim(),
      // Supervisor assigns task; analyst must mark it done
      status:isSup2?'pending':'pending-confirm',
      assignedBy:isSup2?currentUser.id:null,
      assignedTs:isSup2?Date.now():null,
      _ts:Date.now()
    };
    freeTasks.push(ft);
    // If supervisor created for someone else, notify them
    if(isSup2&&ft.analystId!==currentUser.id){
      replanNotifs.push({
        id:nextNotifId++,
        type:'free_task_assigned',
        freeTaskId:ft.id,
        analystId:ft.analystId,
        forUserId:ft.analystId,
        status:'pending',
        ts:Date.now(),
        fromUser:currentUser.id,
        fromName:currentUser.name,
        description:ft.description,
        date:ft.date,
        suggestedHours:ft.suggestedHours||0
      });
    } else if(!isSup2){
      // Analyst created own free task — notify supervisor
      var sup4=USERS.find(function(u){return u.role==='supervisor';});
      if(sup4){
        replanNotifs.push({
          id:nextNotifId++,
          type:'free_task_completed',
          freeTaskId:ft.id,
          analystId:currentUser.id,
          forUserId:sup4.id,
          fromUser:currentUser.id,
          fromName:currentUser.name,
          status:'pending',
          ts:Date.now(),
          description:ft.description,
          hours:hours,
          date:ft.date
        });
      }
    }
    auditLog('CREATE','FREE_TASK',ft.id,{description:ft.description,suggestedHours:ft.suggestedHours||ft.hours,date:ft.date,analystId:ft.analystId},'');
  }
  closeFreeTaskModal();
  saveLS();
  saveNow().catch(function(e){console.error('saveNow freeTask:',e);});
}

function confirmFreeTask(ftId){
  if(!isSupRole()){alert('Solo el Supervisor puede confirmar tareas libres.');return;}
  const ft=freeTasks.find(function(x){return x.id===ftId;});if(!ft)return;
  ft.status='confirmed';
  ft.confirmedBy=currentUser.id;
  ft.confirmedTs=Date.now();
  // Mark all related notifications as resolved
  replanNotifs.filter(function(n){
    return (n.type==='free_task_completed'||n.type==='free_task_assigned')
      &&n.freeTaskId===ft.id&&n.status!=='resolved';
  }).forEach(function(n){n.status='resolved';});
  auditLog('CONFIRM','FREE_TASK',ftId,{description:ft.description,hours:ft.hours,analystId:ft.analystId},'');
  saveLS();render();
  saveNow().catch(function(e){console.error('saveNow confirmFT:',e);});
}

function rejectFreeTask(ftId){
  if(!isSupRole()){return;}
  if(!confirm('¿Rechazar esta tarea libre?'))return;
  const ft=freeTasks.find(function(x){return x.id===ftId;});if(!ft)return;
  ft.status='rejected';
  ft.rejectedBy=currentUser.id;
  ft.rejectedTs=Date.now();
  auditLog('REJECT','FREE_TASK',ftId,{description:ft.description},'');
  saveLS();render();
}

function deleteFreeTask(ftId){
  if(!isSupRole()){alert('Solo el Supervisor puede eliminar tareas libres.');return;}
  const ft=freeTasks.find(function(x){return x.id===ftId;});if(!ft)return;
  const u=getU(ft.analystId);
  requireSignature(
    'Eliminar tarea libre',
    'Eliminar: '+ft.description+' ('+escH(u.name)+', '+fmtDF(ft.date)+', '+ft.hours+'h)',
    function(reason){
      freeTasks=freeTasks.filter(function(x){return x.id!==ftId;});
      auditLog('DELETE','FREE_TASK',ftId,{
        description:ft.description,hours:ft.hours,
        analystId:ft.analystId,analystName:u.name,date:ft.date
      },reason||'Eliminación por Supervisor');
      saveLS();render();
      saveNow().catch(function(e){console.error('saveNow delFT:',e);});
    },
    currentUser.id
  );
}

function markFtNotifRead(notifId){
  var n=replanNotifs.find(function(x){return x.id===notifId;});
  if(n)n.status='read';
  saveLS();render();
}

    +'<button onclick="var e=document.getElementById(\'cft-hrs\');e.value=Math.max(0.5,parseFloat(e.value||1)-0.5)" class="btn" style="width:34px;height:34px;font-size:18px;padding:0">−</button>'
    +'<input type="number" id="cft-hrs" min="0.5" max="24" step="0.5" value="'+(ft.suggestedHours||ft.hours||1)+'" style="width:90px;text-align:center;font-size:20px;font-weight:700;padding:5px;border:2px solid var(--border);border-radius:var(--radius);font-family:var(--mono)">'
    +'<button onclick="var e=document.getElementById(\'cft-hrs\');e.value=(parseFloat(e.value||1)+0.5)" class="btn" style="width:34px;height:34px;font-size:18px;padding:0">+</button>'
    +'<span style="font-size:12px;color:var(--text3)">horas</span>'
    +'</div></div>'
    +'<div style="margin-bottom:16px"><label style="font-size:11px;font-weight:600;color:var(--text2);text-transform:uppercase;letter-spacing:.04em">Comentario (opcional)</label>'
    +'<textarea id="cft-comment" rows="2" placeholder="Ej: Se completó sin inconvenientes" style="width:100%;margin-top:6px;padding:7px 9px;border:1px solid var(--border);border-radius:var(--radius);font-size:13px;resize:vertical;box-sizing:border-box">'+escH(ft.completionComment||'')+'</textarea></div>'
    +'<div style="display:flex;gap:8px">'
    +'<button id="cft-cancel" class="btn" style="flex:1">Cancelar</button>'
    +'<button onclick="window._doConfirmFt('+ftId+','+notifId+')" class="btn suc" style="flex:1">✓ Confirmar realizada</button>'
    +'</div></div></div>';
  document.body.appendChild(hDiv);
  document.getElementById('cft-cancel').onclick=function(){document.body.removeChild(hDiv);};
  window._doConfirmFt=function(fid,nid){
    var hVal=parseFloat((document.getElementById('cft-hrs')||{}).value||0);
    var comment=((document.getElementById('cft-comment')||{}).value||'').trim();
    if(!hVal||hVal<=0){alert('Ingresá horas válidas.');return;}
    document.body.removeChild(hDiv);
    var ft2=freeTasks.find(function(x){return x.id===fid;});
    if(ft2){
      ft2.realHours=hVal;
      ft2.completionComment=comment;
      ft2.status='pending-confirm';
      ft2.completedBy=currentUser.id;
      ft2.completedTs=Date.now();
      var sup3=USERS.find(function(u){return u.role==='supervisor';});
      if(sup3){
        replanNotifs.push({id:nextNotifId++,type:'free_task_completed',
          freeTaskId:fid,forUserId:sup3.id,
          analystId:currentUser.id,fromUser:currentUser.id,fromName:currentUser.name,
          status:'pending',ts:Date.now(),
          description:ft2.description,hours:hVal,date:ft2.date,comment:comment});
      }
    }
    var n=replanNotifs.find(function(x){return x.id===nid;});
    if(n)n.status='resolved';
    saveLS();
    saveNow().catch(function(e){console.error(e);});
    render();
  };
}

function requestPlanification(taskId){
  const t=tasks.find(function(x){return x.id===taskId;});if(!t)return;
  var motDiv=document.createElement('div');
  motDiv.innerHTML='<div style="position:fixed;inset:0;z-index:500;background:rgba(0,0,0,.4);display:flex;align-items:center;justify-content:center">'
    +'<div style="background:var(--surface);border-radius:var(--radius-lg);padding:20px;width:360px;box-shadow:0 8px 32px rgba(0,0,0,.2)">'
    +'<h4 style="margin:0 0 6px">Solicitar planificación</h4>'
    +'<p style="font-size:12px;color:var(--text2);margin:0 0 12px">'+escH(t.producto)+' · '+escH(t.lote)+'</p>'
    +'<div class="frow"><label>Motivo de la solicitud (opcional)</label><textarea id="rplan-mot" rows="3" placeholder="Ej: Necesito realizar los ensayos de identificación..." style="width:100%;resize:vertical"></textarea></div>'
    +'<div style="display:flex;gap:8px;justify-content:flex-end;margin-top:12px">'
    +'<button onclick="document.body.removeChild(this.closest(\'div[style*=fixed]\').parentElement)" class="btn">Cancelar</button>'
    +'<button onclick="window._doReqPlan('+taskId+')" class="btn pri">📋 Enviar solicitud</button>'
    +'</div></div></div>';
  document.body.appendChild(motDiv);
  window._doReqPlan=function(tid){
    var comment=(document.getElementById('rplan-mot')||{}).value||'';
    document.body.removeChild(motDiv);
    if(comment===null)return;
  replanNotifs.push({
    id:nextNotifId++,
    type:'planification_request',
    taskId:tid,
    analystId:currentUser.id,
    status:'pending',
    ts:Date.now(),
    fromUser:currentUser.id,
    fromName:currentUser.name,
    fromRole:currentUser.role,
    producto:t.producto,
    lote:t.lote,
    comment:comment.trim()
  });
  auditLog('REQUEST','TASK',tid,{
    description:'Solicitud de planificación: '+t.producto+' '+t.lote,
    comment:comment.trim()
  },'Solicitud de asignación de analista');
  saveLS();render();
  saveNow().catch(function(e){console.error('saveNow planReq:',e);});
  alert('✓ Solicitud enviada al Supervisor.');
}

function openOvertimeForSup(analystId, dateStr){
  const u=getU(analystId);
  const h=prompt('Horas extra a agregar para '+u.name+' el '+fmtDF(dateStr)+':', '');
  if(h===null)return;
  const val=parseFloat(h);
  if(isNaN(val)||val<=0){alert('Número inválido.');return;}
  const note=prompt('Motivo (opcional):', '');
  if(note===null)return;
  // Add as an approved overtime request directly
  scheduleRequests.push({
    id:nextSchedReqId++,
    analystId,dateStr,status:'approved',
    proposed:{type:'overtime',extraHours:val,startTime:'',endTime:'',breakMinutes:0},
    reason:note||'Asignado por supervisor',
    ts:Date.now(),requestedBy:currentUser.id,
    reviewedBy:currentUser.id,reviewedTs:Date.now()
  });
  showSchedModal=false;saveLS('counters');
  render();
}
