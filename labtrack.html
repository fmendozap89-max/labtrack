function copyAuditTrail() {
  const entries = [...(auditTrail||[])].reverse();
  const hdrs = ['Fecha','Hora','Usuario','Rol','Acción','Entidad','ID','Campo','Valor anterior','Valor nuevo','Motivo'];
  const rows = entries.map(function(e){
    const d = new Date(e.ts);
    const det = e.details||{};
    return [
      d.toLocaleDateString('es'),
      d.toLocaleTimeString('es'),
      e.userName||'',
      e.userRole||'',
      e.action||'',
      e.entity||'',
      e.entityId||'',
      det.field||'',
      det.oldVal!==undefined?String(det.oldVal):'',
      det.newVal!==undefined?String(det.newVal):'',
      e.reason||''
    ].join('\t');
  });
  const text = [hdrs.join('\t'),...rows].join('\n');
  navigator.clipboard.writeText(text).then(function(){
    alert('Audit trail copiado ('+entries.length+' registros).\nPodés pegarlo en Excel.');
  }).catch(function(){
    const ta=document.createElement('textarea');ta.value=text;
    document.body.appendChild(ta);ta.select();document.execCommand('copy');
    document.body.removeChild(ta);
    alert('Copiado ('+entries.length+' registros)');
  });
}

// ── 21 CFR Part 11: Failed login tracking ──
let loginAttempts = {};  // {uid: {count, lastTs}}
const MAX_LOGIN_ATTEMPTS = 5;
const LOGIN_LOCKOUT_MS = 15 * 60 * 1000; // 15 min

function checkLoginLockout(uid) {
  const att = loginAttempts[uid];
  if(!att) return false;
  if(Date.now() - att.lastTs > LOGIN_LOCKOUT_MS) { loginAttempts[uid] = null; return false; }
  return att.count >= MAX_LOGIN_ATTEMPTS;
}
function recordLoginFailure(uid, name) {
  if(!loginAttempts[uid]) loginAttempts[uid] = {count:0, lastTs:0};
  loginAttempts[uid].count++;
  loginAttempts[uid].lastTs = Date.now();
  auditLog('LOGIN_FAIL','USER',uid,{
    description:'Intento fallido de acceso ('+(loginAttempts[uid].count)+'/'+MAX_LOGIN_ATTEMPTS+')',
    userName: name||uid
  },'');
  if(loginAttempts[uid].count >= MAX_LOGIN_ATTEMPTS) {
    auditLog('ACCOUNT_LOCKED','USER',uid,{
      description:'Cuenta bloqueada por '+MAX_LOGIN_ATTEMPTS+' intentos fallidos. Bloqueo: 15 min.'
    },'');
  }
}
function recordLoginSuccess(uid) {
  loginAttempts[uid] = null; // reset on success
}

// ── 21 CFR Part 11: Session inactivity timeout ──
let _lastActivityTs = Date.now();
const SESSION_TIMEOUT_MS = 30 * 60 * 1000; // 30 min inactivity
let _sessionTimer = null;

function resetActivityTimer() {
  _lastActivityTs = Date.now();
}
function startSessionWatchdog() {
  if(_sessionTimer) clearInterval(_sessionTimer);
  _sessionTimer = setInterval(function() {
    if(!currentUser) return;
    const idle = Date.now() - _lastActivityTs;
    if(idle >= SESSION_TIMEOUT_MS) {
      auditLog('SESSION_TIMEOUT','USER',currentUser.id,{
        description:'Sesión cerrada automáticamente por inactividad (30 min)',
        idleMinutes: Math.round(idle/60000)
      },'');
      currentUser = null;
      selectedLoginUser = null;
      loginStep = 1;
      loginError = 'Sesión cerrada por inactividad (30 min). Por favor ingresá nuevamente.';
      render();
    }
  }, 60000); // check every minute
}

// ── GLP: Soft delete — never destroy records ──
function softDeleteTask(id, reason) {
  const t = tasks.find(function(x){return x.id===id;});
  if(!t) return;
  t._deleted = true;
  t._deletedBy = currentUser.id;
  t._deletedTs = Date.now();
  t._deletedReason = reason;
  t._ts = Date.now();
  auditLog('DELETE','TASK',id,{
    description:'Anulación (borrado lógico): '+t.producto+' '+t.lote,
    oldVal: t.status
  }, reason);
  closeModal(); saveLS(); render();
}

// ── GLP/ISO 17025: Record versioning — save snapshot before each edit ──
function saveTaskVersion(t) {
  if(!t) return;
  if(!t._history) t._history = [];
  t._history.push({
    ts: Date.now(),
    editedBy: currentUser ? currentUser.id : '?',
    editedByName: currentUser ? currentUser.name : '?',
    snapshot: {
      producto: t.producto,
      lote: t.lote,
      status: t.status,
      assignments: JSON.parse(JSON.stringify(t.assignments||[])),
      notes: t.notes,
      due: t.due,
      priority: t.priority
    }
  });
  // Keep last 20 versions
  if(t._history.length > 20) t._history = t._history.slice(-20);
}

// ── Render task history modal ──
function renderTaskHistory(taskId) {
  const t = tasks.find(function(x){return x.id===taskId;});
  if(!t||!t._history||!t._history.length) return '<div class="empty">Sin historial de ediciones previas</div>';
  const rows = [...t._history].reverse().map(function(h,i){
    const d = new Date(h.ts);
    const snap = h.snapshot||{};
    const changes = [];
    // Compare with current
    if(snap.status !== t.status) changes.push('Estado: '+statusLabel(snap.status)+' → '+statusLabel(t.status));
    if(snap.notes !== t.notes) changes.push('Notas modificadas');
    if(snap.due !== t.due) changes.push('Vencimiento: '+fmtDF(snap.due||'')+' → '+fmtDF(t.due||''));
    if(snap.priority !== t.priority) changes.push('Prioridad: '+snap.priority+' → '+t.priority);
    return '<div style="padding:10px 14px;border-bottom:1px solid var(--border)">'
      +'<div style="display:flex;gap:12px;align-items:center;flex-wrap:wrap">'
      +'<span style="font-size:11px;font-family:var(--mono);color:var(--text3)">v'+(t._history.length-i)
      +' — '+d.toLocaleDateString('es')+' '+d.toLocaleTimeString('es',{hour:'2-digit',minute:'2-digit'})+'</span>'
      +'<span style="font-size:12px;font-weight:600">'+escH(h.editedByName||h.editedBy||'?')+'</span>'
      +(changes.length?'<span style="font-size:11px;color:var(--text2)">'+escH(changes.join(' · '))+'</span>':'<span style="font-size:11px;color:var(--text3)">Sin cambios registrados</span>')
      +'</div>'
      +'<div style="margin-top:6px;font-size:11px;color:var(--text3)">Estado en ese momento: '
      +'<span class="pill '+snap.status+'">'+statusLabel(snap.status)+'</span>'
      +(snap.notes?'<br>Notas: '+escH(snap.notes.slice(0,80)):'')+'</div>'
      +'</div>';
  }).join('');
  return '<div style="background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);overflow:hidden">'+rows+'</div>';
}

// ── 21 CFR Part 11: Data integrity hash ──
function computeIntegrityHash(t) {
  // Simple deterministic checksum of critical fields
  const str = [t.id, t.producto, t.lote, t.status,
    t.reviewedBy||'', t.reviewedDate||'', t.approvedBy||'', t.approvedDate||'',
    (t.assignments||[]).map(function(a){return a.analyst+':'+a.date;}).join(',')
  ].join('|');
  // DJB2 hash
  let hash = 5381;
  for(let i=0;i<str.length;i++){hash=((hash<<5)+hash)+str.charCodeAt(i);hash=hash&hash;}
  return (hash>>>0).toString(16).padStart(8,'0');
}

function verifyTaskIntegrity(t) {
  if(!t._integrityHash) return null; // not yet hashed
  return t._integrityHash === computeIntegrityHash(t);
}

function stampIntegrity(t) {
  t._integrityHash = computeIntegrityHash(t);
  t._integrityTs = Date.now();
  t._integrityBy = currentUser ? currentUser.id : '?';
}

function avStack(t){return getAssignees(t).map(function(id){var u=getU(id);return'<div class="av '+u.av+'" title="'+escH(u.name)+'">'+escH(u.avInit)+'</div>';}).join('');}
function tRowSupLote(t){
  const assigns=t.assignments||[];
  const estTotal=assigns.reduce((s,a)=>s+(a.estimatedHours||0),0)||t.estimatedHours||0;
  const realTotal=assigns.reduce((s,a)=>s+(a.realHours||0),0);
  const diff=estTotal>0?realTotal-estTotal:null;
  const over=diff!==null&&diff>0;
  const barColor=over?'var(--red)':realTotal>=estTotal*0.9&&realTotal>0?'var(--green)':'var(--blue)';
  const pct=estTotal>0?Math.min(realTotal/estTotal*100,120):0;
  const pendReplan=replanNotifs.some(n=>n.taskId===t.id&&n.status==='pending');
  const cols='grid-template-columns:1.8fr 1.1fr 1.1fr .65fr .65fr .65fr .6fr .7fr .35fr';
  return(t.status==='pending-confirm'
    ?'<div class="trow" style="'+cols+'" onclick="confirmDone('+t.id+')" title="Clic para confirmar completado" style="cursor:pointer">'
    :'<div class="trow" style="'+cols+'" onclick="openEdit('+t.id+')">')
    +'<div class="cell-trunc" style="font-weight:500">'+escH(t.producto)+'</div>'
    +'<div class="cell-sub cell-trunc">'+escH(t.lote)+'</div>'
    // Analysts stack
    +'<div style="display:flex;align-items:center;gap:3px;flex-wrap:wrap">'
    +assigns.map(a=>{const u=getU(a.analyst);return'<div class="av '+u.av+'" title="'+escH(u.name)+'" style="width:22px;height:22px;font-size:9px">'+escH(u.avInit)+'</div>';}).join('')
    +(pendReplan?'<span style="font-size:9px;background:var(--amber-bg);color:var(--amber-text);padding:1px 4px;border-radius:3px;margin-left:2px">⏳</span>':'')
    +'</div>'
    // T.Est
    +'<div style="font-family:var(--mono);font-size:12px;text-align:right;font-weight:600">'+(estTotal?estTotal+'h':'<span style="color:var(--text3)">—</span>')+'</div>'
    // T.Real + bar
    +'<div style="text-align:right">'
    +(realTotal>0
      ?'<div style="font-family:var(--mono);font-size:12px;font-weight:700;color:'+barColor+'">'+realTotal.toFixed(1)+'h</div>'

    +(t.status==='reviewed'&&isSupRole()?'<button class="btn sm" style="color:var(--blue);border-color:var(--blue)" onclick="event.stopPropagation();markApproved('+t.id+')" title="Aprobar">✓ Aprobar</button>':'')
    +((t.status==='done'||t.status==='reviewed')&&(isSupRole()||isReviewerRole())?' <button class="btn sm dan" onclick="event.stopPropagation();markObserved('+t.id+')" title="Observar">⚑</button>':'')
    +(assigns.length>0&&isSupRole()?'<button class="btn sm" title="Replanificar" onclick="event.stopPropagation();openReplanSuper('+t.id+')">📅</button>':'')

function tRowSupAnalista(t){
  const assigns=t.assignments||[];
  if(assigns.length===0)return tRowSupLote(t);
  const pendReplan=replanNotifs.some(n=>n.taskId===t.id&&n.status==='pending');
  const cols='grid-template-columns:1.8fr 1.1fr 1.1fr .65fr .65fr .65fr .6fr .7fr .35fr';
  const stripeColors=['#1a4f8a','#1e5c35','#7a4e0a','#4a35a0','#8a2020','#1a6060'];
  const stripe=stripeColors[t.id%stripeColors.length];

  return assigns.map(function(a,i){
    const u=getU(a.analyst);
    const aEst=a.estimatedHours||0;
    const aReal=a.realHours||0;
    const diff=aEst>0?aReal-aEst:null;
    const over=diff!==null&&diff>0;
    const barColor=over?'var(--red)':aReal>=aEst*0.9&&aReal>0?'var(--green)':'var(--blue)';
    const pct=aEst>0?Math.min(aReal/aEst*100,120):0;
    const isFirst=i===0;
    const aTlCount=a.timeLog?a.timeLog.length:0;
    const aTlToday=a.timeLog?(a.timeLog.find(function(e){return e.date===today();})||null):null;
    const rowBg=i%2===0?'var(--surface)':'rgba(0,0,0,.014)';

    var row='<div class="trow" style="'+cols+';background:'+rowBg+';'
      +(isFirst?'border-top:2px solid '+stripe+';':'border-top:1px solid var(--border);')
      +'border-left:3px solid '+stripe+';" onclick="openEdit('+t.id+')">';

    // Producto — every row, dimmed on non-first
    row+='<div class="cell-trunc" style="'+(isFirst?'font-weight:600':'color:var(--text3);font-size:11px')+'">'+escH(t.producto)+'</div>';
    // Lote — every row
    row+='<div class="cell-sub cell-trunc" style="'+(isFirst?'':'color:var(--text3)')+'">'+escH(t.lote)+'</div>';
    // Analyst
    row+='<div style="display:flex;align-items:center;gap:6px">'
      +'<div class="av '+u.av+'" style="width:22px;height:22px;font-size:9px;flex-shrink:0">'+escH(u.avInit)+'</div>'
      +'<div>'
      +'<div style="font-size:12px;font-weight:500">'+escH(u.name.split(' ')[0])+'</div>'
      +(aTlCount>0?'<div style="font-size:9px;color:var(--text3);font-family:var(--mono)">'+aTlCount+' entrada'+(aTlCount>1?'s':'')+(aTlToday?' · hoy':'')+'</div>':'')
      +'</div></div>';
    // T.Est
    row+='<div style="font-family:var(--mono);font-size:12px;text-align:right;font-weight:600">'+(aEst?aEst+'h':'<span style="color:var(--text3)">—</span>')+'</div>';
    // T.Real
    row+='<div style="text-align:right">'
      +(aReal>0
        ?'<div style="font-family:var(--mono);font-size:12px;font-weight:700;color:'+barColor+'">'+aReal.toFixed(1)+'h</div>'
          +(aEst>0?'<div style="background:rgba(0,0,0,.08);border-radius:2px;height:3px;overflow:hidden;margin-top:2px"><div style="height:100%;background:'+barColor+';width:'+Math.min(pct,100).toFixed(0)+'%"></div></div>':'')
        :'<span style="color:var(--text3);font-size:11px">—</span>')
      +'</div>';
    // Dif
    row+='<div style="font-family:var(--mono);font-size:12px;text-align:right">'
      +(diff!==null?'<span style="font-weight:700;color:'+(over?'var(--red)':diff<-0.1?'var(--amber)':'var(--green)')+';">'+(diff>0?'+':'')+diff.toFixed(1)+'h</span>':'<span style="color:var(--text3)">—</span>')
      +'</div>';
    // Vence + Estado + Acciones — solo primera fila
    row+='<div style="font-family:var(--mono);font-size:12px">'+(isFirst?fmtD(t.due):'')+'</div>';
    row+='<div>'+(isFirst?'<span class="pill '+t.status+'">'+statusLabel(t.status)+'</span>':'')+'</div>';
    row+='<div onclick="event.stopPropagation()">'
      +(isFirst&&assigns.length>0?'<button class="btn sm" title="Replanificar" onclick="openReplanSuper('+t.id+')">📅</button>':'')
      +(isFirst&&pendReplan?'<span style="font-size:9px;background:var(--amber-bg);color:var(--amber-text);padding:1px 3px;border-radius:3px">⏳</span>':'')
      +'</div>';
    row+='</div>';
    return row;
  }).join('');
}

function openReplanSuper(taskId){
  // If multiple analysts, open picker; if one, go direct
  const t=tasks.find(x=>x.id===taskId);if(!t)return;
  const assignees=getAssignees(t);
  if(assignees.length===1){openReplan(taskId,assignees[0]);}
  else if(assignees.length>1){
    const names=assignees.map(id=>getU(id).name).join(', ');
    const pick=prompt('Analistas asignados:\n'+names+'\n\nEscribí las primeras letras del nombre del analista a replanificar:');
    if(!pick)return;
    const found=assignees.find(id=>getU(id).name.toLowerCase().includes(pick.toLowerCase()));
    if(found){openReplan(taskId,found);}
    else{alert('No se encontró ese analista.');}
  }
}
function tRowAna(t){
  var ma=(t.assignments||[]).find(function(a){return a.analyst===currentUser.id;});
  var md=ma?ma.date:t.due;
  var assignedDate=new Date(md+'T12:00:00');
  var todayDate=new Date(today()+'T12:00:00');
  var diffDays=Math.ceil((assignedDate-todayDate)/(1000*60*60*24));
  var canStart=diffDays<=1&&t.status==='pending';
  var pendingReplan=replanNotifs.find(function(n){return n.taskId===t.id&&n.analystId===currentUser.id&&n.status==='pending';});
  var replanLabel=pendingReplan?'<span style="font-size:10px;background:var(--amber-bg);color:var(--amber-text);padding:1px 5px;border-radius:4px;font-weight:500">Replan. pendiente</span>':'';
  var estH=ma?ma.estimatedHours||0:t.estimatedHours||0;

  var realH=tl.reduce(function(s,e){return s+(e.hours||0);},0)||(ma&&ma.realHours||0);

  var barColor=over?'var(--red)':realH>=estH*0.9?'var(--green)':'var(--blue)';
  // Today's time log entry
  var todayEntry=tl.find(function(e){return e.date===today();});

  var hoursCol='<div style="display:flex;flex-direction:column;gap:2px">'
    +(estH?'<span style="font-size:10px;color:var(--text2);font-family:var(--mono)">Est: '+estH+'h</span>':'')
    +(realH?'<span style="font-size:11px;font-weight:700;color:'+barColor+';font-family:var(--mono)">Real: '+realH.toFixed(1)+'h</span>':'<span style="font-size:10px;color:var(--text3)">Sin datos</span>')
    +(estH&&realH?'<div style="background:rgba(0,0,0,.08);border-radius:2px;height:4px;width:44px;overflow:hidden"><div style="height:100%;background:'+barColor+';width:'+Math.min(pct,100).toFixed(0)+'%"></div></div>':'')

  return'<div class="trow" style="grid-template-columns:1.4fr .7fr .75fr .55fr 1.1fr">'

    +'<div style="font-family:var(--mono);font-size:12px">'+fmtD(md)+(replanLabel?'<br>'+replanLabel:'')+'</div>'
    +'<div>'+hoursCol+'</div>'
    +'<div>'
    +'<span class="pill '+t.status+'">'+statusLabel(t.status)+'</span>'
    +(t.status==='observed'&&t.observations&&t.observations.length?'<div style="font-size:9px;font-weight:600;color:var(--amber-text);margin-top:2px;background:var(--amber-bg);border-radius:3px;padding:1px 5px">⚑ '+escH(t.observations[t.observations.length-1].comment.slice(0,40))+'</div>':'')
    +(t.status==='approved'?'<div style="font-size:9px;color:var(--green);margin-top:1px;font-weight:600">✓ Aprobado'+( t.approvedDate?' '+fmtDF(t.approvedDate):'')+'</div>':'')
    +'</div>'
    +'<div style="display:flex;gap:3px;flex-wrap:wrap;align-items:center">'
    +(canStart?'<button class="btn pri sm" onclick="markProg('+t.id+')">▶ Iniciar</button>':'')
    +(t.status==='progress'?'<button class="btn suc sm" onclick="markDone('+t.id+')">✓ Completar</button>':'')
    +(t.status==='observed'?'<button class="btn suc sm" onclick="markDone('+t.id+')">↩ Re-enviar</button>':'')
    +(t.status==='pending-confirm'?'<span style="font-size:10px;background:var(--blue-bg);color:var(--blue-text);padding:2px 6px;border-radius:4px;font-weight:500">⏳ Confirmación pendiente</span>':'')
    +(t.status==='done'?'<span style="font-size:11px;color:var(--green)">✓ Completado</span>':'')
    +(!pendingReplan&&t.status!=='done'&&t.status!=='pending-confirm'?'<button class="btn sm" onclick="openReplan('+t.id+',\''+currentUser.id+'\')" title="Replanificar">📅</button>':'')

// ── WEEK ──
function getMonthDates(off){
  const now=new Date();
  const year=now.getFullYear();
  const month=now.getMonth()+off;
  const d=new Date(year,month,1);
  const firstDay=d.getDay()===0?6:d.getDay()-1; // Mon=0
  const daysInMonth=new Date(year,month+1,0).getDate();
  // pad to full weeks
  const total=Math.ceil((firstDay+daysInMonth)/7)*7;
  return{year:d.getFullYear(),month:d.getMonth(),firstDay,daysInMonth,total,
    label:['Enero','Febrero','Marzo','Abril','Mayo','Junio','Julio','Agosto','Septiembre','Octubre','Noviembre','Diciembre'][d.getMonth()]+' '+d.getFullYear()};
}

        ${wd.map(d=>{const dt=tasks.filter(t=>(t.assignments||[]).some(x=>x.analyst===a.id&&x.date===d));const ab=getAbsenceOnDate(a.id,d);const typ=ab?getABSTypes()[ab.type]||getABSTypes()['absence']||{color:'#fdeee4',text:'#8a3c10',label:'Falta'}:null;const hasConflict=ab&&dt.length>0;return`<div class="wcell" style="background:${ab?typ.color+'33':d===todayStr?'rgba(26,79,138,.04)':''};">${ab?`<div style="font-size:9px;font-weight:600;color:${typ.text};padding:1px 3px;border-radius:2px;margin-bottom:2px;background:${typ.color}">${typ.label}</div>`:''}${dt.map(t=>`<div class="chip ${hasConflict?'':''+a.chip}" onclick="openEdit(${t.id})" style="cursor:pointer;margin-bottom:2px;${hasConflict?'border:1px solid var(--red);background:var(--red-bg);':''}">${hasConflict?'⚠ ':''}<div style="font-weight:600;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${escH(t.producto)}</div><div style="font-size:9px;opacity:.75;font-family:var(--mono);overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${escH(t.lote)}</div></div>`).join('')}${(_calCache[d]||[]).filter(o=>(o.analysts||[]).includes(a.id)).map(o=>`<div style="padding:2px 5px;border-radius:3px;margin-bottom:2px;background:#ddeaf8;border-left:3px solid #1a4f8a;font-size:10px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;cursor:pointer" onclick="event.stopPropagation();${sup?'openMgmtModal('+o.id+')':''}" title="${escH(getMgmtCat(o.category).label+(o.estimatedHours?' ('+o.estimatedHours+'h)':'')+(o.startTime?' '+o.startTime:''))}"><span style="font-weight:600;color:#1a4f8a">${escH(getMgmtCat(o.category).label)}</span>${o.startTime?`<span style="display:block;font-size:9px;color:#185FA5;font-family:var(--mono)">${o.startTime}${o.endTime?'–'+o.endTime:''}</span>`:''}</div>`).join('')}</div>`;}).join('')}
      </div>`).join('')}

  </div>
  ${!sup?`<div class="sec" style="margin-top:16px">Mis análisis de esta semana</div><div class="tbl">
    <div class="thead" style="grid-template-columns:1.4fr .8fr .7fr .7fr .9fr"><div>Producto / Lote</div><div>Fecha asig.</div><div>Prioridad</div><div>Estado</div><div></div></div>
    ${tasks.filter(t=>(t.assignments||[]).some(a=>a.analyst===currentUser.id&&wd.includes(a.date))).map(t=>tRowAna(t)).join('')||'<div class="empty">Sin análisis esta semana</div>'}
  </div>`:''}`;
}

function renderCalMonth(sup){
  const {year,month,firstDay,daysInMonth,total,label}=getMonthDates(monthOffset);
  const todayStr=today();
  const allRows=sup?ANALYSTS:[ANALYSTS.find(a=>a.id===currentUser.id)].filter(Boolean);
  const selA=sup?calMonthAnalyst:null; // only supervisor can filter
  const rows=selA?allRows.filter(a=>a.id===selA):allRows;
  const DAY_HDR=['Lun','Mar','Mié','Jue','Vie','Sáb','Dom'];

  // Build calendar cells
  let cells=[];
  for(let i=0;i<total;i++){
    const dayNum=i-firstDay+1;
    if(dayNum<1||dayNum>daysInMonth){cells.push(null);continue;}
    cells.push(year+'-'+String(month+1).padStart(2,'0')+'-'+String(dayNum).padStart(2,'0'));
  }
  const weeks=[];
  for(let i=0;i<cells.length;i+=7)weeks.push(cells.slice(i,i+7));

  // Analyst filter pills (supervisor only)
  let pillsHtml='';
  if(sup){
    pillsHtml='<div style="display:flex;gap:6px;flex-wrap:wrap;align-items:center;margin-bottom:12px">'
      +'<span style="font-size:11px;color:var(--text3);font-weight:600;margin-right:2px">Analista:</span>';
    const allAct=!selA;
    pillsHtml+='<div onclick="calMonthAnalyst=null;render()" style="padding:4px 12px;border-radius:20px;font-size:12px;font-weight:600;cursor:pointer;border:2px solid '+(allAct?'var(--blue)':'var(--border)')+';background:'+(allAct?'var(--blue-bg)':'var(--surface)')+';color:'+(allAct?'var(--blue)':'var(--text2)')+'">Todos</div>';
    allRows.forEach(function(a){
      const act=selA===a.id;
      pillsHtml+='<div onclick="calMonthAnalyst=\''+a.id+'\';render()" style="padding:4px 10px;border-radius:20px;font-size:12px;font-weight:600;cursor:pointer;border:2px solid '+(act?'var(--blue)':'var(--border)')+';background:'+(act?'var(--blue-bg)':'var(--surface)')+';color:'+(act?'var(--blue)':'var(--text2)')+';display:flex;align-items:center;gap:5px">'
        +'<div class="av '+a.av+'" style="width:18px;height:18px;font-size:7px;flex-shrink:0">'+escH(a.avInit)+'</div>'+escH(a.name.split(' ')[0])+'</div>';
    });
    pillsHtml+='</div>';
  }

  const navHtml='<div class="filter-row" style="margin-bottom:12px">'
    +'<button class="btn" onclick="monthOffset--;render()">← Anterior</button>'
    +'<span style="font-size:14px;font-weight:600;min-width:160px;text-align:center">'+label+'</span>'
    +'<button class="btn" onclick="monthOffset++;render()">Siguiente →</button>'
    +'<button class="btn sm" style="margin-left:6px" onclick="monthOffset=0;render()">Hoy</button>'
    +'</div>';

  // Pre-compute mgmt occurrences for month
  const fromDate=year+'-'+String(month+1).padStart(2,'0')+'-01';
  const toDate=year+'-'+String(month+1).padStart(2,'0')+'-'+String(daysInMonth).padStart(2,'0');
  const monthMgmt=mgmtTasks.flatMap(function(mt){return expandMgmt(mt,fromDate,toDate);});

  let gridHtml='<div style="background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);overflow:hidden">'
    +'<div style="display:grid;grid-template-columns:repeat(7,minmax(0,1fr));background:var(--bg2);border-bottom:1px solid var(--border)">'
    +DAY_HDR.map(function(d){return'<div style="padding:6px 8px;font-size:11px;font-weight:600;color:var(--text2);text-transform:uppercase;letter-spacing:.04em;text-align:center;border-right:1px solid var(--border)">'+d+'</div>';}).join('')
    +'</div>';

  weeks.forEach(function(week){
    gridHtml+='<div style="display:grid;grid-template-columns:repeat(7,minmax(0,1fr));border-bottom:1px solid var(--border)">';
    week.forEach(function(dateStr){
      if(!dateStr){gridHtml+='<div style="background:var(--bg2);border-right:1px solid var(--border);min-height:90px"></div>';return;}
      const isToday=dateStr===todayStr;
      const isWork=isWorkday(dateStr);
      const dt2=new Date(dateStr+'T12:00:00');
      const isWE=dt2.getDay()===0||dt2.getDay()===6;

      // Collect content for this day filtered by selected analyst
      const dayTasks=tasks.filter(function(t){
        return(t.assignments||[]).some(function(a){
          return a.date===dateStr&&rows.some(function(r){return r.id===a.analyst;});
        });
      });
      const dayMgmt=monthMgmt.filter(function(o){
        return o.occDate===dateStr&&rows.some(function(r){return(o.analysts||[]).includes(r.id);});
      });

      // Absence badges (show per analyst when filtered, summarized when all)
      let absHtml='';
      if(selA){
        const abs=getAbsenceOnDate(selA,dateStr);
        if(abs){
          const typ=getABSTypes()[abs.type]||{color:'#fdeee4',text:'#8a3c10',label:'Aus.'};
          absHtml='<div style="font-size:9px;font-weight:600;padding:1px 4px;border-radius:3px;margin-bottom:2px;background:'+typ.color+';color:'+typ.text+';overflow:hidden;text-overflow:ellipsis;white-space:nowrap">'+typ.label+'</div>';
        }
      } else {
        rows.forEach(function(a){
          const ab=getAbsenceOnDate(a.id,dateStr);
          if(!ab)return;
          const typ=getABSTypes()[ab.type]||{color:'#fdeee4',text:'#8a3c10',label:'Aus.'};
          absHtml+='<div style="font-size:9px;font-weight:600;padding:1px 3px;border-radius:2px;margin-bottom:1px;background:'+typ.color+';color:'+typ.text+';overflow:hidden;text-overflow:ellipsis;white-space:nowrap">'+escH(a.avInit)+': '+typ.label+'</div>';
        });
      }

      const bg=isToday?'rgba(26,79,138,.04)':!isWork?'var(--bg2)':'var(--surface)';
      const minH=selA?'110px':'90px';
      gridHtml+='<div style="border-right:1px solid var(--border);min-height:'+minH+';padding:4px;background:'+bg+'">';
      gridHtml+='<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:3px">'
        +'<span style="font-size:'+(isToday?'14':'12')+'px;font-weight:'+(isToday?'700':'400')+';color:'+(isToday?'var(--blue)':isWE?'var(--amber)':'var(--text2)')+';font-family:var(--mono)">'+dateStr.slice(8)+'</span>';
      // Show analyst avatars on the day number when showing all analysts
      if(!selA&&!sup){}
      gridHtml+='</div>';
      gridHtml+=absHtml;

      // Analysis task chips
      const maxTasks=selA?5:3;
      dayTasks.slice(0,maxTasks).forEach(function(t){
        // Find which analyst(s) from current filter are on this task
        const analystOnTask=(t.assignments||[]).filter(function(a){return rows.some(function(r){return r.id===a.analyst;});});
        const u=analystOnTask.length===1?getU(analystOnTask[0].analyst):null;
        const chipBg=u?'var(--chip-'+u.av+', #e8eff8)':selA?'#e8eff8':'#e8eff8';
        const chip=rows.find(function(r){return(t.assignments||[]).some(function(a){return a.analyst===r.id;});});
        const chipClass=chip?chip.chip:'av1';
        gridHtml+='<div class="chip '+chipClass+'" onclick="openEdit('+t.id+')" style="cursor:pointer;margin-bottom:2px">'
          +'<div style="font-weight:600;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">'+escH(t.producto)+'</div>'
          +(selA?'<div style="font-size:9px;opacity:.75;font-family:var(--mono);overflow:hidden;text-overflow:ellipsis;white-space:nowrap">'+escH(t.lote)+'</div>':'')
          +'</div>';
      });
      if(dayTasks.length>maxTasks)gridHtml+='<div style="font-size:9px;color:var(--text3);text-align:center;padding:1px">+'+( dayTasks.length-maxTasks)+' más</div>';

      // Mgmt chips
      const maxMgmt=selA?3:2;
      dayMgmt.slice(0,maxMgmt).forEach(function(o){
        const c=getMgmtCat(o.category);
        gridHtml+='<div style="padding:2px 4px;border-radius:3px;margin-bottom:2px;background:'+c.color+';border-left:2px solid '+c.text+';font-size:10px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;cursor:pointer" onclick="openMgmtModal('+o.id+')">'
          +'<span style="font-weight:600;color:'+c.text+'">'+escH(c.label)+'</span>'
          +'</div>';
      });
      if(dayMgmt.length>maxMgmt)gridHtml+='<div style="font-size:9px;color:var(--text3);text-align:center;padding:1px">+'+( dayMgmt.length-maxMgmt)+' gestión</div>';

      gridHtml+='</div>';
    });
    gridHtml+='</div>';
  });
  gridHtml+='</div>';

  // Legend
  const legendHtml='<div style="display:flex;gap:10px;flex-wrap:wrap;margin-top:8px;font-size:11px;color:var(--text2)">'
    +(selA?'<span style="font-size:11px;color:var(--blue);font-weight:500">Mostrando: '+escH(allRows.find(function(a){return a.id===selA;})?.name||'')+'</span>':'')
    +'<span style="display:flex;align-items:center;gap:4px"><span style="width:10px;height:10px;background:#e8eff8;border-left:2px solid #1a4f8a;border-radius:2px;display:inline-block"></span>Gestión</span>'
    +'<span style="display:flex;align-items:center;gap:4px"><span style="width:10px;height:10px;background:var(--bg2);border:1px solid var(--border);border-radius:2px;display:inline-block"></span>No laborable</span>'
    +'</div>';

  return navHtml+pillsHtml+gridHtml+legendHtml;
}

    <button class="btn sm" onclick="calView='week';render()" style="${calView==='week'?'background:var(--surface);font-weight:600;box-shadow:0 1px 4px rgba(0,0,0,.08)':'border:none;background:transparent'}">Semana</button>

// ── ANALYSTS ──
function renderAnalysts(){
  const isSup=isSupRole();
  if(!ANALYSTS.length) return '<div class="empty">Sin analistas registrados</div>';
  return ANALYSTS.map(function(a){
    const myT=tasks.filter(function(t){return (t.assignments||[]).some(function(x){return x.analyst===a.id;});});
    const pend=myT.filter(function(t){return t.status==='pending'||t.status==='scheduled'||t.status==='late';}).length;
    const prog=myT.filter(function(t){return t.status==='progress'||t.status==='pending-confirm';}).length;
    const done=myT.filter(function(t){return ['done','reviewed','approved'].includes(t.status);}).length;
    const hEst=myT.reduce(function(s,t){return s+(t.assignments||[]).filter(function(x){return x.analyst===a.id;}).reduce(function(s2,x){return s2+(parseFloat(x.estimatedHours)||0);},0);},0);
    const hReal=myT.reduce(function(s,t){return s+(t.assignments||[]).filter(function(x){return x.analyst===a.id;}).reduce(function(s2,x){return s2+(parseFloat(x.realHours)||0);},0);},0);
    const absentToday=isAbsent(a.id,today());
    const conflicts=checkAbsenceConflicts().filter(function(c){return c.analystId===a.id;}).length;
    return '<div class="card" style="padding:14px 16px;margin-bottom:10px">'
      +'<div style="display:flex;align-items:center;gap:12px;flex-wrap:wrap">'
      +'<div class="av '+a.av+'" style="width:40px;height:40px;font-size:15px;flex-shrink:0">'+escH(a.avInit)+'</div>'
      +'<div style="flex:1;min-width:0"><div style="font-weight:600;font-size:14px">'+escH(a.name)+'</div>'
      +'<div style="font-size:11px;color:var(--text3)">'+escH(a.role==='reviewer'?'Revisor':'Analista')+'</div></div>'
      +(absentToday?'<span style="font-size:11px;background:var(--amber-bg);color:var(--amber-text);padding:2px 8px;border-radius:10px;font-weight:600">Ausente</span>':'')
      +(conflicts>0?'<span style="font-size:11px;background:var(--red-bg);color:var(--red-text);padding:2px 8px;border-radius:10px;font-weight:600">'+conflicts+' conflicto'+(conflicts>1?'s':'')+'</span>':'')
      +'</div>'
      +'<div style="display:flex;gap:12px;margin-top:10px;padding-top:10px;border-top:1px solid var(--border);flex-wrap:wrap;align-items:center">'
      +'<div style="text-align:center;min-width:44px"><div style="font-size:20px;font-weight:700;color:var(--amber)">'+pend+'</div><div style="font-size:10px;color:var(--text3)">Pendiente</div></div>'
      +'<div style="text-align:center;min-width:44px"><div style="font-size:20px;font-weight:700;color:var(--blue)">'+prog+'</div><div style="font-size:10px;color:var(--text3)">En curso</div></div>'
      +'<div style="text-align:center;min-width:44px"><div style="font-size:20px;font-weight:700;color:var(--green)">'+done+'</div><div style="font-size:10px;color:var(--text3)">Completados</div></div>'
      +(hEst>0?'<div style="text-align:center;min-width:44px"><div style="font-size:20px;font-weight:700">'+hEst.toFixed(0)+'h</div><div style="font-size:10px;color:var(--text3)">H.Est.</div></div>':'')
      +(hReal>0?'<div style="text-align:center;min-width:44px"><div style="font-size:20px;font-weight:700;color:'+(hReal>hEst&&hEst>0?'var(--red)':'var(--green)')+'">'+hReal.toFixed(1)+'h</div><div style="font-size:10px;color:var(--text3)">H.Real</div></div>':'')
      +(isSup?'<div style="margin-left:auto;display:flex;gap:6px;flex-wrap:wrap">'
        +'<button class="btn sm" onclick="filterAnalyst=\''+a.id+'\';currentView=\'tasks\';render()">Ver análisis</button>'
        +'<button class="btn sm" onclick="rrhhAnalyst=\''+a.id+'\';currentView=\'rrhh\';rrhhTab=\'absences\';render()">Gestión</button>'
        +'</div>':'')
      +'</div></div>';
  }).join('');
}

function roundTo15(t){
  if(!t)return t;
  var p=t.split(':');if(p.length<2)return t;
  var h=parseInt(p[0]),m=parseInt(p[1]);
  var r=Math.round(m/15)*15;
  if(r>=60){h=(h+1)%24;r=0;}
  return String(h).padStart(2,'0')+':'+String(r).padStart(2,'0');
}
function timePicker(id,val,style){
  style=style||'';
  var h='08',m='00';
  if(val&&val.length>=4){var p=val.split(':');h=p[0]||'08';m=p[1]||'00';}
  var mi=parseInt(m)||0;mi=Math.round(mi/15)*15;
  if(mi>=60){mi=0;h=String(parseInt(h)+1).padStart(2,'0');}
  m=String(mi).padStart(2,'0');
  var hrs='';
  for(var i=0;i<24;i++){var hh=String(i).padStart(2,'0');hrs+='<option value="'+hh+'"'+(hh===h?' selected':'')+'>'+hh+'</option>';}
  var mins=['00','15','30','45'].map(function(mm){return'<option value="'+mm+'"'+(mm===m?' selected':'')+'>'+mm+'</option>';}).join('');
  return'<span class="time-pick" style="'+style+'">'
    +'<select id="'+id+'-h" onchange="syncTimeHidden(\''+id+'\')" aria-label="Hora">'+hrs+'</select>'
    +'<span style="font-family:var(--mono);font-weight:700;font-size:14px;padding:0 2px;color:var(--text)">:</span>'
    +'<select id="'+id+'-m" onchange="syncTimeHidden(\''+id+'\')" aria-label="Minutos">'+mins+'</select>'
    +'<input type="hidden" id="'+id+'" value="'+h+':'+m+'">'
    +'</span>';
}
function syncTimeHidden(id){
  var h=document.getElementById(id+'-h');
  var m=document.getElementById(id+'-m');
  var hidden=document.getElementById(id);
  if(h&&m&&hidden)hidden.value=h.value+':'+m.value;
}
function getTimeVal(id){
  var el=document.getElementById(id);
  if(!el)return'';
  return el.type==='hidden'?el.value:roundTo15(el.value||'');
}

function saveTimeEntry(){
  const t=tasks.find(x=>x.id===timeLogTaskId);if(!t)return;
  const ma=(t.assignments||[]).find(a=>a.analyst===currentUser.id);if(!ma)return;
  if(!ma.timeLog)ma.timeLog=[];
  const start=getTimeVal('tl-start');
  const end=getTimeVal('tl-end');
  const notes=document.getElementById('tl-notes')?.value||'';
  if(!start||!end){alert('Ingres\u00e1 hora de inicio y fin.');return;}
  if(end<=start){alert('La hora de fin debe ser posterior al inicio.');return;}
  // Calculate hours from start/end
  const [sh,sm]=start.split(':').map(Number);
  const [eh,em]=end.split(':').map(Number);
  const rawMin=(eh*60+em)-(sh*60+sm);
  const roundedMin=Math.round(rawMin/15)*15;
  const hours=Math.round(roundedMin/60*4)/4;
  const todayStr=today();
  const existing=ma.timeLog.find(e=>e.date===todayStr);
  if(existing){existing.start=start;existing.end=end;existing.notes=notes;existing.hours=hours;}
  else{ma.timeLog.push({date:todayStr,start,end,notes,hours});}
  // Update legacy realHours for compat
  ma.realHours=ma.timeLog.reduce((s,e)=>s+(e.hours||0),0);
  showTimeLogModal=false;saveLS();render();
}

function deleteTimeEntry(taskId,dateStr){
  const t=tasks.find(x=>x.id===taskId);if(!t)return;
  const ma=(t.assignments||[]).find(a=>a.analyst===currentUser.id);if(!ma||!ma.timeLog)return;
  ma.timeLog=ma.timeLog.filter(e=>e.date!==dateStr);
  ma.realHours=ma.timeLog.reduce((s,e)=>s+(e.hours||0),0);
  saveLS();render();
}

  if(!assigns.length)return'';
  var estH=t.estimatedHours||0;
  var realT=assigns.reduce(function(s,a){return s+(a.realHours||0);},0);
  var diff=realT-estH;
  var body=assigns.map(function(a){
    var u=getU(a.analyst);var rh=a.realHours||0;
    return'<div style="display:flex;align-items:center;gap:7px;padding:3px 10px;background:var(--surface);border-radius:20px;border:1px solid var(--border)">'
      +'<div class="av '+u.av+'" style="width:22px;height:22px;font-size:9px">'+escH(u.avInit)+'</div>'
      +'<span style="font-size:12px">'+escH(u.name.split(' ')[0])+'</span>'
      +'<span style="font-family:var(--mono);font-size:13px;font-weight:700;color:'+(rh>0?'var(--blue)':'var(--text3)')+'">'+rh.toFixed(1)+'h</span>'
      +(a.estimatedHours?'<span style="font-size:10px;color:var(--text3)">/ '+a.estimatedHours+'h est.</span>':'')
      +'</div>';
  }).join('');
  var totalBadge='<div style="padding:3px 12px;background:'+(diff>0?'var(--red-bg)':diff<-0.5?'var(--amber-bg)':'var(--green-bg)')+';border-radius:20px;font-size:12px;font-weight:600;color:'+(diff>0?'var(--red-text)':diff<-0.5?'var(--amber-text)':'var(--green-text)')+'">Total: '+realT.toFixed(1)+'h'+(estH>0?' / '+estH+'h est.':'')+'</div>';
  return'<div class="frow form-full"><label>Horas por analista</label><div style="background:var(--bg);border-radius:var(--radius);padding:8px 12px;display:flex;flex-wrap:wrap;gap:8px">'+body+totalBadge+'</div></div>';
}

function renderDateAssigns(){
  var sec=document.getElementById('date-assigns');if(!sec)return;
  if(selectedAnalysts.length===0){
    sec.innerHTML='<div style="font-size:12px;color:var(--text3);padding:6px 0">Seleccion\u00e1 al menos un analista arriba</div>';
    return;
  }
  // Sync: add missing row for each selected analyst
  selectedAnalysts.forEach(function(id){
    if(!multiAssigns.some(function(r){return r.analyst===id;})){
      multiAssigns.push({_key:id+'_'+Date.now(),analyst:id,date:analystDates[id]||'',estH:analystEstimHours[id]||0});
    }
  });
  // Remove rows for deselected analysts
  multiAssigns=multiAssigns.filter(function(r){return selectedAnalysts.indexOf(r.analyst)>=0;});
  var editT=editingTask!==null?tasks.find(function(x){return x.id===editingTask;}):null;
  sec.innerHTML=multiAssigns.map(function(row,idx){
    var u=getU(row.analyst);
    var existAss=editT?(editT.assignments||[]).find(function(a){
      return a.analyst===row.analyst&&(a.date===row.date||!row.date);
    }):null;
    var tl=existAss&&existAss.timeLog?existAss.timeLog:[];
    var realH=tl.reduce(function(s,e){return s+(e.hours||0);},0)||(existAss&&existAss.realHours||0);
    var isFirst=!multiAssigns.slice(0,idx).some(function(r){return r.analyst===row.analyst;});
    var rowsForAnalyst=multiAssigns.filter(function(r){return r.analyst===row.analyst;}).length;
    var tlRows=tl.map(function(e){
      return'<span style="font-size:10px;color:var(--text3);font-family:var(--mono)">'+e.date+': '+e.start+'\u2013'+e.end+(e.hours?' ('+e.hours.toFixed(1)+'h)':'')+'</span>';
    }).join(' \u00b7 ');
    return'<div style="background:var(--bg);border-radius:var(--radius);padding:8px 10px;margin-bottom:5px;border-left:3px solid var(--border2)">'
      +'<div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap">'
      +(isFirst
        ?'<div class="av '+u.av+'" style="flex-shrink:0">'+escH(u.avInit)+'</div>'
          +'<span style="font-weight:600;flex:1;min-width:80px">'+escH(u.name)+'</span>'
        :'<div style="width:32px;flex-shrink:0"></div>'
          +'<span style="flex:1;min-width:80px;font-size:11px;color:var(--text3)">\u21b3 d\u00eda adicional</span>'
      )
      +'<label style="font-size:11px;color:var(--text2);white-space:nowrap">Fecha:</label>'
      +'<input type="date" value="'+escH(row.date||'')+'"'
      +' style="font-size:12px;padding:4px 7px;border:1px solid var(--border2);border-radius:var(--radius);background:var(--surface);color:var(--text);width:130px"'
      +' onchange="updateMultiAssign(\''+row._key+'\',\'date\',this.value)">'
      +'<label style="font-size:11px;color:var(--text2);white-space:nowrap">Est.\u00a0(h):</label>'
      +'<input type="number" value="'+(row.estH||'')+'"'
      +' placeholder="0" min="0" max="24" step="0.25"'
      +' style="font-size:12px;padding:4px 7px;border:1px solid var(--border2);border-radius:var(--radius);background:var(--surface);color:var(--text);width:60px"'
      +' onchange="updateMultiAssign(\''+row._key+'\',\'estH\',parseFloat(this.value)||0)">'
      +(realH>0?'<span style="font-size:11px;font-family:var(--mono);font-weight:700;color:'+(realH>row.estH&&row.estH>0?'var(--red)':'var(--green)')+'">Real: '+realH.toFixed(1)+'h</span>':'')
      +'<button onclick="addMultiAssignRow(\''+row.analyst+'\')" title="Agregar otro d\u00eda para este analista"'
      +' style="padding:2px 8px;border:1px dashed var(--blue);border-radius:var(--radius);background:transparent;color:var(--blue);cursor:pointer;font-size:12px;white-space:nowrap">+\u00a0d\u00eda</button>'
      +(rowsForAnalyst>1
        ?'<button onclick="removeMultiAssignRow(\''+row._key+'\')"'
          +' style="padding:2px 6px;border:1px solid var(--border2);border-radius:var(--radius);background:transparent;color:var(--red-text);cursor:pointer;font-size:11px">\u2715</button>'
        :'')
      +'</div>'
      +(tlRows?'<div style="margin-top:5px;display:flex;flex-wrap:wrap;gap:4px">'+tlRows+'</div>':'')

function updateMultiAssign(key,field,val){
  var r=multiAssigns.find(function(x){return x._key===key;});
  if(r){r[field]=val;}
}
function addMultiAssignRow(analystId){
  multiAssigns.push({_key:analystId+'_'+Date.now(),analyst:analystId,date:'',estH:0});
  renderDateAssigns();
}
function removeMultiAssignRow(key){
  multiAssigns=multiAssigns.filter(function(r){return r._key!==key;});
  renderDateAssigns();
}

function toggleAna(id){
  var i=selectedAnalysts.indexOf(id);
  if(i>=0){
    selectedAnalysts.splice(i,1);
    delete analystDates[id];
    multiAssigns=multiAssigns.filter(function(r){return r.analyst!==id;});
  }else{
    selectedAnalysts.push(id);
    multiAssigns.push({_key:id+'_'+Date.now(),analyst:id,date:analystDates[id]||'',estH:analystEstimHours[id]||0});
  }
  document.querySelectorAll('.ana-check').forEach(function(el){
    var oc=el.getAttribute('onclick')||'';
    if(oc.indexOf("'"+id+"'")>=0||oc.indexOf('"'+id+'"')>=0){
      el.classList.toggle('selected',selectedAnalysts.indexOf(id)>=0);
    }
  });
  renderDateAssigns();
}

function nameToId(n){const nl=n.trim().toLowerCase();return ANALYSTS.find(a=>a.name.toLowerCase()===nl||a.name.toLowerCase().split(' ')[0]===nl.split(' ')[0])||null;}
function parsePaste(text){
  const lines=text.trim().split('\n').filter(l=>l.trim());
  if(lines.length<2){pastePreview=[];render();return;}
  pastePreview=lines.slice(1).map(r=>{const c=r.split('\t');return{producto:c[0]||'',lote:c[1]||'',analista:c[2]||'',fechaAnalisis:c[3]||'',due:c[4]||'',priority:c[5]||'Normal'};}).filter(r=>r.producto&&r.lote);
  render();
}
function handleFile(input){
  const file=input.files[0];if(!file)return;
  const reader=new FileReader();
  reader.onload=e=>{
    try{
      const wb=XLSX.read(e.target.result,{type:'binary',cellDates:true,dateNF:'yyyy-mm-dd'});
      const ws=wb.Sheets[wb.SheetNames[0]];
      const data=XLSX.utils.sheet_to_json(ws,{defval:'',raw:false,dateNF:'yyyy-mm-dd'});
      if(data.length>500){
        if(!confirm('El archivo tiene '+data.length+' filas. Se importarán las primeras 500. ¿Continuar?'))return;
      }
      const rows=data.slice(0,500);
      pastePreview=rows.map(r=>({
        producto:String(r['Producto']||r['producto']||'').trim(),
        lote:String(r['Lote']||r['lote']||'').trim(),
        analista:String(r['Analista']||r['analista']||'').trim(),
        fechaAnalisis:String(r['Fecha análisis']||r['FechaAnalisis']||r['Fecha_análisis']||'').trim(),
        due:String(r['Fecha entrega']||r['Vence']||r['fecha_entrega']||'').trim(),
        priority:String(r['Prioridad']||r['prioridad']||'Normal').trim()
      })).filter(r=>r.producto&&r.lote);
      render();
    }catch(err){
      alert('Error al leer el archivo Excel: '+err.message+'. Verificá que el archivo tenga el formato correcto.');
    }
  };
  reader.onerror=()=>alert('No se pudo leer el archivo.');
  reader.readAsBinaryString(file);
}
function confirmImport(){
  try{
    var duplicates=[];
    var toImport=[];
    pastePreview.forEach(function(r){
      var prod=(r.producto||'').trim();
      var lote=(r.lote||'').trim();
      if(!prod||!lote)return;
      var exists=tasks.some(function(t){
        return!t._deleted
          &&t.producto.trim().toLowerCase()===prod.toLowerCase()
          &&t.lote.trim().toLowerCase()===lote.toLowerCase();
      });
      if(exists)duplicates.push(prod+' / Lote: '+lote);
      else toImport.push(r);
    });
    if(duplicates.length>0){
      var msg='Los siguientes registros YA EXISTEN y no seran importados (mismo Producto y Lote):\n\n'
        +duplicates.slice(0,10).join('\n')
        +(duplicates.length>10?'\n... y '+(duplicates.length-10)+' mas':'');
      if(toImport.length===0){
        alert(msg+'\n\nNo hay registros nuevos para importar.');
        pastePreview=[];showImportModal=false;render();return;
      }
      if(!confirm(msg+'\n\nImportar los '+toImport.length+' registro(s) restante(s)?'))return;
    }
    const newTasks=toImport.map(r=>{
      const prod=(r.producto||'').trim();
      const lote=(r.lote||'').trim();
      if(!prod||!lote)return null;
      const ana=nameToId(r.analista);
      // Normalize date: accept DD/MM/AAAA, AAAA-MM-DD, DD-MM-AAAA
      function normDate(s){
        if(!s)return'';
        s=String(s).trim();
        // Excel numeric date
        if(/^\d{5}$/.test(s)){const d=new Date(Math.round((parseInt(s)-25569)*86400*1000));return d.toISOString().slice(0,10);}
        // AAAA-MM-DD
        if(/^\d{4}-\d{2}-\d{2}$/.test(s))return s;
        // DD/MM/AAAA or DD-MM-AAAA
        const m=s.match(/^(\d{1,2})[\/\-](\d{1,2})[\/\-](\d{4})$/);
        if(m)return m[3]+'-'+m[2].padStart(2,'0')+'-'+m[1].padStart(2,'0');
        return s;
      }
      const fechaAna=normDate(r.fechaAnalisis);
      const due=normDate(r.due);
      const asgn=ana?[{analyst:ana.id,date:fechaAna||due}]:[];
      const priority=['Normal','Alta','Urgente'].includes(r.priority)?r.priority:'Normal';
      return{id:nextId++,producto:prod,lote,created:today(),assignments:asgn,due,priority,status:'pending',notes:''};
    }).filter(Boolean);
    tasks=tasks.concat(newTasks);
    if(duplicates&&duplicates.length>0&&newTasks.length>0)alert('Importacion completada. '+newTasks.length+' registro(s) importados. '+duplicates.length+' duplicado(s) omitido(s).');
    pastePreview=[];
    showImportModal=false;
    saveLS();
    render();
  }catch(e){
    alert('Error al importar: '+e.message+'. Los datos anteriores no fueron modificados.');
    pastePreview=[];showImportModal=false;render();
  }
}
function xlsxDownload(wb, filename){
  try{
    // Use base64 data URL - works with file:// protocol too
    const wbout=XLSX.write(wb,{bookType:'xlsx',type:'base64'});
    const dataUrl='data:application/vnd.openxmlformats-officedocument.spreadsheetml.sheet;base64,'+wbout;
    const a=document.createElement('a');
    a.href=dataUrl;a.download=filename;a.style.display='none';
    document.body.appendChild(a);a.click();
    setTimeout(()=>a.remove(),500);
  }catch(e){
    // Fallback: blob URL
    try{
      const wbout=XLSX.write(wb,{bookType:'xlsx',type:'array'});
      const blob=new Blob([wbout],{type:'application/vnd.openxmlformats-officedocument.spreadsheetml.sheet'});
      const url=URL.createObjectURL(blob);
      const a=document.createElement('a');a.href=url;a.download=filename;
      document.body.appendChild(a);a.click();
      setTimeout(()=>{try{URL.revokeObjectURL(url);}catch(e2){}a.remove();},1000);
    }catch(e2){alert('No se pudo descargar el archivo. Usá la opción "Copiar encabezados" disponible en la pantalla.');}
  }
}
function copyHeaders(){
  const text='Producto\tLote\tAnalista\tFecha análisis\tFecha entrega\tPrioridad';
  if(navigator.clipboard&&navigator.clipboard.writeText){
    navigator.clipboard.writeText(text).then(()=>{
      const btn=document.getElementById('copy-btn');
      if(btn){btn.textContent='✓ Copiado';btn.style.background='var(--green)';btn.style.color='#fff';setTimeout(()=>{btn.textContent='📋 Copiar encabezados';btn.style.background='';btn.style.color='';},2000);}
    }).catch(()=>fallbackCopy(text));
  }else{fallbackCopy(text);}
}
function fallbackCopy(text){
  const ta=document.createElement('textarea');
  ta.value=text;ta.style.position='fixed';ta.style.opacity='0';
  document.body.appendChild(ta);ta.select();
  try{document.execCommand('copy');alert('Encabezados copiados. Pegá en la celda A1 de Excel.');}
  catch(e){alert('No se pudo copiar automáticamente. Copiá manualmente:\n\n'+text);}
  document.body.removeChild(ta);
}
function downloadTemplate(){
  function go(){
    const ws=XLSX.utils.aoa_to_sheet([
      ['Producto','Lote','Analista','Fecha análisis','Fecha entrega','Prioridad'],
      ['Amoxicilina 500mg','L-2024-011',ANALYSTS[0]?ANALYSTS[0].name:'Analista 1','2026-04-25','2026-04-28','Normal'],
      ['Ibuprofeno 400mg','L-2024-012',ANALYSTS[1]?ANALYSTS[1].name:'Analista 2','2026-04-26','2026-04-30','Alta'],
    ]);
    ws['!cols']=[{wch:24},{wch:14},{wch:18},{wch:16},{wch:16},{wch:12}];
    const wb=XLSX.utils.book_new();XLSX.utils.book_append_sheet(wb,'Análisis',ws);
    xlsxDownload(wb,'plantilla_labtrack.xlsx');
  }
  if(window.XLSX){go();}else{const s=document.createElement('script');s.src='https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js';s.onload=go;document.head.appendChild(s);}
}
function doExportXLSX(){
  const rows=tasks.map(t=>{
    const asigs=getAssignees(t).map(id=>getU(id).name).join(', ');
    const fechas=(t.assignments||[]).map(a=>getU(a.analyst).name.split(' ')[0]+': '+fmtDF(a.date)).join(' | ');
    return{'Producto':t.producto,'Lote':t.lote,'Fecha creación':fmtDF(t.created),'Analistas':asigs,'Fechas de análisis':fechas,'Fecha entrega':fmtDF(t.due),'Prioridad':t.priority,'Estado':statusLabel(t.status),'Notas':t.notes||''};
  });
  const ws=XLSX.utils.json_to_sheet(rows);
  ws['!cols']=[{wch:22},{wch:14},{wch:14},{wch:30},{wch:34},{wch:14},{wch:10},{wch:12},{wch:32}];
  const wb=XLSX.utils.book_new();XLSX.utils.book_append_sheet(wb,'Análisis',ws);
  const res=ANALYSTS.map(a=>{const mt=tasks.filter(t=>getAssignees(t).includes(a.id));return{'Analista':a.name,'Total':mt.length,'Completados':mt.filter(t=>t.status==='done').length,'En curso':mt.filter(t=>t.status==='progress').length,'Pendientes':mt.filter(t=>t.status==='pending').length,'Vencidos':mt.filter(t=>t.status==='late').length};});
  XLSX.utils.book_append_sheet(wb,'Resumen analistas',XLSX.utils.json_to_sheet(res));
  xlsxDownload(wb,'labtrack_reporte_'+today()+'.xlsx');
}

function markDone(id){
  const t=tasks.find(x=>x.id===id);if(!t)return;
  if(currentUser.role==='analyst'||currentUser.role==='reviewer'){
    // Analyst requests completion — needs supervisor confirmation
    t.status='pending-confirm';
    t.completedBy=currentUser.id;
    auditLog('STATUS_CHANGE','TASK',id,{field:'status',oldVal:'progress',newVal:'pending-confirm',description:t.producto+' '+t.lote},'');
    t.completedTs=Date.now();
    saveLS();render();
  } else {
    // Supervisor confirms directly
    t.status='done';
    t.confirmedBy=currentUser.id;
    auditLog('STATUS_CHANGE','TASK',id,{field:'status',oldVal:'progress',newVal:'done',description:t.producto+' '+t.lote},'');
    t.confirmedTs=Date.now();
    saveLS();render();
  }
}
function markReviewed(id){
  const t=tasks.find(function(x){return x.id===id;});
  if(!t)return;
  if(t.status!=='done'){alert('Solo se pueden revisar análisis completados.');return;}
  const dateStr=prompt('Fecha de revisión (AAAA-MM-DD):', today());
  if(dateStr===null)return;
  requireSignature(
    'Marcar como Revisado',
    'Revisión: '+t.producto+' '+t.lote,
    function(reason){
      t.status='reviewed';
      t._ts=Date.now();
      t.reviewedBy=currentUser.id;
      t.reviewedTs=Date.now();
      t.reviewedDate=dateStr||today();
      stampIntegrity(t);
      auditLog('REVIEW','TASK',id,{
        field:'status',
        oldVal:'done',
        newVal:'reviewed',
        description:t.producto+' '+t.lote,
        lote:t.lote,
        reviewedDate:t.reviewedDate
      },reason);
      saveLS();render();
    }
  );
}

function markApproved(id){
  const t=tasks.find(function(x){return x.id===id;});
  if(!t)return;
  if(t.status!=='reviewed'){alert('Solo se pueden aprobar análisis revisados.');return;}
  const dateStr=prompt('Fecha de aprobación (AAAA-MM-DD):', today());
  if(dateStr===null)return;
  requireSignature(
    'Aprobar análisis',
    'Aprobación: '+t.producto+' '+t.lote,
    function(reason){
      var _aDate=dateStr||today();
      if(t.due&&_aDate>t.due){
        if(!confirm('⚠️ La fecha de aprobación ('+fmtDF(_aDate)+') es POSTERIOR a la fecha límite ('+fmtDF(t.due)+').\n\n¿Confirmar aprobación fuera de plazo?'))return;
      }
      t.status='approved';
      t._ts=Date.now();
      t.approvedBy=currentUser.id;
      t.approvedTs=Date.now();
      t.approvedDate=_aDate;
      stampIntegrity(t);
      auditLog('APPROVE','TASK',id,{
        field:'status',
        oldVal:'reviewed',
        newVal:'approved',
        description:t.producto+' '+t.lote,
        lote:t.lote,
        approvedDate:t.approvedDate,lateApproval:t.due&&t.approvedDate>t.due
      },reason);
      saveLS();render();
    }
  );
}

function markObserved(id){
  const t=tasks.find(x=>x.id===id);if(!t)return;
  const comment=prompt('Observación (requerida):','');
  if(comment===null)return;

}

function markProg(id){
  const t=tasks.find(x=>x.id===id);if(!t)return;
  if(currentUser.role==='analyst'||currentUser.role==='reviewer'){
    var todayDate=new Date(today()+'T12:00:00');
    var myAssigns=(t.assignments||[]).filter(function(a){return a.analyst===currentUser.id;});
    if(myAssigns.length>0){
      var minDiff=Infinity;
      myAssigns.forEach(function(ma){
        var ad=new Date((ma.date||today())+'T12:00:00');
        var diff=Math.abs(Math.round((ad-todayDate)/(1000*60*60*24)));
        if(diff<minDiff)minDiff=diff;
      });
      if(minDiff>2){alert('Solo podés iniciar esta actividad dentro de los 2 días anteriores o posteriores a la fecha asignada.');return;}
    }
  }
  t.status='progress';t.startedTs=Date.now();
  if(!t.startDatetime)t.startDatetime=new Date().toISOString().slice(0,16);
  saveLS();render();
}
function deleteTask(id){
  const t=tasks.find(function(x){return x.id===id;});
  if(!t)return;
  if(!isSupRole()){alert('Solo el supervisor puede eliminar análisis.');return;}
  if(t.status==='approved'){alert('No se puede eliminar un análisis aprobado (ALCOA+).');return;}
  requireSignature('Eliminar análisis','Eliminar: '+t.producto+' | Lote: '+t.lote,function(reason){
    auditLog('DELETE','TASK',id,{
      description:'Eliminación: '+t.producto+' | Lote: '+t.lote
        +' | Estado: '+statusLabel(t.status)+' | Vto: '+fmtDF(t.due),
      producto:t.producto,lote:t.lote,status:t.status
    },reason);
    tasks=tasks.filter(function(x){return x.id!==id;});
    showModal=false;editingTask=null;
    saveLS();render();
  });
}

function submitReplan(isSup){
  const newDate=document.getElementById('replan-date').value;
  const reason=(document.getElementById('replan-reason').value||'').trim();
  if(!newDate){alert('Seleccioná la nueva fecha.');return;}
  if(!reason){alert('Indicá el motivo de la replanificación.');return;}
  const t=tasks.find(x=>x.id===replanTaskId);
  if(!t)return;
  if(isSup){
    // Supervisor aplica directamente
    const aIdx=(t.assignments||[]).findIndex(a=>a.analyst===replanAnalystId);
    if(aIdx>=0)t.assignments[aIdx].date=newDate;
    else t.assignments.push({analyst:replanAnalystId,date:newDate});
    // Log as approved
    replanNotifs.push({
      id:nextNotifId++,taskId:replanTaskId,analystId:replanAnalystId,
      oldDate:t.assignments.find(a=>a.analyst===replanAnalystId)?.date||'',
      newDate,reason,requestedBy:'SUP',status:'approved',
      ts:Date.now()
    });
  } else {
    // Analista: crear solicitud pendiente
    replanNotifs.push({
      id:nextNotifId++,taskId:replanTaskId,analystId:replanAnalystId,
      oldDate:(t.assignments||[]).find(a=>a.analyst===replanAnalystId)?.date||t.due,
      newDate,reason,requestedBy:currentUser.id,status:'pending',
      ts:Date.now()
    });
  }
  showReplanModal=false;replanTaskId=null;replanAnalystId=null;
  saveLS();render();
}

  const lote=document.getElementById('f-lote').value.trim();
  if(!prod||!lote){alert('El producto y el lote son obligatorios.');return;}
  const created=document.getElementById('f-created').value;
  const due=document.getElementById('f-due').value;
  const priority=document.getElementById('f-prio').value;
  const status=document.getElementById('f-status').value;
  const notes=document.getElementById('f-notes').value;
  // Build assignments from multiAssigns — same analyst can appear N times (multi-day)
  var _editForSave=editingTask!==null?tasks.find(function(x){return x.id===editingTask;}):null;
  var _usedKeys={};
  const assignments=multiAssigns.length>0
    ?multiAssigns.map(function(row){
        var d=row.date||due;
        var existing=_editForSave?((_editForSave.assignments||[]).find(function(a){
          return a.analyst===row.analyst&&a.date===d&&!_usedKeys[row.analyst+'|'+a.date];
        })):null;
        if(existing)_usedKeys[row.analyst+'|'+existing.date]=true;
        return Object.assign({},existing||{},{analyst:row.analyst,date:d,estimatedHours:row.estH||0});
      })
    :selectedAnalysts.map(function(id){
        var editT=_editForSave;
        var existing=editT?(editT.assignments||[]).find(function(a){return a.analyst===id;}):null;
        var inputEl=document.getElementById('f-aest-'+id);
        var estH=inputEl?parseFloat(inputEl.value)||0:(analystEstimHours[id]||0);
        return Object.assign({},existing||{},{analyst:id,date:analystDates[id]||due,estimatedHours:estH});
      });
  // Auto-derive status; analyst is optional
  var _autoStatus=status;
  if(!editingTask){
    _autoStatus=assignments.length===0?'pending':'scheduled';
  } else {
    var _et2=tasks.find(function(x){return x.id===editingTask;});
    if(_et2&&_et2.status==='pending'&&assignments.length>0)_autoStatus='scheduled';
  }
  // Warn if any assignment date is >= due (no time left for review + approval)
  if(assignments.length>0&&due){
    var _lateA=assignments.filter(function(a){return a.date&&a.date>=due;});
    if(_lateA.length>0){
      var _ln=_lateA.map(function(a){var u=getU(a.analyst);return(u?u.name.split(' ')[0]:'?')+': '+a.date;}).join(', ');
      alert('⚠️ AVISO: La fecha límite es el objetivo de APROBACIÓN.\n'
        +'Las siguientes fechas de análisis coinciden o superan esa fecha, sin dejar tiempo para revisión y aprobación:\n'
        +_ln+'\n\nVencimiento (aprobación): '+fmtDF(due)+'\nRevisá la planificación.');
    }
  }
  var _estH=assignments.reduce(function(s,a){return s+(a.estimatedHours||0);},0)||0;
  if(editingTask){const t=tasks.find(x=>x.id===editingTask);if(t){saveTaskVersion(t);Object.assign(t,{producto:prod,lote,created,assignments,due,priority,status:_autoStatus,notes,estimatedHours:_estH||t.estimatedHours||0});}}
  else tasks.push({id:nextId++,producto:prod,lote,created,assignments,due,priority,status:_autoStatus,notes,estimatedHours:_estH});
  const _eid2=editingTask;
  showModal=false;editingTask=null;
  auditLog(_eid2?'EDIT':'CREATE','TASK',_eid2||nextId-1,{description:(_eid2?'Edicion':'Nuevo analisis')+': '+prod+' '+lote},'');
  saveLS();render();
}

// CLOUD CONFIG — Jsonbin.io (gratis, sin Azure)
// ══════════════════════════════════════════════════════
const CLOUD = {
  enabled: false,
  apiKey: '',       // Master Key de jsonbin.io
  binId: '',        // Bin ID (se crea automáticamente la primera vez)
  syncInterval: 30000,
};
// ── PRESET (embedded at save-time — do not edit manually) ──
const CLOUD_PRESET = { apiKey: '', binId: '', enabled: false };

// ── Cloud state ──
let cloudStatus = 'offline'; // offline|connecting|ok|error|syncing
let cloudLastSync = null;
let cloudInitDone = false;
let cloudSaveQueue = false;
let _cloudSyncTimer = null;
let _cloudSaveTimer = null;

const JSONBIN_BASE = 'https://api.jsonbin.io/v3';

// ── Init ──
async function cloudInit() {
  if(!CLOUD.enabled || !CLOUD.apiKey) return;
  if(location.protocol === 'file:') {
    cloudStatus = 'error'; renderCloudBadge();
    return;
  }
  cloudStatus = 'connecting'; renderCloudBadge();
  try {
    if(!CLOUD.binId) {
      // Try to find existing LabTrack bin for this API key
      await cloudFindOrCreateBin();
    }
    await cloudLoad();
    cloudInitDone = true;
    cloudSyncStart();
    cloudStatus = 'ok'; cloudLastSync = new Date(); renderCloudBadge();
    render();
  } catch(e) {
    console.error('cloudInit:', e);
    cloudStatus = 'error'; renderCloudBadge();
  }
}async function cloudFindOrCreateBin() {
  // Search for existing LabTrack bin
  try {
    const r = await fetch(JSONBIN_BASE + '/b?type=json', {
      headers: { 'X-Master-Key': CLOUD.apiKey }
    });
    if(r.ok) {
      const list = await r.json();
      const existing = (list||[]).find(function(b){ return b.name === 'LabTrack'; });
      if(existing) {
        CLOUD.binId = existing.id;
        _persistCloudConfig();
        console.log('Found existing bin:', CLOUD.binId);
        return;
      }
    }
  } catch(e) { /* fallthrough to create */ }
  // No existing bin — create one
  await cloudCreateBin();
}

async function cloudCreateBin() {
  const snap = getSnapshot();
  const r = await fetch(JSONBIN_BASE + '/b', {
    method: 'POST',
    headers: {
      'Content-Type': 'application/json',
      'X-Master-Key': CLOUD.apiKey,
      'X-Bin-Name': 'LabTrack',
      'X-Bin-Private': 'true',
    },
    body: snap
  });
  if(!r.ok) throw new Error('Create bin failed: ' + r.status);
  const data = await r.json();
  CLOUD.binId = data.metadata.id;
  _persistCloudConfig();
  console.log('Bin created:', CLOUD.binId);
}
async function cloudLoad() {
  if(!CLOUD.binId) return false;
  cloudStatus = 'syncing'; renderCloudBadge();
  try {
    const r = await fetch(JSONBIN_BASE + '/b/' + CLOUD.binId + '/latest', {
      headers: { 'X-Master-Key': CLOUD.apiKey }
    });
    if(!r.ok) throw new Error('Load failed: ' + r.status);
    const data = await r.json();
    const json = JSON.stringify(data.record);
    // Merge remote data with local — prevents overwriting concurrent changes
    var localSnap = localStorage.getItem('lt4-snap');
    var merged = localSnap ? mergeSnapshot(localSnap, data.record) : data.record;
    var mergedJson = JSON.stringify(merged);
    if(applySnapshot(mergedJson)) {
      localStorage.setItem('lt4-snap', mergedJson);
      rebuildDerived();
      // Push merged result back to cloud so all devices converge
      if(cloudInitDone && CLOUD.binId) {
        setTimeout(cloudSaveNow, 500);
      }
    }
    cloudStatus = 'ok'; cloudLastSync = new Date(); renderCloudBadge();
    return true;
  } catch(e) {
    console.error('cloudLoad:', e);
    cloudStatus = 'error'; renderCloudBadge();
    return false;
  }
}

// ── Save to cloud (debounced 1s) ──
function cloudSave() {
  if(!cloudInitDone) return;
  if(_cloudSaveTimer) clearTimeout(_cloudSaveTimer);
  _cloudSaveTimer = setTimeout(cloudSaveNow, 1000);
}

async function cloudSaveNow() {
  if(!CLOUD.binId) return;
  cloudStatus = 'syncing'; renderCloudBadge();
  try {
    const snap = getSnapshot();
    const r = await fetch(JSONBIN_BASE + '/b/' + CLOUD.binId, {
      method: 'PUT',
      headers: {
        'Content-Type': 'application/json',
        'X-Master-Key': CLOUD.apiKey,
      },
      body: snap
    });
    if(!r.ok) throw new Error('Save failed: ' + r.status);
    cloudStatus = 'ok'; cloudLastSync = new Date(); renderCloudBadge();
    cloudSaveQueue = false;
  } catch(e) {
    console.error('cloudSave:', e);
    cloudStatus = 'error'; renderCloudBadge();
  }
}

// ── Sync loop: pull changes from others every 30s ──
function cloudSyncStart() {
  if(_cloudSyncTimer) clearInterval(_cloudSyncTimer);
  _cloudSyncTimer = setInterval(async () => {
    // Skip sync if: currently saving, or there's a pending local save
    if(cloudStatus === 'syncing') return;
    if(_cloudSaveTimer) return; // cloud save in progress, skip pull
    const loaded = await cloudLoad();
    if(loaded) render();
  }, CLOUD.syncInterval);
}
function cloudSyncNow() {
  cloudLoad().then(() => render());
}

// ── Persist config in localStorage ──
function _persistCloudConfig() {
  localStorage.setItem('lt4-cloud-cfg', JSON.stringify({
    enabled: CLOUD.enabled,
    apiKey: CLOUD.apiKey,
    binId: CLOUD.binId,
  }));
}

function loadCloudConfig() {
  // Apply preset embedded in the file (shared across all devices via OneDrive)
  if(CLOUD_PRESET.apiKey) {
    Object.assign(CLOUD, CLOUD_PRESET);
  }
  // Then apply any local overrides (e.g. if user configured on this device)
  try {
    const c = JSON.parse(localStorage.getItem('lt4-cloud-cfg') || 'null');
    if(c && c.apiKey) Object.assign(CLOUD, c);
  } catch(e) {}
}

async function saveCloudConfig() {
  const key = document.getElementById('cfg-apikey')?.value.trim() || '';
  if(!key) { alert('Ingresá la API Key.'); return; }
  CLOUD.apiKey = key;
  CLOUD.enabled = true;
  CLOUD.binId = '';
  _persistCloudConfig();
  closeCloudConfig();
  render();
  // Init cloud (finds/creates bin, loads data)
  await cloudInit();
  // Now embed config in HTML and offer download
  await _embedAndDownload(CLOUD.apiKey, CLOUD.binId);
}
function cloudDisconnect() {
  if(!confirm('¿Desconectar la sincronización en nube? Los datos locales se mantienen.')) return;
  CLOUD.enabled = false; CLOUD.apiKey = ''; CLOUD.binId = '';
  cloudInitDone = false; cloudStatus = 'offline';
  if(_cloudSyncTimer) clearInterval(_cloudSyncTimer);
  _persistCloudConfig();
  renderCloudBadge();
  render();
}

function safeBoot(){
  try{
    // Mark boot attempt
    localStorage.setItem(BOOT_KEY, Date.now());
    loadLS();
    localStorage.removeItem(BOOT_KEY); // boot succeeded
    render();
  }catch(e){
    console.error('Boot error:',e);
    const el=document.getElementById('app');
    if(el)el.innerHTML=renderRecovery(e.message||String(e));
  }
}

// If there's a stale boot timestamp (crash during previous load), show recovery immediately

const staleBootTs=localStorage.getItem(BOOT_KEY);
const now_ts=Date.now();
if(staleBootTs&&(now_ts-parseInt(staleBootTs))<30000){
  // Previous boot didn't complete within 30s — likely crashed
  localStorage.removeItem(BOOT_KEY);
  document.getElementById('app').innerHTML=renderRecovery('La sesión anterior se cerró inesperadamente. Esto puede deberse a un error en la importación de datos.');
} else {
  loadCloudConfig();
  // Check URL hash for cloud config (shared by device 1)
  try {
    var hash = location.hash;
    if(hash && hash.startsWith('#cloud=')) {
      var encoded = hash.slice(7);
      var cfg = JSON.parse(atob(decodeURIComponent(encoded)));
      if(cfg && cfg.apiKey) {
        Object.assign(CLOUD, cfg);
        _persistCloudConfig();
        // Clean the URL without reloading
        history.replaceState(null,'',location.pathname + location.search);
      }
    }
  } catch(e) {}
  safeBoot();
  if(CLOUD.enabled){ cloudInit(); }
}

async function _embedAndDownload(apiKey, binId) {
  if(!apiKey) return;
  try {
    // Read the main script content directly from the DOM script tag
    var scripts = Array.from(document.querySelectorAll('script:not([src])'));
    var mainScript = null;
    for(var i=0; i<scripts.length; i++){
      if(scripts[i].textContent.includes('CLOUD_PRESET')){ mainScript=scripts[i]; break; }
    }
    if(!mainScript){ alert('No se encontró la configuración del script.'); return; }

    var originalScript = mainScript.textContent;
    var newPreset = "const CLOUD_PRESET = { apiKey: '" + apiKey.replace(/\\/g,'\\\\').replace(/'/g,"\\'") + "', binId: '" + (binId||'').replace(/\\/g,'\\\\').replace(/'/g,"\\'") + "', enabled: true };";
    var updatedScript = originalScript.replace(/const CLOUD_PRESET = \{[^}]+\};/, newPreset);

    // Build minimal valid HTML
    var styleTag = document.querySelector('style');
    var cssContent = styleTag ? styleTag.innerHTML : '';
    var xlsxSrc = 'https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js';

    var html = '<!DOCTYPE html>\n<html lang="es">\n<head>\n'
      + '<meta charset="UTF-8">\n<meta name="viewport" content="width=device-width, initial-scale=1.0">\n'
      + '<title>LabTrack</title>\n'
      + '<script src="' + xlsxSrc + '"><' + '/script>\n'
      + '<style>\n' + cssContent + '\n</style>\n'
      + '</head>\n<body>\n'
      + '<div id="app" style="min-height:100vh">Cargando...</div>\n'
      + '<script>\n' + updatedScript + '\n<' + '/script>\n'
      + '</body>\n</html>';

    var blob = new Blob([html], {type: 'text/html;charset=utf-8'});
    var a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = 'labtrack.html';
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    setTimeout(function(){ URL.revokeObjectURL(a.href); }, 2000);
    alert('✓ labtrack.html descargado.\n\nSubilo a GitHub reemplazando el anterior.\nTodos los dispositivos sincronizarán automáticamente al abrir esa URL.');
  } catch(e) {
    console.error('embed error:', e);
    alert('Error al descargar: ' + e.message);
  }
  document.addEventListener('click', function(){resetActivityTimer();}, true);
  document.addEventListener('keydown', function(){resetActivityTimer();}, true);
}
