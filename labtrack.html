<style>
@import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@300;400;500;600&family=IBM+Plex+Mono:wght@400;500&display=swap');
:root{--bg:#f5f4f0;--bg2:#eceae4;--surface:#fff;--border:rgba(0,0,0,.10);--border2:rgba(0,0,0,.18);--text:#1a1916;--text2:#6b6860;--text3:#9c9a94;--blue:#1a4f8a;--blue-bg:#e8eff8;--blue-text:#1a4f8a;--green:#1e5c35;--green-bg:#e4f2ea;--green-text:#1e5c35;--amber:#7a4e0a;--amber-bg:#fdf0d8;--amber-text:#7a4e0a;--red:#8a2020;--red-bg:#fce8e8;--red-text:#8a2020;--orange:#8a3c10;--orange-bg:#fdeee4;--orange-text:#8a3c10;--radius:6px;--radius-lg:10px;--font:'IBM Plex Sans',sans-serif;--mono:'IBM Plex Mono',monospace}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:var(--font);background:var(--bg);color:var(--text);font-size:14px;line-height:1.5}
.login-wrap{min-height:100vh;min-height:100dvh;display:flex;align-items:center;justify-content:center;padding:16px;box-sizing:border-box}
.login-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);padding:32px 28px;width:100%;max-width:380px;box-shadow:0 2px 16px rgba(0,0,0,.07);box-sizing:border-box}
.login-logo{display:flex;align-items:center;gap:10px;margin-bottom:28px}
.login-logo .icon{width:36px;height:36px;background:var(--blue);border-radius:8px;display:flex;align-items:center;justify-content:center}
.login-logo .name{font-size:18px;font-weight:600;letter-spacing:-.02em}
.login-logo .name span{color:var(--blue)}
.user-list{display:flex;flex-direction:column;gap:5px;margin-bottom:18px}
.user-btn{display:flex;align-items:center;gap:10px;padding:10px 12px;background:var(--bg);border:1px solid var(--border);border-radius:var(--radius);cursor:pointer;transition:all .12s}
.user-btn:hover,.user-btn.selected{border-color:var(--blue);background:var(--blue-bg)}
.user-btn.selected{border-width:2px}
.pwd-hint{font-size:11px;color:var(--text3);background:var(--bg2);border-radius:var(--radius);padding:8px 10px;margin-top:12px;line-height:1.6}

.av{width:24px;height:24px;border-radius:50%;display:inline-flex;align-items:center;justify-content:center;font-size:9px;font-weight:700;flex-shrink:0;font-family:var(--mono);text-transform:uppercase}
.av-lg{width:32px;height:32px;font-size:11px}
.av-xl{width:38px;height:38px;font-size:12px}
.av0,.av1{background:#ddeaf8;color:#1a4f8a}
.av2{background:#d4ede0;color:#1e5c35}
.av3{background:#faecd3;color:#7a4e0a}
.av4{background:#fadddd;color:#8a2020}
.av5{background:#e8e3f8;color:#4a35a0}
.av6{background:#fde8d8;color:#8a3c10}

.frow{margin-bottom:12px}

.nav-item:hover{background:var(--bg);color:var(--text)}

.nav-item .ni{font-size:14px;width:16px;text-align:center}
.nbadge{font-size:10px;padding:1px 5px;border-radius:10px;margin-left:auto;font-weight:600}

.main{flex:1;display:flex;flex-direction:column;overflow:hidden;min-width:0}

.scard{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);padding:14px;-webkit-tap-highlight-color:transparent;user-select:none}

.sv.ok{color:var(--green)}.sv.w{color:var(--amber)}.sv.d{color:var(--red)}
.sec{font-size:11px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:.06em;margin-bottom:8px}

.thead{display:grid;padding:7px 12px;background:var(--bg2);border-bottom:1px solid var(--border);font-size:11px;font-weight:600;color:var(--text2);text-transform:uppercase;letter-spacing:.04em}
.trow{display:grid;padding:9px 12px;border-bottom:1px solid var(--border);font-size:13px;align-items:center;cursor:pointer;transition:background .1s}
.trow:hover{background:var(--bg)}

.pill{font-size:10px;padding:2px 8px;border-radius:20px;font-weight:600;display:inline-block;white-space:nowrap}
.pill.pend{background:var(--amber-bg);color:var(--amber-text)}
.pill.prog{background:var(--blue-bg);color:var(--blue-text)}
.pill.done{background:var(--green-bg);color:var(--green-text)}.pill.scheduled{background:var(--blue-bg);color:var(--blue-text)}
.pill.late{background:var(--red-bg);color:var(--red-text)}
.pill.nor{background:var(--bg2);color:var(--text2)}
.pill.hi{background:var(--orange-bg);color:var(--orange-text)}
.pill.urg{background:var(--red-bg);color:var(--red-text)}
.week-grid{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);overflow:hidden;margin-bottom:16px}
.whead{display:grid;border-bottom:1px solid var(--border);background:var(--bg2)}
.whead>div,.wcell-name,.wcell{padding:7px 8px;border-right:1px solid var(--border);font-size:11px;font-weight:600;color:var(--text2);text-transform:uppercase;letter-spacing:.04em}

.wcell-name{font-weight:500;color:var(--text);background:var(--bg);text-transform:none;letter-spacing:0;display:flex;align-items:flex-start;gap:6px;padding-top:8px;min-height:44px;font-size:12px}

.chip{padding:3px 5px;border-radius:4px;font-size:10px;line-height:1.3;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;font-weight:500}
.c1{background:#ddeaf8;color:#1a4f8a}.c2{background:#d4ede0;color:#1e5c35}.c3{background:#faecd3;color:#7a4e0a}.c4{background:#fadddd;color:#8a2020}.c5{background:#e8e3f8;color:#4a35a0}.c6{background:#fde8d8;color:#8a3c10}.c7{background:#d8f0f0;color:#1a6060}.c8{background:#f0e8f8;color:#6a35a0}

.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:0 14px}

.ana-check{display:flex;align-items:center;gap:7px;padding:6px 9px;border:1px solid var(--border2);border-radius:var(--radius);cursor:pointer;font-size:12px;transition:all .1s}

.filter-row{display:flex;gap:8px;margin-bottom:12px;align-items:center;flex-wrap:wrap}

.av-stack{display:flex;gap:2px;flex-wrap:wrap}

.paste-area{width:100%;height:88px;font-size:11px;font-family:var(--mono);padding:8px;border:1px solid var(--border2);border-radius:var(--radius);background:var(--surface);color:var(--text);resize:vertical}
.preview-tbl{width:100%;font-size:11px;border-collapse:collapse;margin-top:8px}
.preview-tbl th{background:var(--bg2);padding:5px 7px;text-align:left;border:1px solid var(--border);font-weight:600;color:var(--text2);text-transform:uppercase;letter-spacing:.04em;font-size:10px}

.today-banner{background:var(--blue);border-radius:var(--radius-lg);padding:14px 18px;margin-bottom:16px;display:flex;align-items:center;gap:16px}

.new-user-form{background:var(--bg);border-radius:var(--radius);padding:14px;margin-top:12px;display:grid;grid-template-columns:1fr 1fr;gap:8px}
.new-user-form .form-full{grid-column:1/-1}

  .time-pick{display:inline-flex;align-items:center;gap:2px;background:var(--surface);border:1px solid var(--border2);border-radius:var(--radius);padding:2px 4px;}
  .time-pick select{border:none;background:transparent;color:var(--text);font-family:var(--mono);font-size:13px;font-weight:600;padding:2px 2px;cursor:pointer;-webkit-appearance:none;appearance:none;text-align:center;width:30px;}

  .pill.reviewed{background:#e4f2ea;color:#1e5c35}

<body>
<div id="app" style="min-height:100vh">Cargando...</div>
<script>
// ── AV COLORS (cycling) ──
const AV_CLASSES=['av1','av2','av3','av4','av5','av6','av7','av8'];
const CHIP_CLASSES=['c1','c2','c3','c4','c5','c6','c7','c8'];

function initials(name){
  const parts=name.trim().split(/\s+/).filter(Boolean);
  if(parts.length===0)return'??';
  if(parts.length===1)return parts[0].slice(0,2).toUpperCase();
  return(parts[0][0]+parts[parts.length-1][0]).toUpperCase();
}
function avClass(idx){return AV_CLASSES[idx%AV_CLASSES.length];}
function chipClass(idx){return CHIP_CLASSES[idx%CHIP_CLASSES.length];}

// ── STATE ──
let USERS=[];
let passwords={};
let tasks=[];
let nextId=11;
let nextUid=100;
let nextNotifId=1;
let nextAbsId=1;
let nextMgmtId=1;
let currentUser=null,currentView='dashboard';
let showModal=false,editingTask=null;
let showNotifPanel=false;
let mgmtView='list';
let informeFilterStatus='';
let auditTrail=[];
let auditFilterUser='';
let auditFilterAction='';
let auditFilterEntity='';
let mgmtListPeriod='week';
let showImportModal=false,showChangePwd=false;
let tasksView='lote';
let filterAnalyst='',filterStatus='',filterSearch='';
let loginStep=1,selectedLoginUser=null,loginError='';
let modalTab='paste',pastePreview=[];
let replanNotifs=[];
let showReplanModal=false,replanTaskId=null;
let absences={};
let workdayConfig={weekdays:{1:true,2:true,3:true,4:true,5:true,0:false,6:false},extra:[],off:[]};
let mgmtTasks=[];
let editingMgmt=null;
let showMgmtModal=false;
let showExtraModal=false;
let showTimeLogModal=false;
let timeLogTaskId=null;
let showMgmtOccModal=false;
let mgmtOccTaskId=null;
let mgmtOccDate=null;
let calMonthAnalyst=null;
let mgmtMonthAnalyst=null;
let weekOffset=0;
let monthOffset=0;
let calView='week';
let dashFilter='';





function setMgmtMonthAnalyst(id){mgmtMonthAnalyst=id||null;render();}
let mySchedView='week';
let cronogramaView='week'; // 'week'|'month' // 'week'|'month' for analyst schedule // selected analyst in month view // 'list'|'calendar'
let mgmtCalView='week';
let schedView='week'; // 'week'|'month' for schedule tab
let schedSelectedAnalyst=null;
let mgmtCategories=[
  {id:'revision',label:'Revisión',color:'#e8eff8',text:'#1a4f8a'},
  {id:'toc',label:'TOC',color:'#e4f2ea',text:'#1e5c35'},
  {id:'compras',label:'Compras',color:'#faecd3',text:'#7a4e0a'},
  {id:'gestion',label:'Gestión',color:'#e8e3f8',text:'#4a35a0'},
  {id:'limpieza',label:'Limpieza',color:'#fdeee4',text:'#8a3c10'},
  {id:'mantenimiento',label:'Mantenimiento',color:'#fce8e8',text:'#8a2020'},
];
// Analyst schedules: {analystId: {startTime:'08:00', endTime:'16:00', breakMinutes:60}}
let analystSchedules={};
// Schedule change requests: [{id, analystId, type:'schedule', proposed, reason, status, ts}]
let scheduleRequests=[];
let nextSchedReqId=1;
let showSchedReqModal=false;
let analystEstimHours={};
let multiAssigns=[]; // [{_key,analyst,date,estH}] — permite mismo analista varias veces
let showSchedModal=false;
let schedModalAnalyst=null;
let schedModalDate=null;
// Editable absence types: deep copy so supervisor can rename
let absenceTypesDef={
  holiday:{label:'Feriado',color:'#faecd3',text:'#7a4e0a'},
  vacation:{label:'Vacaciones',color:'#d4ede0',text:'#1e5c35'},
  medical:{label:'Lic. médica',color:'#fce8e8',text:'#8a2020'},
  personal:{label:'Lic. personal',color:'#e8e3f8',text:'#4a35a0'},
  absence:{label:'Falta',color:'#fdeee4',text:'#8a3c10'},
  training:{label:'Capacitación',color:'#e8eff8',text:'#1a4f8a'},
};

// Derived (rebuilt after any USERS change)
let ANALYSTS=[];
let uMap={};
function isReviewerRole(){return currentUser&&currentUser.role==='reviewer';}
function isSupRole(){return currentUser&&currentUser.role==='supervisor';}

function rebuildDerived(){
  ANALYSTS=USERS.filter(u=>u.role==='analyst').sort((a,b)=>a.name.localeCompare(b.name,'es'));
  uMap={};
  USERS.forEach((u,i)=>{
    u.av=avClass(i);
    u.avInit=initials(u.name);
    u.chip=chipClass(i);
    uMap[u.id]=u;
  });
}

// ── STORAGE ──
const SK={tasks:'lt4-tasks',nid:'lt4-nid',pwds:'lt4-pwds',users:'lt4-users',uid:'lt4-uid'};
function getSnapshot(){
  return JSON.stringify({
    savedAt:Date.now(),
    v:6,
    tasks,nextId,nextUid,nextNotifId,nextAbsId,nextMgmtId,
    users:USERS.map(u=>({id:u.id,name:u.name,role:u.role})),
    passwords,replanNotifs,absences,workdayConfig,mgmtTasks,mgmtCategories,analystSchedules,scheduleRequests,nextSchedReqId,absenceTypesDef
  });
}
function applySnapshot(json){
  try{
    const d=JSON.parse(json);

// isWorkday: is this date a working day for ANY analyst?
function isWorkday(dateStr){
  if(workdayConfig.off.some(o=>(o.date||o)===dateStr))return false;
  if(workdayConfig.extra.some(e=>(e.date||e)===dateStr))return true;
  const day=new Date(dateStr+'T12:00:00').getDay();
  return workdayConfig.weekdays[day]===true;
}
// isWorkdayFor: is this date a working day for a specific analyst?
function isWorkdayFor(analystId, dateStr){
  if(workdayConfig.off.some(o=>(o.date||o)===dateStr))return false;
  // Check if there's a per-analyst extra for this date
  const extra=workdayConfig.extra.find(e=>(e.date||e)===dateStr);
  if(extra){
    // Extra exists — analyst works if they're in the list (or list is 'all')
    const analysts=extra.analysts||[];
    return analysts==='all'||analysts.includes(analystId);
  }
  const day=new Date(dateStr+'T12:00:00').getDay();
  return workdayConfig.weekdays[day]===true;
}

function checkAbsenceConflicts(){
  const conflicts=[];

  // ── Analysis task conflicts ──
  tasks.forEach(t=>{
    (t.assignments||[]).forEach(a=>{
      if(!a.date)return;
      const absent=isAbsent(a.analyst,a.date);
      const nonWork=!isWorkdayFor(a.analyst,a.date);
      if(absent||nonWork){
        const absEntry=getAbsenceOnDate(a.analyst,a.date);
        const absTyp=absent?(getABSTypes()[absEntry?.type]||{label:'Ausencia'}):null;
        conflicts.push({
          type:'analysis',
          taskId:t.id,analystId:a.analyst,date:a.date,
          task:t.producto+' '+t.lote,
          analyst:getU(a.analyst).name,
          absType:absEntry?.type||null,
          absLabel:absent?(absTyp?.label||'Ausencia'):null,
          nonWorkday:nonWork&&!absent,
          reason:absent?'Ausencia: '+(absTyp?.label||'Ausencia'):'Día no laborable'
        });
      }
    });
  });

  // ── Management task conflicts ──
  const today_=today();
  const checkFrom=new Date(today_+'T00:00:00');
  checkFrom.setDate(checkFrom.getDate()-7); // check from last week
  const checkTo=new Date(today_+'T00:00:00');
  checkTo.setMonth(checkTo.getMonth()+3); // check 3 months ahead
  const fromStr=checkFrom.toISOString().slice(0,10);
  const toStr=checkTo.toISOString().slice(0,10);

  mgmtTasks.forEach(mt=>{
    const occs=expandMgmt(mt,fromStr,toStr);
    occs.forEach(occ=>{
      // Use occ.analysts (already has exceptions applied) not mt.analysts
      (occ.analysts||[]).forEach(analystId=>{
        const d=occ.occDate;
        const absent=isAbsent(analystId,d);
        const nonWork=!isWorkdayFor(analystId,d);
        if(absent||nonWork){
          const absEntry=getAbsenceOnDate(analystId,d);
          const absTyp=absent?(getABSTypes()[absEntry?.type]||{label:'Ausencia'}):null;
          const cat=getMgmtCat(mt.category);
          conflicts.push({
            type:'mgmt',
            mgmtId:mt.id,analystId,date:d,
            task:cat.label+(occ.startTime?' '+occ.startTime:''),
            analyst:getU(analystId).name,
            absType:absEntry?.type||null,
            absLabel:absent?(absTyp?.label||'Ausencia'):null,
            nonWorkday:nonWork&&!absent,
            reason:absent?'Ausencia: '+(absTyp?.label||'Ausencia'):'Día no laborable',
            catColor:cat.color,catText:cat.text
          });
        }
      });
    });
  });

  // Sort by date
  conflicts.sort((a,b)=>a.date.localeCompare(b.date));
  return conflicts;
}

      <input type="text" id="sm-note" value="${escH(s.note||s.reason||'')}" placeholder="${isDay?'Ej: Turno especial, horas extra por urgencia...':'Ej: Cambio de horario permanente'}">

      <button class="btn pri" onclick="saveSchedModal()">${isSup?'Guardar':'Enviar solicitud'}</button>

}
// ── Time normalization: round to nearest 15 min ──
function snapTimeInput(el){
  if(!el||!el.value)return el?.value||'';
  const snapped=roundTo15(el.value);
  el.value=snapped;
  return snapped;
}

function saveSchedModal(){
  const isSup=currentUser.role==='supervisor';
  const start=getTimeVal('sm-start')||'08:00';
  const end=getTimeVal('sm-end')||'16:00';
  const brk=parseInt(document.getElementById('sm-brk')?.value)||60;
  const note=document.getElementById('sm-note')?.value.trim()||'';
  const type=document.getElementById('sm-type')?.value||'change';
  const proposed={startTime:start,endTime:end,breakMinutes:brk,type,note};
  if(isSup){
    if(schedModalDate){
      setAnalystDayOverride(schedModalAnalyst,schedModalDate,{...proposed,status:'assigned'});
    } else {
      setAnalystDefault(schedModalAnalyst,proposed);
    }
    showSchedModal=false;saveLS();render();
  } else {
    if(!note&&!isSup){alert('Indicá el motivo del cambio.');return;}
    scheduleRequests.push({
      id:nextSchedReqId++,analystId:schedModalAnalyst,
      dateStr:schedModalDate||null,status:'pending',
      proposed,reason:note,ts:Date.now(),requestedBy:currentUser.id
    });
    showSchedModal=false;saveLS();render();
    // No alert needed — bell will show it
  }
}
function renderSchedulesTab(){
  try{
    const isSup=currentUser.role==='supervisor';
    const rows=isSup
      ?USERS.filter(function(u){return u.role==='analyst'||u.role==='reviewer';}).sort(function(a,b){return a.name.localeCompare(b.name,'es');})
      :[USERS.find(function(a){return a.id===currentUser.id;})].filter(Boolean);
    if(!rows||rows.length===0)return'<div class="empty">No hay analistas configurados.</div>';
    const pendTotal=scheduleRequests.filter(r=>r.status==='pending').length;
    var _wA=(!schedView||schedView==='week');
    var _mA=(schedView==='month');
    var viewToggle='<div style="display:flex;gap:4px;background:var(--bg2);border-radius:var(--radius);padding:3px;width:fit-content;margin-bottom:14px">'
      +'<button class="btn sm" onclick="schedView=\'week\';render()" style="'+(_wA?'background:var(--surface);font-weight:600;box-shadow:0 1px 3px rgba(0,0,0,.1)':'border:none;background:transparent')+'">'+'Semana'+'</button>'
      +'<button class="btn sm" onclick="schedView=\'month\';render()" style="'+(_mA?'background:var(--surface);font-weight:600;box-shadow:0 1px 3px rgba(0,0,0,.1)':'border:none;background:transparent')+'">'+'Mes'+'</button>'
      +'</div>';
    var _sv=schedView||'week';
    return viewToggle+(_sv==='week'?renderSchedulesWeek(isSup,rows,pendTotal):renderSchedulesMonth(isSup,rows));
  }catch(e){
    console.error('renderSchedulesTab error:',e);
    return'<div style="background:var(--red-bg);border:1px solid var(--red);border-radius:var(--radius);padding:14px;color:var(--red-text);font-size:13px">'
      +'<b>Error al cargar Horarios:</b><br><code style="font-size:11px">'+escH(e&&e.message||String(e))+'</code>'
      +'</div>';
  }
}

function renderSchedulesWeek(isSup,rows,pendTotal){
  const wd=getWeekDates(weekOffset);
  const todayStr=today();

  // Pre-compute mgmt occurrences for the week (perf)
  const _dayMgmtCache={};
  wd.forEach(d=>{_dayMgmtCache[d]=mgmtTasks.flatMap(mt=>expandMgmt(mt,d,d));});
  function buildDayInfo(analystId,d){
    const def=getAnalystScheduleDefault(analystId);
    const ov=analystSchedules[analystId]?.overrides?.[d];
    const hasOv=ov&&(ov.status==='approved'||ov.status==='assigned');
    const s=hasOv?ov:def;
    const h=calcHours(s);
    const absent=getAbsenceOnDate(analystId,d);
    const isWork=isWorkdayFor(analystId,d);
    const pendReq=scheduleRequests.find(r=>r.analystId===analystId&&r.dateStr===d&&r.status==='pending');
    const myTasks=tasks.filter(t=>(t.assignments||[]).some(x=>x.analyst===analystId&&x.date===d));
    const mgmtOccs=(_dayMgmtCache[d]||[]).filter(o=>(o.analysts||[]).includes(analystId));
    const workH=myTasks.reduce((a,t)=>a+getAssignHours(t,analystId,d),0)+mgmtOccs.reduce((a,o)=>a+(o.estimatedHours||0),0);
    const extraH=Math.max(0,workH-h);
    return{s,h,hasOv,ov,absent,isWork,pendReq,myTasks,mgmtOccs,workH,extraH};
  }

  return`
  <div style="display:flex;align-items:center;gap:8px;margin-bottom:14px;flex-wrap:wrap">
    <button class="btn" onclick="weekOffset--;render()">← Anterior</button>
    <span style="font-size:14px;font-weight:600;font-family:var(--mono)">${fmtD(wd[0])} – ${fmtD(wd[6])}</span>

    <button class="btn sm" onclick="weekOffset=0;render()">Hoy</button>
    ${isSup&&pendTotal>0?`<span style="margin-left:auto;font-size:11px;background:var(--amber-bg);color:var(--amber-text);padding:4px 12px;border-radius:20px;font-weight:600;cursor:pointer" onclick="showNotifPanel=true;render()">⏳ ${pendTotal} solicitud${pendTotal>1?'es':''} pendiente${pendTotal>1?'s':''}</span>`:''}
  </div>

  ${rows.map(a=>{
    const def=getAnalystScheduleDefault(a.id);
    const defH=calcHours(def);
    const pendA=scheduleRequests.filter(r=>r.analystId===a.id&&r.status==='pending').length;
    const cols=wd.map(d=>{
      const {s,h,hasOv,ov,absent,isWork,pendReq,myTasks,mgmtOccs,workH,extraH}=buildDayInfo(a.id,d);
      const absTyp=absent?getABSTypes()[absent.type]||{color:'#fdeee4',text:'#8a3c10',label:'Ausente'}:null;
      const schedTyp=hasOv?SCHED_TYPES.find(t=>t.id===ov.type)||null:null;
      const dt2=new Date(d+'T12:00:00');
      const isToday=d===todayStr;
      const isWeekend=dt2.getDay()===0||dt2.getDay()===6;
      const dayN=['Dom','Lun','Mar','Mié','Jue','Vie','Sáb'][dt2.getDay()];
      let cellBg=absent?absTyp.color+'55':hasOv?(schedTyp&&schedTyp.color?schedTyp.color+'88':'#e8eff8')||'#e8eff8':'var(--surface)';
      if(!absent&&!hasOv&&isToday)cellBg='var(--blue-bg)';
      if(!absent&&!hasOv&&!isWork)cellBg='var(--bg2)';
      const clickFn=isSup?`openDaySchedule('${a.id}','${d}')`:currentUser.id===a.id?`requestScheduleChange('${a.id}','${d}')`:null;
      return`<div style="border-right:1px solid var(--border);padding:8px 10px;background:${cellBg};min-height:150px;cursor:${clickFn?'pointer':'default'}" onclick="${clickFn||''}">
        <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:5px">
          <div>
            <div style="font-size:9px;font-weight:700;text-transform:uppercase;color:${isToday?'var(--blue)':isWeekend?'var(--amber)':'var(--text3)'}">${dayN}</div>
            <div style="font-size:20px;font-weight:800;font-family:var(--mono);line-height:1;color:${isToday?'var(--blue)':'var(--text)'}">${dt2.getDate()}</div>
          </div>
          <div style="text-align:right">
            ${absent?`<span style="font-size:8px;font-weight:700;padding:1px 5px;border-radius:5px;background:${absTyp.color};color:${absTyp.text};display:block;margin-bottom:2px">${absTyp.label}</span>`:''}
            ${!absent&&!isWork?`<span style="font-size:8px;color:var(--text3)">No lab.</span>`:''}
            ${hasOv&&!absent?`<span style="font-size:8px;font-weight:700;padding:1px 5px;border-radius:5px;background:${schedTyp?.color||'#e8eff8'};color:${schedTyp?.text||'#1a4f8a'};display:block">${schedTyp?.label||'Excep.'}</span>`:''}
          </div>
        </div>
        ${!absent&&isWork?`

          <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:3px">
            <span style="font-size:8px;color:var(--text3);font-weight:600">HORARIO</span>
            <span style="font-size:11px;font-weight:700;font-family:var(--mono);color:${hasOv?'var(--blue)':'var(--text)'}">${h.toFixed(1)}h</span>
          </div>
          <div style="display:flex;justify-content:space-between;align-items:center">
            <div style="text-align:center"><div style="font-size:8px;color:var(--green)">Entrada</div><div style="font-family:var(--mono);font-weight:700;font-size:12px">${s.startTime}</div></div>

            <div style="text-align:center"><div style="font-size:8px;color:var(--red)">Salida</div><div style="font-family:var(--mono);font-weight:700;font-size:12px">${s.endTime}</div></div>

        ${myTasks.slice(0,2).map(t=>`<div style="font-size:9px;padding:1px 4px;border-radius:2px;background:#d4ede0;border-left:2px solid #1e5c35;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;font-weight:600;color:#1e5c35;margin-bottom:1px">${escH(t.producto.split(' ')[0])}</div>`).join('')}
        ${mgmtOccs.slice(0,1).map(o=>{const c=getMgmtCat(o.category);return`<div style="font-size:9px;padding:1px 4px;border-radius:2px;background:${c.color};border-left:2px solid ${c.text};overflow:hidden;text-overflow:ellipsis;white-space:nowrap;font-weight:600;color:${c.text};margin-bottom:1px">${escH(c.label)}</div>`;}).join('')}
        `:''}
        ${!isWork&&!absent?`<div style="font-size:10px;color:var(--text3);text-align:center;padding:8px 0">—</div>`:''}
        ${absent?`<div style="font-size:9px;color:${absTyp.text};text-align:center;padding:8px 0;font-weight:500">${absent.note||absTyp.label}</div>`:''}

        <div>
          <div style="font-weight:600;font-size:14px">${escH(a.name)}</div>

        </div>
        <div style="margin-left:auto;display:flex;gap:6px;align-items:center">
          ${pendA>0?`<span style="font-size:10px;background:var(--amber-bg);color:var(--amber-text);padding:2px 8px;border-radius:10px;font-weight:600">⏳ ${pendA}</span>`:''}

  ${isSup&&scheduleRequests.filter(r=>r.status==='pending').length>0?`

    ${scheduleRequests.filter(r=>r.status==='pending').sort((a,b)=>b.ts-a.ts).map(req=>{
      const u=getU(req.analystId);const h=calcHours(req.proposed);

function renderSchedulesMonth(isSup,rows){

  const selA=schedSelectedAnalyst||(rows[0]?.id||null);
  if(!selA)return'<div class="empty">Sin analistas</div>';
  const analyst=rows.find(a=>a.id===selA)||rows[0];
  if(!analyst)return'<div class="empty">Sin analistas</div>';
  const def=getAnalystScheduleDefault(analyst.id);
  const defH=calcHours(def);
  // Build calendar cells
  let cells=[];
  for(let i=0;i<total;i++){

    cells.push(dn<1||dn>daysInMonth?null:year+'-'+String(month+1).padStart(2,'0')+'-'+String(dn).padStart(2,'0'));

function saveAbsType(key){
  const input=document.getElementById('abstype-'+key);
  const val=input?.value.trim();
  if(!val){showAbsTypeMsg('El nombre no puede estar vacío.','var(--red)');return;}
  if(absenceTypesDef[key])absenceTypesDef[key].label=val;
  saveLS();render();
  showAbsTypeMsg('Tipo actualizado: "'+val+'"','var(--green)');
}
function cycleAbsColor(key){
  const cur=absenceTypesDef[key];if(!cur)return;
  const curIdx=ABS_COLOR_PALETTES.findIndex(p=>p.color===cur.color);
  const next=ABS_COLOR_PALETTES[(curIdx+1)%ABS_COLOR_PALETTES.length];
  cur.color=next.color;cur.text=next.text;
  saveLS();render();
}
function deleteAbsType(key){
  const used=Object.values(absences).flat().filter(a=>a.type===key).length;
  if(used>0){alert('No se puede eliminar: hay '+used+' ausencia(s) con este tipo. Primero editá o eliminá esas ausencias.');return;}
  if(!confirm('¿Eliminar el tipo "'+absenceTypesDef[key]?.label+'"?'))return;
  delete absenceTypesDef[key];
  saveLS();render();
}
function addAbsType(){
  const label=(document.getElementById('newabstype-label')?.value||'').trim();
  if(!label){showNewAbsTypeMsg('Ingresá un nombre.','var(--red)');return;}
  const pal=ABS_COLOR_PALETTES[selectedAbsPalette]||ABS_COLOR_PALETTES[0];
  // Generate a safe key from label
  const key='custom_'+label.toLowerCase().replace(/[^a-z0-9]/g,'_').slice(0,20)+'_'+Date.now().toString(36).slice(-4);
  if(absenceTypesDef[key]){showNewAbsTypeMsg('Ya existe un tipo con ese nombre.','var(--red)');return;}
  absenceTypesDef[key]={label,color:pal.color,text:pal.text};
  saveLS();
  const inp=document.getElementById('newabstype-label');
  if(inp)inp.value='';
  showNewAbsTypeMsg('Tipo "'+label+'" creado.','var(--green)');
  render();
}

function handleWorkdayClick(dateStr){
  const extra=getExtraEntry(dateStr);
  const off=getOffEntry(dateStr);
  if(off){removeWorkdayOverride(dateStr);render();return;}
  if(extra){
    // Re-open the extra workday editor for this date
    extraModalDate=dateStr;showExtraModal=true;render();return;
  }
  const day=new Date(dateStr+'T12:00:00').getDay();
  const defaultWork=workdayConfig.weekdays[day]===true;
  if(defaultWork){
    // Normal workday — mark as off (add note)
    const note=prompt('Motivo (opcional, ej: Feriado nacional):','');
    if(note===null)return; // cancelled
    saveOffDay(dateStr,note);render();
  } else {
    // Non-workday — open modal to select which analysts work
    extraModalDate=dateStr;showExtraModal=true;render();
  }
}

  if(!mt.exceptions)mt.exceptions=[];
  var exc=mt.exceptions.find(function(e){return e.date===dateStr;});
  if(exc){exc.analysts=[];}
  else mt.exceptions.push({date:dateStr,analysts:[],note:'Omitido desde conflictos'});

}

function quickRemoveAnalystFromMgmtOcc(mgmtId, dateStr, analystId){
  var mt=mgmtTasks.find(function(m){return m.id==mgmtId;});
  if(!mt)return;
  if(!mt.exceptions)mt.exceptions=[];
  var exc=mt.exceptions.find(function(e){return e.date===dateStr;});

  else mt.exceptions.push({date:dateStr,analysts:baseAnalysts,note:'Modificado desde conflictos'});

// ── MANAGEMENT TASKS ──
const MGMT_CATEGORIES=['Revisión','TOC','Compras','Gestión','Limpieza','Mantenimiento','Otro'];
const MGMT_FREQS=[
  {id:'once',label:'Una vez'},
  {id:'daily',label:'Diariamente'},
  {id:'weekly',label:'Semanal'},
  {id:'biweekly',label:'Quincenal'},
  {id:'monthly',label:'Mensual'},
  {id:'semestral',label:'Semestral'},
];
const WORKDAY_HOURS=8;

function expandMgmt(mt, fromDate, toDate){
  const occ=[];
  const from=new Date(fromDate+'T00:00:00');
  const to=new Date(toDate+'T23:59:59');
  const start=new Date((mt.startDate||fromDate)+'T00:00:00');
  function add(d){
    const ds=d.toISOString().slice(0,10);
    if(d<from||d>to)return;
    if(mt.frequency==='daily'&&!isWorkday(ds))return;
    const exc=(mt.exceptions||[]).find(e=>e.date===ds);
    if(exc&&exc.analysts&&exc.analysts.length===0)return;
    const effAnalysts=exc?exc.analysts:(mt.analysts||[]);
    occ.push({...mt,occDate:ds,analysts:effAnalysts,_hasExc:!!exc});
  }
  if(mt.frequency==='once'){add(start);return occ;}
  let cur=new Date(start);
  const endD=mt.endDate?new Date(mt.endDate+'T23:59:59'):to;
  const cap=to<endD?to:endD;
  let safety=0;
  while(cur<=cap&&safety<1500){
    safety++;
    add(new Date(cur));
    if(mt.frequency==='daily')cur.setDate(cur.getDate()+1);
    else if(mt.frequency==='weekly')cur.setDate(cur.getDate()+7);
    else if(mt.frequency==='biweekly')cur.setDate(cur.getDate()+14);
    else if(mt.frequency==='monthly')cur.setMonth(cur.getMonth()+1);
    else if(mt.frequency==='semestral')cur.setMonth(cur.getMonth()+6);
    else break;
  }
  return occ;
}

      });

        html+='<div style="padding:2px 4px;border-radius:3px;margin-bottom:2px;background:#e4f2ea;border-left:3px solid #1e5c35;font-size:10px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">'
          +'<span style="font-weight:600;color:#1e5c35">'+escH(t.producto.split(' ')[0])+'</span>'+(t.estimatedHours?' <span style="font-size:9px;color:#1e5c35">'+t.estimatedHours+'h</span>':'')+'</div>';

        +'<div style="text-align:center"><div style="font-size:8px;color:var(--red)">Salida</div><div style="font-family:var(--mono);font-weight:700;font-size:14px">'+s.endTime+'</div></div>'

          +'<span style="font-family:var(--mono);font-weight:700;color:'+(workH>totalAvail?'var(--red)':workH>=totalAvail*.8?'var(--amber)':'var(--green)')+'">'+workH.toFixed(1)+'/'+totalAvail.toFixed(1)+'h</span>'
          +'</div>'
          +'<div style="background:rgba(0,0,0,.08);border-radius:3px;height:6px;overflow:hidden">'

          +(workH>totalAvail?'<div style="font-size:9px;font-weight:700;color:var(--red);margin-top:2px">\u26a0 +'+(workH-totalAvail).toFixed(1)+'h extra</div>':'')
          +'</div>';

      // Analysis tasks

          +'<div style="display:flex;justify-content:space-between;align-items:center">'
          +'<div style="font-size:10px;font-weight:600;color:#1e5c35;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">'+escH(t.producto.split(' ')[0])+'</div>'

          +'<button class="btn sm" style="flex:1;font-size:10px;padding:3px;color:var(--green);border-color:var(--green)" onclick="requestOvertime(\''+d+'\')">&#x2605; Extra</button>'

  return nav+grid;

function renderCronogramaMonth(a, def){
  const {year,month,firstDay,daysInMonth,total,label}=getMonthDates(monthOffset);
  const todayStr=today();
  const pad=function(n){return String(n).padStart(2,'0');};
  const fromDate=year+'-'+pad(month+1)+'-01';
  const toDate=year+'-'+pad(month+1)+'-'+pad(daysInMonth);
  const mgmtOccsByDay={};
  mgmtTasks.forEach(function(mt){
    expandMgmt(mt,fromDate,toDate).forEach(function(o){
      if(!(o.analysts||[]).includes(currentUser.id))return;
      if(!mgmtOccsByDay[o.occDate])mgmtOccsByDay[o.occDate]=[];
      mgmtOccsByDay[o.occDate].push(o);
    });
  });
  const DAY_HDR=['Lun','Mar','M\u00edd','Jue','Vie','S\u00e1b','Dom'];
  let cells=[];
  for(let i=0;i<total;i++){const dn=i-firstDay+1;cells.push(dn<1||dn>daysInMonth?null:year+'-'+pad(month+1)+'-'+pad(dn));}
  const weeks=[];for(let i=0;i<cells.length;i+=7)weeks.push(cells.slice(i,i+7));

  let nav='<div style="display:flex;align-items:center;gap:8px;margin-bottom:12px;flex-wrap:wrap">'
    +'<button class="btn" onclick="monthOffset--;render()">\u2190 Anterior</button>'
    +'<span style="font-size:14px;font-weight:600;min-width:160px;text-align:center">'+label+'</span>'
    +'<button class="btn" onclick="monthOffset++;render()">Siguiente \u2192</button>'
    +'<button class="btn sm" onclick="monthOffset=0;render()">Hoy</button>'
    +'</div>';

  let grid='<div style="background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);overflow:hidden">'
    +'<div style="display:grid;grid-template-columns:repeat(7,minmax(0,1fr));background:var(--bg2);border-bottom:1px solid var(--border)">'
    +DAY_HDR.map(function(d){return'<div style="padding:6px 4px;font-size:10px;font-weight:600;color:var(--text2);text-transform:uppercase;text-align:center;border-right:1px solid var(--border)">'+d+'</div>';}).join('')
    +'</div>';

  weeks.forEach(function(week){
    grid+='<div style="display:grid;grid-template-columns:repeat(7,minmax(0,1fr));border-bottom:1px solid var(--border)">';
    week.forEach(function(dateStr){
      if(!dateStr){grid+='<div style="background:var(--bg2);border-right:1px solid var(--border);min-height:100px"></div>';return;}
      const ov=analystSchedules[currentUser.id]?.overrides?.[dateStr];
      const hasOv=ov&&(ov.status==='approved'||ov.status==='assigned');
      const s=hasOv?ov:def;
      const h=calcHours(s);
      const absent=getAbsenceOnDate(currentUser.id,dateStr);
      const isWork=isWorkdayFor(currentUser.id,dateStr);
      const pendReq=scheduleRequests.find(function(r){return r.analystId===currentUser.id&&r.dateStr===dateStr&&r.status==='pending';});
      const approvedOT=scheduleRequests.find(function(r){return r.analystId===currentUser.id&&r.dateStr===dateStr&&r.status==='approved'&&r.proposed.type==='overtime';});
      const myTasks=tasks.filter(function(t){return(t.assignments||[]).some(function(x){return x.analyst===currentUser.id&&x.date===dateStr;});});
      const dayMgmt=mgmtOccsByDay[dateStr]||[];
      const workH=myTasks.reduce(function(acc,t){return acc+(t.estimatedHours||0);},0)+dayMgmt.reduce(function(acc,o){return acc+(o.estimatedHours||0);},0);
      const totalAvail=h+(approvedOT?approvedOT.proposed.extraHours||0:0);
      const absTyp=absent?getABSTypes()[absent.type]||{color:'#fdeee4',text:'#8a3c10',label:'Aus.'}:null;
      const schedTyp=hasOv?SCHED_TYPES.find(function(t){return t.id===ov.type;})||null:null;
      const dt2=new Date(dateStr+'T12:00:00');
      const isToday=dateStr===todayStr;
      const isWE=dt2.getDay()===0||dt2.getDay()===6;
      const bg=absent?absTyp.color+'55':hasOv?(schedTyp&&schedTyp.color?schedTyp.color+'77':'##e8eff8'):isToday?'var(--blue-bg)':!isWork?'var(--bg2)':'var(--surface)';

      grid+='<div style="border-right:1px solid var(--border);min-height:100px;padding:4px;background:'+bg+';cursor:pointer" onclick="requestScheduleChange(\''+currentUser.id+'\',\''+dateStr+'\')">';
      grid+='<div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:3px">'
        +'<span style="font-size:'+(isToday?'14':'12')+'px;font-weight:'+(isToday?'800':'500')+';color:'+(isToday?'var(--blue)':isWE?'var(--amber)':'var(--text)')+';font-family:var(--mono)">'+dateStr.slice(8)+'</span>'
        +(pendReq?'<span style="font-size:8px;background:var(--amber-bg);color:var(--amber-text);padding:1px 3px;border-radius:3px;font-weight:700">\u23f3</span>':'')
        +'</div>';
      if(!absent&&isWork){
        const schedColor=hasOv?'var(--blue)':'var(--text2)';
        grid+='<div style="font-size:10px;font-family:var(--mono);font-weight:600;color:'+schedColor+'">'+s.startTime+'\u2013'+s.endTime+'</div>';
        grid+='<div style="font-size:10px;color:'+schedColor+';font-family:var(--mono)">'+h.toFixed(1)+'h'+(approvedOT?'<span style="color:var(--green)"> +'+approvedOT.proposed.extraHours+'h</span>':'')+'</div>';
        if(hasOv&&schedTyp) grid+='<div style="font-size:8px;font-weight:700;padding:1px 4px;border-radius:3px;background:'+(schedTyp.color||'#e8eff8')+';color:'+(schedTyp.text||'#1a4f8a')+';margin-top:2px">'+schedTyp.label+'</div>';
        if(workH>0){
          const pct=Math.min(workH/totalAvail*100,100);
          grid+='<div style="background:rgba(0,0,0,.08);border-radius:2px;height:3px;overflow:hidden;margin:3px 0"><div style="height:100%;background:'+(workH>totalAvail?'var(--red)':workH>=totalAvail*.8?'var(--amber)':'var(--blue)')+';width:'+pct.toFixed(0)+'%"></div></div>';
        }
        myTasks.slice(0,2).forEach(function(t){
          grid+='<div style="font-size:9px;padding:1px 4px;border-radius:2px;margin-bottom:1px;background:#d4ede0;color:#1e5c35;font-weight:600;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;cursor:pointer" onclick="event.stopPropagation();openEdit('+t.id+')">'+escH(t.producto.split(' ')[0])+'</div>';
        });
        dayMgmt.slice(0,2).forEach(function(o){
          const c=getMgmtCat(o.category);
          grid+='<div style="font-size:9px;padding:1px 4px;border-radius:2px;margin-bottom:1px;background:'+c.color+';color:'+c.text+';font-weight:600;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">'+escH(c.label)+'</div>';
        });
        const more=myTasks.length+dayMgmt.length>4?myTasks.length+dayMgmt.length-4:0;
        if(more) grid+='<div style="font-size:8px;color:var(--text3);text-align:center">+'+more+' m\u00e1s</div>';
      } else if(absent){
        grid+='<div style="font-size:9px;font-weight:600;color:'+absTyp.text+';margin-top:4px">'+absTyp.label+'</div>';
        if(absent.note) grid+='<div style="font-size:8px;color:'+absTyp.text+';opacity:.7">'+escH(absent.note)+'</div>';
      } else {
        grid+='<div style="font-size:9px;color:var(--text3);text-align:center;padding:8px 0">\u2014</div>';
      }
      grid+='</div>';
    });
    grid+='</div>';
  });
  grid+='</div>';

  const legend='<div style="display:flex;gap:10px;flex-wrap:wrap;margin-top:8px;font-size:11px;color:var(--text2)">'
    +'<span style="display:flex;align-items:center;gap:4px"><span style="width:10px;height:10px;background:#d4ede0;border-left:3px solid #1e5c35;border-radius:2px;display:inline-block"></span>An\u00e1lisis</span>'
    +'<span style="display:flex;align-items:center;gap:4px"><span style="width:10px;height:10px;background:#e8eff8;border-left:3px solid #1a4f8a;border-radius:2px;display:inline-block"></span>Gesti\u00f3n</span>'
    +'<span style="display:flex;align-items:center;gap:4px"><span style="width:10px;height:10px;background:var(--blue-bg);border:2px solid var(--blue);border-radius:2px;display:inline-block"></span>Hoy</span>'
    +'<span style="font-size:10px;color:var(--text3);align-self:center">Clic en un d\u00eda para solicitar cambio de horario</span>'
    +'</div>';
  return nav+grid+legend;
}
function renderMySchedule(){
  scheduleRequests.filter(r=>r.analystId===currentUser.id&&r.status==='approved'&&!r._seenByAnalyst)
    .forEach(r=>{r._seenByAnalyst=true;});
  const a=getU(currentUser.id);
  const def=getAnalystScheduleDefault(currentUser.id);
  const defH=calcHours(def);
  const pendReqs=scheduleRequests.filter(r=>r.analystId===currentUser.id&&r.status==='pending');
  const histReqs=scheduleRequests.filter(r=>r.analystId===currentUser.id&&r.status!=='pending').slice(-10).reverse();
  const isSup=currentUser.role==='supervisor';

  const viewToggle='<div style="display:flex;gap:4px;background:var(--bg2);border-radius:var(--radius);padding:3px;width:fit-content;margin-bottom:14px">'
    +'<button class="btn sm" onclick="mySchedView=\'week\';render()" style="'+(mySchedView==='week'?'background:var(--surface);font-weight:600;box-shadow:0 1px 3px rgba(0,0,0,.1)':'border:none;background:transparent')+'">Semana</button>'
    +'<button class="btn sm" onclick="mySchedView=\'month\';render()" style="'+(mySchedView==='month'?'background:var(--surface);font-weight:600;box-shadow:0 1px 3px rgba(0,0,0,.1)':'border:none;background:transparent')+'">Mes</button>'
    +'</div>';

  const headerCard='<div style="background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);padding:12px 16px;margin-bottom:16px;display:flex;align-items:center;gap:12px;flex-wrap:wrap">'
    +'<div class="av av-xl '+a.av+'">'+escH(a.avInit)+'</div>'
    +'<div><div style="font-weight:600;font-size:15px">'+escH(a.name)+'</div>'
    +'<div style="font-size:12px;color:var(--text2)">Horario base: <b style="font-family:var(--mono)">'+def.startTime+' \u2013 '+def.endTime+'</b> \u00b7 <b style="color:var(--blue)">'+defH.toFixed(1)+'h</b> \u00b7 Descanso '+( def.breakMinutes||60)+'min</div></div>'
    +(pendReqs.length?'<div style="margin-left:auto;background:var(--amber-bg);border-radius:var(--radius);padding:6px 12px;font-size:12px;color:var(--amber-text);font-weight:600">\u23f3 '+pendReqs.length+' solicitud'+(pendReqs.length>1?'es':'')+' pendiente'+(pendReqs.length>1?'s':'')+'</div>':'')
    +'</div>';

  const content=mySchedView==='week'?renderMySchedWeek(a,def):renderMySchedMonth(a,def);

  const histSection=pendReqs.length||histReqs.length
    ?'<div style="background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);overflow:hidden;margin-top:16px">'
      +'<div style="padding:10px 14px;background:var(--bg2);border-bottom:1px solid var(--border);font-size:12px;font-weight:600">Solicitudes de cambio de horario</div>'
      +[...pendReqs,...histReqs].map(r=>{
        const h=calcHours(r.proposed);
        const stBg={pending:'var(--amber-bg)',approved:'var(--green-bg)',rejected:'var(--red-bg)'}[r.status];
        const stC={pending:'var(--amber-text)',approved:'var(--green-text)',rejected:'var(--red-text)'}[r.status];
        const stL={pending:'Pendiente',approved:'Aprobada',rejected:'Rechazada'}[r.status];
        const typeL=SCHED_TYPES.find(t=>t.id===r.proposed.type)?.label||'Cambio';
        const dt=new Date(r.ts);
        return'<div style="padding:10px 14px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10px;flex-wrap:wrap">'
          +'<div style="min-width:90px;font-family:var(--mono);font-size:12px;font-weight:600">'+(r.dateStr?fmtDF(r.dateStr):'Base')+'</div>'
          +'<div style="flex:1;min-width:0">'
          +'<div style="font-size:12px;font-weight:600">'+(r.proposed.type==='overtime'?'Horas extra: '+r.proposed.extraHours+'h':''+r.proposed.startTime+'\u2013'+r.proposed.endTime+' \u00b7 '+h.toFixed(1)+'h')+'</div>'
          +'<div style="font-size:11px;color:var(--text2);overflow:hidden;text-overflow:ellipsis;white-space:nowrap">'+escH(r.reason||'')+'</div>'
          +'<div style="font-size:10px;color:var(--text3)">'+typeL+'</div>'
          +'</div>'
          +'<div style="display:flex;flex-direction:column;align-items:flex-end;gap:2px">'
          +'<span style="font-size:10px;font-weight:700;padding:2px 8px;border-radius:10px;background:'+stBg+';color:'+stC+'">'+stL+'</span>'
          +'<span style="font-size:10px;color:var(--text3)">'+dt.getDate()+'/'+(dt.getMonth()+1)+' '+String(dt.getHours()).padStart(2,'0')+':'+String(dt.getMinutes()).padStart(2,'0')+'</span>'
          +'</div></div>';
      }).join('')
      +'</div>'
    :'';

  return viewToggle+headerCard+content+histSection;
}

function renderMySchedWeek(a, def){
  const wd=getWeekDates(weekOffset);
  const todayStr=today();
  const cache={};wd.forEach(d=>{cache[d]=mgmtTasks.flatMap(mt=>expandMgmt(mt,d,d));});

  let nav='<div style="display:flex;align-items:center;gap:8px;margin-bottom:14px;flex-wrap:wrap">'
    +'<button class="btn" onclick="weekOffset--;render()">&#8592; Anterior</button>'
    +'<span style="font-size:14px;font-weight:600;font-family:var(--mono)">'+fmtD(wd[0])+' \u2013 '+fmtD(wd[6])+'</span>'
    +'<button class="btn" onclick="weekOffset++;render()">Siguiente &#8594;</button>'
    +'<button class="btn sm" onclick="weekOffset=0;render()">Hoy</button>'
    +'</div>';

  let grid='<div style="display:grid;grid-template-columns:repeat(7,minmax(0,1fr));gap:8px;margin-bottom:4px">';
  wd.forEach(d=>{
    const ov=analystSchedules[currentUser.id]?.overrides?.[d];
    const hasOv=ov&&(ov.status==='approved'||ov.status==='assigned');
    const s=hasOv?ov:def;
    const h=calcHours(s);
    const absent=getAbsenceOnDate(currentUser.id,d);
    const isWork=isWorkdayFor(currentUser.id,d);
    const pendReq=scheduleRequests.find(r=>r.analystId===currentUser.id&&r.dateStr===d&&r.status==='pending');
    const pendOT=scheduleRequests.find(r=>r.analystId===currentUser.id&&r.dateStr===d&&r.status==='pending'&&r.proposed.type==='overtime');
    const approvedOT=scheduleRequests.find(r=>r.analystId===currentUser.id&&r.dateStr===d&&r.status==='approved'&&r.proposed.type==='overtime');

    +'<span style="display:flex;align-items:center;gap:4px"><span style="width:10px;height:10px;background:#e8eff8;border-left:3px solid #1a4f8a;border-radius:2px;display:inline-block"></span>Excepci\u00f3n horario</span>'
    +'<span style="display:flex;align-items:center;gap:4px"><span style="width:10px;height:10px;background:var(--bg2);border:1px solid var(--border);border-radius:2px;display:inline-block"></span>No laborable</span>'
    +'<span style="font-size:10px;color:var(--text3);align-self:center">Clic en cualquier d\u00eda para solicitar cambio</span>'
    +'</div>';
  return nav+grid+legend;

function requestOvertime(dateStr){
  const h=prompt('Horas extra a solicitar (ej: 2, 2.5):', '');
  if(h===null)return;
  const val=parseFloat(h);
  if(isNaN(val)||val<=0){alert('Ingres\u00e1 un n\u00famero v\u00e1lido.');return;}
  const reason=prompt('Motivo de las horas extra:', '');
  if(reason===null)return;
  if(!reason.trim()){alert('El motivo es requerido.');return;}
  scheduleRequests.push({
    id:nextSchedReqId++,
    analystId:currentUser.id,
    dateStr:dateStr,
    status:'pending',
    proposed:{type:'overtime',extraHours:val,startTime:'',endTime:'',breakMinutes:0},
    reason:reason.trim(),
    ts:Date.now(),
    requestedBy:currentUser.id
  });
  saveLS();render();
}

}

          ${MGMT_CAT_PALETTES.map((p,i)=>`<div id="mgcatpal-${i}" style="width:18px;height:18px;border-radius:50%;background:${p.color};border:2px solid ${p.text};cursor:pointer" onclick="selMgmtCatPalette=${i};document.querySelectorAll('[id^=mgcatpal-]').forEach((el,j)=>{el.style.transform=j===${i}?'scale(1.4)':'scale(1)';el.style.boxShadow=j===${i}?'0 0 0 2px var(--blue)':'none';})"></div>`).join('')}

function cycleMgmtCatColor(idx){
  const c=mgmtCategories[idx];if(!c)return;
  const ci=MGMT_CAT_PALETTES.findIndex(p=>p.color===c.color);
  const next=MGMT_CAT_PALETTES[(ci+1)%MGMT_CAT_PALETTES.length];
  c.color=next.color;c.text=next.text;saveLS();render();
}
function saveMgmtCat(id){
  const inp=document.getElementById('mgcat-lbl-'+id);
  const val=inp?.value.trim();
  if(!val){alert('El nombre no puede estar vacío.');return;}
  const c=mgmtCategories.find(x=>x.id===id);
  if(c)c.label=val;
  saveLS();
  const msg=document.getElementById('mgcat-msg');
  if(msg){msg.style.color='var(--green)';msg.textContent='Categoría actualizada.';setTimeout(()=>{if(msg)msg.textContent='';render();},1500);}
}
function deleteMgmtCat(id){
  const used=mgmtTasks.filter(t=>t.category===id).length;
  if(used>0){alert('No se puede eliminar: hay '+used+' actividad(es) con esta categoría.');return;}
  if(!confirm('¿Eliminar la categoría "'+mgmtCategories.find(c=>c.id===id)?.label+'"?'))return;
  mgmtCategories=mgmtCategories.filter(c=>c.id!==id);
  saveLS();render();
}
function addMgmtCat(){
  const label=(document.getElementById('newmgcat-label')?.value||'').trim();
  if(!label){const m=document.getElementById('newmgcat-msg');if(m){m.style.color='var(--red)';m.textContent='Ingresá un nombre.';setTimeout(()=>{if(m)m.textContent='';},2000);}return;}
  const pal=MGMT_CAT_PALETTES[selMgmtCatPalette]||MGMT_CAT_PALETTES[0];
  const id='cat_'+label.toLowerCase().replace(/[^a-z0-9]/g,'_').slice(0,16)+'_'+Date.now().toString(36).slice(-3);
  mgmtCategories.push({id,label,color:pal.color,text:pal.text});
  const inp=document.getElementById('newmgcat-label');if(inp)inp.value='';
  saveLS();
  const m=document.getElementById('newmgcat-msg');
  if(m){m.style.color='var(--green)';m.textContent='"'+label+'" agregada.';setTimeout(()=>{if(m)m.textContent='';render();},1500);}
}

function skipMgmtOccRange(){
  var mt=mgmtTasks.find(function(m){return m.id===mgmtOccTaskId;});
  if(!mt)return;
  var startStr=document.getElementById('mocc-range-start')&&document.getElementById('mocc-range-start').value;
  var endStr=document.getElementById('mocc-range-end')&&document.getElementById('mocc-range-end').value;
  var analystId=document.getElementById('mocc-range-analyst')&&document.getElementById('mocc-range-analyst').value;
  if(!startStr||!endStr){alert('Ingresá fechas válidas.');return;}
  if(endStr<startStr){alert('La fecha fin debe ser posterior al inicio.');return;}
  if(!mt.exceptions)mt.exceptions=[];
  var cur=new Date(startStr+'T12:00:00');
  var end=new Date(endStr+'T12:00:00');
  var changed=0;
  while(cur<=end){
    var ds=cur.toISOString().slice(0,10);
    var exc=mt.exceptions.find(function(e){return e.date===ds;});
    if(!exc){exc={date:ds,analysts:[].concat(mt.analysts||[])};mt.exceptions.push(exc);}
    if(analystId){
      exc.analysts=exc.analysts.filter(function(a){return a!==analystId;});
    } else {
      exc.analysts=[];
    }
    changed++;
    cur.setDate(cur.getDate()+1);
  }
  showMgmtOccModal=false;saveLS();render();
}

function removeMgmtExc(){
  var mt=mgmtTasks.find(function(m){return m.id===mgmtOccTaskId;});
  if(!mt||!mt.exceptions)return;
  mt.exceptions=mt.exceptions.filter(function(e){return e.date!==mgmtOccDate;});
  showMgmtOccModal=false;saveLS();render();

function getTableData(tableId){
  // Returns {headers:[], rows:[[]]} built from data model, not DOM
  const HEADERS=['Producto','Lote','Analistas','Fechas análisis','Vence','Prioridad','Estado','T.Est(h)','T.Real(h)','Notas'];
  function taskToRow(t){
    const analistas=getAssignees(t).map(id=>getU(id).name).join(', ');
    const fechas=(t.assignments||[]).map(a=>getU(a.analyst).name.split(' ')[0]+': '+fmtDF(a.date)).join(' | ');
    const realH=(t.assignments||[]).reduce((s,a)=>s+(a.realHours||0),0);
    return[t.producto||'',t.lote||'',analistas,fechas,fmtDF(t.due),t.priority,statusLabel(t.status),t.estimatedHours||'',realH||'',t.notes||''];
  }
  let taskList=[];
  if(tableId==='tbl-tasks'){
    let f=currentUser.role==='supervisor'?[...tasks]:tasks.filter(t=>isMyTask(t));
    if(filterAnalyst)f=f.filter(t=>getAssignees(t).includes(filterAnalyst));
    if(filterStatus)f=f.filter(t=>t.status===filterStatus);
    taskList=f;
  } else if(tableId==='tbl-dash'){
    taskList=(dashFilter&&dashFilter!=='all')?tasks.filter(t=>t.status===dashFilter):[...tasks].reverse();
  } else if(tableId==='tbl-late'){
    taskList=tasks.filter(t=>t.status==='late');
  } else if(tableId==='tbl-pend'){
    taskList=tasks.filter(t=>t.status==='pending');
  }
  return{headers:HEADERS,rows:taskList.map(taskToRow)};
}
function buildHtmlTable(headers,rows){
  const thStyle='border:1px solid #bbb;padding:6px 10px;background:#e8e8e8;font-weight:bold;font-family:Arial,sans-serif;font-size:12px;white-space:nowrap';
  const tdStyle='border:1px solid #bbb;padding:5px 10px;font-family:Arial,sans-serif;font-size:12px;vertical-align:top';
  const tdAltStyle='border:1px solid #bbb;padding:5px 10px;font-family:Arial,sans-serif;font-size:12px;vertical-align:top;background:#f9f9f9';
  const head=`<tr>${headers.map(h=>`<th style="${thStyle}">${escH(h)}</th>`).join('')}</tr>`;
  const body=rows.map((r,ri)=>`<tr>${r.map(c=>`<td style="${ri%2===0?tdStyle:tdAltStyle}">${escH(String(c))}</td>`).join('')}</tr>`).join('');
  return`<table style="border-collapse:collapse">${head}${body}</table>`;
}
function buildTextTable(headers,rows){
  return[headers,...rows].map(r=>r.map(c=>String(c).replace(/\t/g,' ')).join('\t')).join('\n');
}
function copyTableToClipboard(tableId){
  const {headers,rows}=getTableData(tableId);
  if(rows.length===0){alert('No hay datos para copiar.');return;}
  const htmlContent=buildHtmlTable(headers,rows);
  const textContent=buildTextTable(headers,rows);
  function doWrite(){
    if(navigator.clipboard&&window.ClipboardItem){
      const htmlBlob=new Blob([htmlContent],{type:'text/html'});
      const textBlob=new Blob([textContent],{type:'text/plain'});
      navigator.clipboard.write([new ClipboardItem({'text/html':htmlBlob,'text/plain':textBlob})])
        .then(()=>showCopyFeedback(tableId))
        .catch(()=>fallbackTextCopy(textContent,tableId));
    } else {
      fallbackTextCopy(textContent,tableId);
    }
  }
  // Some browsers require clipboard write to happen inside a user gesture
  try{doWrite();}catch(e){fallbackTextCopy(textContent,tableId);}
}
function fallbackTextCopy(text,tableId){
  const ta=document.createElement('textarea');
  ta.value=text;ta.style.position='fixed';ta.style.opacity='0';
  document.body.appendChild(ta);ta.select();
  try{document.execCommand('copy');showCopyFeedback(tableId);}
  catch(e){alert('No se pudo copiar. Seleccioná la tabla manualmente.');}
  document.body.removeChild(ta);
}
function showCopyFeedback(tableId){
  const btn=document.getElementById('copybtn-'+tableId);
  if(btn){const orig=btn.textContent;btn.textContent='✓ Copiado';btn.style.background='var(--green)';btn.style.color='#fff';setTimeout(()=>{btn.textContent=orig;btn.style.background='';btn.style.color='';},2000);}
}
const DAY_NAMES=['Dom','Lun','Mar','Mié','Jue','Vie','Sáb'];
function getWeekDates(off){
  const now=new Date();
  const day=now.getDay();
  const diffToMon=day===0?-6:1-day;
  const base=new Date(now);
  base.setDate(now.getDate()+diffToMon+off*7);
  base.setHours(0,0,0,0);
  return Array.from({length:7},(_,i)=>{
    const x=new Date(base);x.setDate(base.getDate()+i);
    return x.toISOString().slice(0,10);
  });
}
function weekDayLabel(dateStr){
  const dt=new Date(dateStr+'T12:00:00');
  return DAY_NAMES[dt.getDay()]+' '+String(dt.getDate()).padStart(2,'0')+'/'+String(dt.getMonth()+1).padStart(2,'0');
}

      +'<div><span class="pill '+t.status+'">'+statusLabel(t.status)+'</span>'
      +(t.status==='observed'&&t.observations&&t.observations.length?'<div style="font-size:9px;color:var(--amber-text);margin-top:2px" title="'+escH(t.observations[t.observations.length-1].comment)+'">⚑ '+escH(t.observations[t.observations.length-1].comment.slice(0,25))+'</div>':'')
      +(t.reviewedBy?'<div style="font-size:9px;color:var(--green);margin-top:1px">Rev. '+fmtDF(t.reviewedDate||'')+'</div>':'')

      +(canAct&&(t.status==='done'||t.status==='observed')?'<button class="btn sm" style="color:var(--amber-text);border-color:var(--amber)" onclick="markObserved('+t.id+')" title="Observar con comentario">⚑</button>':'')
      +'</div>'
      +'</div>';
  }

  const thead='<div class="thead" style="'+cols+'">'
    +'<div>Producto</div><div>Lote</div><div>Analistas</div>'
    +'<div style="text-align:right">T.Est</div><div style="text-align:right">T.Real</div>'
    +'<div>Estado</div><div>Acc.</div>'
    +'</div>';

  var html='';

  // Pending review section
  html+='<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:8px">'
    +'<div class="sec" style="margin-bottom:0">Pendientes de revisión ('+pending.length+')</div>'
    +(pending.length>0?'<button class="btn sm" style="color:var(--text3)" onclick="markObservedAll()" title="Observar todos">Observar todos</button>':'')
    +'</div>'
    +'<div class="tbl" style="margin-bottom:20px">'
    +(pending.length===0
      ?'<div class="empty">No hay análisis completados pendientes de revisión ✓</div>'
      :thead+pending.map(function(t){return reviewRow(t,true);}).join(''))
    +'</div>';

  // Already reviewed section
  if(done.length>0){
    html+='<div class="sec" style="margin-bottom:8px;color:var(--green)">Ya revisados ('+done.length+')</div>'
      +'<div id="cloud-badge" style="margin-right:8px;cursor:pointer" onclick="openCloudConfig()" title="Configuración de nube"></div>'
    +'<div class="tbl">'

function markObservedAll(){
  var pending=tasks.filter(function(t){return t.status==='done';});
  if(!pending.length){alert('No hay análisis pendientes.');return;}
  var comment=prompt('Observación general para los '+pending.length+' análisis pendientes:','');
  if(comment===null)return;
  if(!comment.trim()){alert('La observación no puede estar vacía.');return;}
  pending.forEach(function(t){
    if(!t.observations)t.observations=[];
    t.observations.push({by:currentUser.id,ts:Date.now(),comment:comment.trim(),fromStatus:t.status});
    t.status='observed';t.observedBy=currentUser.id;t.observedTs=Date.now();
  });
  saveLS();render();
}

function renderInformes(){
  // ── helpers ──
  function diffDays(a,b){
    // a,b: date strings 'YYYY-MM-DD' or timestamps
    if(!a||!b)return null;
    const da=typeof a==='number'?new Date(a):new Date(a);
    const db=typeof b==='number'?new Date(b):new Date(b);
    const diff=Math.round((db-da)/(1000*60*60*24));
    return diff;
  }
  function tsToDate(ts){
    if(!ts)return '';
    const d=new Date(ts);
    return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');
  }
  function dCell(val){
    if(val===null||val===undefined||val==='')return '<td style="color:var(--text3);text-align:center">—</td>';
    return '<td style="text-align:center">'+val+'</td>';
  }
  function numCell(val,color){
    if(val===null||val===undefined)return '<td style="color:var(--text3);text-align:right">—</td>';
    var style='text-align:right'+(color?';color:'+color:'');
    return '<td style="'+style+'">'+val+'</td>';
  }

  // ── filters ──
  var filtered=[...tasks];
  if(informeFilterStatus) filtered=filtered.filter(function(t){return t.status===informeFilterStatus;});
  if(filterSearch){var q=filterSearch.toLowerCase();filtered=filtered.filter(function(t){return t.producto.toLowerCase().includes(q)||t.lote.toLowerCase().includes(q);});}

  // ── build rows ──
  var rows=filtered.map(function(t){
    var assigns=t.assignments||[];
    var analistas=assigns.map(function(a){return escH(getU(a.analyst).name.split(' ')[0]);}).join(', ');
    var hEst=assigns.reduce(function(s,a){return s+(a.estimatedHours||0);},0)||t.estimatedHours||0;
    var hReal=assigns.reduce(function(s,a){return s+(a.realHours||0);},0);
    var hDiff=hEst>0?(hReal-hEst).toFixed(1):null;

    // Dates
    var fIngreso=t.created||'';
    var fVencimiento=t.due||'';
    var fInicio=assigns.length?assigns.reduce(function(min,a){return (!min||a.date<min)?a.date:min;},null):'';
    var fCompletado=t.completedTs?tsToDate(t.completedTs):(t.confirmedTs?tsToDate(t.confirmedTs):'');
    var fRevision=t.reviewedDate||'';
    var fAprobacion=t.approvedDate||'';

    // Intervals (days)
    var dIngresoInicio=diffDays(fIngreso,fInicio);
    var dInicioCompletado=diffDays(fInicio,fCompletado);
    var dCompletadoRevision=diffDays(fCompletado,fRevision);
    var dRevisionAprobacion=diffDays(fRevision,fAprobacion);
    var dTotal=diffDays(fIngreso,fAprobacion||fRevision||fCompletado||fInicio||fIngreso);
    var dDemora=fVencimiento?(diffDays(fVencimiento,fAprobacion||fRevision||fCompletado||fVencimiento)):null;

    var over=hEst>0&&hReal>hEst;
    var hColor=over?'var(--red)':hReal>0?'var(--green)':'';

    return '<tr>'
      +'<td>'+escH(t.producto)+'</td>'
      +'<td style="font-family:var(--mono);font-size:11px">'+escH(t.lote)+'</td>'
      +'<td style="text-align:center"><span class="pill '+t.status+'" style="font-size:10px">'+statusLabel(t.status)+'</span></td>'
      +'<td>'+escH(analistas)+'</td>'
      +dCell(fVencimiento)
      +dCell(fIngreso)
      +dCell(fInicio)
      +dCell(fCompletado)
      +dCell(fRevision)
      +dCell(fAprobacion)
      +numCell(dIngresoInicio)
      +numCell(dInicioCompletado)
      +numCell(dCompletadoRevision)
      +numCell(dRevisionAprobacion)
      +numCell(dTotal,dTotal!==null?(dTotal<=30?'var(--green)':dTotal<=60?'var(--amber)':'var(--red)'):'')
      +numCell(dDemora,dDemora===null?'':dDemora>0?'var(--red)':dDemora===0?'var(--amber)':'var(--green)')
      +numCell(hEst||null)
      +numCell(hReal||null,hColor)
      +numCell(hDiff,over?'var(--red)':hDiff!==null?'var(--green)':'')
      +'</tr>';
  });

  // ── header ──
  var thStyle='padding:8px 10px;background:var(--bg2);font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.04em;color:var(--text2);white-space:nowrap;border-bottom:2px solid var(--border)';
  var tdStyle='padding:7px 10px;border-bottom:1px solid var(--border);font-size:12px;vertical-align:middle;white-space:nowrap';

  var html='<div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap;margin-bottom:12px">'
    +searchBarHtml()
    +'<select onchange="informeFilterStatus=this.value;render()" style="font-size:12px;padding:5px 8px;border:1px solid var(--border2);border-radius:var(--radius);background:var(--surface);color:var(--text)">'
    +'<option value="">Todos los estados</option>'
    +'<option value="pending">Pendiente</option>'
    +'<option value="progress">En curso</option>'
    +'<option value="done">Completado</option>'
    +'<option value="reviewed">Revisado</option>'
    +'<option value="approved">Aprobado</option>'
    +'<option value="observed">Observado</option>'
    +'<option value="late">Vencido</option>'
    +'</select>'
    +'<span style="font-size:12px;color:var(--text3)">'+filtered.length+' muestras</span>'
    +'<button class="btn sm" onclick="copyInformeTable()" style="margin-left:auto">📋 Copiar para Excel</button>'
    +'</div>'
    +'<div style="overflow-x:auto;border:1px solid var(--border);border-radius:var(--radius-lg)">'
    +'<table id="informe-table" style="width:100%;border-collapse:collapse;font-size:12px">'
    +'<thead><tr>'
    +'<th style="'+thStyle+';text-align:left">Producto</th>'
    +'<th style="'+thStyle+';text-align:left">Lote</th>'
    +'<th style="'+thStyle+'">Estado</th>'
    +'<th style="'+thStyle+';text-align:left">Analistas</th>'
    +'<th style="'+thStyle+'">F. Vencimiento</th>'
    +'<th style="'+thStyle+'">F. Ingreso</th>'
    +'<th style="'+thStyle+'">F. Inicio</th>'
    +'<th style="'+thStyle+'">F. Completado</th>'
    +'<th style="'+thStyle+'">F. Revisión</th>'
    +'<th style="'+thStyle+'">F. Aprobación</th>'
    +'<th style="'+thStyle+'" title="Días desde ingreso hasta inicio de análisis">D. Ingreso→Inicio</th>'
    +'<th style="'+thStyle+'" title="Días desde inicio hasta completado">D. Análisis</th>'
    +'<th style="'+thStyle+'" title="Días desde completado hasta revisión">D. Complet.→Revisión</th>'
    +'<th style="'+thStyle+'" title="Días desde revisión hasta aprobación">D. Revisión→Aprobación</th>'
    +'<th style="'+thStyle+'" title="Días totales desde ingreso hasta último estado">D. Total</th>'
    +'<th style="'+thStyle+'" title="Días de demora respecto a vencimiento (negativo=a tiempo)">D. Demora</th>'
    +'<th style="'+thStyle+';text-align:right">H. Est.</th>'
    +'<th style="'+thStyle+';text-align:right">H. Real</th>'
    +'<th style="'+thStyle+';text-align:right">Dif. H.</th>'
    +'</tr></thead>'
    +'<tbody>'
    +(rows.length?rows.join('').replace(/<td/g,'<td style="'+tdStyle+'"').replace(/<td style="'+tdStyle+'"style=/g,'<td style='):'<tr><td colspan="19" style="'+tdStyle+';text-align:center;color:var(--text3);padding:20px">Sin resultados</td></tr>')
    +'</tbody></table></div>';

  return html;
}

function copyInformeTable(){
  var tbl=document.getElementById('informe-table');
  if(!tbl){alert('No hay tabla para copiar.');return;}
  var rows=[];
  tbl.querySelectorAll('tr').forEach(function(tr){
    var cells=[];
    tr.querySelectorAll('th,td').forEach(function(td){
      cells.push(td.innerText.replace(/\t|\n/g,' ').trim());
    });
    rows.push(cells.join('\t'));
  });
  var text=rows.join('\n');
  navigator.clipboard.writeText(text).then(function(){
    var btn=document.querySelector('[onclick="copyInformeTable()"]');
    if(btn){btn.textContent='✓ Copiado';setTimeout(function(){btn.textContent='\uD83D\uDCCB Copiar para Excel';},2000);}
  }).catch(function(){
    // Fallback
    var ta=document.createElement('textarea');
    ta.value=text;document.body.appendChild(ta);ta.select();
    document.execCommand('copy');document.body.removeChild(ta);
    var btn=document.querySelector('[onclick="copyInformeTable()"]');
    if(btn){btn.textContent='✓ Copiado';setTimeout(function(){btn.textContent='\uD83D\uDCCB Copiar para Excel';},2000);}
  });
}

  out.push('Probando conexión a jsonbin.io...');

    if(r.status === 401) {

function mergeSnapshot(local, remote) {
  try {
    var L = typeof local === 'string' ? JSON.parse(local) : local;
    var R = typeof remote === 'string' ? JSON.parse(remote) : remote;
    if(!L || !R) return R || L;

    var merged = Object.assign({}, R); // start from remote base

    // ── Tasks: merge by id, keep newer ──
    var taskMap = {};
    (R.tasks||[]).forEach(function(t){ taskMap[t.id] = t; });
    (L.tasks||[]).forEach(function(t){
      var rt = taskMap[t.id];
      if(!rt || (t._ts||0) > (rt._ts||0)) {
        taskMap[t.id] = t; // local is newer
      }
    });
    merged.tasks = Object.values(taskMap).filter(function(t){ return !t._deleted; });

    // ── Counters: keep max ──
    merged.nextId = Math.max(L.nextId||0, R.nextId||0);
    merged.nextUid = Math.max(L.nextUid||0, R.nextUid||0);
    merged.nextNotifId = Math.max(L.nextNotifId||0, R.nextNotifId||0);
    merged.nextAbsId = Math.max(L.nextAbsId||0, R.nextAbsId||0);
    merged.nextMgmtId = Math.max(L.nextMgmtId||0, R.nextMgmtId||0);
    merged.nextSchedReqId = Math.max(L.nextSchedReqId||0, R.nextSchedReqId||0);

    // ── Schedule requests: merge by id ──
    var srMap = {};
    (R.scheduleRequests||[]).forEach(function(r){ srMap[r.id] = r; });
    (L.scheduleRequests||[]).forEach(function(r){
      var rr = srMap[r.id];
      if(!rr || (r._ts||0) > (rr._ts||0)) srMap[r.id] = r;
    });
    merged.scheduleRequests = Object.values(srMap);

    // ── Replan notifs: merge by id ──
    var rnMap = {};
    (R.replanNotifs||[]).forEach(function(n){ rnMap[n.id] = n; });
    (L.replanNotifs||[]).forEach(function(n){
      var rn = rnMap[n.id];
      if(!rn || (n._ts||0) > (rn._ts||0)) rnMap[n.id] = n;
    });
    merged.replanNotifs = Object.values(rnMap);

    // ── MgmtTasks: merge by id ──
    var mtMap = {};
    (R.mgmtTasks||[]).forEach(function(t){ mtMap[t.id] = t; });
    (L.mgmtTasks||[]).forEach(function(t){
      var rt = mtMap[t.id];
      if(!rt || (t._ts||0) > (rt._ts||0)) mtMap[t.id] = t;
    });
    merged.mgmtTasks = Object.values(mtMap).filter(function(t){ return !t._deleted; });

    // ── Users: merge by id, keep newer ──
    var uMap2 = {};
    (R.users||[]).forEach(function(u){ uMap2[u.id] = u; });
    (L.users||[]).forEach(function(u){
      var ru = uMap2[u.id];
      if(!ru || (u._ts||0) > (ru._ts||0)) uMap2[u.id] = u;
    });
    merged.users = Object.values(uMap2).filter(function(u){ return !u._deleted; });

    // ── Passwords: merge by key, keep newer ──
    var LP = L.passwords||{}, RP = R.passwords||{};
    var LP_ts = L.passwords_ts||{}, RP_ts = R.passwords_ts||{};
    var mergedPwd = Object.assign({}, RP);
    var mergedPwdTs = Object.assign({}, RP_ts);
    Object.keys(LP).forEach(function(uid){
      if((LP_ts[uid]||0) > (RP_ts[uid]||0)){
        mergedPwd[uid] = LP[uid];
        mergedPwdTs[uid] = LP_ts[uid];
      }
    });
    merged.passwords = mergedPwd;
    merged.passwords_ts = mergedPwdTs;

    // ── Absences: merge by analystId, keep newer ──
    var LA = L.absences||{}, RA = R.absences||{};
    var LA_ts = L.absences_ts||{}, RA_ts = R.absences_ts||{};
    var mergedAbs = Object.assign({}, RA);
    var mergedAbsTs = Object.assign({}, RA_ts);
    Object.keys(LA).forEach(function(aid){
      if((LA_ts[aid]||0) > (RA_ts[aid]||0)){
        mergedAbs[aid] = LA[aid];
        mergedAbsTs[aid] = LA_ts[aid];
      }
    });
    merged.absences = mergedAbs;
    merged.absences_ts = mergedAbsTs;

    // ── Analyst schedules: merge by analystId ──
    var LS = L.analystSchedules||{}, RS = R.analystSchedules||{};
    var mergedSched = Object.assign({}, RS);
    Object.keys(LS).forEach(function(aid){
      var ls = LS[aid], rs = RS[aid];
      if(!rs){ mergedSched[aid] = ls; return; }
      // Merge default schedule
      var lDef = ls.default||{}, rDef = rs.default||{};
      var mergedDef = ((lDef._ts||0) > (rDef._ts||0)) ? lDef : rDef;
      // Merge overrides by date
      var mergedOv = Object.assign({}, rs.overrides||{});
      Object.keys(ls.overrides||{}).forEach(function(d){
        var lo = ls.overrides[d], ro = (rs.overrides||{})[d];
        if(!ro || (lo._ts||0) > (ro._ts||0)) mergedOv[d] = lo;
      });
      mergedSched[aid] = {default: mergedDef, overrides: mergedOv};
    });
    merged.analystSchedules = mergedSched;

    // ── Workday config: keep newer ──
    if((L.workdayConfig_ts||0) > (R.workdayConfig_ts||0)){
      merged.workdayConfig = L.workdayConfig;
      merged.workdayConfig_ts = L.workdayConfig_ts;
    }

    // ── MgmtCategories: keep newer ──
    if((L.mgmtCategories_ts||0) > (R.mgmtCategories_ts||0)){
      merged.mgmtCategories = L.mgmtCategories;
      merged.mgmtCategories_ts = L.mgmtCategories_ts;
    }

    // ── AbsenceTypesDef: keep newer ──
    if((L.absenceTypesDef_ts||0) > (R.absenceTypesDef_ts||0)){
      merged.absenceTypesDef = L.absenceTypesDef;
      merged.absenceTypesDef_ts = L.absenceTypesDef_ts;
    }

    return merged;
  } catch(e) {
    console.error('mergeSnapshot error:', e);
    return remote; // fallback: use remote
  }
}

function quickActivateDay(dateStr, analystId) {
  // Collect all analysts assigned to tasks or mgmt on this day
  var affectedAnalysts = new Set();
  tasks.forEach(function(t){
    (t.assignments||[]).forEach(function(a){
      if(a.date===dateStr) affectedAnalysts.add(a.analyst);
    });
  });
  mgmtTasks.forEach(function(mt){
    var occs = expandMgmt(mt, dateStr, dateStr);
    occs.forEach(function(o){ (o.analysts||[]).forEach(function(id){ affectedAnalysts.add(id); }); });
  });
  // Also include the specific analyst passed
  if(analystId) affectedAnalysts.add(analystId);
  var ids = Array.from(affectedAnalysts);
  // Add as extra workday for these analysts
  workdayConfig.off = workdayConfig.off.filter(function(o){ return (o.date||o)!==dateStr; });
  workdayConfig.extra = workdayConfig.extra.filter(function(e){ return (e.date||e)!==dateStr; });
  workdayConfig.extra.push({date:dateStr, analysts:ids, note:'Activado desde gestión de conflictos'});
  workdayConfig.extra.sort(function(a,b){ return (a.date||a).localeCompare(b.date||b); });
  workdayConfig_ts = Date.now();
  saveLS();
  _lastHtml='';
  render();
}

// AUDIT TRAIL — Complete, attributable, tamper-evident change log
// Each entry: { ts, userId, userName, action, entity, entityId, field, oldVal, newVal, reason }
// ══════════════════════════════════════════════════════════════════════

function auditLog(action, entity, entityId, details, reason) {
  if(!currentUser) return;
  const entry = {
    id: 'AL' + Date.now() + Math.random().toString(36).slice(2,6),
    ts: Date.now(),
    userId: currentUser.id,
    userName: currentUser.name,
    userRole: currentUser.role,
    action: action,       // 'CREATE'|'EDIT'|'STATUS_CHANGE'|'DELETE'|'APPROVE'|'REVIEW'|'OBSERVE'|'LOGIN'|'LOGOUT'
    entity: entity,       // 'TASK'|'USER'|'SCHEDULE'|'ABSENCE'|'MGMT'
    entityId: entityId,
    details: details||{}, // { field, oldVal, newVal } or other context
    reason: reason||''
  };
  if(!Array.isArray(auditTrail)) auditTrail=[];
  auditTrail.push(entry);
  // Purge entries older than 30 days; floor at 500 entries for safety
  var _cutoff30 = Date.now() - 30*24*60*60*1000;
  var _kept = auditTrail.filter(function(e){return e.ts>=_cutoff30;});
  auditTrail = _kept.length>=500 ? _kept : auditTrail.slice(-Math.max(500,_kept.length));
  saveLS();
}

// ── Electronic signature: require reason for critical actions ──
function requireSignature(action, label, callback) {
  // Show confirmation modal with reason field
  const overlay = document.createElement('div');
  overlay.style.cssText = 'position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.5);z-index:9999;display:flex;align-items:center;justify-content:center';
  overlay.innerHTML = '<div style="background:var(--surface);border-radius:var(--radius-lg);padding:24px;max-width:420px;width:90%;box-shadow:0 8px 32px rgba(0,0,0,.3)">'
    + '<h3 style="margin:0 0 8px;font-size:15px">Firma electrónica — '+escH(label)+'</h3>'
    + '<p style="font-size:12px;color:var(--text2);margin:0 0 16px">Esta acción quedará registrada en el audit trail con tu identidad y fecha/hora.</p>'
    + '<div style="margin-bottom:12px"><label style="font-size:12px;font-weight:600;color:var(--text2)">Contraseña de confirmación</label>'
    + '<input type="password" id="sig-pwd" placeholder="Ingresá tu contraseña" style="width:100%;margin-top:4px;padding:8px 10px;border:1px solid var(--border2);border-radius:var(--radius);background:var(--bg2);color:var(--text);font-size:13px;box-sizing:border-box" autofocus></div>'
    + '<div style="margin-bottom:16px"><label style="font-size:12px;font-weight:600;color:var(--text2)">Motivo / justificación <span style="color:var(--red)">*</span></label>'
    + '<textarea id="sig-reason" placeholder="Ej: Resultados verificados, análisis conforme a especificaciones" rows="3" style="width:100%;margin-top:4px;padding:8px 10px;border:1px solid var(--border2);border-radius:var(--radius);background:var(--bg2);color:var(--text);font-size:13px;box-sizing:border-box;resize:vertical"></textarea></div>'
    + '<div id="sig-err" style="color:var(--red);font-size:12px;margin-bottom:8px;display:none"></div>'
    + '<div style="display:flex;gap:8px;justify-content:flex-end">'
    + '<button onclick="this.closest(\'div[style*=fixed]\').remove()" style="padding:8px 16px;border:1px solid var(--border2);border-radius:var(--radius);background:var(--surface);color:var(--text);cursor:pointer;font-size:13px">Cancelar</button>'
    + '<button id="sig-confirm" style="padding:8px 16px;border:none;border-radius:var(--radius);background:var(--blue);color:#fff;cursor:pointer;font-size:13px;font-weight:600">Confirmar y firmar</button>'
    + '</div></div>';
  document.body.appendChild(overlay);
  // Wire confirm button
  document.getElementById('sig-confirm').onclick = function() {
    const pwd = document.getElementById('sig-pwd').value;
    const reason = document.getElementById('sig-reason').value.trim();
    const errEl = document.getElementById('sig-err');
    if(!pwd) { errEl.textContent='Ingresá tu contraseña'; errEl.style.display='block'; return; }
    if(!reason) { errEl.textContent='El motivo es obligatorio'; errEl.style.display='block'; return; }
    const uid = currentUser.id;
    if(pwd !== passwords[uid]) { errEl.textContent='Contraseña incorrecta'; errEl.style.display='block'; return; }
    overlay.remove();
    callback(reason);
  };
  document.getElementById('sig-pwd').onkeydown = function(e){
    if(e.key==='Enter') document.getElementById('sig-confirm').click();
  };
}

// ── Immutability guard: check if a task can still be edited ──
function canEditTask(t) {
  // Once approved, task data is locked — only admin can override
  if(t.status==='approved') return false;
  return true;
}
function canEditField(t, field) {
  // After review, analytical results (notes, hours) are locked
  const lockedAfterReview = ['notes','assignments'];
  if(['reviewed','approved'].includes(t.status) && lockedAfterReview.includes(field)) return false;
  return true;
}
