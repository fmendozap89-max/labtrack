function skipMgmtOccRange(){
  var mt=mgmtTasks.find(function(m){return m.id===mgmtOccTaskId;});
  if(!mt)return;
  var startStr=document.getElementById('mocc-range-start')&&document.getElementById('mocc-range-start').value;
  var endStr=document.getElementById('mocc-range-end')&&document.getElementById('mocc-range-end').value;
  var analystId=document.getElementById('mocc-range-analyst')&&document.getElementById('mocc-range-analyst').value;
  if(!startStr||!endStr){alert('Ingresá fechas válidas.');return;}
  if(endStr<startStr){alert('La fecha fin debe ser posterior al inicio.');return;}
  if(!mt.exceptions)mt.exceptions=[];
  var cur=new Date(startStr+'T12:00:00');
  var end=new Date(endStr+'T12:00:00');
  var changed=0;
  while(cur<=end){
    var ds=cur.toISOString().slice(0,10);
    var exc=mt.exceptions.find(function(e){return e.date===ds;});
    if(!exc){exc={date:ds,analysts:[].concat(mt.analysts||[])};mt.exceptions.push(exc);}
    if(analystId){
      exc.analysts=exc.analysts.filter(function(a){return a!==analystId;});
    } else {
      exc.analysts=[];
    }
    changed++;
    cur.setDate(cur.getDate()+1);
  }
  showMgmtOccModal=false;saveLS();render();
}

function removeMgmtExc(){
  var mt=mgmtTasks.find(function(m){return m.id===mgmtOccTaskId;});

  mt.exceptions=mt.exceptions.filter(function(e){return e.date!==mgmtOccDate;});

function getTableData(tableId){
  // Returns {headers:[], rows:[[]]} built from data model, not DOM
  const HEADERS=['Producto','Lote','Analistas','Fechas análisis','Vence','Prioridad','Estado','T.Real(h)','Notas'];
  function taskToRow(t){
    const analistas=getAssignees(t).map(id=>getU(id).name).join(', ');
    const fechas=(t.assignments||[]).map(a=>getU(a.analyst).name.split(' ')[0]+': '+fmtDF(a.date)).join(' | ');
    const realH=(t.assignments||[]).reduce((s,a)=>s+(a.realHours||0),0);
    return[t.producto||'',t.lote||'',analistas,fechas,fmtDF(t.due),t.priority,statusLabel(t.status),realH||'',t.notes||''];
  }
  let taskList=[];
  if(tableId==='tbl-tasks'){
    let f=currentUser.role==='supervisor'?sortTasks([...tasks],taskSort,taskSortDir):sortTasks(tasks.filter(t=>isMyTask(t)),taskSort,taskSortDir);
    if(filterAnalyst)f=f.filter(t=>getAssignees(t).includes(filterAnalyst));
    if(filterStatus)f=f.filter(t=>t.status===filterStatus);
    // 'Por analista' view: one row per assignment
    if(tasksView==='analista'){
      var analRows=[];
      f.forEach(function(t){
        var asgns=(t.assignments||[]).filter(function(a){return !a._removed;});
        if(asgns.length===0){
          analRows.push(taskToRow(t));
        } else {
          asgns.forEach(function(a){
            var u=getU(a.analyst);
            var aDone=(a.realHours>0)||(a.sessions&&a.sessions.length>0);
            var aStatus=aDone?'Completado':statusLabel(t.status);
            analRows.push([t.producto||'',t.lote||'',u?u.name:'?',fmtDF(a.date),fmtDF(t.due),t.priority||'',aStatus,a.realHours||'',t.notes||'']);
          });
        }
      });
      return{headers:HEADERS,rows:analRows};
    }
    taskList=f;
  } else if(tableId==='tbl-dash'){
    taskList=(dashFilter&&dashFilter!=='all')?tasks.filter(t=>t.status===dashFilter):[...tasks].reverse();
  } else if(tableId==='tbl-late'){
    taskList=tasks.filter(t=>t._dueStatus==='late'&&t.status!=='approved');
  } else if(tableId==='tbl-pend'){
    taskList=tasks.filter(t=>t.status==='pending');
  }
  return{headers:HEADERS,rows:taskList.map(taskToRow)};
}
function buildHtmlTable(headers,rows){
  const thStyle='border:1px solid #bbb;padding:6px 10px;background:#e8e8e8;font-weight:bold;font-family:Arial,sans-serif;font-size:12px;white-space:nowrap';
  const tdStyle='border:1px solid #bbb;padding:5px 10px;font-family:Arial,sans-serif;font-size:12px;vertical-align:top';
  const tdAltStyle='border:1px solid #bbb;padding:5px 10px;font-family:Arial,sans-serif;font-size:12px;vertical-align:top;background:#f9f9f9';
  const head=`<tr>${headers.map(h=>`<th style="${thStyle}">${escH(h)}</th>`).join('')}</tr>`;
  const body=rows.map((r,ri)=>`<tr>${r.map(c=>`<td style="${ri%2===0?tdStyle:tdAltStyle}">${escH(String(c))}</td>`).join('')}</tr>`).join('');
  return`<table style="border-collapse:collapse">${head}${body}</table>`;
}
function buildTextTable(headers,rows){
  return[headers,...rows].map(r=>r.map(c=>String(c).replace(/\t/g,' ')).join('\t')).join('\n');
}
function copyTableToClipboard(tableId){
  const {headers,rows}=getTableData(tableId);
  if(rows.length===0){alert('No hay datos para copiar.');return;}
  const htmlContent=buildHtmlTable(headers,rows);
  const textContent=buildTextTable(headers,rows);
  function doWrite(){
    if(navigator.clipboard&&window.ClipboardItem){
      const htmlBlob=new Blob([htmlContent],{type:'text/html'});
      const textBlob=new Blob([textContent],{type:'text/plain'});
      navigator.clipboard.write([new ClipboardItem({'text/html':htmlBlob,'text/plain':textBlob})])
        .then(()=>showCopyFeedback(tableId))
        .catch(()=>fallbackTextCopy(textContent,tableId));
    } else {
      fallbackTextCopy(textContent,tableId);
    }
  }
  // Some browsers require clipboard write to happen inside a user gesture
  try{doWrite();}catch(e){fallbackTextCopy(textContent,tableId);}
}
function fallbackTextCopy(text,tableId){
  const ta=document.createElement('textarea');
  ta.value=text;ta.style.position='fixed';ta.style.opacity='0';
  document.body.appendChild(ta);ta.select();
  try{document.execCommand('copy');showCopyFeedback(tableId);}
  catch(e){alert('No se pudo copiar. Seleccioná la tabla manualmente.');}
  document.body.removeChild(ta);
}
function showCopyFeedback(tableId){
  const btn=document.getElementById('copybtn-'+tableId);
  if(btn){const orig=btn.textContent;btn.textContent='✓ Copiado';btn.style.background='var(--green)';btn.style.color='#fff';setTimeout(()=>{btn.textContent=orig;btn.style.background='';btn.style.color='';},2000);}
}
const DAY_NAMES=['Dom','Lun','Mar','Mié','Jue','Vie','Sáb'];
function getWeekDates(off){
  const now=new Date();
  const day=now.getDay();
  const diffToMon=day===0?-6:1-day;
  const base=new Date(now);
  base.setDate(now.getDate()+diffToMon+off*7);
  base.setHours(0,0,0,0);
  return Array.from({length:7},(_,i)=>{
    const x=new Date(base);x.setDate(base.getDate()+i);
    return x.toISOString().slice(0,10);
  });
}
function weekDayLabel(dateStr){
  const dt=new Date(dateStr+'T12:00:00');
  return DAY_NAMES[dt.getDay()]+' '+String(dt.getDate()).padStart(2,'0')+'/'+String(dt.getMonth()+1).padStart(2,'0');
}

function sortTasks(arr,sortCol,dir){
  return [...arr].sort(function(a,b){
    var va,vb;
    var dir2=dir||1;
    if(sortCol==='due'){va=a.due||'9999-12-31';vb=b.due||'9999-12-31';}
    else if(sortCol==='created'){va=a.created||'0000-00-00';vb=b.created||'0000-00-00';}
    else if(sortCol==='producto'){va=(a.producto||'').toLowerCase();vb=(b.producto||'').toLowerCase();}
    else if(sortCol==='status'){va=a.status||'';vb=b.status||'';}
    else if(sortCol==='priority'){
      var po={Urgente:0,Alta:1,Normal:2};
      va=po[a.priority]!==undefined?po[a.priority]:3;
      vb=po[b.priority]!==undefined?po[b.priority]:3;
    }
    else{va=a.due||'9999-12-31';vb=b.due||'9999-12-31';}
    if(va<vb)return -dir2;if(va>vb)return dir2;return 0;
  });
}

function doExportAprobados(){
  if(typeof XLSX==='undefined'){alert('Librería Excel no disponible');return;}
  var approved=tasks.filter(function(t){return t.status==='approved';});
  var rows=approved.map(function(t){
    var assigns=(t.assignments||[]).filter(function(a){return !a._removed;});
    var realH=assigns.reduce(function(s,a){return s+(a.realHours||0);},0);
    return{
      'Producto':t.producto,'Lote':t.lote,
      'Analistas':assigns.map(function(a){var u=getU(a.analyst);return u?u.name:'?';}).join(', '),
      'F. límite aprobación':t.due?fmtDF(t.due):'',
      'F. aprobación':t.approvedDate?fmtDF(t.approvedDate):'',
      'Prioridad':t.priority||'Normal',
      'Horas reales':realH||'',
      'Aprobado por':_approverName(t),
      'Notas':t.notes||''
    };
  });
  var wb=XLSX.utils.book_new();
  var ws=XLSX.utils.json_to_sheet(rows);
  ws['!cols']=[{wch:24},{wch:14},{wch:28},{wch:16},{wch:16},{wch:10},{wch:10},{wch:18},{wch:30}];
  XLSX.utils.book_append_sheet(wb,ws,'Aprobados');
  XLSX.writeFile(wb,'labtrack_aprobados_'+today()+'.xlsx');
}

function recalcLateStatus(){
  var todayStr=today();
  var todayMs=new Date(todayStr+'T12:00:00').getTime();
  tasks.forEach(function(t){
    // Approved tasks: freeze _dueStatus at approval time
    if(t.status==='approved'){t._dueStatus=t._dueStatus||'ok';return;}
    // a-ingresar tasks: never mark late by due date; track expected arrival separately
    if(t.status==='a-ingresar'||t.status==='muestra-ok'){t._dueStatus='ok';return;}
    if(!t.due){t._dueStatus='ok';return;}
    var dueMs=new Date(t.due+'T12:00:00').getTime();
    var daysLeft=Math.ceil((dueMs-todayMs)/(1000*60*60*24));
    if(daysLeft<0){t._dueStatus='late';}
    else if(daysLeft<=3){t._dueStatus='near';}
    else{t._dueStatus='ok';}
    // Restore 'late' status only for non-started tasks if was incorrectly set
    if(t.status==='late'){
      // Restore to workflow status
      t.status=(t.assignments&&t.assignments.filter(function(a){return !a._removed;}).length>0)?'scheduled':'pending';
    }
  });
}

}

async function hashPassword(plain){
  const enc=new TextEncoder();
  const buf=await crypto.subtle.digest('SHA-256',enc.encode(plain));
  const hex=Array.from(new Uint8Array(buf)).map(function(b){return b.toString(16).padStart(2,'0');}).join('');
  return '$sha256$'+hex;
}

async function doLogin(){
  if(!selectedLoginUser){loginError='Seleccioná un usuario.';render();return;}
  const v=(document.getElementById('login-pwd')||{}).value||'';
  const uid=selectedLoginUser.id||selectedLoginUser;
  const stored=passwords[uid]||'';
  let ok=false;
  if(stored.startsWith('$sha256$')){
    ok=(await hashPassword(v))===stored;
  } else {
    ok=(v===stored);
    if(ok){
      hashPassword(v).then(function(h){
        passwords[uid]=h;
        saveLS();saveNow().catch(function(e){console.error('pwd-upgrade:',e);});
      });
    }
  }
  if(ok){
    currentUser=uMap[uid];
    loginStep=1;loginError='';selectedLoginUser=null;
    currentView=firstViewForRole(currentUser);
    recordLoginSuccess(uid);
    try{localStorage.setItem('lt9-session',JSON.stringify({uid:uid,ts:Date.now()}));}catch(e){}
    render();
  } else {
    loginError='Contraseña incorrecta. Intentá de nuevo.';
    render();
  }
}

function renderReview(){
  // Tasks completed or observed - awaiting review
  const pending=tasks.filter(function(t){return t.status==='done'||t.status==='observed';});
  const done=tasks.filter(function(t){return t.status==='reviewed';});
  const cols='grid-template-columns:1.5fr 1fr 1fr .7fr .65fr .5fr';

  function reviewRow(t,canAct){
    const assigns=t.assignments||[];
    const realH=assigns.reduce(function(s,a){return s+(a.realHours||0);},0);
    const analStacks=assigns.map(function(a){const u=getU(a.analyst);return'<div class="av '+u.av+'" title="'+escH(u.name)+'" style="width:22px;height:22px;font-size:9px">'+escH(u.avInit)+'</div>';}).join('');
    const hColor=realH>0?'var(--green)':'var(--text3)';
    // PUNTO 3: solo se puede revisar si el análisis está en 'done' (todos los analistas completaron)
    const canReview=canAct&&t.status==='done';
    const canObserve=canAct&&(t.status==='done'||t.status==='observed');
    const lastObs=t.observations&&t.observations.length?t.observations[t.observations.length-1]:null;
    const lastCmpCmt=t.completionComments&&t.completionComments.length?t.completionComments[t.completionComments.length-1]:null;
    return'<div class="trow" style="'+cols+'">'
      +'<div class="cell-trunc" style="font-weight:500">'+escH(t.producto)+'</div>'
      +'<div class="cell-sub cell-trunc">'+escH(t.lote)+'</div>'
      +'<div style="display:flex;align-items:center;gap:3px">'+analStacks+'</div>'
      +'<div style="font-family:var(--mono);font-size:12px;font-weight:700;text-align:right;color:'+hColor+'">'+(realH?realH.toFixed(1)+'h':'—')+'</div>'
      +'<div><span class="pill '+t.status+'">'+statusLabel(t.status)+'</span>'
      +(lastCmpCmt?'<div style="font-size:9px;color:var(--text2);margin-top:2px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap" title="'+escH(lastCmpCmt.byName+': '+lastCmpCmt.comment)+'">💬 '+escH(lastCmpCmt.comment.slice(0,30))+'</div>':'')
      +(lastObs?'<div style="font-size:9px;color:var(--amber-text);margin-top:2px" title="'+escH(lastObs.comment)+'">'+'⚑ '+escH((lastObs.byName||'')+': '+lastObs.comment.slice(0,25))+'</div>':'')
      +(t.reviewedBy?'<div style="font-size:9px;color:var(--green);margin-top:1px">Rev. '+fmtDF(t.reviewedDate||'')+'</div>':'')
      +'</div>'
      +'<div style="display:flex;gap:4px;flex-wrap:wrap">'
      +(canAct?'<button class="btn sm" onclick="openEdit('+t.id+')" title="Ver análisis completo">🔍 Ver</button>':'')
      +(canReview?'<button class="btn sm suc" onclick="markReviewed('+t.id+')" title="Marcar como revisado">✓ Revisar</button>':'')
      +(canObserve?'<button class="btn sm" style="color:var(--amber-text);border-color:var(--amber)" onclick="markObserved('+t.id+')" title="Observar con comentario">⚑ Observar</button>':'')
      +'</div>'
      +'</div>';
  }

  const thead='<div class="thead" style="'+cols+'">'
    +'<div>Producto</div><div>Lote</div><div>Analistas</div>'
    +'<div style="text-align:right">T.Real</div>'
    +'<div>Estado</div><div>Acc.</div>'
    +'</div>';

  var html='<div style="display:flex;justify-content:flex-end;gap:5px;margin-bottom:10px">'
    +'<button class="btn sm" onclick="copyRevision(this)">📋 Copiar</button>'
    +'<button class="btn sm" onclick="exportRevisionXLSX()">↓ Excel</button>'
    +'</div>';

  // Pending review section
  html+='<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:8px">'
    +'<div class="sec" style="margin-bottom:0">Pendientes de revisión ('+pending.length+')</div>'
    +(pending.length>0?'<button class="btn sm" style="color:var(--text3)" onclick="markObservedAll()" title="Observar todos">Observar todos</button>':'')
    +'</div>'
    +'<div class="tbl" style="margin-bottom:20px">'
    +(pending.length===0
      ?'<div class="empty">No hay análisis completados pendientes de revisión ✓</div>'
      :thead+pending.map(function(t){return reviewRow(t,true);}).join(''))
    +'</div>';

  // Already reviewed section
  if(done.length>0){
    html+='<div class="sec" style="margin-bottom:8px;color:var(--green)">Ya revisados ('+done.length+')</div>'
    +'<div class="tbl">'
    +'<div class="tbl">'
      +thead+done.map(function(t){return reviewRow(t,false);}).join('')
      +'</div>';
  }

  return html;
}

          +'<b>'+escH(s.suggestedByName||'')+'</b>'
          +'<span style="color:var(--text3)">·</span>'
          +'<span>'+new Date(s.suggestedTs).toLocaleString('es',{day:'2-digit',month:'2-digit',year:'numeric',hour:'2-digit',minute:'2-digit'})+'</span>'

          +'</div>';
      }).join('');
      html+='</div>';
    }
    return html;
  }

  // ── Vista no-supervisor: mis sugerencias ──
  var mySugg=productSuggestions.filter(function(s){return s.suggestedBy===uid;}).sort(function(a,b){return(b.suggestedTs||0)-(a.suggestedTs||0);});
  var html='<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;flex-wrap:wrap;gap:8px">'
    +'<div style="font-size:13px;color:var(--text2)">Sugerí ingresos al supervisor. Recibirás notificación con la respuesta.</div>'
    +'<button class="btn pri" onclick="openSuggestionModal()">📦 Nueva sugerencia</button>'
    +'</div>';

  if(mySugg.length===0){
    return html+'<div class="empty">Todavía no enviaste sugerencias de ingreso.</div>';
  }

  var pendS=mySugg.filter(function(s){return s.status==='pending';});
  var resolvedS=mySugg.filter(function(s){return s.status!=='pending';});

  if(pendS.length>0){
    html+='<div style="margin-bottom:20px">';
    html+='<div style="font-size:13px;font-weight:700;color:var(--blue);margin-bottom:8px">En espera de respuesta ('+pendS.length+')</div>';
    html+=pendS.map(function(s){
      return '<div style="background:var(--surface);border:1px solid var(--blue);border-radius:var(--radius-lg);padding:12px 14px;margin-bottom:8px">'
        +'<div style="font-size:13px;font-weight:600;margin-bottom:4px">'+escH(s.producto)+'</div>'
        +'<div style="font-size:12px;color:var(--text3);font-family:var(--mono);margin-bottom:6px">'+escH(s.lote)+'</div>'
        +(s.priority&&s.priority!=='Normal'?'<div style="font-size:11px;color:var(--amber-text);font-weight:600;margin-bottom:4px">Prioridad: '+escH(s.priority)+'</div>':'')
        +(s.due?'<div style="font-size:11px;color:var(--text2);margin-bottom:4px">Vto. aprobación: <b style="font-family:var(--mono)">'+fmtDDMMYY(s.due)+'</b></div>':'')
        +(s.notes?'<div style="font-size:11px;color:var(--text2);margin-bottom:4px">Nota: '+escH(s.notes)+'</div>':'')
        +'<div style="font-size:10px;color:var(--text3)">Enviado '+new Date(s.suggestedTs).toLocaleString('es',{day:'2-digit',month:'2-digit',hour:'2-digit',minute:'2-digit'})+'</div>'
        +'<div style="margin-top:8px;display:inline-block;background:var(--blue-bg);color:var(--blue-text);border-radius:4px;padding:3px 10px;font-size:11px;font-weight:600">⏳ En espera</div>'
        +'</div>';
    }).join('');
    html+='</div>';
  }

  if(resolvedS.length>0){
    html+='<div>';
    html+='<div style="font-size:13px;font-weight:700;color:var(--text2);margin-bottom:8px">Historial ('+resolvedS.length+')</div>';
    html+=resolvedS.map(function(s){
      var confirmed=s.status==='confirmed';
      var borderC=confirmed?'var(--green)':'var(--red)';

        :'<div style="display:inline-block;background:var(--red-bg);color:var(--red);border-radius:4px;padding:3px 10px;font-size:11px;font-weight:600;margin-top:6px">✗ Rechazado</div>';

        +badge

  }
  return html;
}

function submitSuggestion(){
  var prod=((document.getElementById('sug-producto')||{}).value||'').trim();
  var lote=((document.getElementById('sug-lote')||{}).value||'').trim();
  if(!prod){alert('Indicá el nombre del producto.');return;}
  if(!lote){alert('Indicá el número de lote.');return;}
  var sug={id:nextSuggId++,producto:prod,lote:lote,
    priority:(document.getElementById('sug-priority')||{value:'Normal'}).value||'Normal',
    due:((document.getElementById('sug-due')||{}).value||''),
    notes:((document.getElementById('sug-notes')||{}).value||'').trim(),
    suggestedBy:currentUser.id,suggestedByName:currentUser.name,
    suggestedTs:Date.now(),status:'pending',_ts:Date.now()};
  productSuggestions.push(sug);
  replanNotifs.push({id:nextNotifId++,type:'product_suggestion',suggId:sug.id,
    fromUserId:currentUser.id,fromName:currentUser.name,status:'pending',_ts:Date.now()});
  showSuggModal=false;
  saveLS();saveNow().catch(function(e){console.error(e);});
  render();
  setTimeout(function(){alert('Sugerencia enviada. El supervisor recibirá la notificación.');},100);
}

function confirmSuggestion(id){
  // confirmSuggestion: redirige al flujo de revisión con modal pre-llenado
  openNewTaskFromSuggestion(id);
}

function rejectSuggestion(id){
  if(!confirm('¿Rechazar esta sugerencia de ingreso?'))return;
  var sug=productSuggestions.find(function(s){return s.id===id;});
  if(!sug)return;
  sug.status='rejected';sug._ts=Date.now();sug.rejectedBy=currentUser.id;
  // Resolve the incoming product_suggestion notification
  replanNotifs.forEach(function(n){if(n.type==='product_suggestion'&&n.suggId===id&&n.status==='pending'){n.status='resolved';n.resolvedTs=Date.now();n.resolvedHow='rejected';}});
  replanNotifs.push({id:nextNotifId++,type:'product_suggestion_response',
    suggId:id,forUserId:sug.suggestedBy,response:'rejected',
    status:'pending',_ts:Date.now()});
  saveLS();saveNow().catch(function(e){console.error(e);});
  render();
}

function markObservedAll(){
  if(currentUser.role!=='supervisor'&&currentUser.role!=='reviewer'){
    alert('Solo el Supervisor o el Revisor pueden observar análisis.');return;
  }
  var pending=tasks.filter(function(t){return t.status==='done';});
  if(!pending.length){alert('No hay análisis pendientes.');return;}
  var comment=prompt('Observación general para los '+pending.length+' análisis pendientes:','');
  if(comment===null)return;
  if(!comment.trim()){alert('La observación no puede estar vacía.');return;}
  pending.forEach(function(t){
    if(!t.observations)t.observations=[];
    t.observations.push({by:currentUser.id,byName:currentUser.name,byRole:currentUser.role,
      ts:Date.now(),comment:comment.trim(),fromStatus:t.status});
    t.status='observed';t.observedBy=currentUser.id;t.observedTs=Date.now();
    // Notificar analistas
    const assignees=[...new Set((t.assignments||[]).map(function(a){return a.analyst;}))];
    assignees.forEach(function(analystId){
      replanNotifs.push({id:nextNotifId++,type:'observation',taskId:t.id,analystId:analystId,forUserId:analystId,
        status:'pending',ts:Date.now(),fromUser:currentUser.id,fromName:currentUser.name,
        fromRole:currentUser.role,comment:comment.trim(),producto:t.producto,lote:t.lote});
    });
    auditLog('OBSERVE','TASK',t.id,{field:'status',oldVal:'done',newVal:'observed',
      description:'Observación masiva: '+t.producto+' '+t.lote},comment);
  });
  saveLS();render();
}

function renderInformes(){
  // ── helpers ──
  function diffDays(a,b){
    // a,b: date strings 'YYYY-MM-DD' or timestamps
    if(!a||!b)return null;
    const da=typeof a==='number'?new Date(a):new Date(a);
    const db=typeof b==='number'?new Date(b):new Date(b);
    const diff=Math.round((db-da)/(1000*60*60*24));
    return diff;
  }
  function tsToDate(ts){
    if(!ts)return '';
    const d=new Date(ts);
    return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');
  }
  function dCell(val){
    if(val===null||val===undefined||val==='')return '<td style="color:var(--text3);text-align:center">—</td>';
    return '<td style="text-align:center">'+val+'</td>';
  }
  function numCell(val,color){
    if(val===null||val===undefined)return '<td style="color:var(--text3);text-align:right">—</td>';
    var style='text-align:right'+(color?';color:'+color:'');
    return '<td style="'+style+'">'+val+'</td>';
  }

  // ── filters ──
  var filtered=[...tasks];
  if(informeFilterStatus) filtered=filtered.filter(function(t){return t.status===informeFilterStatus;});
  if(filterSearch){var q=filterSearch.toLowerCase();filtered=filtered.filter(function(t){return t.producto.toLowerCase().includes(q)||t.lote.toLowerCase().includes(q);});}

  // ── build rows ──
  var rows=filtered.map(function(t){
    var assigns=t.assignments||[];
    var analistas=assigns.map(function(a){return escH(getU(a.analyst).name.split(' ')[0]);}).join(', ');
    var hReal=assigns.reduce(function(s,a){return s+(a.realHours||0);},0);

    // Dates
    var fIngreso=t.created||'';
    var fVencimiento=t.due||'';
    var fInicio=assigns.length?assigns.reduce(function(min,a){return (!min||a.date<min)?a.date:min;},null):'';
    var fCompletado=t.completedTs?tsToDate(t.completedTs):(t.confirmedTs?tsToDate(t.confirmedTs):'');
    var fRevision=t.reviewedDate||'';
    var fAprobacion=t.approvedDate||'';

    // Intervals (days)
    var dIngresoInicio=diffDays(fIngreso,fInicio);
    var dInicioCompletado=diffDays(fInicio,fCompletado);
    var dCompletadoRevision=diffDays(fCompletado,fRevision);
    var dRevisionAprobacion=diffDays(fRevision,fAprobacion);
    var dTotal=diffDays(fIngreso,fAprobacion||fRevision||fCompletado||fInicio||fIngreso);
    var dDemora=fVencimiento?(diffDays(fVencimiento,fAprobacion||fRevision||fCompletado||fVencimiento)):null;

    var hColor=hReal>0?'var(--green)':'';

    var revName=_reviewerName(t);
    var aprName=_approverName(t);
    var obsArr=t.observations||[];
    var obsCount=obsArr.length;
    var obsTip=obsCount?escH(obsArr.map(function(o,i){var d=o.ts?new Date(o.ts).toISOString().slice(0,10):'';return '#'+(i+1)+' '+(o.byName||'')+(d?' ('+d+')':'')+': '+(o.comment||'');}).join('\n')):'';
    var obsCell=obsCount>0
      ?'<td style="text-align:center;cursor:help" title="'+obsTip+'"><span style="background:var(--amber-bg);color:var(--amber-text);border-radius:4px;padding:2px 7px;font-weight:600;font-size:11px">'+obsCount+'</span></td>'
      :'<td style="color:var(--text3);text-align:center">—</td>';
    return '<tr>'
      +'<td>'+escH(t.producto)+'</td>'
      +'<td style="font-family:var(--mono);font-size:11px">'+escH(t.lote)+'</td>'
      +'<td style="text-align:center"><span class="pill '+t.status+'" style="font-size:10px">'+statusLabel(t.status)+'</span></td>'
      +'<td>'+escH(analistas)+'</td>'
      +dCell(fVencimiento)
      +dCell(fIngreso)
      +dCell(fInicio)
      +dCell(fCompletado)
      +dCell(fRevision)
      +dCell(fAprobacion)
      +'<td>'+(revName?escH(revName):'<span style="color:var(--text3)">—</span>')+'</td>'
      +'<td>'+(aprName?escH(aprName):'<span style="color:var(--text3)">—</span>')+'</td>'
      +numCell(dIngresoInicio)
      +numCell(dInicioCompletado)
      +numCell(dCompletadoRevision)
      +numCell(dRevisionAprobacion)
      +numCell(dTotal,dTotal!==null?(dTotal<=30?'var(--green)':dTotal<=60?'var(--amber)':'var(--red)'):'')
      +numCell(dDemora,dDemora===null?'':dDemora>0?'var(--red)':dDemora===0?'var(--amber)':'var(--green)')
      +numCell(hReal||null,hColor)
      +obsCell
      +'</tr>';
  });

  // ── header ──
  var thStyle='padding:8px 10px;background:var(--bg2);font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.04em;color:var(--text2);white-space:nowrap;border-bottom:2px solid var(--border)';
  var tdStyle='padding:7px 10px;border-bottom:1px solid var(--border);font-size:12px;vertical-align:middle;white-space:nowrap';

  var html='<div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap;margin-bottom:12px">'
    +searchBarHtml()
    +'<select onchange="informeFilterStatus=this.value;render()" style="font-size:12px;padding:5px 8px;border:1px solid var(--border2);border-radius:var(--radius);background:var(--surface);color:var(--text)">'
    +'<option value="">Todos los estados</option>'
    +'<option value="pending">Ingresado</option>'
    +'<option value="scheduled">Programado</option>'
    +'<option value="progress">En curso</option>'
    +'<option value="pending-confirm">Completado (conf. pendiente)</option>'
    +'<option value="done">Completado p/ revisar</option>'
    +'<option value="reviewed">Revisado</option>'
    +'<option value="approved">Aprobado</option>'
    +'<option value="observed">Observado</option>'
    +'<option value="late">Vencido</option>'
    +'</select>'
    +'<span style="font-size:12px;color:var(--text3)">'+filtered.length+' muestras</span>'
    +'<div style="display:flex;gap:5px;margin-left:auto">'
    +'<button class="btn sm" onclick="copyInformeTable()">📋 Copiar</button>'
    +'<button class="btn sm" onclick="exportXLSX()">↓ Excel</button>'
    +'</div>'
    +'</div>'
    +'<div style="overflow-x:auto;border:1px solid var(--border);border-radius:var(--radius-lg)">'
    +'<table id="informe-table" style="width:100%;border-collapse:collapse;font-size:12px">'
    +'<thead><tr>'
    +'<th style="'+thStyle+';text-align:left">Producto</th>'
    +'<th style="'+thStyle+';text-align:left">Lote</th>'
    +'<th style="'+thStyle+'">Estado</th>'
    +'<th style="'+thStyle+';text-align:left">Analistas</th>'
    +'<th style="'+thStyle+'">F. Vencimiento</th>'
    +'<th style="'+thStyle+'">F. Ingreso</th>'
    +'<th style="'+thStyle+'">F. Inicio</th>'
    +'<th style="'+thStyle+'">F. Completado</th>'
    +'<th style="'+thStyle+'">F. Revisión</th>'
    +'<th style="'+thStyle+'">F. Aprobación</th>'
    +'<th style="'+thStyle+';text-align:left">Revisado por</th>'
    +'<th style="'+thStyle+';text-align:left">Aprobado por</th>'
    +'<th style="'+thStyle+'" title="Días desde ingreso hasta inicio de análisis">D. Ingreso→Inicio</th>'
    +'<th style="'+thStyle+'" title="Días desde inicio hasta completado">D. Análisis</th>'
    +'<th style="'+thStyle+'" title="Días desde completado hasta revisión">D. Complet.→Revisión</th>'
    +'<th style="'+thStyle+'" title="Días desde revisión hasta aprobación">D. Revisión→Aprobación</th>'
    +'<th style="'+thStyle+'" title="Días totales desde ingreso hasta último estado">D. Total</th>'
    +'<th style="'+thStyle+'" title="Días de demora respecto a vencimiento (negativo=a tiempo)">D. Demora</th>'
    +'<th style="'+thStyle+';text-align:right">H. Real</th>'
    +'<th style="'+thStyle+'">Observaciones</th>'
    +'</tr></thead>'
    +'<tbody>'
    +(rows.length?rows.join('').replace(/<td/g,'<td style="'+tdStyle+'"').replace(/<td style="'+tdStyle+'"style=/g,'<td style='):'<tr><td colspan="20" style="'+tdStyle+';text-align:center;color:var(--text3);padding:20px">Sin resultados</td></tr>')
    +'</tbody></table></div>';

  return html;
}

function copyInformeTable(){
  var tbl=document.getElementById('informe-table');
  if(!tbl){alert('No hay tabla para copiar.');return;}
  var rows=[];
  tbl.querySelectorAll('tr').forEach(function(tr){
    var cells=[];
    tr.querySelectorAll('th,td').forEach(function(td){
      cells.push(td.innerText.replace(/\t|\n/g,' ').trim());
    });
    rows.push(cells.join('\t'));
  });
  var text=rows.join('\n');
  navigator.clipboard.writeText(text).then(function(){
    var btn=document.querySelector('[onclick="copyInformeTable()"]');
    if(btn){btn.textContent='✓ Copiado';setTimeout(function(){btn.textContent='\uD83D\uDCCB Copiar para Excel';},2000);}
  }).catch(function(){
    // Fallback
    var ta=document.createElement('textarea');
    ta.value=text;document.body.appendChild(ta);ta.select();
    document.execCommand('copy');document.body.removeChild(ta);
    var btn=document.querySelector('[onclick="copyInformeTable()"]');
    if(btn){btn.textContent='✓ Copiado';setTimeout(function(){btn.textContent='\uD83D\uDCCB Copiar para Excel';},2000);}
  });
}

function _stampTask(t){ t._ts = _ts(); return t; }

// Merge two snapshots: prefer newer _ts per entity
function _ts(){ return Date.now(); }

// Merge two versions of the same task: assignment-level granularity
function _mergeTaskDeep(lt, rt){
  if(!lt)return rt; if(!rt)return lt;
  // Use the newer _ts version as base for scalar fields
  var base=(lt._ts||0)>=(rt._ts||0)?lt:rt;
  var other=(base===lt)?rt:lt;
  var merged=Object.assign({},base);
  // Merge assignments by analyst+date key — keep the one with more data or newer _ts
  var aMap={};
  (other.assignments||[]).forEach(function(a){aMap[a.analyst+'|'+(a.date||'')]=a;});
  (base.assignments||[]).forEach(function(a){
    var k=a.analyst+'|'+(a.date||'');
    var o=aMap[k];
    if(!o||(a._ts||0)>=(o._ts||0))aMap[k]=a;
  });
  merged.assignments=Object.values(aMap);
  // Merge append-only arrays (observations, completionComments, resubmitHistory) by ts dedup
  function _appendMerge(a1,a2){
    var seen=new Set();var r=[];
    [a1||[],a2||[]].forEach(function(arr){arr.forEach(function(x){var k=(x.ts||0)+'|'+(x.by||x.byName||'');if(!seen.has(k)){seen.add(k);r.push(x);}});});
    return r.sort(function(a,b){return(a.ts||0)-(b.ts||0);});
  }
  merged.observations=_appendMerge(lt.observations,rt.observations);
  merged.completionComments=_appendMerge(lt.completionComments,rt.completionComments);
  merged.resubmitHistory=_appendMerge(lt.resubmitHistory,rt.resubmitHistory);
  // Keep max of monotonically-increasing timestamps
  ['completedTs','reviewedTs','approvedTs','confirmedTs','startedTs'].forEach(function(f){
    var v=Math.max(lt[f]||0,rt[f]||0);
    if(v)merged[f]=v; else delete merged[f];
  });
  return merged;
}

function mergeSnapshot(local, remote) {
  try {
    var L = typeof local === 'string' ? JSON.parse(local) : local;
    var R = typeof remote === 'string' ? JSON.parse(remote) : remote;
    if(!L || !R) return L || R; // FIX: preferir local ante falta de datos

    var merged = Object.assign({}, R); // start from remote base

    // ── Tasks: merge by id, keep newer ──
    var taskMap = {};
    (R.tasks||[]).forEach(function(t){ taskMap[t.id] = t; });
    (L.tasks||[]).forEach(function(t){
      var rt=taskMap[t.id];
      if(!rt){taskMap[t.id]=t;}
      else{taskMap[t.id]=_mergeTaskDeep(t,rt);}
    });
    merged.tasks = Object.values(taskMap).filter(function(t){ return !t._deleted; });

    // ── FreeTasks: merge by id, keep newer ──
    var ftMap = {};
    (R.freeTasks||[]).forEach(function(t){ ftMap[t.id] = t; });
    (L.freeTasks||[]).forEach(function(t){
      var rt = ftMap[t.id];
      if(!rt || (t._ts||0) > (rt._ts||0)) ftMap[t.id] = t;
    });
    merged.freeTasks = Object.values(ftMap).filter(function(t){ return !t._deleted; });

    // ── ProductSuggestions: merge by id, keep newer ──
    var psMap={};
    (R.productSuggestions||[]).forEach(function(s){psMap[s.id]=s;});
    (L.productSuggestions||[]).forEach(function(s){var rs=psMap[s.id];if(!rs||(s._ts||0)>(rs._ts||0))psMap[s.id]=s;});
    merged.productSuggestions=Object.values(psMap);

    // ── Counters: keep max ──
    merged.nextId         = Math.max(L.nextId||0,         R.nextId||0);
    merged.nextUid        = Math.max(L.nextUid||0,        R.nextUid||0);
    merged.nextNotifId    = Math.max(L.nextNotifId||0,    R.nextNotifId||0);
    merged.nextAbsId      = Math.max(L.nextAbsId||0,      R.nextAbsId||0);
    merged.nextMgmtId     = Math.max(L.nextMgmtId||0,     R.nextMgmtId||0);
    merged.nextFreeTaskId = Math.max(L.nextFreeTaskId||0, R.nextFreeTaskId||0);
    merged.nextSchedReqId = Math.max(L.nextSchedReqId||0, R.nextSchedReqId||0);
    merged.nextSuggId     = Math.max(L.nextSuggId||0,     R.nextSuggId||0);

    // ── Schedule requests: merge by id ──
    // Status priority: approved/rejected > pending (una solicitud resuelta nunca retrocede)
    function _srPriority(r){ return {approved:2,rejected:2,pending:1}[r.status]||0; }
    var srMap = {};
    (R.scheduleRequests||[]).forEach(function(r){ srMap[r.id] = r; });
    (L.scheduleRequests||[]).forEach(function(r){
      var rr = srMap[r.id];
      if(!rr) { srMap[r.id]=r; return; }
      var lPri=_srPriority(r), rPri=_srPriority(rr);
      // Primero: status resuelto gana sobre pendiente
      if(lPri > rPri){ srMap[r.id]=r; return; }
      if(rPri > lPri){ return; }
      // Mismo nivel de status: gana el más reciente por _ts
      if((r._ts||0) > (rr._ts||0)) srMap[r.id]=r;
    });
    merged.scheduleRequests = Object.values(srMap);

    // ── Replan notifs: merge by id ──
    var rnMap = {};
    (R.replanNotifs||[]).forEach(function(n){ rnMap[n.id] = n; });
    (L.replanNotifs||[]).forEach(function(n){
      var rn = rnMap[n.id];
      if(!rn || (n._ts||0) > (rn._ts||0)) rnMap[n.id] = n;
    });
    merged.replanNotifs = Object.values(rnMap);

    // ── MgmtTasks: merge by id ──
    var mtMap = {};
    (R.mgmtTasks||[]).forEach(function(t){ mtMap[t.id] = t; });
    (L.mgmtTasks||[]).forEach(function(t){
      var rt = mtMap[t.id];
      if(!rt || (t._ts||0) > (rt._ts||0)) mtMap[t.id] = t;
    });
    merged.mgmtTasks = Object.values(mtMap).filter(function(t){ return !t._deleted; });

    // ── Users: merge by id, keep newer ──
    var uMap2 = {};
    (R.users||[]).forEach(function(u){ uMap2[u.id] = u; });
    (L.users||[]).forEach(function(u){
      var ru = uMap2[u.id];
      if(!ru || (u._ts||0) > (ru._ts||0)) uMap2[u.id] = u;
    });
    merged.users = Object.values(uMap2).filter(function(u){ return !u._deleted; });

    // ── Passwords: merge by key, keep newer ──
    var LP = L.passwords||{}, RP = R.passwords||{};
    var LP_ts = L.passwords_ts||{}, RP_ts = R.passwords_ts||{};
    var mergedPwd = Object.assign({}, RP);
    var mergedPwdTs = Object.assign({}, RP_ts);
    Object.keys(LP).forEach(function(uid){
      if((LP_ts[uid]||0) > (RP_ts[uid]||0)){
        mergedPwd[uid] = LP[uid];
        mergedPwdTs[uid] = LP_ts[uid];
      }
    });
    merged.passwords = mergedPwd;
    merged.passwords_ts = mergedPwdTs;

    // ── Absences: merge by analystId, keep newer ──
    var LA = L.absences||{}, RA = R.absences||{};
    var LA_ts = L.absences_ts||{}, RA_ts = R.absences_ts||{};
    var mergedAbs = Object.assign({}, RA);
    var mergedAbsTs = Object.assign({}, RA_ts);
    Object.keys(LA).forEach(function(aid){
      if((LA_ts[aid]||0) > (RA_ts[aid]||0)){
        mergedAbs[aid] = LA[aid];
        mergedAbsTs[aid] = LA_ts[aid];
      }
    });
    merged.absences = mergedAbs;
    merged.absences_ts = mergedAbsTs;

    // ── Analyst schedules: merge by analystId ──
    var LS = L.analystSchedules||{}, RS = R.analystSchedules||{};
    var mergedSched = Object.assign({}, RS);
    Object.keys(LS).forEach(function(aid){
      var ls = LS[aid], rs = RS[aid];
      if(!rs){ mergedSched[aid] = ls; return; }
      // Merge default schedule
      var lDef = ls.default||{}, rDef = rs.default||{};
      var mergedDef = ((lDef._ts||0) > (rDef._ts||0)) ? lDef : rDef;
      // Merge overrides by date
      var mergedOv = Object.assign({}, rs.overrides||{});
      Object.keys(ls.overrides||{}).forEach(function(d){
        var lo = ls.overrides[d], ro = (rs.overrides||{})[d];
        if(!ro || (lo._ts||0) > (ro._ts||0)) mergedOv[d] = lo;
      });
      mergedSched[aid] = {default: mergedDef, overrides: mergedOv};
    });
    merged.analystSchedules = mergedSched;

    // ── Workday config: keep newer (timestamp stored inside object as ._ts) ──
    var lwc_ts=(L.workdayConfig&&L.workdayConfig._ts)||0;
    var rwc_ts=(R.workdayConfig&&R.workdayConfig._ts)||0;
    if(lwc_ts > rwc_ts){merged.workdayConfig=L.workdayConfig;}

    // ── MgmtCategories: keep newer ──
    if((L.mgmtCategories_ts||0) > (R.mgmtCategories_ts||0)){
      merged.mgmtCategories = L.mgmtCategories;
      merged.mgmtCategories_ts = L.mgmtCategories_ts;
    }

    // ── AbsenceTypesDef: keep newer ──
    if((L.absenceTypesDef_ts||0) > (R.absenceTypesDef_ts||0)){
      merged.absenceTypesDef = L.absenceTypesDef;
      merged.absenceTypesDef_ts = L.absenceTypesDef_ts;
    }

    return merged;
  } catch(e) {
    console.error('mergeSnapshot error:', e);
    return local; // FIX: fallback = local para no perder trabajo del usuario activo
  }
}

function quickActivateDay(dateStr, analystId) {
  // Collect all analysts assigned to tasks or mgmt on this day
  var affectedAnalysts = new Set();
  tasks.forEach(function(t){
    (t.assignments||[]).forEach(function(a){
      if(a.date===dateStr) affectedAnalysts.add(a.analyst);
    });
  });
  mgmtTasks.forEach(function(mt){
    var occs = expandMgmt(mt, dateStr, dateStr);
    occs.forEach(function(o){ (o.analysts||[]).forEach(function(id){ affectedAnalysts.add(id); }); });
  });
  // Also include the specific analyst passed
  if(analystId) affectedAnalysts.add(analystId);
  var ids = Array.from(affectedAnalysts);
  // Add as extra workday for these analysts
  workdayConfig.off = workdayConfig.off.filter(function(o){ return (o.date||o)!==dateStr; });
  workdayConfig.extra = workdayConfig.extra.filter(function(e){ return (e.date||e)!==dateStr; });
  workdayConfig.extra.push({date:dateStr, analysts:ids, note:'Activado desde gestión de conflictos'});
  workdayConfig.extra.sort(function(a,b){ return (a.date||a).localeCompare(b.date||b); });
  workdayConfig._ts=Date.now();
  saveLS();
  _lastHtml='';
  render();
}

function renderNotificaciones(){
  var isSup=isSupRole();
  var allReqs=[...scheduleRequests].sort(function(a,b){return b.ts-a.ts;});
  var pending=allReqs.filter(function(r){return r.status==='pending';});
  var history=allReqs.filter(function(r){return r.status!=='pending';});

  function typeLabel(t){
    return t==='change'?'Cambio de horario':t==='overtime'?'Horas extra':t==='reduced'?'Horario reducido':t==='shift'?'Guardia / Turno':t||'Solicitud';
  }
  function statusStr(s){
    return s==='approved'?'Aprobado':s==='rejected'?'Rechazado':'Pendiente';
  }
  function buildDetail(p){
    if(!p)return'—';
    var d=typeLabel(p.type);
    if(p.startTime&&p.endTime)d+=': '+p.startTime+'–'+p.endTime;
    if(p.extraHours)d+=' (+'+p.extraHours+'h extra)';
    if(p.breakMinutes!==undefined)d+=', pausa '+p.breakMinutes+'min';
    return d;
  }

  // Copiar al portapapeles como TSV para Excel
  function copyTsv(){
    var HDR='Analista	Fecha de solicitud	Fecha asig.	Detalle / Motivo	Comentario analista	Estado	Aprobado por';
    var rows=allReqs.map(function(r){
      var u=getU(r.analystId);
      var reviewer=r.reviewedBy?getU(r.reviewedBy):null;
      var ts=new Date(r.ts);
      return [
        u.name,
        ts.toLocaleDateString('es',{day:'2-digit',month:'2-digit',year:'numeric'})+' '+ts.toLocaleTimeString('es',{hour:'2-digit',minute:'2-digit'}),
        r.dateStr?fmtDF(r.dateStr):'—',
        buildDetail(r.proposed),
        r.reason||'',
        statusStr(r.status),
        reviewer?reviewer.name:'—'
      ].join('	');
    });
    var text=HDR+'\n'+rows.join('\n');
    navigator.clipboard.writeText(text).catch(function(){
      var ta=document.createElement('textarea');ta.value=text;
      document.body.appendChild(ta);ta.select();document.execCommand('copy');ta.remove();
    });
    var btn=document.getElementById('btn-copy-sol');
    if(btn){btn.textContent='✓ Copiado';setTimeout(function(){btn.textContent='📋 Copiar para Excel';},2000);}
  }
  // Guardar referencia global para el onclick
  window._ltCopyTsv=copyTsv;

  // Tabla HTML
  var COLS='display:grid;grid-template-columns:120px 100px 80px 140px 1fr 90px 110px'+(isSup?' 100px':'');
  function thead(){
    return'<div style="'+COLS+';gap:6px;padding:7px 12px;background:var(--bg2);border-bottom:1px solid var(--border);font-size:10px;font-weight:700;color:var(--text2);text-transform:uppercase;letter-spacing:.04em">'
      +'<div>Analista</div><div>Fecha sol.</div><div>Fecha asig.</div><div>Detalle / Motivo</div>'
      +'<div>Comentario analista</div><div>Estado</div><div>Aprobado por</div>'
      +(isSup?'<div>Acciones</div>':'')
      +'</div>';
  }
  function trow(r, showActions){
    var u=getU(r.analystId);
    var reviewer=r.reviewedBy?getU(r.reviewedBy):null;
    var ts=new Date(r.ts);
    var sc=r.status==='approved'?'var(--green)':r.status==='rejected'?'var(--red)':'var(--amber)';
    return'<div style="'+COLS+';gap:6px;padding:9px 12px;border-bottom:1px solid var(--border);font-size:12px;align-items:start">'
      // Analista
      +'<div style="display:flex;align-items:center;gap:5px"><div class="av '+u.av+'" style="width:20px;height:20px;font-size:8px;flex-shrink:0">'+escH(u.avInit)+'</div><span style="font-weight:600;font-size:11px">'+escH(u.name)+'</span></div>'
      // Fecha solicitud
      +'<div style="font-family:var(--mono);font-size:10px">'+ts.toLocaleDateString('es',{day:'2-digit',month:'2-digit',year:'numeric'})+'<br><span style="color:var(--text3)">'+ts.toLocaleTimeString('es',{hour:'2-digit',minute:'2-digit'})+'</span></div>'
      // Fecha asig
      +'<div style="font-family:var(--mono);font-size:11px">'+(r.dateStr?fmtDF(r.dateStr):'<span style="color:var(--text3)">—</span>')+'</div>'
      // Detalle
      +'<div style="font-size:11px;color:var(--text2)">'+escH(buildDetail(r.proposed))+'</div>'
      // Comentario / motivo analista
      +'<div style="font-size:11px;color:var(--text2)">'+(r.reason?escH(r.reason):'<span style="color:var(--text3)">—</span>')+'</div>'
      // Estado
      +'<div><span style="font-size:10px;font-weight:700;padding:2px 7px;border-radius:10px;background:'+sc+'22;color:'+sc+'">'+statusStr(r.status)+'</span></div>'
      // Aprobado por
      +'<div style="font-size:11px;color:var(--text3)">'+(reviewer?escH(reviewer.name):'—')+'</div>'
      // Acciones
      +(isSup
        ?'<div style="display:flex;gap:3px;flex-wrap:wrap">'
          +(showActions
            ?'<button class="btn sm suc" onclick="approveSchedule('+r.id+')" style="font-size:10px">✓ Aprobar</button>'
             +'<button class="btn sm dan" onclick="rejectSchedule('+r.id+')" style="font-size:10px">✗ Rechazar</button>'
             +'<button class="btn sm" onclick="editScheduleRequest('+r.id+')" style="font-size:10px">✎ Editar</button>'
            :'')
          +(r.status==='approved'
            ?'<button class="btn sm" onclick="declineApproval('+r.id+')" style="font-size:10px;color:var(--red)">↩ Declinar apr.</button>'
            :'')
          +'</div>'
        :'')
      +'</div>';
  }

  var html='<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;flex-wrap:wrap;gap:8px">'
    +'<div class="sec" style="margin-bottom:0">Solicitudes de cambio de horario ('+allReqs.length+')</div>'
    +'<div style="display:flex;gap:5px">'
    +'<button id="btn-copy-sol" class="btn sm" onclick="window._ltCopyTsv&&window._ltCopyTsv()">📋 Copiar</button>'
    +'<button class="btn sm" onclick="exportNotificacionesXLSX()">↓ Excel</button>'
    +'</div>'
    +'</div>';

  html+='<div style="font-size:12px;font-weight:600;color:var(--amber);margin-bottom:8px">Pendientes ('+pending.length+')</div>';
  if(pending.length===0){
    html+='<div class="empty" style="margin-bottom:16px">Sin solicitudes pendientes ✓</div>';
  }else{
    html+='<div class="tbl" style="margin-bottom:20px;overflow-x:auto">'+thead()+pending.map(function(r){return trow(r,true);}).join('')+'</div>';
  }
  if(history.length>0){
    html+='<div style="font-size:12px;font-weight:600;color:var(--text2);margin-bottom:8px">Historial ('+history.length+')</div>';
    html+='<div class="tbl" style="overflow-x:auto">'+thead()+history.map(function(r){return trow(r,false);}).join('')+'</div>';
  }
  return html;
}

// ── Electronic signature: require reason for critical actions ──
function requireSignature(action, label, callback) {
  // Show confirmation modal with reason field
  const overlay = document.createElement('div');
  overlay.style.cssText = 'position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.5);z-index:9999;display:flex;align-items:center;justify-content:center';
  overlay.innerHTML = '<div style="background:var(--surface);border-radius:var(--radius-lg);padding:24px;max-width:420px;width:90%;box-shadow:0 8px 32px rgba(0,0,0,.3)">'
    + '<h3 style="margin:0 0 8px;font-size:15px">Firma electrónica — '+escH(label)+'</h3>'
    + '<p style="font-size:12px;color:var(--text2);margin:0 0 16px">Esta acción quedará registrada en el audit trail con tu identidad y fecha/hora.</p>'
    + '<div style="margin-bottom:12px"><label style="font-size:12px;font-weight:600;color:var(--text2)">Contraseña de confirmación</label>'
    + '<input type="password" id="sig-pwd" placeholder="Ingresá tu contraseña" style="width:100%;margin-top:4px;padding:8px 10px;border:1px solid var(--border2);border-radius:var(--radius);background:var(--bg2);color:var(--text);font-size:13px;box-sizing:border-box"></div>'
    + '<div style="margin-bottom:16px"><label style="font-size:12px;font-weight:600;color:var(--text2)">Motivo / justificación <span style="font-size:11px;font-weight:400;color:var(--text3)">(opcional)</span></label>'
    + '<textarea id="sig-reason" placeholder="Ej: Resultados verificados, análisis conforme a especificaciones" rows="3" style="width:100%;margin-top:4px;padding:8px 10px;border:1px solid var(--border2);border-radius:var(--radius);background:var(--bg2);color:var(--text);font-size:13px;box-sizing:border-box;resize:vertical"></textarea></div>'
    + '<div id="sig-err" style="color:var(--red);font-size:12px;margin-bottom:8px;display:none"></div>'
    + '<div style="display:flex;gap:8px;justify-content:flex-end">'
    + '<button onclick="this.closest(\'div[style*=fixed]\').remove()" style="padding:8px 16px;border:1px solid var(--border2);border-radius:var(--radius);background:var(--surface);color:var(--text);cursor:pointer;font-size:13px">Cancelar</button>'
    + '<button id="sig-confirm" style="padding:8px 16px;border:none;border-radius:var(--radius);background:var(--blue);color:#fff;cursor:pointer;font-size:13px;font-weight:600">Confirmar y firmar</button>'
    + '</div></div>';
  document.body.appendChild(overlay);
  // Wire confirm button
  document.getElementById('sig-confirm').onclick = async function() {
    const pwd = document.getElementById('sig-pwd').value;
    const reason = document.getElementById('sig-reason').value.trim();
    const errEl = document.getElementById('sig-err');
    if(!pwd) { errEl.textContent='Ingresá tu contraseña'; errEl.style.display='block'; return; }
    const uid = currentUser.id;
    const stored = passwords[uid]||'';
    let ok = false;
    if(stored.startsWith('$sha256')) { ok = (await hashPassword(pwd)) === stored; }
    else { ok = (pwd === stored); }
    if(!ok) { errEl.textContent='Contraseña incorrecta'; errEl.style.display='block'; return; }
    overlay.remove();
    callback(reason);
  };
  document.getElementById('sig-pwd').onkeydown = function(e){
    if(e.key==='Enter') document.getElementById('sig-confirm').click();
  };
}

// ── Immutability guard: check if a task can still be edited ──
function canEditTask(t) {
  // Once approved, task data is locked — only admin can override
  if(t.status==='approved') return false;
  return true;
}
function canEditField(t, field) {
  // After review, analytical results (notes, hours) are locked
  const lockedAfterReview = ['notes','assignments'];
  if(['reviewed','approved'].includes(t.status) && lockedAfterReview.includes(field)) return false;
  return true;
}

function exportAuditCSV(){
  var rows=[['Fecha','Hora','Usuario','Rol','Accion','Entidad','ID','Descripcion','Motivo']];
  [...auditTrail].sort(function(a,b){return a.ts-b.ts;}).forEach(function(e){
    var dt=new Date(e.ts);var u=getU(e.userId||e.user);
    rows.push([dt.toLocaleDateString('es'),dt.toLocaleTimeString('es'),u?u.name:(e.userName||e.userId||''),u?u.role:(e.userRole||''),,e.action,e.entity,String(e.entityId||''),(e.details&&e.details.description)||'',e.reason||'']);
  });
  var csv=rows.map(function(r){return r.map(function(c){return'"'+String(c||'').replace(/"/g,'""')+'"';}).join(',');}).join('\n');
  var blob=new Blob(['\uFEFF'+csv],{type:'text/csv;charset=utf-8'});
  var a=document.createElement('a');a.href=URL.createObjectURL(blob);
  a.download='audit_trail_'+new Date().toISOString().slice(0,10)+'.csv';
  document.body.appendChild(a);a.click();document.body.removeChild(a);
}

// ── Render audit trail view ──
function renderAuditTrail() {
  if(!isSupRole()) return '<div class="empty">Acceso restringido</div>';
  const entries = [...(auditTrail||[])]; // más reciente primero (ya ordenado así)
  const filterUser = auditFilterUser||'';
  const filterAction = auditFilterAction||'';
  const filterEntity = auditFilterEntity||'';
  
  let f = entries;
  if(filterUser) f = f.filter(function(e){return (e.userId||e.user)===filterUser||(e.userName||'').toLowerCase().includes(filterUser.toLowerCase());});
  if(filterAction) f = f.filter(function(e){return e.action===filterAction;});
  if(filterEntity) f = f.filter(function(e){return e.entity===filterEntity;});

  const actionColors = {
    CREATE:'var(--green)',EDIT:'var(--blue)',STATUS_CHANGE:'var(--amber)',
    DELETE:'var(--red)',APPROVE:'var(--teal)',REVIEW:'var(--purple)',
    OBSERVE:'var(--amber)',LOGIN:'var(--text3)',LOGOUT:'var(--text3)'
  };

function copyAuditTrail() {
  const entries = [...(auditTrail||[])]; // ya ordenado más reciente primero
  const hdrs = ['Fecha','Hora','Usuario','Rol','Acción','Entidad','ID','Campo','Valor anterior','Valor nuevo','Motivo'];
  const rows = entries.map(function(e){
    const d = new Date(e.ts);
    const det = e.details||{};
    return [
      d.toLocaleDateString('es'),
      d.toLocaleTimeString('es'),
      e.userName||'',
      e.userRole||'',
      e.action||'',
      e.entity||'',
      e.entityId||'',
      det.field||'',
      det.oldVal!==undefined?String(det.oldVal):'',
      det.newVal!==undefined?String(det.newVal):'',
      e.reason||''
    ].join('\t');
  });
  const text = [hdrs.join('\t'),...rows].join('\n');
  navigator.clipboard.writeText(text).then(function(){
    alert('Audit trail copiado ('+entries.length+' registros).\nPodés pegarlo en Excel.');
  }).catch(function(){
    const ta=document.createElement('textarea');ta.value=text;
    document.body.appendChild(ta);ta.select();document.execCommand('copy');
    document.body.removeChild(ta);
    alert('Copiado ('+entries.length+' registros)');
  });
}

// ── 21 CFR Part 11: Failed login tracking ──
let loginAttempts = {};  // {uid: {count, lastTs}}
const MAX_LOGIN_ATTEMPTS = 5;
const LOGIN_LOCKOUT_MS = 15 * 60 * 1000; // 15 min

function checkLoginLockout(uid) {
  const att = loginAttempts[uid];
  if(!att) return false;
  if(Date.now() - att.lastTs > LOGIN_LOCKOUT_MS) { loginAttempts[uid] = null; return false; }
  return att.count >= MAX_LOGIN_ATTEMPTS;
}
function recordLoginFailure(uid, name) {
  if(!loginAttempts[uid]) loginAttempts[uid] = {count:0, lastTs:0};
  loginAttempts[uid].count++;
  loginAttempts[uid].lastTs = Date.now();
  /* LOGIN_FAIL no se registra en audit trail */
  if(loginAttempts[uid].count >= MAX_LOGIN_ATTEMPTS) {
    /* ACCOUNT_LOCKED no se registra en audit trail */
  }
}
function recordLoginSuccess(uid) {
  loginAttempts[uid] = null; // reset on success
}

// ── 21 CFR Part 11: Session inactivity timeout ──
let _lastActivityTs = Date.now();
const SESSION_TIMEOUT_MS = 30 * 60 * 1000; // 30 min inactivity
let _sessionTimer = null;

function resetActivityTimer() {
  _lastActivityTs = Date.now();
}
function startSessionWatchdog() {
  if(_sessionTimer) clearInterval(_sessionTimer);
  _sessionTimer = setInterval(function() {
    if(!currentUser) return;
    const idle = Date.now() - _lastActivityTs;
    if(idle >= SESSION_TIMEOUT_MS) {
      /* SESSION_TIMEOUT no se registra en audit trail */
      currentUser = null;
      selectedLoginUser = null;
      loginStep = 1;
      loginError = 'Sesión cerrada por inactividad (30 min). Por favor ingresá nuevamente.';
      render();
    }
  }, 60000); // check every minute
}

// ── GLP: Soft delete — never destroy records ──
function softDeleteTask(id, reason) {
  const t = tasks.find(function(x){return x.id===id;});
  if(!t) return;
  t._deleted = true;
  t._deletedBy = currentUser.id;
  t._deletedTs = Date.now();
  t._deletedReason = reason;
  t._ts = Date.now();
  auditLog('DELETE','TASK',id,{
    description:'Anulación (borrado lógico): '+t.producto+' '+t.lote,
    oldVal: t.status
  }, reason);
  closeModal(); saveLS(); render();
}

// ── GLP/ISO 17025: Record versioning — save snapshot before each edit ──
function saveTaskVersion(t) {
  if(!t) return;
  if(!t._history) t._history = [];
  t._history.push({
    ts: Date.now(),
    editedBy: currentUser ? currentUser.id : '?',
    editedByName: currentUser ? currentUser.name : '?',
    snapshot: {
      producto: t.producto,
      lote: t.lote,
      status: t.status,
      assignments: JSON.parse(JSON.stringify(t.assignments||[])),
      notes: t.notes,
      due: t.due,
      priority: t.priority
    }
  });
  // Keep last 20 versions
  if(t._history.length > 20) t._history = t._history.slice(-20);
}

// ── Render task history modal ──
function renderTaskHistory(taskId) {
  const t = tasks.find(function(x){return x.id===taskId;});
  if(!t||!t._history||!t._history.length) return '<div class="empty">Sin historial de ediciones previas</div>';
  const rows = [...t._history].reverse().map(function(h,i){
    const d = new Date(h.ts);

    if(snap.status !== t.status) changes.push('Estado: '+statusLabel(snap.status)+' → '+statusLabel(t.status));
    if(snap.notes !== t.notes) changes.push('Notas modificadas');
    if(snap.due !== t.due) changes.push('Vencimiento: '+fmtDF(snap.due||'')+' → '+fmtDF(t.due||''));
    if(snap.priority !== t.priority) changes.push('Prioridad: '+snap.priority+' → '+t.priority);

// ── 21 CFR Part 11: Data integrity hash ──
function computeIntegrityHash(t) {
  // Simple deterministic checksum of critical fields
  const str = [t.id, t.producto, t.lote, t.status,
    t.reviewedBy||'', t.reviewedDate||'', t.approvedBy||'', t.approvedDate||'',
    (t.assignments||[]).map(function(a){return a.analyst+':'+a.date;}).join(',')
  ].join('|');
  // DJB2 hash
  let hash = 5381;
  for(let i=0;i<str.length;i++){hash=((hash<<5)+hash)+str.charCodeAt(i);hash=hash&hash;}
  return (hash>>>0).toString(16).padStart(8,'0');
}

function verifyTaskIntegrity(t) {
  if(!t._integrityHash) return null; // not yet hashed
  return t._integrityHash === computeIntegrityHash(t);
}

function stampIntegrity(t) {
  t._integrityHash = computeIntegrityHash(t);
  t._integrityTs = Date.now();
  t._integrityBy = currentUser ? currentUser.id : '?';
}

function renderSamplerView(){
  var all=tasks.filter(function(t){return t.status==='a-ingresar'||t.status==='muestra-ok';});
  var myAssigned=all.filter(function(t){return(t.samplerAssignments||[]).some(function(s){return s.sampler===currentUser.id;});});
  var others=all.filter(function(t){return!(t.samplerAssignments||[]).some(function(s){return s.sampler===currentUser.id;});});

  function taskCard(t,isMine){
    var sa=isMine?(t.samplerAssignments||[]).find(function(s){return s.sampler===currentUser.id;}):null;
    var isDone=sa&&sa.done;
    var isOk=t.status==='muestra-ok';
    return'<div class="sampler-card" style="'+(isDone?'opacity:.75':'')+';">'
      +'<div style="display:flex;align-items:flex-start;gap:10px;flex-wrap:wrap">'
      +'<div style="flex:1;min-width:180px">'
      +'<div style="display:flex;align-items:center;gap:6px;margin-bottom:4px">'
      +'<span class="pill '+(isOk?'muestra-ok':'a-ingresar')+'" style="font-size:10px">'+statusLabel(t.status)+'</span>'
      +(t.priority&&t.priority!=='Normal'?'<span class="pill '+t.priority.toLowerCase()+'" style="font-size:10px">'+t.priority+'</span>':'')
      +'</div>'
      +'<div style="font-weight:600;font-size:13px">'+escH(t.producto)+'</div>'
      +'<div style="font-size:11px;color:var(--text3);font-family:var(--mono)">'+escH(t.lote)+'</div>'
      +(t.expectedArrival?'<div style="font-size:11px;color:var(--text2);margin-top:3px">Llegada esperada: <b style="font-family:var(--mono)">'+fmtDDMMYY(t.expectedArrival)+'</b>'+(t.expectedArrival<today()?'<span style="color:var(--red);font-weight:700;margin-left:4px">⚠ vencida</span>':'')+'</div>':'')
      +(t.arrivalNotes?'<div style="font-size:11px;color:var(--text2);margin-top:2px">📝 '+escH(t.arrivalNotes)+'</div>':'')
      +'</div>'
      +'<div style="display:flex;flex-direction:column;align-items:flex-end;gap:6px;min-width:120px">'
      +(isMine&&sa&&sa.assignedNote?'<div style="font-size:11px;color:var(--text2);text-align:right">'+escH(sa.assignedNote)+'</div>':'')
      +(isDone?'<div class="sampling-info">✓ Muestreo realizado<br><b>'+fmtDDMMYY(sa.realArrivalDate)+'</b>'+(sa.lotNotes?'<br>'+escH(sa.lotNotes):'')+(sa.hours?'<br>'+sa.hours.toFixed(1)+'h':'')+'</div>':
        (isMine||t.status==='a-ingresar')?'<button class="btn sm pri" style="background:#059669;border-color:#059669;white-space:nowrap" onclick="openSamplingModal('+t.id+')">✓ Registrar muestreo</button>'
        :'<span class="sampling-info">✓ Muestra OK — pendiente supervisor</span>')
      +'</div>'
      +'</div>'
      +(isOk&&sa&&sa.done?'<div class="sampling-info" style="margin-top:8px">⏳ Pendiente de aprobación por supervisor</div>':'')
      +'</div>';
  }

  var html='';
  if(myAssigned.length){
    html+='<div class="sec" style="margin-bottom:8px">📦 Mis asignaciones de muestreo</div>'
      +myAssigned.map(function(t){return taskCard(t,true);}).join('');
  }
  if(others.length){
    html+='<div class="sec" style="margin-top:16px;margin-bottom:8px;color:var(--text3)">Otros productos a ingresar (sin asignación propia)</div>'
      +others.map(function(t){return taskCard(t,false);}).join('');
  }
  if(!all.length)html='<div class="empty" style="padding:40px">No hay productos "A ingresar" en este momento ✓</div>';
  return html;
}

          </div></div>`:''}
        <div class="scard" onclick="dashFilter=dashFilter==='progress'?'':'progress';render()" style="cursor:pointer;transition:box-shadow .15s${dashFilter==='progress'?';box-shadow:0 0 0 2px var(--blue)':''}">
          <div class="scard-lbl">EN CURSO</div><div class="scard-val" style="color:${prog>0?'var(--blue)':'inherit'}">${prog}</div></div>
        <div class="scard" onclick="dashFilter=dashFilter==='late'?'':'late';render()" style="cursor:pointer;transition:box-shadow .15s${dashFilter==='late'?';box-shadow:0 0 0 2px var(--red)':''}">
          <div class="scard-lbl">VENCIDOS</div><div class="scard-val" style="color:${late>0?'var(--red)':'inherit'}">${late}</div></div>
        <div class="scard" onclick="dashFilter=dashFilter==='done'?'':'done';render()" style="cursor:pointer;transition:box-shadow .15s${dashFilter==='done'?';box-shadow:0 0 0 2px var(--green)':''}">
          <div class="scard-lbl">COMPLETADOS</div><div class="scard-val" style="color:${done>0?'var(--green)':'inherit'}">${done}</div></div>
      </div>
      ${late>0&&!dashFilter?`<div class="notif">⚠ ${late} análisis vencido${late>1?'s':''}. Revisá Pendientes.</div>`:''}
    ${(()=>{const cc=checkAbsenceConflicts();return cc.length>0?`<div class="notif" style="background:var(--orange-bg);color:var(--orange-text);border-color:rgba(138,60,16,.2)">⚠ ${cc.length} análisis asignado${cc.length>1?'s':''} en días no laborables. <button class="btn sm" onclick="currentView='rrhh';rrhhTab='conflicts';render()" style="margin-left:6px;background:var(--orange-text);color:#fff;border-color:transparent">Ver conflictos</button></div>`:'';})()}
      <div style="display:flex;align-items:center;gap:8px;margin-bottom:8px;flex-wrap:wrap">
        <div class="sec" style="margin-bottom:0">${filterLabel[dashFilter]||'Filtrado'}</div>
        ${dashFilter?`<button class="btn sm" onclick="dashFilter='';render()" style="font-size:11px;padding:2px 8px">✕ Limpiar</button>`:''}
        <div style="margin-left:auto;display:flex;gap:4px;flex-wrap:wrap">
          <button class="btn sm${dashFilter===''?' ':'  '}" onclick="dashFilter='';render()" style="${dashFilter===''?'background:var(--bg2);font-weight:600':''}">Todos</button>
          <button class="btn sm" onclick="dashFilter=dashFilter==='pending'?'':'pending';render()" style="${dashFilter==='pending'?'background:var(--amber-bg);color:var(--amber-text);font-weight:600;border-color:var(--amber)':''}">Pendientes</button>
          <button class="btn sm" onclick="dashFilter=dashFilter==='progress'?'':'progress';render()" style="${dashFilter==='progress'?'background:var(--blue-bg);color:var(--blue-text);font-weight:600;border-color:var(--blue)':''}">En curso</button>
          <button class="btn sm" onclick="dashFilter=dashFilter==='late'?'':'late';render()" style="${dashFilter==='late'?'background:var(--red-bg);color:var(--red-text);font-weight:600;border-color:var(--red)':''}">Vencidos</button>
          <button class="btn sm" onclick="dashFilter=dashFilter==='done'?'':'done';render()" style="${dashFilter==='done'?'background:var(--green-bg);color:var(--green-text);font-weight:600;border-color:var(--green)':''}">Completados</button>
          <button id="copybtn-tbl-dash" class="btn sm" onclick="copyTableToClipboard('tbl-dash')" style="border-color:var(--blue);color:var(--blue)">📋 Copiar</button>
        </div>
      </div>
      <div class="filter-row" style="margin-bottom:8px">${searchBarHtml()}</div><div class="tbl" id="tbl-dash">
        <div class="thead-sup">${sortHdrSup('producto','Producto / Lote')}<div>Analistas</div>${sortHdrSup('created','Ingreso')}${sortHdrSup('due','Aprob. límite')}${sortHdrSup('status','Estado')}${sortHdrSup('priority','Prioridad')}<div>Notas</div><div>Acciones</div></div>
        ${filtered.length===0?'<div class="empty">Sin resultados para este filtro</div>':filtered.map(t=>tRowSupLote(t)).join('')}
      </div>`;
  }
  // Sampler dashboard
  if(isSamplerRole()){
    const myPending=tasks.filter(t=>(t.status==='a-ingresar'||t.status==='muestra-ok')&&(t.samplerAssignments||[]).some(s=>s.sampler===currentUser.id&&!s.done));
    const myDoneS=tasks.filter(t=>(t.samplerAssignments||[]).some(s=>s.sampler===currentUser.id&&s.done));
    const myFT=freeTasks.filter(ft=>ft.analystId===currentUser.id&&ft.status!=='done').slice(0,5);
    return`<div class="dash-grid" style="margin-bottom:16px">
      <div class="stat-card"><div class="stat-n" style="color:var(--amber)">${myPending.length}</div><div class="stat-l">Pendientes muestreo</div></div>
      <div class="stat-card"><div class="stat-n" style="color:var(--green)">${myDoneS.length}</div><div class="stat-l">Muestreos realizados</div></div>
    </div>
    ${myPending.length?`<div class="sec" style="margin-bottom:8px">📦 Mis muestreos pendientes</div>
    <div style="margin-bottom:16px">${myPending.map(t=>{
      const sa=(t.samplerAssignments||[]).find(s=>s.sampler===currentUser.id&&!s.done);
      const isOk=t.status==='muestra-ok';
      return'<div class="sampler-card">'
        +'<div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap">'
        +'<span class="pill '+(isOk?'muestra-ok':'a-ingresar')+'" style="font-size:10px">'+statusLabel(t.status)+'</span>'
        +'<b style="font-size:13px">'+escH(t.producto)+'</b>'
        +'<span style="font-family:var(--mono);font-size:11px;color:var(--text3)">'+escH(t.lote)+'</span>'
        +(t.expectedArrival?'<span style="font-size:11px;color:var(--text3)">Esperado: <b>'+fmtDDMMYY(t.expectedArrival)+'</b></span>':'')
        +'</div>'
        +(sa&&sa.assignedNote?'<div style="font-size:11px;color:var(--text2);margin-top:4px">📝 '+escH(sa.assignedNote)+'</div>':'')
        +(!isOk?'<div style="margin-top:8px"><button class="btn sm pri" style="background:#059669;border-color:#059669" onclick="openSamplingModal('+t.id+')">✓ Registrar muestreo</button></div>':'<div style="margin-top:6px;font-size:11px;color:#065f46;background:#d1fae5;padding:4px 10px;border-radius:var(--radius);display:inline-block">✓ Muestreo registrado — pendiente aprobación supervisor</div>')
        +'</div>';
    }).join('')}</div>`:''}
    ${myFT.length?`<div class="sec" style="margin-bottom:6px">Tareas libres pendientes</div>
    <div class="tbl">${myFT.map(ft=>`<div class="trow" onclick="openFreeTaskModal(${ft.id})">`
      +`<div style="font-size:12px">${escH(ft.description||'')}</div>`
      +`<div style="font-family:var(--mono);font-size:11px">${ft.date?fmtDDMMYY(ft.date):'—'}</div>`
      +`<div><span class="pill ${ft.status||'pending'}" style="font-size:10px">${statusLabel(ft.status||'pending')}</span></div>`
      +`</div>`).join('')}</div>`:''}`;
  }
  // ── Analyst / Reviewer / Staff — "Mi día" con 3 secciones ──
  var _myId=currentUser.id;
  var _todayStr=today();

  // ¿El analista ya completó SU parte en esta tarea?
  function _myPartDone(t){
    var myA=(t.assignments||[]).filter(function(a){return a.analyst===_myId&&!a._removed;});
    if(!myA.length)return false;
    return myA.every(function(a){
      return(a.realHours>0)||(a.sessions&&a.sessions.length>0)||!!a._completedBySup;
    });
  }
  // Fecha más temprana de asignación pendiente (no hecha) de este analista
  function _myEarliestPending(t){
    var pend=(t.assignments||[]).filter(function(a){
      return a.analyst===_myId&&!a._removed
        &&!((a.realHours>0)||(a.sessions&&a.sessions.length>0)||!!a._completedBySup);
    });
    if(!pend.length)return null;
    return pend.map(function(a){return a.date||'9999';}).sort()[0];
  }

  var myTasks=tasks.filter(function(t){
    return t.status!=='a-ingresar'&&t.status!=='muestra-ok'
      &&(t.assignments||[]).some(function(a){return a.analyst===_myId&&!a._removed;});
  });
  var _termSt=['done','reviewed','approved'];

  // Pares {t, a} por cada ASIGNACIÓN individual pendiente (no por tarea)
  // Así una asignación ya hecha no arrastra a las otras del mismo producto
  var _pendingCombos=[];
  myTasks.forEach(function(t){
    if(_termSt.includes(t.status))return;
    if(t.status==='pending-confirm')return;
    if(t.status==='observed'){
      var myA=(t.assignments||[]).filter(function(a){return a.analyst===_myId&&!a._removed;});
      if(myA.length)_pendingCombos.push({t:t,a:myA[0],date:myA[0].date||_todayStr});
      return;
    }
    (t.assignments||[]).forEach(function(a){
      if(a.analyst!==_myId||a._removed)return;
      var done=(a.realHours>0)||(a.sessions&&a.sessions.length>0)||!!a._completedBySup;
      if(!done)_pendingCombos.push({t:t,a:a,date:a.date||''});
    });
  });

  var pastCombos   =_pendingCombos.filter(function(x){return x.t.status!=='observed'&&x.date<_todayStr;});
  var todayCombos  =_pendingCombos.filter(function(x){return x.t.status==='observed'||x.date===_todayStr;});
  var upcomingCombos=_pendingCombos.filter(function(x){return x.t.status!=='observed'&&x.date>_todayStr;});

  // Tareas libres pendientes de aceptación (status==='pending') para "Mi día"
  var _myFTPast=freeTasks.filter(function(ft){return ft.analystId===_myId&&ft.status==='pending'&&(ft.date||'')<_todayStr;});
  var _myFTToday=freeTasks.filter(function(ft){return ft.analystId===_myId&&ft.status==='pending'&&(ft.date||'')=== _todayStr;});
  var _myFTUpcoming=freeTasks.filter(function(ft){return ft.analystId===_myId&&ft.status==='pending'&&(ft.date||'')>_todayStr;});

  var myDone=myTasks.filter(function(t){return _termSt.includes(t.status);});
  var myHReal=myTasks.reduce(function(s,t){
    return s+(t.assignments||[]).filter(function(a){return a.analyst===_myId;})
      .reduce(function(s2,a){return s2+(a.realHours||0);},0);
  },0);
  var totalAction=pastCombos.length+todayCombos.length+_myFTPast.length+_myFTToday.length;

  // Cabecera de sección
  function _secHdr(label,count,bg,border,textColor){
    return'<div style="display:flex;align-items:center;gap:8px;margin:16px 0 8px;padding:8px 12px;background:'+bg+';border-left:3px solid '+border+';border-radius:var(--radius)">'
      +'<span style="font-weight:700;font-size:13px;color:'+textColor+'">'+label+'</span>'
      +(count>0?'<span style="font-size:11px;font-weight:700;color:'+border+';background:'+border+'22;padding:1px 8px;border-radius:10px">'+count+'</span>':'')
      +'</div>';
  }

  // Tarjeta de tarea libre en "Mi día"
  function _ftCard(ft){
    var notifFt=replanNotifs.find(function(n){return n.type==='free_task_assigned'&&n.freeTaskId===ft.id&&n.status==='pending';});
    var h=ft.suggestedHours||ft.hours||0;
    var daysLate=ft.date&&ft.date<_todayStr?Math.round((new Date(_todayStr+'T12:00:00')-new Date(ft.date+'T12:00:00'))/86400000):0;
    return'<div style="background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);padding:10px 14px;margin-bottom:6px;display:flex;align-items:center;gap:12px">'
      +'<span style="font-size:20px;flex-shrink:0">✏</span>'
      +'<div style="flex:1;min-width:0">'
      +'<div style="font-weight:600;font-size:13px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">'+escH(ft.description)+'</div>'
      +'<div style="font-size:11px;color:var(--text2);margin-top:1px">'+fmtDF(ft.date)
        +(h?' · '+h+'h sugeridas':'')
        +(ft.notes?' · '+escH(ft.notes):'')
        +(daysLate>0?'<span style="color:var(--red);font-weight:600;margin-left:4px">· '+daysLate+' día'+(daysLate!==1?'s':'')+' de atraso</span>':'')
      +'</div>'
      +'</div>'
      +'<div style="display:flex;gap:6px;flex-shrink:0">'
      +'<button class="btn suc sm" onclick="confirmFreeTaskAsAnalyst('+ft.id+','+(notifFt?notifFt.id:0)+')" style="font-size:11px">✓ Realizada</button>'
      +(notifFt?'<button class="btn dan sm" onclick="declineFreeTask('+notifFt.id+')" style="font-size:11px">✗ No puedo</button>':'')
      +'</div>'
      +'</div>';
  }

  var _html='';

  // Stats
  _html+='<div class="dash-grid" style="margin-bottom:16px">'
    +'<div class="stat-card"><div class="stat-n" style="color:'+(totalAction>0?'var(--amber)':'var(--green)')+'">'+totalAction+'</div><div class="stat-l">Requieren acción</div></div>'
    +'<div class="stat-card"><div class="stat-n" style="color:var(--blue)">'+myTasks.filter(function(t){return t.status==='progress'||t.status==='pending-confirm';}).length+'</div><div class="stat-l">En curso</div></div>'
    +'<div class="stat-card"><div class="stat-n" style="color:var(--green)">'+myDone.length+'</div><div class="stat-l">Completados</div></div>'
    +(myHReal>0?'<div class="stat-card"><div class="stat-n" style="color:var(--green)">'+myHReal.toFixed(1)+'h</div><div class="stat-l">H. Real total</div></div>':'')
    +'</div>';

  // ── PASADAS ──
  if(pastCombos.length>0||_myFTPast.length>0){
    _html+=_secHdr('⚠ Anteriores sin completar',pastCombos.length+_myFTPast.length,'var(--amber-bg)','var(--amber)','var(--amber-text)');
    if(_myFTPast.length)_html+=_myFTPast.map(_ftCard).join('');
    if(pastCombos.length)_html+='<div class="tbl">'+pastCombos.map(function(x){return tRowAna(x.t,x.a);}).join('')+'</div>';
  }

  // ── HOY ──
  _html+=_secHdr('📅 Hoy — '+fmtDF(_todayStr),todayCombos.length+_myFTToday.length,'var(--blue-bg)','var(--blue)','var(--blue-text)');
  if(todayCombos.length===0&&_myFTToday.length===0){
    _html+='<div class="empty" style="margin-bottom:4px">No hay actividades para hoy ✓</div>';
  } else {
    if(_myFTToday.length)_html+=_myFTToday.map(_ftCard).join('');
    if(todayCombos.length)_html+='<div class="tbl">'+todayCombos.map(function(x){return tRowAna(x.t,x.a);}).join('')+'</div>';
  }

  // ── PRÓXIMAS ──
  if(upcomingCombos.length>0||_myFTUpcoming.length>0){
    _html+=_secHdr('→ Próximas',upcomingCombos.length+_myFTUpcoming.length,'var(--bg2)','var(--border2)','var(--text2)');
    if(_myFTUpcoming.length)_html+=_myFTUpcoming.map(_ftCard).join('');
    if(upcomingCombos.length)_html+='<div class="tbl">'+upcomingCombos.map(function(x){return tRowAna(x.t,x.a);}).join('')+'</div>';
  }

  return _html;
}

      +(t.status==='done'?'<button class="btn sm" style="background:var(--green);color:#fff;border-color:var(--green);font-size:11px;font-weight:600;padding:3px 9px" onclick="event.stopPropagation();markReviewed('+t.id+')">✓ Revisar</button>':'')
      +(t.status==='reviewed'&&isSupRole()?'<button class="btn sm" style="background:var(--blue);color:#fff;border-color:var(--blue);font-size:11px;font-weight:600;padding:3px 9px" onclick="event.stopPropagation();markApproved('+t.id+')">✓ Aprobar</button>':'')
      +((t.status==='done'||t.status==='reviewed')&&(isSupRole()||isReviewerRole())?'<button class="btn sm" style="background:var(--amber-bg);color:var(--amber-text);border-color:var(--amber);font-size:11px;padding:3px 7px" onclick="event.stopPropagation();markObserved('+t.id+')" title="Observar">⚑ Obs.</button>':'')
      +(isSupRole()?'<button class="btn sm" title="Replanificar" onclick="event.stopPropagation();openReplanSuper('+t.id+')" style="font-size:10px;padding:2px 4px">↺</button>':'')

      +'</div>';
  return row+'</div>';
}

  return assigns.map(function(a,idx){

    var isFirst=idx===0;
    var aDone=aReal>0;
    var aStatusLabel=aDone?'✓ Completado':t.status==='progress'?'En curso':t.status==='scheduled'?'Programado':'Ingresado';
    var aStatusColor=aDone?'var(--green)':t.status==='progress'?'var(--blue)':'var(--text3)';

        +'<div class="cell-sub cell-trunc" style="color:'+(isFirst?'var(--text3)':'var(--border)')+'">'+escH(t.lote)+'</div>'
        +'</div>';
    // C2 Analista (this row)
    row+='<div style="display:flex;align-items:center;gap:5px">'
        +(u?'<div class="av '+u.av+'" style="width:20px;height:20px;font-size:8px;flex-shrink:0">'+escH(u.avInit)+'</div>':'')
        +(u?'<span style="font-size:11px;font-weight:500;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">'+escH(u.name.split(' ')[0])+'</span>':'')
        +'</div>';
    // C3 Ingreso (first row only)
